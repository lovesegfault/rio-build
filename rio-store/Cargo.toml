[package]
name = "rio-store"
version.workspace = true
edition.workspace = true
authors.workspace = true
license.workspace = true
repository.workspace = true
publish = false
description = "NAR content-addressable store for rio-build"

[[bin]]
name = "rio-store"
path = "src/main.rs"

[dependencies]
rio-common = { workspace = true }
rio-nix = { workspace = true }
rio-proto = { workspace = true }

# Async runtime
tokio = { workspace = true }
async-trait = { workspace = true }

# gRPC
tonic = { workspace = true }
tokio-stream = { workspace = true }

# Database
sqlx = { workspace = true }

# S3
aws-sdk-s3 = { workspace = true }
aws-config = { workspace = true }

# Byte buffers
bytes = { workspace = true }

# Crypto
sha2 = { workspace = true }
# narinfo signing. Signatures are computed at PutPath time and stored
# in narinfo.signatures so the HTTP cache server never touches the privkey.
ed25519-dalek = { workspace = true }
base64 = { workspace = true }

# Phase 2c chunked CAS
fastcdc = { workspace = true }
blake3 = { workspace = true }
# join_all for bounded-parallel S3 HeadObject batches (exists_batch).
# Worker already uses this; not a new transitive dep.
futures-util = "0.3"
# In-process chunk cache. Lock-free, weight-based eviction — tracks
# byte-size per entry so the 2GB cap is a real memory bound, not just
# an entry count.
moka = { workspace = true }
# Singleflight: DashMap<hash, Shared<JoinHandle>> tracks in-flight
# backend fetches so N concurrent GetPaths for the same chunk issue
# one S3 GET, not N.
dashmap = { workspace = true }

# Encoding
hex = { workspace = true }

# CLI
clap = { workspace = true }

# Logging & metrics
tracing = { workspace = true }
metrics = { workspace = true }

# Error handling
anyhow = { workspace = true }
thiserror = { workspace = true }

# Config
serde = { workspace = true }

[dev-dependencies]
rio-test-support = { path = "../rio-test-support" }
tempfile = { workspace = true }
tokio = { workspace = true, features = ["test-util"] }
tokio-stream = { workspace = true, features = ["net"] }
aws-smithy-mocks = "0.2"
aws-sdk-s3 = { workspace = true, features = ["test-util"] }
proptest = { workspace = true }
