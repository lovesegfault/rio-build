name: CI
on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read
  id-token: write   # OIDC → niks3 + codecov

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  # Cancel stale PR runs; never cancel pushes to main.
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

env:
  NIKS3_URL: http://niks3.niks3.svc.cluster.local:5751
  # Flake attr prefix for CI targets. See flake.nix githubActions.
  GHA: githubActions

jobs:
  # Fast matrix generator — the ONLY dependency for matrix jobs.
  # ~1min total (checkout + nix-install + two nix evals). No
  # workspace build on the critical path; each downstream job
  # builds what it needs and pushes to cache opportunistically.
  gen-matrix:
    name: gen-matrix
    runs-on: rio-ci
    timeout-minutes: 60
    outputs:
      checks: ${{ steps.matrix.outputs.checks }}
      vm: ${{ steps.matrix.outputs.vm }}
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup-nix
      - name: Generate matrices from flake
        id: matrix
        run: |
          set -euo pipefail
          checks=$(nix eval ".#${GHA}.matrix.checks" --json --apply builtins.attrNames)
          vm=$(nix eval ".#${GHA}.matrix.vm-test" --json --apply builtins.attrNames)
          echo "checks=$checks" >> "$GITHUB_OUTPUT"
          echo "vm=$vm" >> "$GITHUB_OUTPUT"
          echo "::notice::checks matrix: $checks"
          echo "::notice::vm matrix: $vm"

  checks:
    name: check / ${{ matrix.check }}
    needs: gen-matrix
    runs-on: rio-ci
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        check: ${{ fromJSON(needs.gen-matrix.outputs.checks) }}
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup-nix
      - run: nix build ".#${GHA}.matrix.checks.${{ matrix.check }}" --print-build-logs
      - uses: ./.github/actions/niks3-push
        if: always() && !cancelled()

  # No needs — starts immediately. Fuzz builds (nightly rust,
  # independent dep tree) don't share anything with cargo checks.
  fuzz-smoke:
    name: fuzz-smoke
    runs-on: rio-ci
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup-nix
      - run: nix build ".#${GHA}.fuzz-smoke" --print-build-logs
      - uses: ./.github/actions/niks3-push
        if: always() && !cancelled()

  # No needs — starts immediately.
  coverage-unit:
    name: coverage / unit
    runs-on: rio-ci
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup-nix
      - run: nix build ".#${GHA}.coverage-unit" --print-build-logs
      - uses: codecov/codecov-action@v5
        with:
          files: result
          flags: unit
          use_oidc: true
      - uses: ./.github/actions/niks3-push
        if: always() && !cancelled()

  vm-test:
    name: vm / ${{ matrix.test }}
    needs: gen-matrix
    runs-on: rio-ci-kvm
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        test: ${{ fromJSON(needs.gen-matrix.outputs.vm) }}
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup-nix
        with:
          kvm: true
      - name: Verify KVM
        run: '[[ -c /dev/kvm && -r /dev/kvm && -w /dev/kvm ]]'
      - run: nix build ".#${GHA}.matrix.vm-test.${{ matrix.test }}" --print-build-logs
      - uses: ./.github/actions/niks3-push
        if: always() && !cancelled()

  vm-coverage:
    name: coverage / ${{ matrix.test }}
    needs: gen-matrix
    runs-on: rio-ci-kvm
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        test: ${{ fromJSON(needs.gen-matrix.outputs.vm) }}
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup-nix
        with:
          kvm: true
      - name: Verify KVM
        run: '[[ -c /dev/kvm && -r /dev/kvm && -w /dev/kvm ]]'
      - run: nix build ".#${GHA}.matrix.vm-coverage.${{ matrix.test }}" --print-build-logs
      - uses: codecov/codecov-action@v5
        with:
          files: result
          flags: ${{ matrix.test }}
          use_oidc: true
      - uses: ./.github/actions/niks3-push
        if: always() && !cancelled()

  # Single stable name for branch protection. Dynamic matrices
  # mean individual entry names (e.g. "vm / vm-phase1a") change
  # as tests are added/removed — marking them required would
  # break. This job fans-in and succeeds iff every upstream did.
  #
  # alls-green treats `skipped` as failure (GitHub branch protection
  # doesn't, which is a well-known footgun — a skipped required
  # check silently passes).
  ci-gate:
    name: CI gate
    if: always()
    needs: [gen-matrix, checks, fuzz-smoke, coverage-unit, vm-test, vm-coverage]
    runs-on: rio-ci
    timeout-minutes: 60
    steps:
      - uses: re-actors/alls-green@release/v1
        with:
          jobs: ${{ toJSON(needs) }}
