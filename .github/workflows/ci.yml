name: CI
on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read
  id-token: write   # OIDC → niks3 + codecov

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  # Cancel stale PR runs; never cancel pushes to main.
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

env:
  NIKS3_URL: http://niks3.niks3.svc.cluster.local:5751
  # Flake attr prefix for CI targets. See flake.nix githubActions.
  GHA: githubActions

jobs:
  # Fast matrix generator — the ONLY dependency for every job.
  # ~1min: checkout + nix-install + one nix eval. No workspace
  # build on the critical path; each downstream job builds what
  # it needs and pushes to cache opportunistically.
  gen-matrix:
    name: gen-matrix
    runs-on: rio-ci
    timeout-minutes: 60
    outputs:
      checks: ${{ steps.gen.outputs.checks }}
      fuzz-smoke: ${{ steps.gen.outputs.fuzz-smoke }}
      vm-test: ${{ steps.gen.outputs.vm-test }}
      coverage: ${{ steps.gen.outputs.coverage }}
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup-nix
      - name: Generate matrices from flake
        id: gen
        # One eval emits all four matrices as a JSON object; jq
        # splits into per-matrix outputs. Adding a new matrix to
        # flake.nix → add one `echo` line + one `outputs:` entry.
        run: |
          set -euo pipefail
          all=$(nix eval ".#${GHA}.matrix" --json \
            --apply 'builtins.mapAttrs (_: builtins.attrNames)')
          echo "::notice::matrices: $all"
          for m in checks fuzz-smoke vm-test coverage; do
            echo "$m=$(jq -c --arg m "$m" '.[$m]' <<<"$all")" >> "$GITHUB_OUTPUT"
          done

  checks:
    name: check / ${{ matrix.name }}
    needs: gen-matrix
    runs-on: rio-ci
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        name: ${{ fromJSON(needs.gen-matrix.outputs.checks) }}
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup-nix
      - run: nix build ".#${GHA}.matrix.checks.${{ matrix.name }}" --print-build-logs
      - uses: ./.github/actions/niks3-push
        if: always() && !cancelled()

  fuzz-smoke:
    name: fuzz / ${{ matrix.name }}
    needs: gen-matrix
    runs-on: rio-ci
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        name: ${{ fromJSON(needs.gen-matrix.outputs.fuzz-smoke) }}
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup-nix
      - run: nix build ".#${GHA}.matrix.fuzz-smoke.${{ matrix.name }}" --print-build-logs
      - uses: ./.github/actions/niks3-push
        if: always() && !cancelled()

  vm-test:
    name: vm / ${{ matrix.name }}
    needs: gen-matrix
    runs-on: rio-ci-kvm
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        name: ${{ fromJSON(needs.gen-matrix.outputs.vm-test) }}
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup-nix
        with:
          kvm: true
      - name: Verify KVM
        run: '[[ -c /dev/kvm && -r /dev/kvm && -w /dev/kvm ]]'
      - run: nix build ".#${GHA}.matrix.vm-test.${{ matrix.name }}" --print-build-logs
      - uses: ./.github/actions/niks3-push
        if: always() && !cancelled()

  coverage:
    name: coverage / ${{ matrix.name }}
    needs: gen-matrix
    # Runner selection by naming convention: `vm-*` entries need
    # KVM (instrumented VM tests → profraw → lcov). `unit` runs
    # on spot. See flake.nix githubActions comment.
    runs-on: ${{ startsWith(matrix.name, 'vm-') && 'rio-ci-kvm' || 'rio-ci' }}
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        name: ${{ fromJSON(needs.gen-matrix.outputs.coverage) }}
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup-nix
        with:
          kvm: ${{ startsWith(matrix.name, 'vm-') }}
      - name: Verify KVM
        if: startsWith(matrix.name, 'vm-')
        run: '[[ -c /dev/kvm && -r /dev/kvm && -w /dev/kvm ]]'
      - run: nix build ".#${GHA}.matrix.coverage.${{ matrix.name }}" --print-build-logs
      - uses: codecov/codecov-action@v5
        with:
          files: result
          flags: ${{ matrix.name }}
          use_oidc: true
      - uses: ./.github/actions/niks3-push
        if: always() && !cancelled()

  # Single stable name for branch protection. Dynamic matrices
  # mean individual entry names change as tests are added/removed —
  # marking them required would break. This job fans-in and succeeds
  # iff every upstream did.
  #
  # alls-green treats `skipped` as failure (GitHub branch protection
  # doesn't, which is a well-known footgun — a skipped required
  # check silently passes).
  ci-gate:
    name: CI gate
    if: always()
    needs: [gen-matrix, checks, fuzz-smoke, vm-test, coverage]
    runs-on: rio-ci
    timeout-minutes: 60
    steps:
      - uses: re-actors/alls-green@release/v1
        with:
          jobs: ${{ toJSON(needs) }}
