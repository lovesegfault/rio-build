name: weekly
on:
  schedule:
    # 03:00 UTC Monday. Daemon builds are ~20-30min each cold-cache;
    # running overnight keeps the spot fleet quiet during dev hours.
    - cron: '0 3 * * 1'
  workflow_dispatch:

permissions:
  contents: read
  id-token: write   # OIDC → niks3

env:
  NIKS3_URL: http://niks3.niks3.svc.cluster.local:5751

jobs:
  # Multi-Nix golden conformance matrix: 4 daemon variants × the
  # golden_conformance test suite. See docs/src/verification.md
  # § Multi-Nix compatibility matrix.
  #
  # Building the linkfarm pulls all four variant runs as one job —
  # serialising on one runner is cheaper than fanning out (3 of the 4
  # daemons share the same cargoArtifacts cache, so cold-start is the
  # nix-daemon compile not the Rust compile).
  golden-matrix:
    runs-on: rio-ci
    timeout-minutes: 180
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup-nix
      - name: Build golden matrix with bumped unstable inputs
        run: |
          # Test against tip of nix-unstable + lix. --override-input forces
          # a fresh fetch of each flakeref (bypassing flake.lock) so the
          # "surfaces breakage early" claim in verification.md is actually
          # true — without this, the weekly run tests the same locked revs
          # forever. nix-pinned + nix-stable stay locked (those are the
          # "guaranteed compatible" baselines). Dev+CI always use locked
          # revs; only this weekly run tests tip.
          nix build .#golden-matrix --print-build-logs \
            --override-input nix-unstable github:NixOS/nix \
            --override-input lix git+https://git.lix.systems/lix-project/lix
      - uses: ./.github/actions/niks3-push
        if: always() && !cancelled()

  # Mutation testing — ~320 scoped mutations × per-mutant nextest
  # run. Missed-count (survived mutants) is the trend metric; the
  # job does NOT fail on nonzero. See docs/src/verification.md
  # § Mutation testing.
  #
  # Serial with golden-matrix (one-runner-at-a-time is fine for a
  # weekly 3-UTC cron; mutants is the slower job so it goes second).
  mutants:
    runs-on: rio-ci
    timeout-minutes: 240
    needs: golden-matrix
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup-nix
      - run: nix build .#mutants --print-build-logs
      # Surface the trend metric in the job summary. The
      # derivation's install phase already extracted these.
      - run: |
          echo "### Mutation testing — week of $(date -u +%Y-%m-%d)" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Outcome | Count |" >> "$GITHUB_STEP_SUMMARY"
          echo "|---|---|" >> "$GITHUB_STEP_SUMMARY"
          echo "| Caught | $(cat result/caught-count) |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Missed | $(cat result/missed-count) |" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          head -50 result/mutants.out/missed.txt >> "$GITHUB_STEP_SUMMARY" || true
          echo '```' >> "$GITHUB_STEP_SUMMARY"
      - uses: ./.github/actions/niks3-push
        if: always() && !cancelled()
