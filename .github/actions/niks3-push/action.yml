name: Push to niks3
description: Push Nix store paths to rio-nix-cache via OIDC-authenticated niks3
inputs:
  paths:
    description: Store paths or result symlinks to push (space-separated glob)
    default: './result*'
runs:
  using: composite
  steps:
    - name: Push store paths to niks3
      shell: bash
      run: |
        set -euo pipefail
        # Bail silently if build produced nothing (e.g. failed early).
        shopt -s nullglob
        paths=(${{ inputs.paths }})
        if [[ ${#paths[@]} -eq 0 ]]; then
          echo "No result paths found, skipping cache push"
          exit 0
        fi

        # Fork PRs don't get id-token: write (GitHub security policy),
        # so ACTIONS_ID_TOKEN_REQUEST_TOKEN is unset. Skip the push —
        # cache miss on fork PRs is acceptable, failing CI is not.
        if [[ -z "${ACTIONS_ID_TOKEN_REQUEST_TOKEN:-}" ]]; then
          echo "No OIDC token available (fork PR?), skipping cache push"
          exit 0
        fi

        # Get OIDC token with niks3 as audience.
        OIDC=$(curl -sSfH "Authorization: Bearer $ACTIONS_ID_TOKEN_REQUEST_TOKEN" \
          "$ACTIONS_ID_TOKEN_REQUEST_URL&audience=$NIKS3_URL" | jq -r .value)
        echo "::add-mask::$OIDC"

        # niks3 CLI via Nix — build (or substitute) and get the
        # store path. Include it in the push so the first job to
        # complete uploads it to S3; subsequent jobs cache-hit.
        niks3=$(nix build .#githubActions.niks3 --no-link --print-out-paths)
        "$niks3/bin/niks3" push \
          --server-url "$NIKS3_URL" --auth-token "$OIDC" \
          "${paths[@]}" "$niks3"
