name: Drain niks3 queue
description: Wait for the post-build-hook uploader to finish, then stop it
runs:
  using: composite
  steps:
    # This used to do the push itself. Now setup-nix installs a
    # post-build-hook that queues every locally-built path the
    # instant its derivation finishes, and a daemon uploads in
    # the background. By the time we get here most paths are
    # already in S3 — including when the build step failed
    # partway (cargoArtifacts built+uploaded, clippy crashed →
    # next run substitutes cargoArtifacts, only reruns clippy).
    #
    # All this step does now is wait for the queue to drain and
    # kill the daemon. ci.yml's `if: always() && !cancelled()`
    # still applies — we drain on failure too, that's the point.
    #
    # $GITHUB_ACTION_PATH here is THIS action's dir (niks3-push),
    # so we reach sideways for the script. Fragile-looking but
    # the two actions are versioned together in one repo, so the
    # relative layout is as stable as the rest of .github/.
    - name: Drain niks3 upload queue
      shell: bash
      run: |
        set -euo pipefail
        QUEUE="$RUNNER_TEMP/niks3-queue"
        SCRIPT="$GITHUB_ACTION_PATH/../setup-nix/niks3_hook.py"
        LOG="$RUNNER_TEMP/niks3-daemon.log"

        /usr/bin/python3 "$SCRIPT" \
          --mode=drain \
          --queue="$QUEUE" \
          --done="$QUEUE.done" \
          --pid-file="$RUNNER_TEMP/niks3-daemon.pid" \
          --timeout=300

        if [[ -s "$LOG" ]]; then
          echo "::group::niks3 daemon log"
          cat "$LOG"
          echo "::endgroup::"
        fi
