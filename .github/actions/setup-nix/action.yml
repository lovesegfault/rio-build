name: Setup Nix
description: Install Nix with rio-nix-cache substituter + niks3 post-build-hook
inputs:
  kvm:
    description: Add kvm/nixos-test system-features
    default: 'false'
runs:
  using: composite
  steps:
    # post-build-hook goes into /etc/nix/nix.conf via extra-conf, and
    # the daemon reads that at startup — so the hook script must exist
    # on disk BEFORE the installer runs.
    #
    # Nix invokes the hook with NO arguments and a stripped env (only
    # $DRV_PATH and $OUT_PATHS — see `man nix.conf`). So we can't pass
    # --mode=hook or --queue on the command line, and we can't read
    # $RUNNER_TEMP or $GITHUB_ACTION_PATH at hook-exec time. Hence
    # the two-line shim: it bakes in the resolved absolute paths to
    # both the python script and the queue file, determined NOW, so
    # the hook itself needs zero environment.
    #
    # /usr/bin/python3 not /usr/bin/env python3 — the nix daemon's
    # PATH when executing the hook is anyone's guess, but /usr/bin
    # is always there on the ARC runner image.
    #
    # Queue and done files are created here as the runner user so
    # the daemon (also runner user) can read them; the hook runs as
    # root via the nix daemon and appends.
    - name: Install niks3 post-build-hook shim
      shell: bash
      run: |
        set -euo pipefail
        QUEUE="$RUNNER_TEMP/niks3-queue"
        SCRIPT="$GITHUB_ACTION_PATH/niks3_hook.py"
        install -m 0666 /dev/null "$QUEUE"
        install -m 0666 /dev/null "$QUEUE.done"
        cat > "$RUNNER_TEMP/niks3-hook" <<SHIM
        #!/bin/sh
        exec /usr/bin/python3 "$SCRIPT" --mode=hook --queue="$QUEUE"
        SHIM
        chmod 0755 "$RUNNER_TEMP/niks3-hook"

    # Upstream NixOS action (no telemetry). No tags yet — pin by SHA.
    - uses: NixOS/nix-installer-action@228d8a956062db04221c97c2794ea443194824aa
      with:
        # Default is true; it writes a udev rule to /etc/udev/rules.d/
        # which doesn't exist in ARC runner containers. We handle KVM
        # ourselves: hostPath mount (arc.tf) + system-features below.
        enable-kvm: false
        # extra-conf lands verbatim in /etc/nix/nix.conf before the
        # daemon launches. ${{ runner.temp }} is a GHA context expanded
        # at action-evaluation time — the daemon sees a literal path.
        extra-conf: |
          substituters = https://rio-nix-cache.s3.us-west-2.amazonaws.com https://cache.nixos.org
          trusted-public-keys = rio-nix-cache:er1fTC0pPR1nSGU+qcYJPle1CW1xtTJul+gA/kUo0KI= cache.nixos.org-1:6NCHdD59X431o0gWypbMrAURkbJ16ZPMQFGspcDShjY=
          max-jobs = auto
          sandbox = true
          post-build-hook = ${{ runner.temp }}/niks3-hook
          ${{ inputs.kvm == 'true' && 'system-features = nixos-test benchmark big-parallel kvm' || '' }}

    # Uploader daemon. Follows the queue from line 1 (so anything
    # queued during the niks3 build below is picked up), fetches a
    # fresh OIDC per entry, pushes, writes a .done line for drain
    # to count against.
    #
    # Fork PRs don't get id-token:write → request token env is unset.
    # Skip the daemon. The hook still fires (queue grows harmlessly);
    # drain sees no pid file and short-circuits.
    #
    # nohup + setsid + full stdio redirect decouples the process from
    # this step's shell. GHA steps share a job container, so a process
    # backgrounded here survives into later steps as long as nothing
    # still ties it to the step's fds.
    - name: Start niks3 uploader daemon
      shell: bash
      run: |
        set -euo pipefail

        if [[ -z "${ACTIONS_ID_TOKEN_REQUEST_TOKEN:-}" ]]; then
          echo "No OIDC token available (fork PR?) — hook will queue but nothing uploads"
          exit 0
        fi

        # Build (or substitute) the niks3 CLI. If it builds locally
        # the hook queues it → daemon's first upload is niks3 itself.
        NIKS3_BIN=$(nix build .#githubActions.niks3 --no-link --print-out-paths)/bin/niks3

        QUEUE="$RUNNER_TEMP/niks3-queue"
        LOG="$RUNNER_TEMP/niks3-daemon.log"
        PID="$RUNNER_TEMP/niks3-daemon.pid"
        SCRIPT="$GITHUB_ACTION_PATH/niks3_hook.py"

        # OIDC env vars are job-scoped, so the subshell inherits them;
        # the python script reads them directly.
        nohup setsid /usr/bin/python3 "$SCRIPT" \
          --mode=daemon \
          --queue="$QUEUE" \
          --done="$QUEUE.done" \
          --niks3-bin="$NIKS3_BIN" \
          --server-url="$NIKS3_URL" \
          </dev/null >"$LOG" 2>&1 &

        echo $! > "$PID"
        echo "niks3 uploader daemon started (pid $(cat "$PID"), log: $LOG)"
