depends_on:
- lint

steps:
- name: build nix-supervisor
  image: bash
  commands:
  - test -n "$CI_HACK_WORK_DIR" && cd $CI_HACK_WORK_DIR; true
  - nix-build --no-out-link nix-supervisor --argstr buildType debug

- name: build nix-web
  image: bash
  commands:
  - test -n "$CI_HACK_WORK_DIR" && cd $CI_HACK_WORK_DIR; true
  - nix-build --no-out-link nix-web --argstr buildType debug

- name: build nix-daemon (nix test)
  image: bash
  commands:
  - test -n "$CI_HACK_WORK_DIR" && cd $CI_HACK_WORK_DIR; true
  - nix-build --no-out-link nix-daemon/tests.nix -A test-nix -A test-nix.binary-cache

when:
- event: [ push, pull_request, pull_request_closed, tag, release, manual, cron ]
