<!DOCTYPE html>
<html lang="en-GB">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>{% block title %}nix-web{% endblock %}</title>
  <link rel="stylesheet" href="/static/bootstrap.css">
  <link rel="stylesheet" href="/static/style.css" />
</head>
<body>

<nav class="navbar">
  <div class="container">
    <a class="navbar-brand" href="/">nix-web</a>
    <form class="d-flex" role="search" action="/goto">
      <input name="path" class="form-control me-2" type="search" placeholder="/nix/store/..." value="{% block goto %}{% endblock %}" aria-label="Path" autofocus />
      <button class="btn btn-outline-success" type="submit">Go</button>
    </form>
  </div>
</nav>

<div class="container">
  {% block content %}{% endblock %}
</div>

<script src="/static/bootstrap.js"></script>
</body>
</html>
