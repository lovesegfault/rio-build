[package]
name = "gorgon-build-nix"
version = "0.1.0"
edition = "2021"
license = "EUPL-1.2"

[dependencies]
gorgon-build-helper = { path = "../gorgon-build-helper" }
gorgond-client = { path = "../gorgond-client" }
gorgon-util-cli = { path = "../gorgon-util-cli" }
nix-daemon = { path = "../nix-daemon" }

chrono.workspace = true
clap-stdin = "0.6.0"
clap.workspace = true
derive_more.workspace = true
miette = { workspace = true, features = ["fancy", "syntect-highlighter"] }
once_cell = { version = "1.21.3", features = ["parking_lot"] }
owo-colors.workspace = true
serde_json.workspace = true
thiserror.workspace = true
tracing.workspace = true
url.workspace = true

[dev-dependencies]
pretty_assertions = "1.4.1"
strip-ansi-escapes = "0.2.1"
