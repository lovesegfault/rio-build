[package]
name = "gorgond"
version = "0.1.0"
edition = "2021"
license = "EUPL-1.2"

[dependencies]
gorgon-build-helper = { path = "../gorgon-build-helper" }
gorgond-client = { path = "../gorgond-client", features = ["axum", "diesel"] }
gorgond-diesel = { path = "../gorgond-diesel" }

axum-extra = { workspace = true, features = ["erased-json"] }
axum = { workspace = true, features = ["macros", "http1", "tokio"] }
backon.workspace = true
bytesize.workspace = true
chrono.workspace = true
clap.workspace = true
clio.workspace = true
derive_more.workspace = true
diesel-async = { workspace = true, features = ["async-connection-wrapper", "deadpool", "postgres"] }
diesel_migrations.workspace = true
diesel = { workspace = true, features = ["chrono", "uuid", "postgres_backend", "32-column-tables", "with-deprecated"] }
futures.workspace = true
humantime.workspace = true
miette = { workspace = true, features = ["fancy", "syntect-highlighter"] }
minicbor-io.workspace = true
minicbor.workspace = true
ownable.workspace = true
scoped-futures.workspace = true
serde_json.workspace = true
serde = { workspace = true, features = ["derive"] }
syntect.workspace = true
thiserror.workspace = true
tokio-stream.workspace = true
tokio-util.workspace = true
tokio = { workspace = true, features = ["rt", "rt-multi-thread", "net", "signal", "macros"] }
tower-http = { version = "0.6.2", features = ["trace"] }
tracing-subscriber.workspace = true
tracing.workspace = true
uuid.workspace = true
yoke = { workspace = true, features = ["derive"] }
