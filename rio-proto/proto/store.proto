syntax = "proto3";
package rio.store;

import "google/protobuf/empty.proto";
import "types.proto";

// Store service for NAR storage and path metadata.
// Inspired by tvix castore/store protos (MIT).
service StoreService {
  // Upload a store path (metadata + streaming NAR data).
  rpc PutPath(stream rio.types.PutPathRequest) returns (rio.types.PutPathResponse);

  // Upload multiple store paths atomically (multi-output derivation).
  // All outputs commit in ONE database transaction; if any fails
  // validation, none are registered. Use this instead of N independent
  // PutPath calls when cross-output atomicity matters (it always does
  // for multi-output derivations — partial registration breaks the
  // "all outputs or none" contract).
  rpc PutPathBatch(stream rio.types.PutPathBatchRequest) returns (rio.types.PutPathBatchResponse);

  // Download a store path's NAR data (streaming).
  rpc GetPath(rio.types.GetPathRequest) returns (stream rio.types.GetPathResponse);

  // Query metadata for a single store path.
  rpc QueryPathInfo(rio.types.QueryPathInfoRequest) returns (rio.types.PathInfo);

  // Query metadata for many paths in one call. I-110: the builder's
  // input-closure BFS was issuing ~800 QueryPathInfo RPCs per build;
  // with 246 ephemeral builders concurrently that saturated the store's
  // PG pool (acquire times → 11s → FUSE circuit-breaker → EIO). Batch
  // reduces it to ~10 RPCs (one per BFS layer), each backed by ONE
  // `WHERE store_path_hash = ANY(...)` query.
  //
  // Local-only: unlike QueryPathInfo this does NOT do per-path upstream
  // substitution or sig-visibility gating — both would re-introduce N
  // round-trips. Callers that need those semantics use QueryPathInfo.
  rpc BatchQueryPathInfo(rio.types.BatchQueryPathInfoRequest) returns (rio.types.BatchQueryPathInfoResponse);

  // Batch check which paths are missing from the store.
  rpc FindMissingPaths(rio.types.FindMissingPathsRequest) returns (rio.types.FindMissingPathsResponse);

  // Content-addressed lookup: find a store path by its content hash.
  rpc ContentLookup(rio.types.ContentLookupRequest) returns (rio.types.ContentLookupResponse);

  // Resolve a store path from its 32-char nixbase32 hash part.
  //
  // wopQueryPathFromHashPart (29) gives us just "abc123..." (the hash-part
  // from /nix/store/{hash-part}-{name}). The Nix daemon looks this up in its
  // ValidPaths table by prefix. We need the same: WHERE store_path LIKE
  // '/nix/store/' || hash_part || '-%'. Without this RPC, the gateway was
  // calling QueryPathInfo with a constructed path that has no name — always
  // a miss.
  //
  // Also reused by cache_server.rs for /{hash}.narinfo HTTP requests.
  rpc QueryPathFromHashPart(rio.types.QueryPathFromHashPartRequest) returns (rio.types.PathInfo);

  // Append signatures to an existing store path's narinfo.
  //
  // wopAddSignatures (37): Nix clients send this after `nix store sign`.
  // Persists: UPDATE narinfo SET signatures = signatures || $2.
  rpc AddSignatures(rio.types.AddSignaturesRequest) returns (rio.types.AddSignaturesResponse);

  // Register a CA derivation realisation (wopRegisterDrvOutput, 42).
  //
  // When Nix finishes building a CA derivation, it sends us the mapping
  // (modular_drv_hash, output_name) -> (output_path, output_hash). We store
  // it so future builds of the same derivation can cache-hit via
  // QueryRealisation — even before Phase 5's full early-cutoff activation.
  //
  // Idempotent (ON CONFLICT DO NOTHING): the same (drv_hash, output_name)
  // always maps to the same output_path (CA derivations are deterministic
  // by construction), so a duplicate registration is a no-op, not an error.
  rpc RegisterRealisation(rio.types.RegisterRealisationRequest) returns (rio.types.RegisterRealisationResponse);

  // Query a CA derivation realisation (wopQueryRealisation, 43).
  //
  // Nix asks "has (drv_hash, output_name) been built before?" and expects
  // back the output_path if yes. NOT_FOUND means "build it yourself" —
  // a normal cache miss, not an error. The gateway translates NOT_FOUND
  // into an empty-set wire response (u64 count = 0).
  rpc QueryRealisation(rio.types.QueryRealisationRequest) returns (rio.types.Realisation);

  // Per-tenant store usage + quota. Gateway calls this before
  // SubmitBuild (r[store.gc.tenant-quota-enforce]) to reject over-quota
  // tenants with STDERR_ERROR. Takes tenant_name (not UUID) so the
  // gateway can call in dual-mode (no JWT → no tenant_id resolved).
  // The store joins tenants on tenant_name to get tenant_id +
  // gc_max_store_bytes, then sums narinfo.nar_size via path_tenants.
  //
  // Cached 30s gateway-side — quota is soft, a few MB of race-window
  // overflow is acceptable. NOT_FOUND on unknown tenant_name (gateway
  // treats as no-quota, passes through).
  rpc TenantQuota(rio.types.TenantQuotaRequest) returns (rio.types.TenantQuotaResponse);
}

// Chunk-level storage service for content-defined chunking.
// PutChunk is UNIMPLEMENTED (server-side chunking only; see chunk.rs).
service ChunkService {
  // Upload a chunk.
  rpc PutChunk(stream rio.types.PutChunkRequest) returns (rio.types.PutChunkResponse);

  // Download a chunk by its digest.
  rpc GetChunk(rio.types.GetChunkRequest) returns (stream rio.types.GetChunkResponse);

  // Batch check which chunks are missing from the store.
  rpc FindMissingChunks(rio.types.FindMissingChunksRequest) returns (rio.types.FindMissingChunksResponse);
}

// Store-side administrative operations. The scheduler's AdminService.
// TriggerGC proxies to this after populating extra_roots from live
// builds. Separate service from StoreService so it can have separate
// RBAC/TLS (admin ops are more privileged than PutPath/GetPath).
service StoreAdminService {
  // Run garbage collection: mark reachable paths (from gc_roots +
  // uploading manifests + grace period + extra_roots), sweep
  // unreachable complete manifests (DELETE CASCADE + chunk decrement
  // + pending_s3_deletes enqueue). Streams GCProgress updates.
  //
  // dry_run=true: compute stats but ROLLBACK the sweep tx.
  rpc TriggerGC(rio.types.GCRequest) returns (stream rio.types.GCProgress);

  // Pin a store path (add to gc_roots). Protects it from GC
  // regardless of reachability. Explicit unpin via UnpinPath.
  rpc PinPath(rio.types.PinPathRequest) returns (rio.types.PinPathResponse);

  // Remove a GC root. The path becomes eligible for collection
  // on the next GC run (if unreachable).
  rpc UnpinPath(rio.types.PinPathRequest) returns (rio.types.PinPathResponse);

  // Backfill references + re-sign for paths uploaded before the worker
  // refscan fix (migration 010 marks them refs_backfilled=FALSE).
  // Cursor-paginated: caller loops until response.cursor is empty.
  // Idempotent per path — safe to re-run on crash.
  rpc ResignPaths(rio.types.ResignPathsRequest) returns (rio.types.ResignPathsResponse);

  // PG↔backend chunk consistency audit: HeadObject every non-deleted
  // chunk, stream PG-says-exists-but-backend-says-no. I-040 diagnostic —
  // catches chunks stranded by key-format changes (the I-007 prefix-
  // normalize) or genuinely lost (S3 lifecycle policies, manual deletes).
  // Read-only; no repair (a missing chunk could be at a legacy key,
  // and the get() fallback already covers that on the read path).
  rpc VerifyChunks(rio.types.VerifyChunksRequest) returns (stream rio.types.VerifyChunksProgress);

  // Per-tenant upstream cache CRUD (tenant_upstreams, migration 026).
  // r[store.substitute.upstream] — the substitution fetch logic itself
  // lands in P0462; these RPCs configure which upstreams a tenant
  // trusts and with what sig_mode.

  // List a tenant's configured upstreams, ORDER BY priority ASC.
  rpc ListUpstreams(rio.types.ListUpstreamsRequest) returns (rio.types.ListUpstreamsResponse);

  // Add an upstream cache for a tenant. ALREADY_EXISTS on duplicate
  // (tenant_id, url). INVALID_ARGUMENT on bad sig_mode.
  rpc AddUpstream(rio.types.AddUpstreamRequest) returns (rio.types.UpstreamInfo);

  // Remove an upstream by (tenant_id, url). NOT_FOUND if no match.
  rpc RemoveUpstream(rio.types.RemoveUpstreamRequest) returns (google.protobuf.Empty);
}
