syntax = "proto3";
package rio.types;

// Admin/status wire types — ClusterStatus, ListExecutors/Builds/Tenants,
// GetBuildLogs, DrainExecutor, ClearPoison, GetSizeClassStatus. Data
// types for the AdminService RPCs defined in admin.proto.
//
// Same `package rio.types;` — prost merges by package into a single
// `rio.types.rs` so Rust callers see these at `rio_proto::types::*`.

import "google/protobuf/timestamp.proto";
import "types.proto";       // ExecutorInfo.resources → ResourceUsage
import "build_types.proto"; // BuildInfo.state → BuildState; ExecutorInfo.kind → ExecutorKind

// ───────────────────────────────────────────────────────────────────────────
// Cluster / executors / builds status
// ───────────────────────────────────────────────────────────────────────────

message ClusterStatusResponse {
  uint32 total_executors = 1;
  uint32 active_executors = 2;
  uint32 draining_executors = 3;
  uint32 pending_builds = 4;
  uint32 active_builds = 5;
  uint32 queued_derivations = 6;
  uint32 running_derivations = 7;
  uint64 store_size_bytes = 8;           // Total store usage
  google.protobuf.Timestamp uptime_since = 9;
  // Total in-flight FOD demand: (Ready | Assigned | Running) +
  // is_fixed_output. The controller's FetcherPool autoscaler scales on
  // this. NOT a subset of queued_derivations (which is Ready-only) —
  // Ready-only undercounts since the first N FODs go Ready→Assigned
  // within one dispatch tick, leaving 0 for a 30s controller poll.
  uint32 queued_fod_derivations = 10;
  // Per-system breakdown of queued_derivations (Ready-only, same
  // semantics as the scalar). Sum across all keys == queued_derivations.
  // BuilderPool autoscalers sum the entries matching pool.spec.systems
  // so an aarch64 pool doesn't scale on x86_64 backlog (I-107). Empty
  // map from old schedulers → controller falls back to the scalar.
  map<string, uint32> queued_by_system = 11;
}

message ListExecutorsRequest {
  string status_filter = 1;              // Optional: "alive", "draining", "dead"
}

message ListExecutorsResponse {
  repeated ExecutorInfo executors = 1;
}

message ExecutorInfo {
  string executor_id = 1;
  // Systems this executor supports. Mirrors HeartbeatRequest.systems.
  repeated string systems = 2;
  repeated string supported_features = 3;
  reserved 4;                            // was max_builds (P0537: always 1)
  reserved 5;                            // was uint32 running_builds (P0537: → bool busy)
  string status = 6;                     // "alive", "draining", "dead"
  ResourceUsage resources = 7;           // (types.proto)
  google.protobuf.Timestamp last_heartbeat = 8;
  google.protobuf.Timestamp connected_since = 9;
  string size_class = 10;                // empty = unknown/unclassified (fetchers always empty)
  ExecutorKind kind = 11;                // builder or fetcher (build_types.proto)
  bool busy = 12;                        // A build is in flight (P0537: at most one per executor)
}

message ListBuildsRequest {
  string status_filter = 1;              // Optional: "pending", "active", "succeeded", "failed", "cancelled"
  uint32 limit = 2;                      // Max results (default: 100)
  uint32 offset = 3;                     // Pagination offset (unstable under concurrent inserts — prefer cursor)
  // Optional: filter by tenant NAME (scheduler resolves to UUID). Empty = all tenants.
  string tenant_filter = 4;
  // Opaque keyset cursor — pass the prior page's next_cursor verbatim.
  // When set, offset is ignored (cursor wins). Server encodes; clients
  // treat as an opaque token.
  optional string cursor = 5;
}

message ListBuildsResponse {
  repeated BuildInfo builds = 1;
  uint32 total_count = 2;               // Total matching builds (for pagination)
  // Opaque cursor for the next page. Unset if this page is the last
  // (fewer rows than limit). Pass as ListBuildsRequest.cursor to continue.
  optional string next_cursor = 3;
}

message BuildInfo {
  string build_id = 1;
  string tenant_id = 2;
  string priority_class = 3;
  BuildState state = 4;                  // (build_types.proto)
  uint32 total_derivations = 5;
  uint32 completed_derivations = 6;
  uint32 cached_derivations = 7;
  google.protobuf.Timestamp submitted_at = 8;
  google.protobuf.Timestamp started_at = 9;
  google.protobuf.Timestamp finished_at = 10;
  string error_summary = 11;
}

message GetBuildLogsRequest {
  string build_id = 1;
  string derivation_path = 2;            // Optional: filter to a specific derivation
  uint64 since_line = 3;                 // Resume from this line number
}

// Chunk of build log data streamed from scheduler.
message BuildLogChunk {
  string derivation_path = 1;
  repeated bytes lines = 2;              // Raw log lines (may be non-UTF-8)
  uint64 first_line_number = 3;
  bool is_complete = 4;                  // true if no more lines follow
}

// ───────────────────────────────────────────────────────────────────────────
// Drain / poison / tenants
// ───────────────────────────────────────────────────────────────────────────

message DrainExecutorRequest {
  string executor_id = 1;
  bool force = 2;                        // If true, cancel running builds on the executor
}

message DrainExecutorResponse {
  bool accepted = 1;
  reserved 2;                            // was uint32 running_builds (P0537: → bool busy)
  bool busy = 3;                         // A build is still in flight (will complete before drain)
}

// Why a builder/fetcher Pod's container terminated. Populated by the
// controller from k8s PodStatus (containerStatuses[].state.terminated.
// reason for OOMKilled/Completed/Error; status.reason+message for
// Evicted). The scheduler uses OomKilled / EvictedDiskPressure to gate
// size_class_floor promotion — bare disconnect no longer infers OOM.
enum TerminationReason {
  // Wire-default: controller couldn't classify (no terminated state,
  // status not yet populated). Scheduler treats as no-op.
  TERMINATION_REASON_UNKNOWN = 0;
  // containerStatuses[].state.terminated.reason == "OOMKilled". Pod hit
  // memory limit. → promote size_class_floor.
  TERMINATION_REASON_OOM_KILLED = 1;
  // status.reason == "Evicted" + message mentions DiskPressure /
  // ephemeral-storage. Node ran out of disk. → promote size_class_floor
  // (next-larger pod gets a bigger ephemeral-storage request).
  TERMINATION_REASON_EVICTED_DISK_PRESSURE = 2;
  // status.reason == "Evicted", other cause (MemoryPressure, PID
  // pressure, node-shutdown). NOT a per-drv sizing signal. → no-op.
  TERMINATION_REASON_EVICTED_OTHER = 3;
  // Exit 0. Expected one-shot exit after CompletionReport. → no-op.
  TERMINATION_REASON_COMPLETED = 4;
  // Exit !=0, non-OOM (panic, SIGKILL from operator, node failure).
  // NOT a sizing signal — pod death wasn't the build's fault. → no-op.
  TERMINATION_REASON_ERROR = 5;
  // Job.status.conditions has type=Failed reason=DeadlineExceeded —
  // activeDeadlineSeconds backstop fired (worker wedged past its own
  // daemon_timeout). → promote size_class_floor + bump timeout_count
  // (same bounded ladder as worker-reported TimedOut). Reported by JOB
  // name (pod is already deleted by Job controller); scheduler prefix-
  // matches recently_disconnected.
  TERMINATION_REASON_DEADLINE_EXCEEDED = 6;
}

message ReportExecutorTerminationRequest {
  // Pod metadata.name (== RIO_EXECUTOR_ID downward-API value the
  // worker registered with). Scheduler resolves to the drv that was
  // running at disconnect via its recently_disconnected map.
  string executor_id = 1;
  TerminationReason reason = 2;
  // Pod's size_class label. The scheduler usually has this from the
  // disconnect-time capture, but the controller sends it anyway so a
  // report that races ahead of (or replaces a swept) disconnect entry
  // can still resolve next_*_class. Empty = unclassed.
  string size_class = 3;
}

message ReportExecutorTerminationResponse {
  // size_class_floor was actually bumped. False for non-resource
  // reasons, unknown executor (already swept / never had a running
  // build at disconnect), or already at the largest class.
  bool promoted = 1;
}

message ClearPoisonRequest {
  // Key the scheduler's DAG is keyed on — in production this is the
  // full .drv store path (e.g. `/nix/store/abc...-foo.drv`). rio-cli
  // validates the format client-side so a bare hash doesn't silently
  // return cleared=false.
  string derivation_hash = 1;
}

message ClearPoisonResponse {
  bool cleared = 1;                      // true if the derivation was poisoned and is now cleared
}

message PoisonedDerivation {
  string drv_path = 1;                   // full /nix/store/...drv path (what ClearPoison takes)
  repeated string failed_executors = 2;  // executors that tried and failed
  uint64 poisoned_secs_ago = 3;          // age; TTL is 24h
}

message ListPoisonedResponse {
  repeated PoisonedDerivation derivations = 1;
}

// Actor-state snapshot for one derivation. Unlike GetBuildGraph (PG-backed),
// this reads the in-memory DAG + live stream pool. The golden field is
// executor_has_stream: false for an Assigned/Running derivation = the stream
// is dead, dispatch can never complete. I-025 diagnostic.
message DerivationDiagnostic {
  string drv_path = 1;
  string drv_hash = 2;
  // DerivationStatus enum as string: "Ready", "Assigned", "Running", etc.
  // String not enum so the CLI doesn't need to track every variant.
  string status = 3;
  bool is_fod = 4;                      // Routes to fetcher pool vs builder pool
  // Assignment state (empty unless Assigned/Running).
  string assigned_executor = 5;
  // Whether self.executors.contains_key(assigned_executor). THE I-025 signal.
  // Only meaningful when assigned_executor is non-empty.
  bool executor_has_stream = 6;
  // Retry accounting.
  uint32 retry_count = 7;
  uint32 infra_retry_count = 8;
  // Seconds remaining on retry backoff. 0 = no backoff or elapsed.
  // Answers "why isn't this Ready drv being dispatched".
  uint64 backoff_remaining_secs = 9;
  // How many builds need this derivation (>1 = shared across builds, dedup).
  uint32 interested_build_count = 10;
  // hard_filter inputs (I-062). Three "restart fixes it" stuck-Ready
  // cases where PG looked clean but the actor's in-memory state was
  // unobservable. Same lesson as I-056b's draining/degraded: every
  // field hard_filter reads must be in the diagnostic.
  string system = 11;                     // can_build() any-match against executor.systems
  repeated string required_features = 12; // can_build() all-match against executor.features
  repeated string failed_builders = 13;   // executors hard_filter excludes for this drv
  // I-062: simulated hard_filter against EVERY executor in the live
  // pool, with the FIRST failing clause named. Only populated for
  // status=Ready (the question "why isn't this dispatching" is only
  // meaningful then). Reasons: kind-mismatch, draining, store-degraded,
  // not-registered, at-capacity, system-mismatch, feature-missing,
  // failed-on, size-class-{undeclared,mismatch}, resource-fit, or
  // ACCEPT (would dispatch — if EVERY executor shows ACCEPT and the
  // drv stays Ready, the rejection is outside hard_filter; that's the
  // load-bearing finding for I-062).
  repeated ExecutorRejection rejections = 14;
}

message ExecutorRejection {
  string executor_id = 1;
  string reason = 2;
}

message InspectBuildDagRequest {
  string build_id = 1;
}

message InspectBuildDagResponse {
  repeated DerivationDiagnostic derivations = 1;
  // Executors in the live stream pool. For "this executor is in PG but not here" diff.
  repeated string live_executor_ids = 2;
}

// Actor in-memory snapshot of one executor's connection state. Unlike
// ExecutorInfo (PG-backed via ListExecutors), this reads the live
// `self.executors` HashMap — what dispatch_ready() sees. The I-048b/c
// signal: an entry with has_stream=false is a zombie (heartbeat-created,
// no BuildExecution stream — dispatch can never reach it). PG last_seen
// shows it [alive]; the actor knows it's dead.
message DebugExecutorState {
  string executor_id = 1;
  // stream_tx.is_some(). false = no BuildExecution bidi stream connected
  // to THIS leader. PG may show last_seen recent (heartbeat is unary,
  // succeeds independently). I-048b zombies have has_stream=false: entry
  // exists, no stream. The smoking gun for "PG says alive, actor disagrees".
  bool has_stream = 2;
  // has_stream && !systems.is_empty(). Dispatch's hard filter — false
  // means this entry is invisible to assignment.
  bool is_registered = 3;
  // Warm-gate. false = waiting on PrefetchComplete ACK; dispatch blocked
  // unless no warm worker passes the hard filter (cold-fallback). Warm
  // builders prevent that fallback for cold ones — explains "registered
  // but never gets work".
  bool warm = 4;
  // Builder vs fetcher. FOD dispatch only routes to fetchers, non-FOD only
  // to builders, no fallback. A queued FOD with zero fetcher entries here
  // = stuck (the I-048c symptom: fod_queue=3 fetcher_util=0.00).
  ExecutorKind kind = 5;
  // Populated by first heartbeat. Empty = stream connected, no heartbeat
  // arrived yet (the gap is_registered checks for).
  repeated string systems = 6;
  // Instant::elapsed() on last_heartbeat. Staleness of the actor's view.
  // PG last_seen may be more recent if heartbeats reach PG but the actor's
  // entry was created stale (or vice versa post-failover).
  uint64 last_heartbeat_ago_secs = 7;
  reserved 8;                            // was uint32 running_count (P0537: derivable as running_build.is_some())
  reserved 9;                            // was repeated string running_builds (P0537: → optional running_build)
  // I-056b: has_capacity() checks `!draining && !store_degraded`. Neither
  // was visible here — 45min chasing PG/recovery red herrings when the
  // FOD-stuck-22min root was a stale drain flag surviving reconnect.
  // The diagnostic for "why isn't this dispatching" couldn't show the
  // answer. Either true → has_capacity() is false → invisible to dispatch
  // regardless of stream/registered/warm.
  bool draining = 10;
  bool store_degraded = 11;
  // The drv hash the actor THINKS this worker is building (P0537: at
  // most one). Can drift from the worker's own view (TOCTOU,
  // I-032-style lost completions). For diffing against
  // InspectBuildDag's assigned_executor — a derivation Assigned to an
  // executor not listing it here (or one whose has_stream=false) is
  // stuck.
  optional string running_build = 12;
}

message DebugListExecutorsResponse {
  // One per entry in the actor's self.executors HashMap. Empty on a
  // standby (actor map cleared on lease loss) — useful diagnostic info
  // in itself; this RPC deliberately does NOT reject on standby.
  repeated DebugExecutorState executors = 1;
}

// Tenant info for ListTenants/CreateTenant.
message TenantInfo {
  string tenant_id = 1;                  // UUID as string
  string tenant_name = 2;
  uint32 gc_retention_hours = 3;
  optional uint64 gc_max_store_bytes = 4;
  google.protobuf.Timestamp created_at = 5;
  bool has_cache_token = 6;              // whether cache_token is set (don't leak the token itself)
}

message ListTenantsResponse {
  repeated TenantInfo tenants = 1;
}

message CreateTenantRequest {
  string tenant_name = 1;
  optional uint32 gc_retention_hours = 2;
  optional uint64 gc_max_store_bytes = 3;
  optional string cache_token = 4;       // Bearer token for binary cache; NULL = no cache access
}

message CreateTenantResponse {
  TenantInfo tenant = 1;
}

// CreateEphemeralBuilderRequest/Response removed 2026-03 — the
// ControllerService they served was speculative proto with zero
// callers/implementers. reconcile_ephemeral polls ClusterStatus (the
// poll-driven architecture is the explicit design choice; see
// ephemeral.rs module docs). Fields 1-2 reserved in case a future
// push-path lands and wants wire compatibility with old clients that
// somehow shipped the stub — unlikely but cheap insurance.
//
// reserved: CreateEphemeralBuilderRequest {pool=1, hint=2},
//           CreateEphemeralBuilderResponse {job_name=1}

// ───────────────────────────────────────────────────────────────────────────
// SITA-E size-class status (GetSizeClassStatus)
// Live snapshot of the rebalancer's state: effective vs configured cutoffs,
// per-class queue depth, sample counts. HUB for P0234 (autoscaler reads
// effective_cutoff), P0236 (CLI prints table), P0237 (CLI embeds in WPS
// describe).
// ───────────────────────────────────────────────────────────────────────────

message SizeClassStatus {
  string name = 1;
  // Current (post-rebalancer) cutoff. The rebalancer EMA-smooths this
  // hourly against build_samples — drifts from configured over time.
  double effective_cutoff_secs = 2;
  // Static TOML cutoff (scheduler.toml `[[size_classes]]` cutoff_secs).
  // Drift visibility: if effective diverged 3× from configured, either
  // the workload shifted or the initial config was off.
  double configured_cutoff_secs = 3;
  // Derivations in ready-queue that WOULD classify into this class.
  // Computed by classify() on each Ready-status derivation's
  // est_duration — the same call dispatch_ready() makes. O(n) in
  // ready-queue depth; fine for an operator/autoscaler-facing RPC.
  uint64 queued = 4;
  // Derivations currently Assigned/Running on executors of this class.
  // Counted via DerivationState.assigned_size_class (set at dispatch
  // time, may reflect overflow — a small build on a large builder
  // counts as "running in large").
  uint64 running = 5;
  // build_samples rows in the rebalancer's lookback window (default 7
  // days) whose duration_secs falls within this class's effective
  // cutoff band. Feeds the "is the rebalancer working off enough data
  // for this class?" operator question.
  uint64 sample_count = 6;
  // Per-system breakdown of `queued` (sum across keys == `queued`).
  // I-143: size-class pools are per-arch (one BPS per arch). Without
  // this, an x86-64-tiny pool reads `queued` for the WHOLE class —
  // including aarch64 derivations it can never build — and spawns at
  // ceiling for wrong-arch work. Controller intersects this map with
  // `BuilderPool.spec.systems`. Empty map (old scheduler) → controller
  // falls back to the scalar.
  map<string, uint64> queued_by_system = 7;
  // Per-system breakdown of `running` (sum across keys == `running`).
  // Symmetry with `queued_by_system` for operator/dashboard use.
  map<string, uint64> running_by_system = 8;
  // ADR-023 SLA-driven sizing: per-derivation spawn intents. When the
  // pool's BuilderPoolSet has `sizing: Sla`, the scheduler pre-computes
  // (cores, mem, disk) per queued derivation and exposes one intent per
  // drv here; the controller spawns one pod per intent with those
  // resources stamped in (pod resources are immutable post-create, so
  // they must be known at spawn time, not at heartbeat-dispatch time).
  // Empty under `sizing: Static` — controller falls back to the scalar
  // `queued` and per-class `spec.resources`.
  repeated SpawnIntent spawn_intents = 9;
}

// ADR-023: scheduler-computed resources for one to-be-spawned builder
// pod. The controller stamps these into the pod's `resources.requests`
// + `limits` and annotates the pod with `rio.build/intent-id`; the
// builder reads the annotation via downward-API → `RIO_INTENT_ID` →
// HeartbeatRequest.intent_id → scheduler matches the heartbeating pod
// to its pre-computed assignment.
message SpawnIntent {
  // Opaque match key. Scheduler-generated; the controller passes it
  // through verbatim as a pod annotation. NOT a drv path (the
  // scheduler may re-plan before the pod heartbeats).
  string intent_id = 1;
  uint32 cores = 2;
  uint64 mem_bytes = 3;
  uint64 disk_bytes = 4;
  // ADR-023 phase-13: per-(band, cap) targeting. Merged into the
  // pod's nodeSelector by the controller (apply_intent_resources).
  // Empty under hw_cost_source=None — pod lands wherever Karpenter
  // bin-packs cheapest.
  map<string, string> node_selector = 5;
}

message GetSizeClassStatusRequest {
  // I-176: when `filter_features=true`, per-class `queued` /
  // `queued_by_system` only count Ready derivations whose
  // `required_features ⊆ pool_features` — derivations a worker
  // advertising exactly `pool_features` would pass hard_filter's
  // feature check for. The controller sets this per-pool so a kvm
  // pool spawns for kvm-required work (which classify() may bucket
  // into any duration class) and a featureless pool stops spawning
  // for feature-gated work it can't build.
  //
  // `filter_features=false` (default) → unfiltered. Distinguishes
  // "no filter" (CLI, BPS status, pre-I-176 controllers) from
  // "filter to required_features=∅" (a pool with `features: []`).
  // proto3 repeated can't be optional, hence the explicit bool.
  repeated string pool_features = 1;
  bool filter_features = 2;
}

message GetSizeClassStatusResponse {
  // Sorted by effective_cutoff_secs ascending (smallest class first).
  // Empty = size-classes not configured on this scheduler (optional
  // feature).
  repeated SizeClassStatus classes = 1;
  // FOD (fetcher) classes — same names as `classes` (fetcher tiers ARE
  // builder tiers), smallest first. Same `SizeClassStatus` shape but
  // cutoff/sample fields are zero — fetcher routing is reactive
  // (`size_class_floor`, r[sched.fod.size-class-reactive]), not
  // duration-estimated. `queued` counts in-flight FOD demand
  // (Ready+Assigned+Running) bucketed by `size_class_floor` so sum
  // across classes == `ClusterStatus.queued_fod_derivations`. P0556:
  // ephemeral FetcherPool reconciler reads this for per-class Job
  // spawning. Empty = `[[size_classes]]` unconfigured.
  repeated SizeClassStatus fod_classes = 2;
}

// ───────────────────────────────────────────────────────────────────────────
// Estimator stats (GetEstimatorStats) — I-124
// ───────────────────────────────────────────────────────────────────────────
// Dump of the in-memory build_history snapshot the scheduler classifies
// from. `rio-cli estimator` — operator answer to "why is this drv routed
// to large?" / "is the EMA for X plausible?". Unlike GetSizeClassStatus
// (per-class aggregate) this is per-(pname,system) detail.

message EstimatorEntry {
  // Derivation pname (build_history key, not full drv path).
  string drv_name = 1;
  // build_history.sample_count — how many completions have fed this EMA.
  // Low (1-2) = the EMA is mostly the first sample; treat with suspicion.
  uint64 sample_count = 2;
  double ema_duration_secs = 3;
  // 0 = no memory signal yet (pre-cgroup-memory.peak builds, or all
  // samples failed before cgroup populated).
  double ema_peak_memory_bytes = 4;
  // What classify() returns for this entry under the CURRENT effective
  // (post-rebalancer) cutoffs. Empty = size-classes unconfigured.
  string size_class = 5;
  // build_history is keyed (pname, system); same pname on x86_64 vs
  // aarch64 are separate rows with separate EMAs.
  string system = 6;
}

message GetEstimatorStatsRequest {
  // Substring match on drv_name (pname). Empty = all entries.
  optional string drv_name_filter = 1;
}

message GetEstimatorStatsResponse {
  // Sorted by sample_count desc (most-observed first).
  repeated EstimatorEntry entries = 1;
}

// ───────────────────────────────────────────────────────────────────────────
// InjectBuildSample (sla-sizing VM test fixture)
// ───────────────────────────────────────────────────────────────────────────

// One synthetic build_samples row. Mirrors the columns the SLA fit
// reads; everything else (node_name, …) is left NULL.
message InjectBuildSampleRequest {
  string pname = 1;
  string system = 2;
  string tenant = 3;
  double duration_secs = 4;
  int64 peak_memory_bytes = 5;
  optional double cpu_limit_cores = 6;
  optional double cpu_seconds_total = 7;
  optional string version = 8;
  // hw-normalize subtest: tag the row with a synthetic hw_class so the
  // refit's reference-second normalization can be asserted.
  optional string hw_class = 9;
}

// ADR-023 phase-13: one interrupt_samples row. kind="interrupt"
// (value=1, on a SpotInterrupted Event) or kind="exposure" (value=
// node-uptime seconds, on Node DELETE). hw_class is the controller's
// NodeLabelCache join — same "{mfr}-{gen}-{storage}" string the
// hw_perf_samples path uses.
message AppendInterruptSampleRequest {
  string hw_class = 1;
  string kind = 2;
  double value = 3;
}

// ───────────────────────────────────────────────────────────────────────────
// ADR-023 SLA overrides (Set/List/ClearSlaOverride, ResetSlaModel, SlaStatus)
// ───────────────────────────────────────────────────────────────────────────

// One sla_overrides row. Unset optional = NULL / wildcard. `id`/
// `created_at_epoch` are server-populated on Set; clients leave them 0.
message SlaOverride {
  int64 id = 1;
  string pname = 2;
  // NULL system/tenant = wildcard (r[sched.sla.override-precedence]:
  // pname+system+tenant > pname+system > pname).
  optional string system = 3;
  optional string tenant = 4;
  optional string cluster = 5;
  // Named tier from `[sla].tiers`. Mutually independent of cores/mem —
  // a row may force a tier (solve still runs) OR force exact cores/mem
  // (solve bypassed) OR both.
  optional string tier = 6;
  optional double p50_secs = 7;
  optional double p90_secs = 8;
  optional double p99_secs = 9;
  optional double cores = 10;
  optional int64 mem_bytes = 11;
  optional string capacity_type = 12;
  // Unix epoch seconds. Unset = never expires. Expired rows are
  // filtered server-side (List/resolve both ignore them).
  optional double expires_at_epoch = 13;
  double created_at_epoch = 14;
  optional string created_by = 15;
}

message SetSlaOverrideRequest {
  // The override to insert. `id`/`created_at_epoch` ignored.
  SlaOverride override = 1;
}

message ListSlaOverridesRequest {
  // Exact-match filter on pname. Empty = all.
  optional string pname = 1;
}

message ListSlaOverridesResponse {
  // Non-expired overrides, ordered by created_at DESC (newest first).
  repeated SlaOverride overrides = 1;
}

message ClearSlaOverrideRequest {
  int64 id = 1;
}

message ResetSlaModelRequest {
  string pname = 1;
  string system = 2;
  string tenant = 3;
}

message SlaStatusRequest {
  string pname = 1;
  string system = 2;
  string tenant = 3;
}

// Snapshot of one cached FittedParams. Stringly-typed `fit_kind` /
// `mem_kind` so the CLI doesn't need to track every DurationFit variant.
message SlaStatusResponse {
  // false ⇔ key never seen / evicted. All other fields zero-valued.
  bool has_fit = 1;
  // "Probe" / "Amdahl" / "Capped" / "Usl"
  string fit_kind = 2;
  double s = 3;
  double p = 4;
  double q = 5;
  double p_bar = 6;
  // "Coupled" / "Independent"
  string mem_kind = 7;
  uint64 mem_p90_bytes = 8;
  optional uint64 disk_p90_bytes = 9;
  double sigma_resid = 10;
  double n_eff = 11;
  double span = 12;
  optional string tier = 13;
  // Override that would apply to this key under current precedence
  // rules, if any. Lets `rio-cli sla status` show "fit says X, override
  // forces Y" in one call.
  optional SlaOverride active_override = 14;
  // "seed" / "fleet" / "operator" / "" — provenance of the prior
  // partial-pooled into this fit (r[sched.sla.prior-partial-pool]).
  // Empty when no prior was applied (priors disabled or pure per-key).
  string prior_source = 15;
}

message SlaExplainRequest {
  string pname = 1;
  string system = 2;
  string tenant = 3;
}

// One tier's solve attempt. `c_star`/`mem_bytes` are populated as far
// as the solve got before `binding_constraint` fired.
message SlaCandidateRow {
  string tier = 1;
  optional double c_star = 2;
  optional uint64 mem_bytes = 3;
  // "p90" | "serial-floor" | "discriminant" | "core-ceiling" |
  // "mem-ceiling" | "disk-ceiling" | "-" (feasible).
  string binding_constraint = 4;
  bool feasible = 5;
}

message SlaExplainResponse {
  // One-line DurationFit description; "(no fit — cold-start probe)" when
  // the key has never been seen.
  string fit_summary = 1;
  // "per-key" | "fleet-prior" | "none".
  string prior_source = 2;
  // Human-readable description of the override that short-circuited the
  // solve (forced_cores), or unset.
  optional string override_applied = 3;
  // One row per tier in the configured ladder (tightest-first).
  repeated SlaCandidateRow candidates = 4;
}

message ExportSlaCorpusRequest {
  // Restrict to one tenant's fits. Unset = all tenants.
  optional string tenant = 1;
  // Floor on n_eff — only export keys with at least this many effective
  // samples. Default 3 (the partial-pool n0: a fit that hasn't yet
  // outweighed its OWN prior is a poor seed for someone else's).
  uint32 min_n = 2;
}

message ExportSlaCorpusResponse {
  // SeedCorpus JSON (see rio-scheduler::sla::prior::SeedCorpus). Carried
  // as an opaque string so the wire format and the on-disk format are
  // the same blob — `rio-cli sla export-corpus -o f.json` is just a
  // write(response.json).
  string json = 1;
  uint32 entries = 2;
}

message ImportSlaCorpusRequest {
  // SeedCorpus JSON. Same shape ExportSlaCorpus produces.
  string json = 1;
}

message ImportSlaCorpusResponse {
  // Entries merged into the seed-prior table (post-rescale).
  uint32 entries_loaded = 1;
  // The hw_class the corpus was referenced against, and the local
  // factor it was rescaled by. `rescale_factor=1.0` ⇔ unknown
  // ref_hw_class (passed through unscaled).
  string ref_hw_class = 2;
  double rescale_factor = 3;
}
