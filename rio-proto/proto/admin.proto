syntax = "proto3";
package rio.admin;

import "google/protobuf/empty.proto";
import "types.proto";       // GCRequest, GCProgress (StoreAdmin types via TriggerGC)
import "dag.proto";         // GetBuildGraphRequest/Response
import "admin_types.proto"; // ClusterStatus*, ListExecutors*, ListBuilds*, etc.

// Administrative service for the rio-cli and rio-dashboard.
// Implemented by the rio-scheduler process (co-located with SchedulerService).
// gRPC-Web compatibility required for the dashboard (via tonic-web).
//
// NOTE: adding an RPC here touches TWO mocks downstream.
//
// Rust (rio-test-support/src/grpc.rs MockAdmin): default-stub unary
// methods are AUTO-GENERATED by rio-test-support/build.rs from this
// file, so adding a unary RPC needs zero Rust changes. Streaming RPCs
// and methods needing custom behavior go in MANUAL_METHODS (build.rs)
// plus a hand-written body in grpc.rs.
//
// TypeScript (rio-dashboard/src/test-support/admin-mock.ts): the
// admin-mock.test.ts parity check fails until the stub lands. Run
// `cargo xtask regen mocks` for a JSON list of the expected names.
service AdminService {
  // Get overall cluster status (executor count, queue depth, etc.).
  rpc ClusterStatus(google.protobuf.Empty) returns (rio.types.ClusterStatusResponse);

  // List registered executors with their status and resource usage.
  rpc ListExecutors(rio.types.ListExecutorsRequest) returns (rio.types.ListExecutorsResponse);

  // List builds with optional status filtering and pagination.
  rpc ListBuilds(rio.types.ListBuildsRequest) returns (rio.types.ListBuildsResponse);

  // Stream build logs for a specific build or derivation.
  rpc GetBuildLogs(rio.types.GetBuildLogsRequest) returns (stream rio.types.BuildLogChunk);

  // Trigger garbage collection (streaming progress updates).
  rpc TriggerGC(rio.types.GCRequest) returns (stream rio.types.GCProgress);

  // Drain an executor: stop sending new assignments, wait for running builds to complete.
  rpc DrainExecutor(rio.types.DrainExecutorRequest) returns (rio.types.DrainExecutorResponse);

  // Clear a poisoned derivation so it can be retried.
  rpc ClearPoison(rio.types.ClearPoisonRequest) returns (rio.types.ClearPoisonResponse);

  // List currently-poisoned derivations (the roots that cascade DependencyFailed).
  rpc ListPoisoned(google.protobuf.Empty) returns (rio.types.ListPoisonedResponse);

  // Actor in-memory DAG snapshot for a build. Unlike GetBuildGraph (reads
  // PG, works for completed builds), this queries the live actor — the
  // exact view dispatch_ready() sees. The executor_has_stream field is
  // the I-025 diagnostic: if a derivation is Assigned to an executor
  // that is NOT in the live stream pool, dispatch is stuck forever.
  rpc InspectBuildDag(rio.types.InspectBuildDagRequest) returns (rio.types.InspectBuildDagResponse);

  // List all tenants.
  rpc ListTenants(google.protobuf.Empty) returns (rio.types.ListTenantsResponse);

  // Create a new tenant.
  rpc CreateTenant(rio.types.CreateTenantRequest) returns (rio.types.CreateTenantResponse);

  // PG-backed DAG snapshot (derivations + derivation_edges + build_derivations JOIN).
  // Dashboard polls 5s for live status colors. Not actor-snapshot — completed
  // builds have no actor state, but PG persists the full graph.
  rpc GetBuildGraph(rio.types.GetBuildGraphRequest) returns (rio.types.GetBuildGraphResponse);

  // SITA-E size-class status snapshot: effective vs configured cutoffs,
  // per-class queued/running counts, sample counts in the rebalancer
  // window. HUB for P0234 (WPS autoscaler), P0236 (CLI cutoffs table),
  // P0237 (CLI WPS describe). Returns empty classes list if size-class
  // routing is disabled.
  rpc GetSizeClassStatus(rio.types.GetSizeClassStatusRequest) returns (rio.types.GetSizeClassStatusResponse);

  // Per-derivation resource estimates for queued-ready derivations.
  // Polled by the controller's manifest reconciler (ADR-020
  // sizing=Manifest mode) alongside ClusterStatus. This is the
  // detailed shape behind ClusterStatus.queued_derivations —
  // the count says HOW MANY, the manifest says HOW BIG each.
  // Pull model (same as ClusterStatus); no new gRPC server, no
  // push. P0501.
  rpc GetCapacityManifest(rio.types.GetCapacityManifestRequest) returns (rio.types.GetCapacityManifestResponse);
}

// ControllerService (Scheduler→Controller push) removed 2026-03 — the
// active ephemeral mechanism is reconcile_ephemeral polling
// ClusterStatus (see ephemeral.rs § Why not a Scheduler→Controller
// RPC). The speculative CreateEphemeralBuilder RPC had zero callers /
// implementers and contradicted the poll-driven architecture decision.
// If a sub-second dispatch path is later required, reintroduce WITH an
// implementer — don't land declaration-only proto.
//
// reserved: CreateEphemeralBuilder was the sole RPC; no field numbers to
// reserve (service-level RPCs don't have wire numbers in proto3).
