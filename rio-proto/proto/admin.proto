syntax = "proto3";
package rio.admin;

import "google/protobuf/empty.proto";
import "types.proto";

// Administrative service for the rio-cli and rio-dashboard.
// Implemented by the rio-scheduler process (co-located with SchedulerService).
// gRPC-Web compatibility required for the dashboard (via tonic-web).
service AdminService {
  // Get overall cluster status (worker count, queue depth, etc.).
  rpc ClusterStatus(google.protobuf.Empty) returns (rio.types.ClusterStatusResponse);

  // List registered workers with their status and resource usage.
  rpc ListWorkers(rio.types.ListWorkersRequest) returns (rio.types.ListWorkersResponse);

  // List builds with optional status filtering and pagination.
  rpc ListBuilds(rio.types.ListBuildsRequest) returns (rio.types.ListBuildsResponse);

  // Stream build logs for a specific build or derivation.
  rpc GetBuildLogs(rio.types.GetBuildLogsRequest) returns (stream rio.types.BuildLogChunk);

  // Trigger garbage collection (streaming progress updates).
  rpc TriggerGC(rio.types.GCRequest) returns (stream rio.types.GCProgress);

  // Drain a worker: stop sending new assignments, wait for running builds to complete.
  rpc DrainWorker(rio.types.DrainWorkerRequest) returns (rio.types.DrainWorkerResponse);

  // Clear a poisoned derivation so it can be retried.
  rpc ClearPoison(rio.types.ClearPoisonRequest) returns (rio.types.ClearPoisonResponse);

  // List all tenants.
  rpc ListTenants(google.protobuf.Empty) returns (rio.types.ListTenantsResponse);

  // Create a new tenant.
  rpc CreateTenant(rio.types.CreateTenantRequest) returns (rio.types.CreateTenantResponse);

  // PG-backed DAG snapshot (derivations + derivation_edges + build_derivations JOIN).
  // Dashboard polls 5s for live status colors. Not actor-snapshot — completed
  // builds have no actor state, but PG persists the full graph.
  rpc GetBuildGraph(rio.types.GetBuildGraphRequest) returns (rio.types.GetBuildGraphResponse);
}

// Service exposed by rio-controller. Scheduler → Controller direction.
//
// Currently declaration-only: the active ephemeral Job spawning
// mechanism is the controller's reconcile_ephemeral polling ClusterStatus
// (reuses ctx.admin, no new server needed). This service is defined
// for the future latency-sensitive path where the scheduler directly
// requests a Job at dispatch time (sub-second instead of ~10s reconcile
// tick). Wiring requires: controller gains a gRPC server + listen port,
// scheduler gains a controller address in config + client, NetworkPolicy
// + RBAC for the new direction. See docs/src/components/controller.md
// r[ctrl.pool.ephemeral].
service ControllerService {
  // Scheduler has a ready-to-dispatch derivation for an ephemeral pool.
  // Controller spawns a Job (one rio-worker pod with RIO_EPHEMERAL=1),
  // returns the Job name. Scheduler holds dispatch until the ephemeral
  // worker heartbeats in (typically 10-30s: pod scheduling + container
  // pull + FUSE mount + scheduler registration).
  //
  // Job settings mirror ephemeral.rs build_job: backoffLimit=0 (scheduler
  // owns retry), restartPolicy=Never, ttlSecondsAfterFinished=60.
  rpc CreateEphemeralWorker(rio.types.CreateEphemeralWorkerRequest)
      returns (rio.types.CreateEphemeralWorkerResponse);
}
