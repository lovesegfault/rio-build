syntax = "proto3";
package rio.admin;

import "google/protobuf/empty.proto";
import "types.proto";       // GCRequest, GCProgress (StoreAdmin types via TriggerGC)
import "dag.proto";         // GetBuildGraphRequest/Response
import "admin_types.proto"; // ClusterStatus*, ListExecutors*, ListBuilds*, etc.
import "build_types.proto"; // CancelBuildRequest/Response (shared with SchedulerService)

// Administrative service for the rio-cli and rio-dashboard.
// Implemented by the rio-scheduler process (co-located with SchedulerService).
// gRPC-Web compatibility required for the dashboard (via tonic-web).
//
// NOTE: adding an RPC here touches TWO mocks downstream.
//
// Rust (rio-test-support/src/grpc.rs MockAdmin): default-stub unary
// methods are AUTO-GENERATED by rio-test-support/build.rs from this
// file, so adding a unary RPC needs zero Rust changes. Streaming RPCs
// and methods needing custom behavior go in MANUAL_METHODS (build.rs)
// plus a hand-written body in grpc.rs.
service AdminService {
  // Get overall cluster status (executor count, queue depth, etc.).
  rpc ClusterStatus(google.protobuf.Empty) returns (rio.types.ClusterStatusResponse);

  // List registered executors with their status and resource usage.
  rpc ListExecutors(rio.types.ListExecutorsRequest) returns (rio.types.ListExecutorsResponse);

  // List builds with optional status filtering and pagination.
  rpc ListBuilds(rio.types.ListBuildsRequest) returns (rio.types.ListBuildsResponse);

  // Stream build logs for a specific build or derivation.
  rpc GetBuildLogs(rio.types.GetBuildLogsRequest) returns (stream rio.types.BuildLogChunk);

  // Trigger garbage collection (streaming progress updates).
  rpc TriggerGC(rio.types.GCRequest) returns (stream rio.types.GCProgress);

  // Drain an executor: stop sending new assignments, wait for running builds to complete.
  rpc DrainExecutor(rio.types.DrainExecutorRequest) returns (rio.types.DrainExecutorResponse);

  // Cancel a build. Operator override — caller_tenant=None bypasses the
  // tenant-ownership check that SchedulerService.CancelBuild applies
  // (r[sched.tenant.authz]). Service-token gated (rio-cli, rio-controller).
  rpc CancelBuild(rio.types.CancelBuildRequest) returns (rio.types.CancelBuildResponse);

  // Controller reports a builder/fetcher Pod's container termination
  // reason (k8s OOMKilled / Evicted-DiskPressure / DeadlineExceeded /
  // etc.). The scheduler gates `resource_floor` bump on this — the
  // bare-disconnect path no longer infers OOM. On a resource-driven
  // termination the scheduler doubles the relevant floor dimension
  // (mem/disk/deadline) for whatever drv was running at disconnect;
  // the NEXT `solve_intent_for` clamps to the bumped floor. Live QA
  // showed cmake doubling from a pod-kill + store-replica-restart
  // with zero builds run; floor is sticky (M_032), so the next
  // submitter paid for an oversized pod.
  //
  // Timing: the gRPC disconnect lands at the scheduler ~1-3s before the
  // controller observes Pod-status + reconciles. Disconnect re-queues at
  // CURRENT floor; this RPC bumps; NEXT dispatch goes bigger. One extra
  // same-size attempt worst-case — same as the FIRST OOM today.
  rpc ReportExecutorTermination(rio.types.ReportExecutorTerminationRequest)
      returns (rio.types.ReportExecutorTerminationResponse);

  // Clear a poisoned derivation so it can be retried.
  rpc ClearPoison(rio.types.ClearPoisonRequest) returns (rio.types.ClearPoisonResponse);

  // List currently-poisoned derivations (the roots that cascade DependencyFailed).
  rpc ListPoisoned(google.protobuf.Empty) returns (rio.types.ListPoisonedResponse);

  // r[impl proto.admin.diag-rpc]

  // Actor in-memory DAG snapshot for a build. Unlike GetBuildGraph (reads
  // PG, works for completed builds), this queries the live actor — the
  // exact view dispatch_ready() sees. The executor_has_stream field is
  // the I-025 diagnostic: if a derivation is Assigned to an executor
  // that is NOT in the live stream pool, dispatch is stuck forever.
  rpc InspectBuildDag(rio.types.InspectBuildDagRequest) returns (rio.types.InspectBuildDagResponse);

  // Actor in-memory executor map snapshot. Unlike ListExecutors (PG
  // last_seen), this reads the live self.executors HashMap. I-048b/c
  // diagnostic: PG showed fetchers [alive], actor map was empty (stream
  // not connected to new leader post-failover) — four wrong hypotheses
  // before finding it. has_stream=false on an entry = zombie. NOT
  // gated on ensure_leader(): a standby's empty map is itself useful.
  rpc DebugListExecutors(google.protobuf.Empty) returns (rio.types.DebugListExecutorsResponse);

  // List all tenants.
  rpc ListTenants(google.protobuf.Empty) returns (rio.types.ListTenantsResponse);

  // Create a new tenant.
  rpc CreateTenant(rio.types.CreateTenantRequest) returns (rio.types.CreateTenantResponse);

  // Delete a tenant by name. FK CASCADE handles tenant_keys/upstreams/
  // path_tenants/chunk_tenants; builds/derivations get tenant_id SET NULL.
  rpc DeleteTenant(rio.types.DeleteTenantRequest) returns (rio.types.DeleteTenantResponse);

  // PG-backed DAG snapshot (derivations + derivation_edges + build_derivations JOIN).
  // Dashboard polls 5s for live status colors. Not actor-snapshot — completed
  // builds have no actor state, but PG persists the full graph.
  rpc GetBuildGraph(rio.types.GetBuildGraphRequest) returns (rio.types.GetBuildGraphResponse);

  // ADR-023 spawn-intent stream: one SpawnIntent per Ready derivation
  // (FOD and non-FOD alike), pre-filtered server-side by
  // {kind, systems, features}. Replaces the per-class GetSizeClassStatus
  // — controller pool reconcilers spawn one Job per intent; the
  // ComponentScaler reads `queued_by_system`.
  rpc GetSpawnIntents(rio.types.GetSpawnIntentsRequest) returns (rio.types.GetSpawnIntentsResponse);

  // Controller reports which SpawnIntents it actually created Jobs for
  // this tick. Arms the scheduler's Pending-watch (ICE-backoff) timer
  // for each — separated from GetSpawnIntents so that RPC stays
  // read-only (dashboard/CLI polls don't arm) and so headroom-gated
  // intents the controller truncates aren't falsely marked ICE.
  rpc AckSpawnedIntents(rio.types.AckSpawnedIntentsRequest) returns (google.protobuf.Empty);

  // ─── ADR-023 SLA overrides ────────────────────────────────────────

  // Pin a (pname, system?, tenant?) key to a forced tier / cores / mem,
  // bypassing the fitted-curve solve. NULL system/tenant are wildcards
  // (r[sched.sla.override-precedence]). Returns the inserted row (with
  // server-assigned id + created_at). Picked up by the next estimator
  // refresh tick (~60s).
  rpc SetSlaOverride(rio.types.SetSlaOverrideRequest) returns (rio.types.SlaOverride);

  // List all non-expired overrides, optionally filtered by pname.
  rpc ListSlaOverrides(rio.types.ListSlaOverridesRequest) returns (rio.types.ListSlaOverridesResponse);

  // Delete one override by id. Idempotent — returns Empty whether or not
  // the row existed.
  rpc ClearSlaOverride(rio.types.ClearSlaOverrideRequest) returns (google.protobuf.Empty);

  // Drop all build_samples for one (pname, system, tenant) key and evict
  // the cached fit. Next dispatch falls back to the cold-start probe
  // path. Operator escape hatch when a fit has converged on garbage
  // (e.g. node-migration changed the hw_class baseline).
  rpc ResetSlaModel(rio.types.ResetSlaModelRequest) returns (google.protobuf.Empty);

  // Dump the cached FittedParams for one (pname, system, tenant) key.
  // Reflects the actor's last refresh tick (~60s stale at worst), NOT a
  // live PG refit. `has_fit=false` ⇔ never seen / evicted.
  rpc SlaStatus(rio.types.SlaStatusRequest) returns (rio.types.SlaStatusResponse);

  // Per-derivation solve trace: re-runs the tier walk for one key in
  // dry-run mode, recording every reject reason. Feeds `rio-cli sla
  // explain`'s candidate table — "fast rejected: c*=18 > p̄=12; normal
  // feasible at c*=6". Same ~60s tick staleness as SlaStatus.
  rpc SlaExplain(rio.types.SlaExplainRequest) returns (rio.types.SlaExplainResponse);

  // Dump every cached fit with n_eff ≥ min_n as a portable JSON corpus
  // (one (s,p,q,p_bar,a,b,n) tuple per (pname,system)). `rio-cli sla
  // export-corpus` writes this to a file; `import-corpus` on a fresh
  // deployment loads it into the seed-prior table so first-dispatch of
  // a known pname skips the cold-start probe ladder. ADR-023 §2.10.
  rpc ExportSlaCorpus(rio.types.ExportSlaCorpusRequest) returns (rio.types.ExportSlaCorpusResponse);

  // Load a corpus (from ExportSlaCorpus, possibly from another cluster)
  // into the seed-prior table. Time-domain params are rescaled by
  // `factor[corpus.ref_hw_class]` from the local hw table so a corpus
  // exported on fast hardware seeds correctly on slow. In-memory only —
  // does NOT survive scheduler restart (use `[sla].seed_corpus` for that).
  rpc ImportSlaCorpus(rio.types.ImportSlaCorpusRequest) returns (rio.types.ImportSlaCorpusResponse);

  // VM-test fixture: write a synthetic build_samples row directly. Lets
  // the sla-sizing scenario inject a 100x outlier and assert the MAD
  // sweep flags it without staging a real wall-clock-hours build. Gated
  // on test-auth (the scheduler refuses unless RIO_ADMIN_TEST_FIXTURES
  // is set); not exposed via rio-cli.
  rpc InjectBuildSample(rio.types.InjectBuildSampleRequest) returns (google.protobuf.Empty);

  // ADR-023 phase-13: append one interrupt_samples row. Called by the
  // controller's spot-interrupt watcher (kind="interrupt", value=1 on
  // a SpotInterrupted Event) and Node-DELETE handler (kind="exposure",
  // value=node_seconds). Append-only; the scheduler's lease-gated
  // poller aggregates into λ[h].
  rpc AppendInterruptSample(rio.types.AppendInterruptSampleRequest) returns (google.protobuf.Empty);

  // ADR-023 §13a: per-hw_class distinct pod_id bench count. Read-only,
  // controller-allowlisted (the controller batches one call per
  // reconcile tick to decide `rio.build/hw-bench-needed`). Reflects
  // the estimator's last refresh tick (~60s stale at worst), NOT a
  // live PG count.
  rpc HwClassSampled(rio.types.HwClassSampledRequest) returns (rio.types.HwClassSampledResponse);
}

// ControllerService (Scheduler→Controller push) removed 2026-03 — the
// active ephemeral mechanism is reconcile_ephemeral polling
// ClusterStatus (see ephemeral.rs § Why not a Scheduler→Controller
// RPC). The speculative CreateEphemeralBuilder RPC had zero callers /
// implementers and contradicted the poll-driven architecture decision.
// If a sub-second dispatch path is later required, reintroduce WITH an
// implementer — don't land declaration-only proto.
//
// reserved: CreateEphemeralBuilder was the sole RPC; no field numbers to
// reserve (service-level RPCs don't have wire numbers in proto3).
