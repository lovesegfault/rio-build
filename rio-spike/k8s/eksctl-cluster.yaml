apiVersion: eksctl.io/v1alpha5
kind: ClusterConfig

metadata:
  name: rio-spike
  region: us-east-2

# K8s 1.33+ required for hostUsers: false (user namespace isolation)
kubernetesVersion: "1.35"

# DEPRECATED: This eksctl config is superseded by the Terraform setup in rio-spike/terraform/.
# Retained as a simpler reference for local development.
# The Terraform config is the source of truth for the spike infrastructure.
managedNodeGroups:
  - name: spike-workers
    # c8a.xlarge used in production Terraform config. m6id.xlarge caused
    # InvalidDiskCapacity errors on AL2023 EKS AMIs due to NVMe instance store.
    instanceType: c8a.xlarge
    desiredCapacity: 1
    minSize: 1
    maxSize: 2
    volumeSize: 100
    volumeType: gp3
    # AL2023 AMI provides kernel 6.1+ (required for overlayfs-over-FUSE)
    amiFamily: AmazonLinux2023
    labels:
      rio.build/role: spike-worker
    taints:
      - key: rio.build/spike
        value: "true"
        effect: NoSchedule
    # IMDSv2 with hop limit 1 (defense-in-depth)
    disableIMDSv1: true
    ssh:
      allow: false
