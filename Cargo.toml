[workspace]
members = ["rio-build"]
resolver = "2"

[workspace.package]
version = "0.1.0"
edition = "2024"
authors = ["Rio Contributors"]
license = "MIT OR Apache-2.0"
repository = "https://github.com/lovesegfault/rio-build"

[workspace.dependencies]
rocksdb = { version = "0.24", default-features = false, features = [
  "bindgen-runtime",
  "zstd",
  "lto",
] }
