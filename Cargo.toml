[workspace]
members = ["crates/rio-dispatcher", "crates/rio-builder", "crates/rio-common"]
resolver = "2"

[workspace.package]
version = "0.1.0"
edition = "2021"
authors = ["Rio Contributors"]
license = "MIT OR Apache-2.0"
repository = "https://github.com/yourusername/rio-build"

[workspace.dependencies]
# Async runtime
tokio = { version = "1.42", features = ["full"] }
tokio-util = { version = "0.7", features = ["io", "codec"] }
tokio-stream = "0.1"
futures-util = "0.3"

# gRPC
tonic = "0.14"
tonic-prost = "0.14"
prost = "0.14"

# SSH
russh = "0.54.5"
rand_core = "0.6"

# Nix protocol
nix-daemon = "0.1"

# Serialization
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"

# Logging and tracing
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }

# Error handling
anyhow = "1.0"
thiserror = "2.0"

# Utilities
uuid = { version = "1.11", features = ["v4", "serde"] }
bytes = "1.9"
camino = "1.1"
hostname = "0.4"
num_cpus = "1.16"
tempfile = "3.14"

# CLI
clap = { version = "4.5", features = ["derive", "env"] }

# Build dependencies
tonic-prost-build = "0.14"
