[workspace]
members = ["crates/rio-dispatcher", "crates/rio-builder", "crates/rio-common"]
resolver = "2"

[workspace.package]
version = "0.1.0"
edition = "2021"
authors = ["Rio Contributors"]
license = "MIT OR Apache-2.0"
repository = "https://github.com/yourusername/rio-build"

[workspace.dependencies]
# Async runtime
tokio = { version = "1.42", features = ["full"] }
tokio-util = "0.7"

# gRPC
tonic = "0.12"
prost = "0.13"

# SSH
russh = "0.45"
russh-keys = "0.45"

# Nix protocol
nix-daemon = "0.1"

# Serialization
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"

# Logging and tracing
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }

# Error handling
anyhow = "1.0"
thiserror = "2.0"

# Utilities
uuid = { version = "1.11", features = ["v4", "serde"] }
bytes = "1.9"

# CLI
clap = { version = "4.5", features = ["derive", "env"] }
