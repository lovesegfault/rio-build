[workspace]
members = ["crates/rio-build", "crates/rio-agent", "crates/rio-common"]
resolver = "2"

[workspace.package]
version = "0.1.0"
edition = "2021"
authors = ["Rio Contributors"]
license = "MIT OR Apache-2.0"
repository = "https://github.com/yourusername/rio-build"

[workspace.dependencies]
# Async runtime
tokio = { version = "1.42", features = ["full"] }
tokio-util = { version = "0.7", features = ["io", "codec"] }
tokio-stream = "0.1"

# gRPC (for agent-to-agent communication)
tonic = "0.14"
tonic-prost = "0.14"
prost = "0.14"

# Serialization
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"

# Compression
zstd = "0.13"

# Logging and tracing
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }

# Error handling
anyhow = "1.0"
thiserror = "2.0"

# Utilities
uuid = { version = "1.11", features = ["v4", "serde"] }
bytes = "1.9"
camino = { version = "1.1", features = ["serde1"] }
chrono = { version = "0.4", features = ["serde"] }

# CLI
clap = { version = "4.5", features = ["derive", "env"] }

# Raft consensus
openraft = { version = "0.9", features = ["serde", "storage-v2"] }
rocksdb = { version = "0.24", default-features = false, features = [
  "bindgen-runtime",
  "zstd",
] }

# Build dependencies
tonic-prost-build = "0.14"

# Testing
tempfile = "3.14"

# Workspace members
rio-common = { path = "crates/rio-common" }

[profile.release]
lto = "thin"
