[workspace]
resolver = "2"
members = [
    "nix-web",
    "nix-supervisor",
    "nix-daemon",
    "gorgon-build",
    "gorgon-build-helper",
    "gorgon-build-nix",
    "gorgonctl",
    "gorgond",
    "gorgond-client",
    "gorgond-diesel",
    "gorgond-github",
    "gorgon-github-events",
    "gorgon-rollup",
    "gorgon-util-cli",
]

[workspace.dependencies]
axum = { version = "0.8.1", default-features = false }
axum-extra = "0.10.0"
backon = "1.5.0"
bytes = "1.10.1"
bytesize = "2.0.1"
chrono = { version = "0.4.40", features = ["serde"] }
clap = { version = "4.5.27", features = ["env", "cargo", "derive"] }
clio = { version = "0.3.5", features = ["clap-parse"] }
colored_json = "5.0.0"
comfy-table = "7.1.4"
crossbeam = { version = "0.8.4", features = ["crossbeam-channel"] }
derive_more = { version = "2.0.1", features = ["full"] }
diesel-async = "0.5.2"
diesel-derive-enum = { version = "3.0.0-beta.1", features = ["postgres"] }
diesel_migrations = "2.2.0"
diesel = { version = "2.2.7", default-features = false }
futures = "0.3.31"
humantime = "2.2.0"
miette = { version = "7.5.0", features = ["serde"] }
minicbor-io = "0.21.0"
minicbor = { version = "0.26.5", features = ["std"] }
object_store = "0.12.0"
ownable = "0.6.2"
owo-colors = { version = "4.2.0", features = ["supports-colors"] }
parking_lot = "0.12.3"
reqwest = "0.12.12"
scoped-futures = "0.1.4"
serde = "1.0.217"
serde_json = "1.0.140"
serde_urlencoded = "0.7.1"
strum = { version = "0.27.1", features = ["derive"] }
supports-color = "3.0.2"
syntect = "5.2.0"
tempfile = "3.19.1"
terminal_size = "0.4.1"
textwrap = { version = "0.16.2", features = ["terminal_size"] }
thiserror = "2.0.11"
tokio-stream = "0.1.17"
tokio-util = "0.7.15"
tokio = { version = "1.43.0", features = ["parking_lot"] }
tracing = "0.1.41"
tracing-serde-structured = "0.4.0"
tracing-subscriber = { version = "0.3.19", features = ["time", "smallvec", "once_cell", "parking_lot"] }
url = { version = "2.5.4", features = ["serde"] }
uuid = { version = "1.16.0", features = ["v7", "serde"] }
yoke = "0.8.0"
zstd = "0.13.3"

[profile.release]
debug = true
