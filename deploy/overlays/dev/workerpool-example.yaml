# Example WorkerPool for dev. Applied automatically with the
# overlay so `kubectl apply -k overlays/dev` gives a fully
# working cluster with workers ready to accept builds.
#
# `privileged: true` — DEV ONLY. Production manifests use
# `capabilities.add: [SYS_ADMIN, SYS_CHROOT]` via the
# WorkerPool's security_context field (see crds/workerpool.rs
# default). Dev clusters (k3s/kind) often have seccomp
# restrictions that break the cap-add path; privileged
# sidesteps that for local iteration.
apiVersion: rio.build/v1alpha1
kind: WorkerPool
metadata:
  name: default
spec:
  replicas:
    min: 1
    max: 3
  autoscaling:
    metric: queueDepth
    # Scale up when > 2 queued derivations per worker. Low for
    # dev so autoscale triggers easily (submit 5 parallel
    # builds, watch it scale to 3).
    targetValue: 2
  image: rio-worker:dev
  # Airgap clusters (k3s/kind with `ctr images import`) need
  # IfNotPresent — K8s would default :latest to Always (pull
  # docker.io, fail). Controller-managed STS can't be kustomize-
  # patched, so this knob lives on the CRD.
  imagePullPolicy: IfNotPresent
  maxConcurrentBuilds: 2
  fuseCacheSize: 10Gi
  sizeClass: small
  systems:
    - x86_64-linux
  features: []
