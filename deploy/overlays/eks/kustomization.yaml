# EKS overlay: IRSA + NLB annotations on top of prod.
#
# Prerequisites:
#   - EKS cluster with OIDC provider configured
#   - IAM role for rio-store SA with S3 GetObject/PutObject/
#     DeleteObject/ListBucket on the chunk bucket
#   - cert-manager installed in the cluster
#   - STORE_IAM_ROLE_ARN env var set when running kustomize
#     (envsubst or sed before apply)
#
# Usage:
#   export STORE_IAM_ROLE_ARN=arn:aws:iam::ACCOUNT:role/rio-store
#   kubectl apply -k deploy/overlays/eks  # after envsubst
#
# IMDSv2 hop limit: NOT a manifest setting — it's on the EC2
# launch template. See infra/eks/main.tf's worker nodegroup
# metadata_options block, or:
#   aws ec2 modify-instance-metadata-options \
#     --instance-id i-... --http-put-response-hop-limit 1
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# Base on prod: same PG/S3 external assumption, PDBs, NetPol, mTLS.
resources:
  - ../prod

patches:
  # IRSA: annotate the store SA with the IAM role ARN. The EKS
  # pod-identity-webhook sees this and projects an AWS token
  # into the pod at /var/run/secrets/eks.amazonaws.com/. aws-sdk
  # picks it up automatically (default credential chain includes
  # "WebIdentityToken" at that path).
  #
  # ${STORE_IAM_ROLE_ARN}: shell var substitution BEFORE apply.
  # kustomize doesn't natively do env-var interpolation; use
  # `envsubst < overlays/eks/kustomization.yaml | kubectl apply -f -`
  # or a sed pipeline. GitOps tools (Argo) have their own
  # substitution mechanisms.
  - target:
      kind: ServiceAccount
      name: rio-store
    patch: |
      - op: add
        path: /metadata/annotations
        value:
          eks.amazonaws.com/role-arn: ${STORE_IAM_ROLE_ARN}

  # aws-load-balancer-controller annotations. Base has none (cloud-
  # agnostic); this is the single place AWS LB behavior is set.
  #
  # type: external → hand this Service to aws-lbc instead of the
  # legacy in-tree cloud-provider-aws. Without this, aws-lbc
  # ignores the Service entirely (legacy provider handles it,
  # badly — classic NLB, instance targeting, no listener attrs).
  #
  # nlb-target-type: ip routes directly to pod IPs (no kube-proxy
  # hop, source IP preserved). Requires aws-lbc + VPC CNI (pods
  # get routable VPC IPs — default on EKS).
  #
  # scheme: internal. Gateway access via SSM bastion tunnel
  # (infra/eks/bastion.tf + smoke-test.sh). Internet-facing is
  # a site-specific overlay patch.
  #
  # listener-attributes.TCP-22: NLB TCP idle timeout. Default is
  # 350s — too short for long nix builds. 3600s = 1h; builds
  # longer than that re-send STDERR_NEXT keepalives (nix-daemon
  # does this anyway). This is the aws-lbc way to set it; the
  # old base's `aws-load-balancer-connection-idle-timeout` was
  # ALB-only legacy syntax that aws-lbc silently ignored.
  #
  # Patch seeds /metadata/annotations with the first entry (base
  # has no annotations block at all → `op: add` on a member path
  # under a nonexistent object fails). Subsequent `op: add` entries
  # add keys into the now-existing map.
  - target:
      kind: Service
      name: rio-gateway
    patch: |
      - op: add
        path: /metadata/annotations
        value:
          service.beta.kubernetes.io/aws-load-balancer-type: external
      - op: add
        path: /metadata/annotations/service.beta.kubernetes.io~1aws-load-balancer-nlb-target-type
        value: ip
      - op: add
        path: /metadata/annotations/service.beta.kubernetes.io~1aws-load-balancer-scheme
        value: internal
      - op: add
        path: /metadata/annotations/service.beta.kubernetes.io~1aws-load-balancer-listener-attributes.TCP-22
        value: tcp.idle_timeout.seconds=3600
