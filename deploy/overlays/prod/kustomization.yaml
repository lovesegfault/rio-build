# Prod overlay: external PG/S3, PDBs, NetworkPolicy, real image tags.
#
# PG and S3 are EXTERNAL (RDS, real S3). This overlay expects:
#   - Secret `rio-postgres` with key `url` (connection string)
#   - AWS IRSA or pod-identity for S3 creds (NOT in-cluster env vars)
#   - Image tags set via `kustomize edit set image` in CI
#
# Don't `kubectl apply -k overlays/prod` directly — copy to a
# gitops repo (Argo/Flux), set the image tags, add the PG secret.
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: rio-system

resources:
  - ../../base
  - namespace.yaml
  - pdb.yaml
  - networkpolicy.yaml
  # cert-manager: self-signed CA + per-component Certificates.
  # Requires cert-manager to be installed in the cluster (it's a
  # prerequisite, not managed by this kustomization). The
  # ClusterIssuer in here is cluster-scoped; everything else
  # lands in rio-system.
  - cert-manager.yaml
  # fod-proxy is in base now (kustomize's load restrictor rejected
  # the old ../../base/fod-proxy.yaml path-traversal reference).

patches:
  # TLS Secret mounts + RIO_TLS__* env + probe retarget to plaintext
  # health port. One patch file with multiple YAML docs (one per
  # Deployment). `path:` form is the non-deprecated replacement for
  # the old `patchesStrategicMerge` (kustomize v5+ warns on it).
  - path: tls-mounts.yaml
  # S3 chunk backend. AWS creds via IRSA (the ServiceAccount
  # annotation for role assumption is cluster-specific — not
  # here). NO hardcoded keys.
  - target:
      kind: Deployment
      name: rio-store
    patch: |
      - op: add
        path: /spec/template/spec/containers/0/env/-
        value:
          name: RIO_CHUNK_BACKEND__KIND
          value: s3
      - op: add
        path: /spec/template/spec/containers/0/env/-
        value:
          name: RIO_CHUNK_BACKEND__BUCKET
          value: PLACEHOLDER-SET-IN-GITOPS
      - op: add
        path: /spec/template/spec/containers/0/env/-
        value:
          name: RIO_CHUNK_BACKEND__PREFIX
          value: chunks/
      - op: add
        path: /spec/template/spec/containers/0/env/-
        value:
          name: RIO_LOG_S3_BUCKET
          value: PLACEHOLDER-SET-IN-GITOPS

# Image tags: CI sets these via `kustomize edit set image`.
# Placeholders fail fast (no :latest in prod — reproducibility).
images:
  - name: rio-scheduler
    newTag: SET-IN-CI
  - name: rio-store
    newTag: SET-IN-CI
  - name: rio-gateway
    newTag: SET-IN-CI
  - name: rio-controller
    newTag: SET-IN-CI
