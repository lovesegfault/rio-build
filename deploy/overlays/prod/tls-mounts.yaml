# Strategic-merge patches: mount TLS Secrets + set RIO_TLS__* env.
#
# Applied in prod overlay only. cert-manager.yaml creates the
# Secrets; these patches mount them at /etc/rio/tls/ and point
# the figment config at them. Base deployment stays plaintext
# (dev overlay doesn't include cert-manager).
#
# Probe retargeting: when mTLS is on, the main gRPC port rejects
# the K8s probe (no client cert). Retarget readiness to the
# plaintext health port (9101/9102). liveness/startup stay
# tcpSocket on the main port — they just check "is listening",
# which works regardless of TLS.
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: rio-scheduler
spec:
  template:
    spec:
      volumes:
        - name: tls
          secret:
            secretName: rio-scheduler-tls
      containers:
        - name: scheduler
          volumeMounts:
            - name: tls
              mountPath: /etc/rio/tls
              readOnly: true
          env:
            - name: RIO_TLS__CERT_PATH
              value: /etc/rio/tls/tls.crt
            - name: RIO_TLS__KEY_PATH
              value: /etc/rio/tls/tls.key
            - name: RIO_TLS__CA_PATH
              value: /etc/rio/tls/ca.crt
          # Retarget readiness to plaintext health port. The
          # service name stays the same — the plaintext server
          # shares the HealthReporter, so the named-service
          # status (leader toggle) still gates this.
          readinessProbe:
            grpc:
              port: 9101
              service: rio.scheduler.SchedulerService
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: rio-store
spec:
  template:
    spec:
      volumes:
        - name: tls
          secret:
            secretName: rio-store-tls
      containers:
        - name: store
          volumeMounts:
            - name: tls
              mountPath: /etc/rio/tls
              readOnly: true
          env:
            - name: RIO_TLS__CERT_PATH
              value: /etc/rio/tls/tls.crt
            - name: RIO_TLS__KEY_PATH
              value: /etc/rio/tls/tls.key
            - name: RIO_TLS__CA_PATH
              value: /etc/rio/tls/ca.crt
          readinessProbe:
            grpc:
              port: 9102
              service: rio.store.StoreService
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: rio-gateway
spec:
  template:
    spec:
      volumes:
        - name: tls
          secret:
            secretName: rio-gateway-tls
      containers:
        - name: gateway
          volumeMounts:
            - name: tls
              mountPath: /etc/rio/tls
              readOnly: true
          env:
            - name: RIO_TLS__CERT_PATH
              value: /etc/rio/tls/tls.crt
            - name: RIO_TLS__KEY_PATH
              value: /etc/rio/tls/tls.key
            - name: RIO_TLS__CA_PATH
              value: /etc/rio/tls/ca.crt
          # No probe retarget: gateway's health is already on a
          # separate plaintext port (9190) — gateway has no main
          # gRPC server, health was always standalone.
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: rio-controller
spec:
  template:
    spec:
      volumes:
        - name: tls
          secret:
            secretName: rio-controller-tls
      containers:
        - name: controller
          volumeMounts:
            - name: tls
              mountPath: /etc/rio/tls
              readOnly: true
          env:
            - name: RIO_TLS__CERT_PATH
              value: /etc/rio/tls/tls.crt
            - name: RIO_TLS__KEY_PATH
              value: /etc/rio/tls/tls.key
            - name: RIO_TLS__CA_PATH
              value: /etc/rio/tls/ca.crt
          # No probe retarget: controller uses HTTP /healthz, no
          # TLS involvement.
