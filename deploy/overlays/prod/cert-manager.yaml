# cert-manager CA + per-component Certificates for intra-cluster mTLS.
#
# Architecture:
#   1. selfsigned-bootstrap ClusterIssuer bootstraps a root CA cert
#      (isCA: true, self-signed).
#   2. rio-ca-issuer (namespaced Issuer, not ClusterIssuer) reads
#      that root CA Secret and issues leaf certs from it. Must be
#      namespaced because cert-manager's `ca` issuer type reads the
#      Secret from ITS OWN namespace — a ClusterIssuer would look in
#      cert-manager's install namespace, not rio-system.
#   3. Per-component Certificate: each gets tls.crt/tls.key/ca.crt.
#      ca.crt is the SAME for all (the root CA). tls.crt is unique
#      per-component with appropriate SANs.
#
# Why not a ClusterIssuer for leaf certs: we want the CA Secret to
# live in rio-system (least privilege — only rio pods can read it).
# ClusterIssuer with `ca:` looks for the Secret in cert-manager's
# namespace, which we don't control and which other tenants' Issuers
# might also read.
---
# Step 1: self-signed bootstrap. Only used to sign the root CA
# cert below, then ignored. cert-manager needs SOME issuer to sign
# the first cert; selfSigned is the bootstrap.
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: rio-selfsigned-bootstrap
spec:
  selfSigned: {}
---
# Step 2: the root CA cert. isCA: true → cert-manager puts the CA
# extension on it. duration: 10y because this is the root of trust
# — rotating it means re-issuing EVERY leaf cert and restarting
# every pod to pick up the new ca.crt. Operators do that rarely.
#
# encoding: PKCS8 is REQUIRED for EC keys. cert-manager defaults
# to ECDSA P256; without PKCS8, the emitted key has a legacy
# `BEGIN EC PRIVATE KEY` header that rustls's PEM parser rejects.
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: rio-root-ca
  namespace: rio-system
spec:
  isCA: true
  secretName: rio-root-ca-secret
  commonName: rio-root-ca
  # 10 years. CA rotation is a deliberate operational event.
  duration: 87600h
  privateKey:
    algorithm: ECDSA
    size: 256
    encoding: PKCS8
  issuerRef:
    kind: ClusterIssuer
    name: rio-selfsigned-bootstrap
---
# Step 3: the issuing CA. Namespaced so it reads rio-root-ca-secret
# from rio-system. Leaf Certificates below reference this.
apiVersion: cert-manager.io/v1
kind: Issuer
metadata:
  name: rio-ca-issuer
  namespace: rio-system
spec:
  ca:
    secretName: rio-root-ca-secret
---
# Per-component leaf certs. dnsNames include ALL forms clients
# might address: short (rio-scheduler), ns-qualified, full FQDN.
# tonic's SAN check uses the :authority header from the URL — for
# `rio-scheduler:9001` that's "rio-scheduler", so the short name
# MUST be in dnsNames.
#
# duration 90d, renewBefore 30d: cert-manager auto-renews when
# 30d remain. Pods pick up the new cert on the next restart (K8s
# doesn't hot-reload Secret mounts into processes; the mount
# UPDATES but the tonic server has already read the old PEM at
# startup). In practice: pods restart more often than every 60d
# (deploys, node maintenance). If that changes, add a reloader
# sidecar (stakater/reloader) that watches the Secret and restarts.
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: rio-scheduler-tls
  namespace: rio-system
spec:
  secretName: rio-scheduler-tls
  duration: 2160h # 90d
  renewBefore: 720h # 30d
  privateKey:
    algorithm: ECDSA
    size: 256
    encoding: PKCS8
  dnsNames:
    - rio-scheduler
    - rio-scheduler.rio-system
    - rio-scheduler.rio-system.svc
    - rio-scheduler.rio-system.svc.cluster.local
  issuerRef:
    kind: Issuer
    name: rio-ca-issuer
---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: rio-store-tls
  namespace: rio-system
spec:
  secretName: rio-store-tls
  duration: 2160h
  renewBefore: 720h
  privateKey:
    algorithm: ECDSA
    size: 256
    encoding: PKCS8
  dnsNames:
    - rio-store
    - rio-store.rio-system
    - rio-store.rio-system.svc
    - rio-store.rio-system.svc.cluster.local
  issuerRef:
    kind: Issuer
    name: rio-ca-issuer
---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: rio-gateway-tls
  namespace: rio-system
spec:
  secretName: rio-gateway-tls
  duration: 2160h
  renewBefore: 720h
  privateKey:
    algorithm: ECDSA
    size: 256
    encoding: PKCS8
  # Gateway is a CLIENT only (its server is SSH, not gRPC). The
  # dnsNames here are for completeness (if something ever connects
  # TO the gateway's health port, which nothing does); the real
  # purpose is the client cert (tls.crt) for gateway→scheduler and
  # gateway→store. Client certs don't need matching SANs for
  # outbound, but rustls still wants the PEM to have SOME identity.
  dnsNames:
    - rio-gateway
    - rio-gateway.rio-system
    - rio-gateway.rio-system.svc
    - rio-gateway.rio-system.svc.cluster.local
  issuerRef:
    kind: Issuer
    name: rio-ca-issuer
---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: rio-controller-tls
  namespace: rio-system
spec:
  secretName: rio-controller-tls
  duration: 2160h
  renewBefore: 720h
  privateKey:
    algorithm: ECDSA
    size: 256
    encoding: PKCS8
  dnsNames:
    - rio-controller
    - rio-controller.rio-system
    - rio-controller.rio-system.svc
    - rio-controller.rio-system.svc.cluster.local
  issuerRef:
    kind: Issuer
    name: rio-ca-issuer
---
# Worker cert. Wildcard for the StatefulSet's headless-Service
# pod DNS: `<pod>.<svc>.<ns>.svc.cluster.local`. Each pod gets
# its own DNS (e.g., default-workers-0.default-workers.rio-system.
# svc.cluster.local), but they all share ONE cert — individual
# per-pod certs would require the controller to create Certificate
# objects per pod, which is more moving parts than we need for
# worker→scheduler auth (the scheduler doesn't verify WHICH worker
# is calling, just that it has a CA-signed cert).
#
# The wildcard form `*.X` only matches ONE label — `default-
# workers-0.default-workers.rio-system` needs the FULL nested
# wildcard. cert-manager allows wildcards in dnsNames.
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: rio-worker-tls
  namespace: rio-system
spec:
  secretName: rio-worker-tls
  duration: 2160h
  renewBefore: 720h
  privateKey:
    algorithm: ECDSA
    size: 256
    encoding: PKCS8
  dnsNames:
    - rio-worker
    # Worker pods don't RECEIVE gRPC so their server-side SAN
    # doesn't matter for anything — this is purely client-cert.
    # The wildcard below is belt-and-suspenders for if we ever
    # expose worker pods (metrics scrape, etc). Single wildcard
    # matches one label only, so this won't match the full pod
    # FQDN but covers the short name.
    - "*.rio-system.svc.cluster.local"
  issuerRef:
    kind: Issuer
    name: rio-ca-issuer
