# NetworkPolicy: workers can't reach the internet or K8s API.
#
# Defense in depth. A compromised builder (malicious .drv
# somehow gets through the sandbox, or a sandbox escape) should
# only be able to hit rio-scheduler and rio-store — not exfil
# data, not hit the cloud metadata endpoint, not talk to the
# K8s apiserver.
#
# ONE policy per selector. K8s merges policies additively
# (allow-lists union), so multiple policies for the same
# selector are confusing. One per component.
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: rio-worker-egress
spec:
  # Matches pods created by the WorkerPool reconciler
  # (build_statefulset sets this label).
  podSelector:
    matchLabels:
      app.kubernetes.io/name: rio-worker
  policyTypes:
    - Egress
  egress:
    # DNS. Without this, the worker can't resolve
    # `rio-scheduler` → everything fails. CoreDNS in kube-system
    # serves cluster DNS.
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
      ports:
        - protocol: UDP
          port: 53
    # Scheduler gRPC. 9001 only — no need for metrics (9091).
    - to:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: rio-scheduler
      ports:
        - protocol: TCP
          port: 9001
    # Store gRPC. Workers fetch NARs (GetPath) and upload
    # outputs (PutPath).
    - to:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: rio-store
      ports:
        - protocol: TCP
          port: 9002
  # No rule for 169.254.169.254 (cloud metadata) or 0.0.0.0/0
  # (internet) → DENIED. NetworkPolicy is default-deny for
  # policyTypes listed: anything not matched by an `egress`
  # rule is blocked. The metadata endpoint block is implicit.
  #
  # What about FODs (fetchurl etc)? They need internet. Two
  # options: (a) fetch on the GATEWAY (which has egress) and
  # upload to the store before submitting — that's the "upload
  # via nix copy first" model the Build CRD assumes; (b) a
  # separate `rio-worker-fod` pool with a relaxed policy. (a)
  # is the design; (b) is an escape hatch if needed.
---
# Controller egress: K8s API + scheduler + store.
#
# The controller NEEDS the apiserver (watch CRDs, patch
# StatefulSets). Workers don't (automountServiceAccountToken:
# false in build_pod_spec).
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: rio-controller-egress
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: rio-controller
  policyTypes:
    - Egress
  egress:
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
      ports:
        - protocol: UDP
          port: 53
    # K8s API. `ipBlock` not `podSelector`: the apiserver isn't
    # a pod (it runs on the control plane, outside the cluster
    # network on managed K8s). The kubernetes Service's
    # ClusterIP is stable (.1 in the service CIDR on most
    # distributions, but not guaranteed). Safer: allow egress
    # to RFC1918 private ranges (covers cluster + apiserver
    # on most managed K8s).
    #
    # This is less tight than the worker policy. The controller
    # is a trusted component (it manages infra); the tradeoff
    # is "allow private-IP space, deny public + link-local" vs
    # "enumerate every internal IP the controller needs." The
    # former is maintainable.
    #
    # Metadata endpoint (169.254.169.254, link-local) is NOT in
    # any RFC1918 block, so it's DENIED implicitly by the
    # absence of a rule matching it. No `except` clause needed
    # — nesting a link-local /32 under an RFC1918 CIDR would
    # be a no-op (the subnet isn't a member of the parent).
    - to:
        - ipBlock:
            cidr: 10.0.0.0/8
        - ipBlock:
            cidr: 172.16.0.0/12
        - ipBlock:
            cidr: 192.168.0.0/16
---
# Scheduler ingress: only rio components can connect to :9001.
# Blocks random pods in the cluster from calling SubmitBuild /
# WorkerService directly. The Service still exists (for DNS) but
# NetworkPolicy blocks connections from non-allowlisted pods.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: rio-scheduler-ingress
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: rio-scheduler
  policyTypes:
    - Ingress
  ingress:
    # gRPC from gateway (SubmitBuild), workers (Heartbeat/
    # BuildExecution), controller (ClusterStatus/DrainWorker).
    - from:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: rio-gateway
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: rio-worker
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: rio-controller
      ports:
        - protocol: TCP
          port: 9001
    # Plaintext health from kubelet. kubelet isn't a pod →
    # needs ipBlock. Node CIDR varies per cluster; the prod
    # overlay's private-range allowance covers it (nodes are
    # RFC1918). Alternatively: omit this (the base yaml's
    # grpc probe is on 9001 which the above rules open; the
    # plaintext 9101 is only used when mTLS is on, and THAT
    # overlay can add a kubelet-specific rule).
    #
    # For now: allow from any pod in this namespace on 9101.
    # The plaintext port serves ONLY health; exposure is
    # harmless (no data, just SERVING/NOT_SERVING).
    - from:
        - podSelector: {}
      ports:
        - protocol: TCP
          port: 9101
---
# Store ingress: gateway (PutPath from nix copy), workers
# (GetPath inputs, PutPath outputs), scheduler (FindMissingPaths
# cache-check).
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: rio-store-ingress
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: rio-store
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: rio-gateway
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: rio-worker
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: rio-scheduler
      ports:
        - protocol: TCP
          port: 9002
    # Plaintext health (same rationale as scheduler).
    - from:
        - podSelector: {}
      ports:
        - protocol: TCP
          port: 9102
