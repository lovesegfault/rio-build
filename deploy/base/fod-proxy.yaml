# Squid forward proxy for fixed-output derivation (FOD) fetches.
#
# FODs (fetchurl, fetchgit, etc) need internet. The default
# NetworkPolicy (prod overlay) denies all egress from workers.
# This proxy sits between: worker → Squid (cluster IP, allowed by
# a NetworkPolicy exception) → internet (allowed for THIS pod).
# Squid's allowlist means FODs can ONLY fetch from known source
# hosts (nixos.org, github, crates.io etc) — an FOD fetching from
# evil.attacker.com gets Squid's 403.
#
# This is defense in depth: FOD sandboxes already verify the
# output hash, so a malicious source can't inject backdoored
# content that PASSES the build. But it CAN exfiltrate data via
# the request (DNS subdomain encoding, POST body, etc) if the
# builder is compromised. The allowlist prevents that.
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: rio-fod-proxy-config
data:
  squid.conf: |
    # Listen on the standard proxy port. Workers connect here.
    http_port 3128

    # Allowlisted domains. `.example.com` matches `example.com`
    # AND all subdomains. This covers the vast majority of Nix
    # FODs (nixpkgs' fetchurl sources). Operators can extend
    # via ConfigMap edit + pod restart.
    acl allowed_domains dstdomain \
      .nixos.org \
      .github.com \
      .githubusercontent.com \
      .gitlab.com \
      .crates.io \
      .pypi.org \
      .pythonhosted.org \
      .npmjs.org \
      .rubygems.org \
      .golang.org \
      .debian.org \
      .kernel.org \
      .sourceforge.net \
      .gnu.org

    # Allow from workers only. In K8s, pod-to-pod traffic comes
    # from the cluster CIDR — we can't easily restrict by pod
    # identity in Squid (that's what NetworkPolicy is for). This
    # ACL is "any client" — the real access control is the
    # NetworkPolicy allowing only workers to reach this pod.
    http_access allow allowed_domains
    http_access deny all

    # No caching. This is a forward proxy for access control,
    # not performance. Caching would complicate cache invalidation
    # (a tarball URL might change content) and the FOD builder
    # verifies by hash anyway.
    cache deny all

    # Logs to stdout for `kubectl logs`. Squid by default logs to
    # /var/log/squid/, which is lost on pod restart. stdio:/dev/
    # stdout routes to container stdout.
    access_log stdio:/dev/stdout

    # No PID file. Default is /var/run/squid.pid which requires
    # root (or a writable /var/run). Running as non-root, we
    # don't need it (K8s manages the process lifecycle).
    pid_filename none

    # Squid wants a cache dir for coredumps etc even with
    # `cache deny all`. Point it at the tmpfs.
    coredump_dir /var/spool/squid
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: rio-fod-proxy
  labels:
    app.kubernetes.io/name: rio-fod-proxy
    app.kubernetes.io/component: proxy
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: rio-fod-proxy
  template:
    metadata:
      labels:
        app.kubernetes.io/name: rio-fod-proxy
        app.kubernetes.io/component: proxy
    spec:
      # runAsNonRoot: Squid doesn't need root. UID 31 is `squid`
      # on Ubuntu. stdout logging breaks under root anyway
      # (Squid drops privileges but stdio:/dev/stdout is opened
      # before that → permission mismatch; running as the target
      # user from the start avoids the dance).
      securityContext:
        runAsNonRoot: true
        runAsUser: 31
        runAsGroup: 31
      containers:
        - name: squid
          # ubuntu/squid is the canonical image. 5.2-22.04_beta:
          # the only non-edge 22.04 tag that exists ("5.7-22.04"
          # was never published — 22.04 shipped squid 5.2).
          image: ubuntu/squid:5.2-22.04_beta
          ports:
            - name: proxy
              containerPort: 3128
          volumeMounts:
            # subPath mounts ONLY squid.conf at that path,
            # leaving the rest of /etc/squid alone (the image
            # has defaults for error pages etc).
            - name: config
              mountPath: /etc/squid/squid.conf
              subPath: squid.conf
              readOnly: true
            # tmpfs for Squid's working dirs. It writes even
            # with `cache deny all` (connection state, etc).
            # medium: Memory = tmpfs, wiped on restart (fine
            # — no persistent state).
            - name: spool
              mountPath: /var/spool/squid
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              # Squid is lightweight for our use case (forward
              # proxy, no cache). 256Mi is generous; most usage
              # will be <50Mi.
              memory: 256Mi
          # No custom probes: Squid exposes nothing for health
          # checks. K8s default (container running = ready) is
          # fine. A more thorough check would TCP-probe 3128.
          readinessProbe:
            tcpSocket:
              port: 3128
            periodSeconds: 10
      volumes:
        - name: config
          configMap:
            name: rio-fod-proxy-config
        - name: spool
          emptyDir:
            medium: Memory
            # 64Mi is plenty for connection state; Squid doesn't
            # cache (cache deny all).
            sizeLimit: 64Mi
---
apiVersion: v1
kind: Service
metadata:
  name: rio-fod-proxy
  labels:
    app.kubernetes.io/name: rio-fod-proxy
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: rio-fod-proxy
  ports:
    - name: proxy
      port: 3128
      targetPort: proxy
