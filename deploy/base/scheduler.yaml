# rio-scheduler: DAG actor + leader election.
#
# replicas=2 for HA. Leader election via K8s Lease means ONE
# replica dispatches; the other merges DAGs (state warm) but
# dispatch_ready early-returns until it acquires. Readiness
# gates on is_leader → Service routes only to the leader.
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: rio-scheduler
  labels:
    app.kubernetes.io/name: rio-scheduler
    app.kubernetes.io/component: scheduler
spec:
  # 2 replicas: one leader, one hot standby. The standby's
  # readinessProbe fails (tonic-health NOT_SERVING when
  # !is_leader) → Service excludes it → all client traffic
  # hits the leader. On leader death: standby acquires the
  # Lease → is_leader=true → readiness passes → traffic flows.
  # ~1s failover (step_down on SIGTERM; 15s Lease TTL is the
  # fallback for crash death).
  replicas: 2
  # Recreate, not RollingUpdate. readinessProbe gates on is_leader
  # (by design — it's how the Service routes to the active
  # replica). That means at most 1 pod is EVER Ready. RollingUpdate
  # requires (replicas - maxUnavailable) Ready at all times, and
  # even with maxUnavailable: 1 that's 1 Ready minimum — which
  # means k8s won't terminate the old leader (only Ready pod)
  # until a new pod is Ready, but new pods can't be Ready until
  # they acquire the lease, which the old leader holds. Deadlock.
  # commit 6250327 tried maxUnavailable: 1 but that only lets k8s
  # kill the old STANDBY, not the leader.
  #
  # Recreate terminates all old pods first. step_down() on SIGTERM
  # (rio-scheduler/src/lease.rs) releases the lease immediately so
  # the new pod acquires on its first poll. Rollout downtime:
  # grace period + pod start + 1 poll ≈ a few seconds. Acceptable
  # for a deliberate deploy; the standby is for UNPLANNED failover.
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: rio-scheduler
  template:
    metadata:
      labels:
        app.kubernetes.io/name: rio-scheduler
        app.kubernetes.io/component: scheduler
    spec:
      serviceAccountName: rio-scheduler
      # Anti-affinity: with replicas=2, REQUIRE they land on
      # different nodes. Both on one node = that node draining
      # kills both (PDB blocks it, but that just stalls the drain
      # — still bad). requiredDuringScheduling is safe for 2
      # replicas on any multi-node cluster; a single-node dev
      # cluster uses replicas=1 anyway (dev overlay patches).
      affinity:
        podAntiAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            - labelSelector:
                matchLabels:
                  app.kubernetes.io/name: rio-scheduler
              topologyKey: kubernetes.io/hostname
      containers:
        - name: scheduler
          image: rio-scheduler:latest
          # imagePullPolicy: overlays set Never (dev, airgap-
          # loaded) or Always (prod, registry).
          ports:
            - name: grpc
              containerPort: 9001
            - name: metrics
              containerPort: 9091
            # Plaintext health for K8s probes. Only listens when
            # server mTLS is configured (RIO_TLS__* set) — K8s
            # gRPC probes can't present client certs. Shares the
            # SAME HealthReporter as the main port: the leader-
            # toggle loop's set_not_serving propagates → standby
            # still correctly fails readiness. Without shared
            # reporter: standby always SERVING → K8s routes to
            # non-leader → cluster split.
            - name: health
              containerPort: 9101
          env:
            # Lease name: all replicas contend for the SAME
            # lease. First to acquire wins. Presence of this
            # env var is what ENABLES lease mode (LeaseConfig::
            # from_env returns None without it → always-leader
            # mode, which would be wrong with replicas=2).
            - name: RIO_LEASE_NAME
              value: rio-scheduler-leader
            # Namespace via downward API — matches wherever
            # kustomize deploys us. Without this, the lease
            # code reads /var/run/secrets/.../namespace
            # (works but explicit is clearer).
            - name: RIO_LEASE_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            # Holder ID = pod name. Unique per replica (K8s
            # guarantees it). HOSTNAME is how K8s exposes it
            # by default; the lease code reads this.
            - name: HOSTNAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: RIO_LISTEN_ADDR
              value: "0.0.0.0:9001"
            - name: RIO_HEALTH_ADDR
              value: "0.0.0.0:9101"
            - name: RIO_STORE_ADDR
              value: "rio-store:9002"
            # DATABASE_URL: overlays inject the real connection string
            # (CloudNativePG secret in dev, RDS in prod). Empty
            # here → scheduler fails fast at startup with a
            # clear error, not a silent hang.
            - name: RIO_DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: rio-postgres
                  key: url
          # gRPC readiness: tonic-health reports SERVING only
          # when is_leader=true (the health-toggle loop in
          # main.rs). MUST specify the service name —
          # set_not_serving::<S>() affects only the NAMED
          # service, not empty-string "". The proto package is
          # `rio.scheduler`, no `.v1` suffix.
          readinessProbe:
            grpc:
              port: 9001
              service: rio.scheduler.SchedulerService
            periodSeconds: 5
            failureThreshold: 3
          # Liveness: same check but LONGER threshold. A
          # non-leader standby is NOT_SERVING (not ready) but
          # ALIVE — don't restart it. Liveness only fires if
          # the gRPC server itself is dead (actor panicked,
          # server hung).
          #
          # Actually: liveness with grpc.service set would ALSO
          # fail on standby. Wrong. Use TCP liveness instead —
          # "is port 9001 listening at all." That's what
          # liveness should check: process up, not "is leader."
          livenessProbe:
            tcpSocket:
              port: 9001
            periodSeconds: 10
            failureThreshold: 6
          # Startup: TCP check (NOT the named gRPC service). The
          # named SchedulerService only goes SERVING when is_leader=true;
          # a standby replica never acquires the lease while the leader
          # is healthy, so a named-service startupProbe would crash-loop
          # the standby. TCP check just confirms the gRPC server is up.
          # Generous threshold: scheduler runs migrations + connects to
          # PG + connects to store on startup — 60s worst case.
          startupProbe:
            tcpSocket:
              port: 9001
            periodSeconds: 5
            # 60s total (12 × 5s). Ignored once this passes.
            failureThreshold: 12
          resources:
            requests:
              cpu: "500m"
              memory: "512Mi"
            limits:
              memory: "2Gi"
---
apiVersion: v1
kind: Service
metadata:
  name: rio-scheduler
  labels:
    app.kubernetes.io/name: rio-scheduler
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: rio-scheduler
  ports:
    - name: grpc
      port: 9001
      targetPort: grpc
