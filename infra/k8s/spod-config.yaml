# spod DaemonSet config. The operator creates a default `spod` instance
# on startup and only reconciles that name; this CR overrides its
# scheduling. Applied via xtask `kubectl apply --server-side
# --force-conflicts` AFTER the operator is up (helm can't adopt an
# operator-created resource).
#
# Constraining to builder/fetcher nodes mirrors the old
# rio-seccomp-installer DS — control-plane nodes don't need profiles.
#
# enableProfileRecording=false: the eBPF recorder loads a per-node BPF
# program for syscall capture. rio's profiles are hand-maintained
# (RuntimeDefault-derived); recording is unused. Disabling drops the
# bpfrecorder container from spod.
apiVersion: security-profiles-operator.x-k8s.io/v1alpha1
kind: SecurityProfilesOperatorDaemon
metadata:
  name: spod
  namespace: security-profiles-operator
spec:
  enableBpfRecorder: false
  # Bottlerocket's SELinux policy doesn't have spc_t (SPO's default).
  # super_t is Bottlerocket's privileged container type. Without this,
  # containerd fails the type transition: "cannot start a stopped
  # process" (no AVC denial logged — runc exits before the audit).
  selinuxTypeTag: super_t
  tolerations:
    - key: rio.build/builder
      operator: Exists
      effect: NoSchedule
    - key: rio.build/fetcher
      operator: Exists
      effect: NoSchedule
  affinity:
    nodeAffinity:
      requiredDuringSchedulingIgnoredDuringExecution:
        nodeSelectorTerms:
          - matchExpressions:
              - key: rio.build/node-role
                operator: In
                values: [builder, fetcher]
