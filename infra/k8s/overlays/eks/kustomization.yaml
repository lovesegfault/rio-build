# EKS overlay: IRSA + NLB + ECR + secrets on top of prod.
#
# This overlay uses ${VAR} placeholders for cluster-specific values
# (ECR registry, IAM role ARN, S3 bucket, image tag). kustomize
# doesn't do env-var interpolation natively. infra/eks/deploy.sh
# copies this overlay to a tmpdir, sed-replaces the ${VARS}, and
# runs `kubectl apply -k` on the copy.
#
# Prerequisites (infra/eks/deploy.sh handles all of these):
#   - tofu apply completed (cluster + Aurora + ECR + bastion)
#   - nix run .#push-images completed (images in ECR)
#   - Secrets generated: rio-postgres, rio-gateway-ssh, rio-hmac,
#     rio-signing-key (deploy.sh creates them from tofu outputs +
#     openssl rand + nix-store --generate-binary-cache-key)
#
# IMDSv2 hop limit: NOT a manifest setting — it's on the EC2
# launch template (infra/eks/main.tf worker nodegroup metadata_options).
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# Base on prod: same PG/S3 external assumption, PDBs, NetPol, mTLS.
resources:
  - ../prod

patches:
  # IRSA: annotate the store SA with the IAM role ARN. The EKS
  # pod-identity-webhook sees this and projects an AWS token at
  # /var/run/secrets/eks.amazonaws.com/. aws-sdk picks it up
  # automatically (default credential chain includes
  # "WebIdentityToken" at that path).
  - target:
      kind: ServiceAccount
      name: rio-store
    patch: |
      - op: add
        path: /metadata/annotations
        value:
          eks.amazonaws.com/role-arn: ${STORE_IAM_ROLE_ARN}

  # aws-load-balancer-controller annotations. Base has none (cloud-
  # agnostic); this is the single place AWS LB behavior is set.
  #
  # type: external → hand this Service to aws-lbc instead of the
  # legacy in-tree cloud-provider-aws. Without this, aws-lbc
  # ignores the Service entirely.
  #
  # nlb-target-type: ip routes directly to pod IPs (no kube-proxy
  # hop, source IP preserved). Requires aws-lbc + VPC CNI.
  #
  # scheme: internal. Gateway access via SSM bastion tunnel
  # (infra/eks/bastion.tf + smoke-test.sh).
  #
  # listener-attributes.TCP-22: NLB TCP idle timeout. 3600s = 1h;
  # builds longer than that re-send STDERR_NEXT keepalives anyway.
  #
  # First entry seeds /metadata/annotations (base has no annotations
  # block → `op: add` on a member path under a nonexistent parent
  # fails per RFC 6902). Subsequent entries add keys into the map.
  - target:
      kind: Service
      name: rio-gateway
    patch: |
      - op: add
        path: /metadata/annotations
        value:
          service.beta.kubernetes.io/aws-load-balancer-type: external
      - op: add
        path: /metadata/annotations/service.beta.kubernetes.io~1aws-load-balancer-nlb-target-type
        value: ip
      - op: add
        path: /metadata/annotations/service.beta.kubernetes.io~1aws-load-balancer-scheme
        value: internal
      - op: add
        path: /metadata/annotations/service.beta.kubernetes.io~1aws-load-balancer-listener-attributes.TCP-22
        value: tcp.idle_timeout.seconds=3600

  # Gateway SSH: mount the host key + authorized_keys Secret.
  # Base doesn't do this (deployment.md:84 warns about it — without
  # a mount, the gateway auto-generates an ephemeral host key on
  # each startup, which breaks known_hosts on every restart).
  #
  # Host key persists via an emptyDir — survives container restarts
  # (same pod), regenerates on pod reschedule (acceptable for dev;
  # prod with 2 replicas should use a real Secret with a fixed key
  # so both replicas present the same host key). authorized_keys
  # from a Secret that smoke-test.sh creates.
  - target:
      kind: Deployment
      name: rio-gateway
    patch: |
      apiVersion: apps/v1
      kind: Deployment
      metadata:
        name: rio-gateway
      spec:
        template:
          spec:
            containers:
              - name: gateway
                env:
                  - name: RIO_HOST_KEY
                    value: /var/lib/rio/gateway/host_key
                  - name: RIO_AUTHORIZED_KEYS
                    value: /etc/rio/ssh/authorized_keys
                volumeMounts:
                  - name: gateway-state
                    mountPath: /var/lib/rio/gateway
                  - name: gateway-ssh
                    mountPath: /etc/rio/ssh
                    readOnly: true
            volumes:
              - name: gateway-state
                emptyDir: {}
              - name: gateway-ssh
                secret:
                  secretName: rio-gateway-ssh

  # Replace prod's PLACEHOLDER-SET-IN-GITOPS with the real bucket.
  # prod sets these to placeholder values (line ~50 in its
  # kustomization) via `op: add` — they're already in the container
  # env list when this overlay sees them. `op: replace` targets the
  # env entry by index, which is fragile (env ordering could shift).
  # Instead: strategic merge by name — merges on the `name` key,
  # replacing `value`.
  - target:
      kind: Deployment
      name: rio-store
    patch: |
      apiVersion: apps/v1
      kind: Deployment
      metadata:
        name: rio-store
      spec:
        template:
          spec:
            containers:
              - name: store
                env:
                  - name: RIO_CHUNK_BACKEND__BUCKET
                    value: ${RIO_CHUNK_BUCKET}
                  - name: RIO_LOG_S3_BUCKET
                    value: ${RIO_CHUNK_BUCKET}
                  # HMAC key for assignment-token signing. Same file
                  # both scheduler and store (shared secret).
                  - name: RIO_HMAC_KEY_PATH
                    value: /etc/rio/hmac/key
                  # NAR signing key (ed25519, nix secret-key format).
                  - name: RIO_SIGNING_KEY_PATH
                    value: /etc/rio/signing/key
                volumeMounts:
                  - name: hmac
                    mountPath: /etc/rio/hmac
                    readOnly: true
                  - name: signing
                    mountPath: /etc/rio/signing
                    readOnly: true
            volumes:
              - name: hmac
                secret:
                  secretName: rio-hmac
              - name: signing
                secret:
                  secretName: rio-signing-key

  # Scheduler gets the same HMAC key (signs assignments, store verifies).
  - target:
      kind: Deployment
      name: rio-scheduler
    patch: |
      apiVersion: apps/v1
      kind: Deployment
      metadata:
        name: rio-scheduler
      spec:
        template:
          spec:
            containers:
              - name: scheduler
                env:
                  - name: RIO_HMAC_KEY_PATH
                    value: /etc/rio/hmac/key
                volumeMounts:
                  - name: hmac
                    mountPath: /etc/rio/hmac
                    readOnly: true
            volumes:
              - name: hmac
                secret:
                  secretName: rio-hmac

# ECR image references. prod sets newTag: SET-IN-CI — this overlay
# replaces both name and tag with the real ECR paths. push-images
# tags with git SHA; deploy.sh substitutes RIO_IMAGE_TAG.
images:
  - name: rio-scheduler
    newName: ${ECR_REGISTRY}/rio-scheduler
    newTag: ${RIO_IMAGE_TAG}
  - name: rio-store
    newName: ${ECR_REGISTRY}/rio-store
    newTag: ${RIO_IMAGE_TAG}
  - name: rio-gateway
    newName: ${ECR_REGISTRY}/rio-gateway
    newTag: ${RIO_IMAGE_TAG}
  - name: rio-controller
    newName: ${ECR_REGISTRY}/rio-controller
    newTag: ${RIO_IMAGE_TAG}
  - name: rio-fod-proxy
    newName: ${ECR_REGISTRY}/rio-fod-proxy
    newTag: ${RIO_IMAGE_TAG}
