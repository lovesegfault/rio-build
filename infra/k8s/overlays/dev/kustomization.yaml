# Dev overlay: CloudNativePG + MinIO, airgap images, 1 scheduler.
#
# For local k3s/kind clusters. Everything self-contained — no
# external PG or S3 needed. Images loaded via `k3s ctr images
# import` or `kind load docker-image` (imagePullPolicy: Never).
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: rio-system

resources:
  - ../../base
  - namespace.yaml
  - postgres.yaml
  - minio.yaml
  - workerpool-example.yaml

patches:
  # Dev: 1 scheduler replica. No HA needed for local dev; the
  # lease still works (it acquires immediately, no contention).
  # Faster iteration (1 pod to restart, not 2).
  - target:
      kind: Deployment
      name: rio-scheduler
    patch: |
      - op: replace
        path: /spec/replicas
        value: 1
  # Gateway: 1 replica, ClusterIP. LoadBalancer needs a real
  # cloud LB controller (metallb in dev clusters, or just skip
  # it and port-forward for testing).
  - target:
      kind: Deployment
      name: rio-gateway
    patch: |
      - op: replace
        path: /spec/replicas
        value: 1
  - target:
      kind: Service
      name: rio-gateway
    patch: |
      - op: replace
        path: /spec/type
        value: ClusterIP
  # Gateway: auto-generated host key (persists for pod lifetime via
  # emptyDir, matches NixOS module's StateDirectory convention) +
  # authorized_keys from Secret (built by secretGenerator below from
  # ssh/authorized_keys — see ssh/README.md for setup).
  - target:
      kind: Deployment
      name: rio-gateway
    patch: |
      apiVersion: apps/v1
      kind: Deployment
      metadata:
        name: rio-gateway
      spec:
        template:
          spec:
            containers:
              - name: gateway
                env:
                  - name: RIO_HOST_KEY
                    value: /var/lib/rio/gateway/host_key
                  - name: RIO_AUTHORIZED_KEYS
                    value: /etc/rio/ssh/authorized_keys
                volumeMounts:
                  - name: gateway-state
                    mountPath: /var/lib/rio/gateway
                  - name: gateway-ssh
                    mountPath: /etc/rio/ssh
                    readOnly: true
            volumes:
              - name: gateway-state
                emptyDir: {}
              - name: gateway-ssh
                secret:
                  secretName: rio-gateway-ssh
  # MinIO creds + S3 chunk backend. The MinIO deployment in
  # this overlay uses these same creds (hardcoded; dev only).
  - target:
      kind: Deployment
      name: rio-store
    patch: |
      - op: add
        path: /spec/template/spec/containers/0/env/-
        value:
          name: AWS_ACCESS_KEY_ID
          value: rio-dev
      - op: add
        path: /spec/template/spec/containers/0/env/-
        value:
          name: AWS_SECRET_ACCESS_KEY
          value: rio-dev-secret
      - op: add
        path: /spec/template/spec/containers/0/env/-
        value:
          name: AWS_ENDPOINT_URL
          value: http://rio-minio:9000
      - op: add
        path: /spec/template/spec/containers/0/env/-
        value:
          name: RIO_CHUNK_BACKEND__KIND
          value: s3
      - op: add
        path: /spec/template/spec/containers/0/env/-
        value:
          name: RIO_CHUNK_BACKEND__BUCKET
          value: rio-chunks
      - op: add
        path: /spec/template/spec/containers/0/env/-
        value:
          name: RIO_CHUNK_BACKEND__PREFIX
          value: ""

# Airgap: images are preloaded, not pulled. Never → fail if not
# preloaded (clear error vs pull timeout).
images:
  - name: rio-scheduler
    newTag: dev
  - name: rio-store
    newTag: dev
  - name: rio-gateway
    newTag: dev
  - name: rio-controller
    newTag: dev
  - name: rio-worker
    newTag: dev
  - name: rio-fod-proxy
    newTag: dev

# PG connection secret: generated from literals (dev creds,
# matches postgres.yaml's CloudNativePG Cluster). In prod
# this comes from the external RDS connection string.
secretGenerator:
  - name: rio-postgres
    literals:
      - url=postgres://rio:rio@rio-pg-rw:5432/rio
    options:
      disableNameSuffixHash: true
  # Gateway authorized_keys. File is .gitignore'd (per-user); `just
  # dev apply` materializes it from RIO_SSH_PUBKEY (.env.local). Raw
  # `kustomize build` without it fails — loud, intentional. See
  # ssh/README.md.
  - name: rio-gateway-ssh
    files:
      - authorized_keys=ssh/authorized_keys
    options:
      disableNameSuffixHash: true
