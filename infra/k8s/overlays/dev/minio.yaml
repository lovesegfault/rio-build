# MinIO for dev S3. Single pod, in-memory (emptyDir) — data
# lost on pod restart. That's fine: dev iteration doesn't need
# durable chunks, and it avoids a PVC dependency.
#
# Why not use the MinIO operator: it's heavy (multi-tenant,
# console, etc). For dev we want "S3-compatible endpoint, 3
# YAML docs, done."
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: rio-minio
  labels:
    app.kubernetes.io/name: rio-minio
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: rio-minio
  template:
    metadata:
      labels:
        app.kubernetes.io/name: rio-minio
    spec:
      containers:
        - name: minio
          image: minio/minio:latest
          args: ["server", "/data"]
          env:
            # Matches the store Deployment patch in
            # kustomization.yaml. DEV ONLY — obviously.
            - name: MINIO_ROOT_USER
              value: rio-dev
            - name: MINIO_ROOT_PASSWORD
              value: rio-dev-secret
          ports:
            - name: s3
              containerPort: 9000
          volumeMounts:
            - name: data
              mountPath: /data
      volumes:
        - name: data
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: rio-minio
spec:
  selector:
    app.kubernetes.io/name: rio-minio
  ports:
    - name: s3
      port: 9000
      targetPort: s3
---
# Bucket creation. MinIO doesn't auto-create buckets; the store
# would 404 on first PutChunk. This Job runs `mc mb` once.
#
# `ttlSecondsAfterFinished: 60` — cleans itself up.
apiVersion: batch/v1
kind: Job
metadata:
  name: rio-minio-create-bucket
spec:
  ttlSecondsAfterFinished: 60
  template:
    spec:
      restartPolicy: OnFailure
      containers:
        - name: mc
          image: minio/mc:latest
          command:
            - /bin/sh
            - -c
            # mc alias set + mb. Retry loop: MinIO might not be
            # ready yet (Job and Deployment start in parallel).
            # 30 × 2s = 60s max wait — plenty for a single pod.
            - |
              for i in $(seq 1 30); do
                if mc alias set local http://rio-minio:9000 rio-dev rio-dev-secret; then
                  mc mb --ignore-existing local/rio-chunks
                  exit 0
                fi
                sleep 2
              done
              exit 1
