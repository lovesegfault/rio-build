# Strategic-merge patches: mount TLS Secrets + set RIO_TLS__* env.
#
# Applied in prod overlay only. cert-manager.yaml creates the
# Secrets; these patches mount them at /etc/rio/tls/ and point
# the figment config at them. Base deployment stays plaintext
# (dev overlay doesn't include cert-manager).
#
# Probe retargeting (store only): when mTLS is on, the main gRPC
# port rejects the K8s probe (no client cert). Retarget store's
# readiness to the plaintext health port (9102). Scheduler doesn't
# need this — its readiness is tcpSocket (see base/scheduler.yaml),
# and TCP handshake completes before the TLS layer is reached.
# liveness/startup stay tcpSocket on the main port for the same
# reason.
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: rio-scheduler
spec:
  template:
    spec:
      volumes:
        - name: tls
          secret:
            secretName: rio-scheduler-tls
      containers:
        - name: scheduler
          volumeMounts:
            - name: tls
              mountPath: /etc/rio/tls
              readOnly: true
          env:
            - name: RIO_TLS__CERT_PATH
              value: /etc/rio/tls/tls.crt
            - name: RIO_TLS__KEY_PATH
              value: /etc/rio/tls/tls.key
            - name: RIO_TLS__CA_PATH
              value: /etc/rio/tls/ca.crt
          # NO readinessProbe patch. Base uses tcpSocket:9001
          # which works under mTLS (TCP accept precedes TLS
          # handshake). Patching grpc.port here would ADD a
          # second handler type via strategic merge → k8s
          # rejects with "may not specify more than 1 handler".
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: rio-store
spec:
  template:
    spec:
      volumes:
        - name: tls
          secret:
            secretName: rio-store-tls
      containers:
        - name: store
          volumeMounts:
            - name: tls
              mountPath: /etc/rio/tls
              readOnly: true
          env:
            - name: RIO_TLS__CERT_PATH
              value: /etc/rio/tls/tls.crt
            - name: RIO_TLS__KEY_PATH
              value: /etc/rio/tls/tls.key
            - name: RIO_TLS__CA_PATH
              value: /etc/rio/tls/ca.crt
          readinessProbe:
            grpc:
              port: 9102
              service: rio.store.StoreService
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: rio-gateway
spec:
  template:
    spec:
      volumes:
        - name: tls
          secret:
            secretName: rio-gateway-tls
      containers:
        - name: gateway
          volumeMounts:
            - name: tls
              mountPath: /etc/rio/tls
              readOnly: true
          env:
            - name: RIO_TLS__CERT_PATH
              value: /etc/rio/tls/tls.crt
            - name: RIO_TLS__KEY_PATH
              value: /etc/rio/tls/tls.key
            - name: RIO_TLS__CA_PATH
              value: /etc/rio/tls/ca.crt
          # No probe retarget: gateway's health is already on a
          # separate plaintext port (9190) — gateway has no main
          # gRPC server, health was always standalone.
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: rio-controller
spec:
  template:
    spec:
      volumes:
        - name: tls
          secret:
            secretName: rio-controller-tls
      containers:
        - name: controller
          volumeMounts:
            - name: tls
              mountPath: /etc/rio/tls
              readOnly: true
          env:
            - name: RIO_TLS__CERT_PATH
              value: /etc/rio/tls/tls.crt
            - name: RIO_TLS__KEY_PATH
              value: /etc/rio/tls/tls.key
            - name: RIO_TLS__CA_PATH
              value: /etc/rio/tls/ca.crt
          # No probe retarget: controller uses HTTP /healthz, no
          # TLS involvement.
