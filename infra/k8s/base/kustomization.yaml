# Base kustomization: CRDs + RBAC + control-plane Deployments.
#
# What's NOT here: WorkerPool CRs (those are user-created, not
# infrastructure), PostgreSQL (overlays provide CloudNativePG
# in dev or an external Secret in prod), S3 config (overlays).
#
# Regenerate crds.yaml after CRD changes:
#   nix build .#crds && cp result infra/k8s/base/crds.yaml
# It's committed (not generated at apply time) because kustomize
# needs real files to read — can't pipe from nix build.
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - crds.yaml
  - rbac.yaml
  - configmaps.yaml
  - store.yaml
  - scheduler.yaml
  - gateway.yaml
  - controller.yaml
  # FOD forward proxy (Squid). Workers route FOD fetches through
  # this if WorkerPool.spec.fodProxyUrl is set. Included in base
  # (not cherry-picked from prod) because kustomize's load
  # restrictor rejects `../../base/fod-proxy.yaml` references
  # from overlay dirs. The Squid pod is harmless if unused —
  # ~50MB, idle, no traffic unless a WorkerPool points at it.
  - fod-proxy.yaml

# All resources get this label. Dashboards filter on it;
# `kubectl get all -l app.kubernetes.io/part-of=rio-build`
# shows the whole deployment.
#
# `labels` not `commonLabels`: the latter is deprecated and
# ALSO mutates selectors (immutable on StatefulSets — would
# break updates). `labels` with `includeSelectors: false`
# adds to metadata.labels only.
labels:
  - pairs:
      app.kubernetes.io/part-of: rio-build
    includeSelectors: false

# Images: overlays set real tags. Base uses :latest (never
# deploy base directly — always through an overlay).
images:
  - name: rio-scheduler
    newTag: latest
  - name: rio-store
    newTag: latest
  - name: rio-gateway
    newTag: latest
  - name: rio-controller
    newTag: latest
  - name: rio-fod-proxy
    newTag: latest
