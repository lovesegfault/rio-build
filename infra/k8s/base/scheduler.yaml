# rio-scheduler: DAG actor + leader election.
#
# replicas=2 for HA. Leader election via K8s Lease means ONE
# replica dispatches; the other merges DAGs (state warm) but
# dispatch_ready early-returns until it acquires.
#
# Readiness is DECOUPLED from leadership: both pods are Ready
# (process up, gRPC listening) but only the leader serves RPCs
# (r[sched.grpc.leader-guard]). Clients route via the headless
# Service + health-aware balancer (rio-proto/src/client/balance.rs)
# which probes grpc.health.v1 and only inserts SERVING endpoints.
# The ClusterIP Service below is kept for per-call connects
# (controller reconcilers, rio-cli, tests) — those get UNAVAILABLE
# 50% of the time and retry, which is fine for non-hot-path.
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: rio-scheduler
  labels:
    app.kubernetes.io/name: rio-scheduler
    app.kubernetes.io/component: scheduler
spec:
  # 2 replicas: one leader, one hot standby. Both are Ready
  # (TCP probe = process up). The ClusterIP Service round-
  # robins; the headless Service exposes both pod IPs so
  # clients with a balanced channel can health-probe.
  replicas: 2
  # RollingUpdate works now that readiness ≠ leadership. Both
  # pods Ready → Available condition true (replicas - maxUnavail
  # = 2 - 1 = 1, and we have 2 Ready). pod-deletion-cost
  # annotation (set by the leader on acquire, lease.rs) makes
  # K8s kill the standby first, so:
  #   1. surge: new pod comes up, becomes Ready, stays standby
  #   2. scale-down: K8s picks lowest cost = old standby, kills it
  #   3. repeat: new pod comes up, old leader step_down on SIGTERM,
  #      new pod acquires, balanced-channel clients reroute in ~3s
  # One leadership flip per rollout instead of two.
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 1
      maxSurge: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: rio-scheduler
  template:
    metadata:
      labels:
        app.kubernetes.io/name: rio-scheduler
        app.kubernetes.io/component: scheduler
    spec:
      serviceAccountName: rio-scheduler
      # Anti-affinity: with replicas=2, REQUIRE they land on
      # different nodes. Both on one node = that node draining
      # kills both (PDB blocks it, but that just stalls the drain
      # — still bad). requiredDuringScheduling is safe for 2
      # replicas on any multi-node cluster; a single-node dev
      # cluster uses replicas=1 anyway (dev overlay patches).
      affinity:
        podAntiAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            - labelSelector:
                matchLabels:
                  app.kubernetes.io/name: rio-scheduler
              topologyKey: kubernetes.io/hostname
      containers:
        - name: scheduler
          image: rio-scheduler:latest
          # imagePullPolicy: overlays set Never (dev, airgap-
          # loaded) or Always (prod, registry).
          ports:
            - name: grpc
              containerPort: 9001
            - name: metrics
              containerPort: 9091
            # Plaintext health for K8s probes. Only listens when
            # server mTLS is configured (RIO_TLS__* set) — K8s
            # gRPC probes can't present client certs. Shares the
            # SAME HealthReporter as the main port: the leader-
            # toggle loop's set_not_serving propagates → standby
            # still correctly fails readiness. Without shared
            # reporter: standby always SERVING → K8s routes to
            # non-leader → cluster split.
            - name: health
              containerPort: 9101
          env:
            # Lease name: all replicas contend for the SAME
            # lease. First to acquire wins. Presence of this
            # env var is what ENABLES lease mode (LeaseConfig::
            # from_env returns None without it → always-leader
            # mode, which would be wrong with replicas=2).
            - name: RIO_LEASE_NAME
              value: rio-scheduler-leader
            # Namespace via downward API — matches wherever
            # kustomize deploys us. Without this, the lease
            # code reads /var/run/secrets/.../namespace
            # (works but explicit is clearer).
            - name: RIO_LEASE_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            # Holder ID = pod name. Unique per replica (K8s
            # guarantees it). HOSTNAME is how K8s exposes it
            # by default; the lease code reads this.
            - name: HOSTNAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: RIO_LISTEN_ADDR
              value: "0.0.0.0:9001"
            - name: RIO_HEALTH_ADDR
              value: "0.0.0.0:9101"
            - name: RIO_STORE_ADDR
              value: "rio-store:9002"
            # DATABASE_URL: overlays inject the real connection string
            # (CloudNativePG secret in dev, RDS in prod). Empty
            # here → scheduler fails fast at startup with a
            # clear error, not a silent hang.
            - name: RIO_DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: rio-postgres
                  key: url
          # TCP readiness: "is the gRPC server listening." NOT
          # gated on is_leader — that's the whole point of this
          # design. Both pods Ready; clients route via health-
          # aware balancer which DOES check is_leader (via
          # grpc.health.v1 on the named service).
          #
          # The old gRPC-named-service probe is still WHAT THE
          # BALANCER uses — just not what K8s uses. K8s only
          # needs to know "pod is up"; the balancer knows "pod
          # is leader."
          readinessProbe:
            tcpSocket:
              port: 9001
            periodSeconds: 5
            failureThreshold: 3
          # Liveness: same check but LONGER threshold. A
          # non-leader standby is NOT_SERVING (not ready) but
          # ALIVE — don't restart it. Liveness only fires if
          # the gRPC server itself is dead (actor panicked,
          # server hung).
          #
          # Actually: liveness with grpc.service set would ALSO
          # fail on standby. Wrong. Use TCP liveness instead —
          # "is port 9001 listening at all." That's what
          # liveness should check: process up, not "is leader."
          livenessProbe:
            tcpSocket:
              port: 9001
            periodSeconds: 10
            failureThreshold: 6
          # Startup: TCP check (NOT the named gRPC service). The
          # named SchedulerService only goes SERVING when is_leader=true;
          # a standby replica never acquires the lease while the leader
          # is healthy, so a named-service startupProbe would crash-loop
          # the standby. TCP check just confirms the gRPC server is up.
          # Generous threshold: scheduler runs migrations + connects to
          # PG + connects to store on startup — 60s worst case.
          startupProbe:
            tcpSocket:
              port: 9001
            periodSeconds: 5
            # 60s total (12 × 5s). Ignored once this passes.
            failureThreshold: 12
          resources:
            requests:
              cpu: "500m"
              memory: "512Mi"
            limits:
              memory: "2Gi"
---
apiVersion: v1
kind: Service
metadata:
  name: rio-scheduler
  labels:
    app.kubernetes.io/name: rio-scheduler
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: rio-scheduler
  ports:
    - name: grpc
      port: 9001
      targetPort: grpc
---
# Headless Service: exposes pod IPs directly as DNS A records.
# clusterIP: None → CoreDNS returns ALL matching pod IPs (TTL 5s
# by default), not a single VIP. The balanced-channel clients
# (gateway, worker) resolve this, probe each IP via grpc.health.v1,
# and route to the SERVING one (= the leader).
#
# TLS note: clients connect to pod IPs (https://10.42.x.y:9001)
# but the cert's SAN is "rio-scheduler" (the ClusterIP name).
# ClientTlsConfig::domain_name() overrides the verify domain
# independently of the connect URI — see balance.rs. So NO SAN
# change needed in cert-manager.yaml. Adding "rio-scheduler-
# headless" to dnsNames would also work but isn't necessary.
apiVersion: v1
kind: Service
metadata:
  name: rio-scheduler-headless
  labels:
    app.kubernetes.io/name: rio-scheduler
spec:
  clusterIP: None
  selector:
    app.kubernetes.io/name: rio-scheduler
  ports:
    - name: grpc
      port: 9001
      targetPort: grpc
