# rio-gateway: SSH server speaking the Nix worker protocol.
#
# `nix copy --to ssh-ng://` and `nix build --store ssh-ng://`
# hit this. Translates worker-protocol opcodes into scheduler
# SubmitBuild + store PutPath calls.
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: rio-gateway
  labels:
    app.kubernetes.io/name: rio-gateway
    app.kubernetes.io/component: gateway
spec:
  # 2 replicas: stateless (session state is in-memory per-
  # connection, no shared state). The LB distributes SSH
  # connections round-robin. A dying gateway kills its sessions
  # (nix client retries).
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: rio-gateway
  template:
    metadata:
      labels:
        app.kubernetes.io/name: rio-gateway
        app.kubernetes.io/component: gateway
    spec:
      serviceAccountName: rio-gateway
      containers:
        - name: gateway
          image: rio-gateway:latest
          ports:
            - name: ssh
              containerPort: 2222
            - name: metrics
              containerPort: 9090
            # health_addr: tonic-health on a separate port
            # (gateway uses russh for SSH, not tonic).
            - name: health
              containerPort: 9190
          env:
            - name: RIO_LISTEN_ADDR
              value: "0.0.0.0:2222"
            - name: RIO_SCHEDULER_ADDR
              value: "rio-scheduler:9001"
            # Headless Service for health-aware balanced routing.
            # Gateway DNS-resolves this to pod IPs, probes
            # grpc.health.v1 on each, routes to the leader.
            # scheduler_addr above is still used — it's the TLS
            # verify domain (cert SAN is "rio-scheduler").
            - name: RIO_SCHEDULER_BALANCE_HOST
              value: "rio-scheduler-headless"
            - name: RIO_SCHEDULER_BALANCE_PORT
              value: "9001"
            - name: RIO_STORE_ADDR
              value: "rio-store:9002"
            # SSH host key: overlays mount a Secret. Without it
            # the gateway generates an ephemeral key on startup
            # (fine for dev, breaks known_hosts on restart).
          readinessProbe:
            # Gateway's tonic-health server (added in D2) —
            # reports SERVING after connect_scheduler succeeds.
            grpc:
              port: 9190
            periodSeconds: 5
            failureThreshold: 3
          livenessProbe:
            # SSH port listening = process alive.
            tcpSocket:
              port: 2222
            periodSeconds: 10
            failureThreshold: 6
          resources:
            requests:
              cpu: "250m"
              memory: "256Mi"
            limits:
              # Gateway buffers NAR uploads in-memory (streaming
              # via tee — ~1MB per concurrent upload since
              # phase2b's dump_path_streaming). 256Mi handles
              # dozens of concurrent uploads.
              memory: "1Gi"
---
apiVersion: v1
kind: Service
metadata:
  name: rio-gateway
  labels:
    app.kubernetes.io/name: rio-gateway
  # No AWS LB annotations here — base is cloud-agnostic. The EKS overlay
  # adds aws-load-balancer-controller annotations (type: external,
  # nlb-target-type: ip, scheme, listener-attributes for idle timeout).
  # Putting them here was wrong twice over: it leaked AWS specifics
  # into base, and used the legacy in-tree-provider syntax that the
  # aws-load-balancer-controller silently ignores.
spec:
  type: LoadBalancer
  selector:
    app.kubernetes.io/name: rio-gateway
  ports:
    - name: ssh
      # External port 22 (standard SSH) → container 2222.
      # Running on 2222 inside means no CAP_NET_BIND_SERVICE
      # (ports < 1024 need it). The Service remap is free.
      port: 22
      targetPort: ssh
