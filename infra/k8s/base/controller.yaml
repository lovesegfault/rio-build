# rio-controller: K8s operator (WorkerPool + Build CRDs).
#
# Single replica — the controller is NOT leader-elected (per
# controller.md: "single replica per design"). kube-runtime
# handles concurrent reconcile safely within one process, but
# two controllers would fight (both try to patch the same
# StatefulSet, SSA conflicts via fieldManager).
#
# Add leader election later if controller restart latency
# (pod rescheduling ~30s) becomes a problem. For now, a 30s
# reconcile gap during restart is fine.
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: rio-controller
  labels:
    app.kubernetes.io/name: rio-controller
    app.kubernetes.io/component: controller
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: rio-controller
  template:
    metadata:
      labels:
        app.kubernetes.io/name: rio-controller
        app.kubernetes.io/component: controller
    spec:
      # The ClusterRoleBinding references this. Without it,
      # default SA → no CRD watch perms → controller fails
      # with 403 on first watch.
      serviceAccountName: rio-controller
      containers:
        - name: controller
          image: rio-controller:latest
          ports:
            - name: metrics
              containerPort: 9094
            - name: health
              containerPort: 9194
          env:
            # Lazy-connected per-reconcile (see reconcilers/
            # mod.rs Ctx doc). A transient scheduler outage
            # doesn't kill the controller.
            - name: RIO_SCHEDULER_ADDR
              value: "rio-scheduler:9001"
            - name: RIO_STORE_ADDR
              value: "rio-store:9002"
          # /healthz serves 200 once kube client + scheduler
          # admin client connected. Before that the pod is
          # NotReady — correct, a controller that can't watch
          # CRDs is useless.
          livenessProbe:
            httpGet:
              path: /healthz
              port: health
            periodSeconds: 10
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /healthz
              port: health
            periodSeconds: 5
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              # Controller is lightweight — watches + patches.
              # The heaviest thing is the Build reconciler's
              # per-Build BuildEvent stream (spawned task per
              # Build). 100 concurrent Builds × ~1KB stream
              # buffer = 100KB. 256Mi is plenty.
              memory: "256Mi"
