          "gridPos": {"x": 0, "y": 16, "w": 24, "h": 6},
          "datasource": {"type": "prometheus", "uid": "${datasource}"},
          "targets": [
            {
              "expr": "rio_scheduler_class_load_fraction",
              "legendFormat": "{{class}}",
              "refId": "A"
            }
