data:
  build-overview.json: |
    {
      "uid": "rio-build-overview",
      "title": "rio-build: Build Overview",
      "tags": ["rio-build"],
      "timezone": "browser",
      "schemaVersion": 39,
      "version": 1,
      "refresh": "30s",
      "time": {"from": "now-1h", "to": "now"},
      "templating": {
        "list": [
          {
            "name": "datasource",
            "type": "datasource",
            "query": "prometheus",
            "current": {},
            "hide": 0,
            "refresh": 1
          }
        ]
      },
      "panels": [
        {
          "id": 1,
          "type": "stat",
          "title": "Active builds",
          "gridPos": {"x": 0, "y": 0, "w": 6, "h": 4},
          "datasource": {"type": "prometheus", "uid": "${datasource}"},
          "targets": [
            {
              "expr": "rio_scheduler_builds_active",
              "refId": "A"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "short",
              "color": {"mode": "thresholds"},
              "thresholds": {"mode": "absolute", "steps": [{"color": "green", "value": null}]}
            },
            "overrides": []
          },
          "options": {
            "reduceOptions": {"calcs": ["lastNotNull"], "fields": "", "values": false},
            "orientation": "auto",
            "textMode": "auto",
            "colorMode": "value",
            "graphMode": "area"
          }
        },
        {
          "id": 2,
          "type": "bargauge",
          "title": "Builds by outcome (rate)",
          "description": "Per-outcome completion rate over the last 5m. Labels: success/failure/cancelled.",
          "gridPos": {"x": 6, "y": 0, "w": 18, "h": 4},
          "datasource": {"type": "prometheus", "uid": "${datasource}"},
          "targets": [
            {
              "expr": "sum by (outcome) (rate(rio_scheduler_builds_total[5m]))",
              "legendFormat": "{{outcome}}",
              "refId": "A"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "ops",
              "color": {"mode": "palette-classic"},
              "thresholds": {"mode": "absolute", "steps": [{"color": "green", "value": null}]}
            },
            "overrides": []
          },
          "options": {
            "displayMode": "gradient",
            "orientation": "horizontal",
            "reduceOptions": {"calcs": ["lastNotNull"], "fields": "", "values": false},
            "showUnfilled": true
          }
        },
        {
          "id": 3,
          "type": "timeseries",
          "title": "Completion rate",
          "description": "Builds reaching terminal state per second.",
          "gridPos": {"x": 0, "y": 4, "w": 12, "h": 8},
          "datasource": {"type": "prometheus", "uid": "${datasource}"},
          "targets": [
            {
              "expr": "sum(rate(rio_scheduler_builds_total[5m]))",
              "legendFormat": "total",
              "refId": "A"
            },
            {
              "expr": "sum(rate(rio_scheduler_builds_total{outcome=\"success\"}[5m]))",
              "legendFormat": "success",
              "refId": "B"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "ops",
              "color": {"mode": "palette-classic"},
              "custom": {"drawStyle": "line", "lineInterpolation": "linear", "fillOpacity": 10, "spanNulls": false}
            },
            "overrides": []
          },
          "options": {
            "legend": {"displayMode": "list", "placement": "bottom", "showLegend": true},
            "tooltip": {"mode": "multi", "sort": "none"}
          }
        },
        {
          "id": 4,
          "type": "timeseries",
          "title": "Build duration p50/p99",
          "gridPos": {"x": 12, "y": 4, "w": 12, "h": 8},
          "datasource": {"type": "prometheus", "uid": "${datasource}"},
          "targets": [
            {
              "expr": "histogram_quantile(0.5, sum by (le) (rate(rio_scheduler_build_duration_seconds_bucket[5m])))",
              "legendFormat": "p50",
              "refId": "A"
            },
            {
              "expr": "histogram_quantile(0.99, sum by (le) (rate(rio_scheduler_build_duration_seconds_bucket[5m])))",
              "legendFormat": "p99",
              "refId": "B"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "s",
              "color": {"mode": "palette-classic"},
              "custom": {"drawStyle": "line", "lineInterpolation": "linear", "fillOpacity": 10, "spanNulls": false}
            },
            "overrides": []
          },
          "options": {
            "legend": {"displayMode": "list", "placement": "bottom", "showLegend": true},
            "tooltip": {"mode": "multi", "sort": "none"}
          }
        }
      ]
    }
  scheduler.json: |
    {
      "uid": "rio-scheduler",
      "title": "rio-build: Scheduler",
      "tags": ["rio-build"],
      "timezone": "browser",
      "schemaVersion": 39,
      "version": 1,
      "refresh": "30s",
      "time": {"from": "now-1h", "to": "now"},
      "templating": {
        "list": [
          {
            "name": "datasource",
            "type": "datasource",
            "query": "prometheus",
            "current": {},
            "hide": 0,
            "refresh": 1
          }
        ]
      },
      "panels": [
        {
          "id": 1,
          "type": "timeseries",
          "title": "Assignment latency p50/p99",
          "description": "Time from ready to assigned. Scheduler dispatch efficiency.",
          "gridPos": {"x": 0, "y": 0, "w": 12, "h": 8},
          "datasource": {"type": "prometheus", "uid": "${datasource}"},
          "targets": [
            {
              "expr": "histogram_quantile(0.5, sum by (le) (rate(rio_scheduler_assignment_latency_seconds_bucket[5m])))",
              "legendFormat": "p50",
              "refId": "A"
            },
            {
              "expr": "histogram_quantile(0.99, sum by (le) (rate(rio_scheduler_assignment_latency_seconds_bucket[5m])))",
              "legendFormat": "p99",
              "refId": "B"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "s",
              "color": {"mode": "palette-classic"},
              "custom": {"drawStyle": "line", "lineInterpolation": "linear", "fillOpacity": 10, "spanNulls": false}
            },
            "overrides": []
          },
          "options": {
            "legend": {"displayMode": "list", "placement": "bottom", "showLegend": true},
            "tooltip": {"mode": "multi", "sort": "none"}
          }
        },
        {
          "id": 2,
          "type": "timeseries",
          "title": "Ready queue depth",
          "description": "Derivations waiting for assignment.",
          "gridPos": {"x": 12, "y": 0, "w": 12, "h": 8},
          "datasource": {"type": "prometheus", "uid": "${datasource}"},
          "targets": [
            {
              "expr": "rio_scheduler_derivations_queued",
              "legendFormat": "queued",
              "refId": "A"
            },
            {
              "expr": "rio_scheduler_derivations_running",
              "legendFormat": "running",
              "refId": "B"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "short",
              "color": {"mode": "palette-classic"},
              "custom": {"drawStyle": "line", "lineInterpolation": "linear", "fillOpacity": 10, "spanNulls": false}
            },
            "overrides": []
          },
          "options": {
            "legend": {"displayMode": "list", "placement": "bottom", "showLegend": true},
            "tooltip": {"mode": "multi", "sort": "none"}
          }
        },
        {
          "id": 3,
          "type": "timeseries",
          "title": "Backstop timeouts",
          "description": "Running derivations reset to Ready after exceeding backstop timeout. Non-zero indicates wedged workers.",
          "gridPos": {"x": 0, "y": 8, "w": 8, "h": 6},
          "datasource": {"type": "prometheus", "uid": "${datasource}"},
          "targets": [
            {
              "expr": "sum(rate(rio_scheduler_backstop_timeouts_total[5m]))",
              "legendFormat": "timeouts/s",
              "refId": "A"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "ops",
              "color": {"mode": "thresholds"},
              "thresholds": {"mode": "absolute", "steps": [{"color": "green", "value": null}, {"color": "red", "value": 0.001}]},
              "custom": {"drawStyle": "line", "lineInterpolation": "linear", "fillOpacity": 20, "spanNulls": false}
            },
            "overrides": []
          },
          "options": {
            "legend": {"displayMode": "list", "placement": "bottom", "showLegend": true},
            "tooltip": {"mode": "single", "sort": "none"}
          }
        },
        {
          "id": 4,
          "type": "timeseries",
          "title": "Cancel signals",
          "description": "CancelSignal messages sent to workers (explicit CancelBuild, backstop timeout, or finalizer drain).",
          "gridPos": {"x": 8, "y": 8, "w": 8, "h": 6},
          "datasource": {"type": "prometheus", "uid": "${datasource}"},
          "targets": [
            {
              "expr": "sum(rate(rio_scheduler_cancel_signals_total[5m]))",
              "legendFormat": "cancels/s",
              "refId": "A"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "ops",
              "color": {"mode": "palette-classic"},
              "custom": {"drawStyle": "line", "lineInterpolation": "linear", "fillOpacity": 20, "spanNulls": false}
            },
            "overrides": []
          },
          "options": {
            "legend": {"displayMode": "list", "placement": "bottom", "showLegend": true},
            "tooltip": {"mode": "single", "sort": "none"}
          }
        },
        {
          "id": 5,
          "type": "timeseries",
          "title": "Misclassifications (penalty)",
          "description": "Builds that exceeded 2x their class cutoff duration, triggering penalty EMA overwrite.",
          "gridPos": {"x": 16, "y": 8, "w": 8, "h": 6},
          "datasource": {"type": "prometheus", "uid": "${datasource}"},
          "targets": [
            {
              "expr": "sum(rate(rio_scheduler_misclassifications_total[5m]))",
              "legendFormat": "misclass/s",
              "refId": "A"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "ops",
              "color": {"mode": "palette-classic"},
              "custom": {"drawStyle": "line", "lineInterpolation": "linear", "fillOpacity": 20, "spanNulls": false}
            },
            "overrides": []
          },
          "options": {
            "legend": {"displayMode": "list", "placement": "bottom", "showLegend": true},
            "tooltip": {"mode": "single", "sort": "none"}
          }
        },
        {
          "id": 6,
          "type": "timeseries",
          "title": "Class drift (cutoff)",
          "description": "Post-hoc classification drift: classify(actual) != assigned. Populated after P0228 completion-samples counter merges; shows No Data until then.",
          "gridPos": {"x": 0, "y": 14, "w": 24, "h": 6},
          "datasource": {"type": "prometheus", "uid": "${datasource}"},
          "targets": [
            {
              "expr": "sum by (assigned_class, actual_class) (rate(rio_scheduler_class_drift_total[5m]))",
              "legendFormat": "{{assigned_class}} -> {{actual_class}}",
              "refId": "A"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "ops",
              "color": {"mode": "palette-classic"},
              "custom": {"drawStyle": "line", "lineInterpolation": "linear", "fillOpacity": 10, "spanNulls": false}
            },
            "overrides": []
          },
          "options": {
            "legend": {"displayMode": "table", "placement": "right", "showLegend": true, "calcs": ["lastNotNull"]},
            "tooltip": {"mode": "multi", "sort": "desc"}
          }
        }
      ]
    }
  store-health.json: |
    {
      "uid": "rio-store-health",
      "title": "rio-build: Store Health",
      "tags": ["rio-build"],
      "timezone": "browser",
      "schemaVersion": 39,
      "version": 1,
      "refresh": "30s",
      "time": {"from": "now-1h", "to": "now"},
      "templating": {
        "list": [
          {
            "name": "datasource",
            "type": "datasource",
            "query": "prometheus",
            "current": {},
            "hide": 0,
            "refresh": 1
          }
        ]
      },
      "panels": [
        {
          "id": 1,
          "type": "stat",
          "title": "Chunk cache hit ratio",
          "description": "moka chunk cache hit ratio computed from counter pair (rate-based, cross-instance safe per observability.md).",
          "gridPos": {"x": 0, "y": 0, "w": 8, "h": 4},
          "datasource": {"type": "prometheus", "uid": "${datasource}"},
          "targets": [
            {
              "expr": "sum(rate(rio_store_chunk_cache_hits_total[5m])) / (sum(rate(rio_store_chunk_cache_hits_total[5m])) + sum(rate(rio_store_chunk_cache_misses_total[5m])))",
              "refId": "A"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "percentunit",
              "min": 0,
              "max": 1,
              "color": {"mode": "thresholds"},
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  {"color": "red", "value": null},
                  {"color": "yellow", "value": 0.5},
                  {"color": "green", "value": 0.8}
                ]
              }
            },
            "overrides": []
          },
          "options": {
            "reduceOptions": {"calcs": ["lastNotNull"], "fields": "", "values": false},
            "orientation": "auto",
            "textMode": "auto",
            "colorMode": "value",
            "graphMode": "area"
          }
        },
        {
          "id": 2,
          "type": "stat",
          "title": "Chunk count",
          "description": "Total chunks in storage (piggybacked on FindMissingChunks).",
          "gridPos": {"x": 8, "y": 0, "w": 8, "h": 4},
          "datasource": {"type": "prometheus", "uid": "${datasource}"},
          "targets": [
            {
              "expr": "rio_store_chunks_total",
              "refId": "A"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "short",
              "color": {"mode": "thresholds"},
              "thresholds": {"mode": "absolute", "steps": [{"color": "blue", "value": null}]}
            },
            "overrides": []
          },
          "options": {
            "reduceOptions": {"calcs": ["lastNotNull"], "fields": "", "values": false},
            "orientation": "auto",
            "textMode": "auto",
            "colorMode": "value",
            "graphMode": "area"
          }
        },
        {
          "id": 3,
          "type": "stat",
          "title": "GC: S3 deletes pending / stuck",
          "description": "GC health proxy. pending = rows awaiting drain (normal: near-zero). stuck = rows at max retry (alert if > 0).",
          "gridPos": {"x": 16, "y": 0, "w": 8, "h": 4},
          "datasource": {"type": "prometheus", "uid": "${datasource}"},
          "targets": [
            {
              "expr": "rio_store_s3_deletes_pending",
              "legendFormat": "pending",
              "refId": "A"
            },
            {
              "expr": "rio_store_s3_deletes_stuck",
              "legendFormat": "stuck",
              "refId": "B"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "short",
              "color": {"mode": "thresholds"},
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  {"color": "green", "value": null},
                  {"color": "yellow", "value": 10},
                  {"color": "red", "value": 100}
                ]
              }
            },
            "overrides": [
              {
                "matcher": {"id": "byName", "options": "stuck"},
                "properties": [
                  {"id": "thresholds", "value": {"mode": "absolute", "steps": [{"color": "green", "value": null}, {"color": "red", "value": 1}]}}
                ]
              }
            ]
          },
          "options": {
            "reduceOptions": {"calcs": ["lastNotNull"], "fields": "", "values": false},
            "orientation": "horizontal",
            "textMode": "value_and_name",
            "colorMode": "value",
            "graphMode": "none"
          }
        },
        {
          "id": 4,
          "type": "timeseries",
          "title": "PutPath latency p50/p99",
          "description": "S3-backed write path latency. Closest proxy for S3 request latency.",
          "gridPos": {"x": 0, "y": 4, "w": 12, "h": 8},
          "datasource": {"type": "prometheus", "uid": "${datasource}"},
          "targets": [
            {
              "expr": "histogram_quantile(0.5, sum by (le) (rate(rio_store_put_path_duration_seconds_bucket[5m])))",
              "legendFormat": "p50",
              "refId": "A"
            },
            {
              "expr": "histogram_quantile(0.99, sum by (le) (rate(rio_store_put_path_duration_seconds_bucket[5m])))",
              "legendFormat": "p99",
              "refId": "B"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "s",
              "color": {"mode": "palette-classic"},
              "custom": {"drawStyle": "line", "lineInterpolation": "linear", "fillOpacity": 10, "spanNulls": false}
            },
            "overrides": []
          },
          "options": {
            "legend": {"displayMode": "list", "placement": "bottom", "showLegend": true},
            "tooltip": {"mode": "multi", "sort": "none"}
          }
        },
        {
          "id": 5,
          "type": "timeseries",
          "title": "S3 requests by operation",
          "gridPos": {"x": 12, "y": 4, "w": 12, "h": 8},
          "datasource": {"type": "prometheus", "uid": "${datasource}"},
          "targets": [
            {
              "expr": "sum by (operation) (rate(rio_store_s3_requests_total[5m]))",
              "legendFormat": "{{operation}}",
              "refId": "A"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "ops",
              "color": {"mode": "palette-classic"},
              "custom": {"drawStyle": "line", "lineInterpolation": "linear", "fillOpacity": 10, "spanNulls": false}
            },
            "overrides": []
          },
          "options": {
            "legend": {"displayMode": "list", "placement": "bottom", "showLegend": true},
            "tooltip": {"mode": "multi", "sort": "desc"}
          }
        }
      ]
    }
  worker-utilization.json: |
    {
      "uid": "rio-worker-utilization",
      "title": "rio-build: Worker Utilization",
      "tags": ["rio-build"],
      "timezone": "browser",
      "schemaVersion": 39,
      "version": 1,
      "refresh": "30s",
      "time": {"from": "now-1h", "to": "now"},
      "templating": {
        "list": [
          {
            "name": "datasource",
            "type": "datasource",
            "query": "prometheus",
            "current": {},
            "hide": 0,
            "refresh": 1
          }
        ]
      },
      "panels": [
        {
          "id": 1,
          "type": "timeseries",
          "title": "WorkerPool replicas (per pool)",
          "description": "Desired vs actual replicas per WorkerPool. Labels: pool (pool name), kind (desired/actual).",
          "gridPos": {"x": 0, "y": 0, "w": 12, "h": 8},
          "datasource": {"type": "prometheus", "uid": "${datasource}"},
          "targets": [
            {
              "expr": "rio_controller_workerpool_replicas",
              "legendFormat": "{{pool}} ({{kind}})",
              "refId": "A"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "short",
              "color": {"mode": "palette-classic"},
              "custom": {"drawStyle": "line", "lineInterpolation": "stepAfter", "fillOpacity": 0, "spanNulls": false}
            },
            "overrides": []
          },
          "options": {
            "legend": {"displayMode": "table", "placement": "right", "showLegend": true, "calcs": ["lastNotNull"]},
