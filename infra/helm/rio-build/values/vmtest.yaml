# VM-test profile. Renders ONLY the controller + RBAC + CRDs.
# Scheduler/store/gateway run as systemd on the separate `control` VM
# (NOT in k3s — see nix/tests/phase3a.nix:16-18).
#
# `helm template` output feeds into services.k3s.manifests via
# nix/helm-render.nix. The controller runs as a POD here — closing the
# "production uses pod path, tests use systemd" gap called out at
# phase3a.nix:27. The rendered ClusterRole is exercised for the first time
# in CI (controller-as-systemd used the admin kubeconfig, bypassing RBAC).

global:
  image:
    # :dev matches the airgap-loaded image tag (nix/tests phase3a.nix:157
    # `image: "rio-worker:dev"` — controller image uses the same convention).
    tag: dev
    # airgap — image is preloaded via services.k3s.images. :dev would
    # default to IfNotPresent anyway but explicit is safer.
    pullPolicy: IfNotPresent

namespace:
  # k3s default ns. nix/tests/phase3a.nix:145 `namespace = "default"`.
  create: false
  name: default

tls:
  enabled: false

podDisruptionBudget:
  enabled: false

networkPolicy:
  enabled: false

controller:
  enabled: true
  # CoreDNS in k3s VM tests doesn't know NixOS-test VM hostnames
  # (phase3a.nix:29-31). hostNetwork → pod uses node's /etc/hosts where
  # `control` resolves.
  hostNetwork: true
  # These point at the `control` VM. Per-test overrides via --set
  # (phase3a also adds autoscaler tuning env).
  schedulerAddr: control:9001
  storeAddr: control:9002
  # No headless scheduler Service in vmtest — single scheduler instance,
  # no balance.
  schedulerBalanceHost: ""

scheduler:
  enabled: false

store:
  enabled: false

gateway:
  enabled: false

fodProxy:
  enabled: false
