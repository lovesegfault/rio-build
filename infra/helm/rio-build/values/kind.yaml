# kind provider. In-cluster PG + RustFS S3, no TLS, single replicas.
# `cargo xtask k8s -p kind up`
#
# Faster than values/dev.yaml (k3s+Rook): RustFS standalone is a single
# pod vs Rook's operator+cluster+RGW (~10s vs ~2-5min). No sudo needed.

global:
  image:
    # Empty registry → bare repo names. Images are airgap-loaded via
    # `kind load image-archive`. pullPolicy IfNotPresent means kind
    # won't try to pull what's already loaded.
    tag: dev

namespace:
  # xtask pre-creates rio-system for the SSH secret before helm runs.
  # Helm won't adopt a namespace it didn't create.
  create: false

tls:
  enabled: false

podDisruptionBudget:
  enabled: false

networkPolicy:
  enabled: false

scheduler:
  replicas: 1
  # Reuse the chunk bucket for build logs — it's dev.
  logS3Bucket: rio-chunks

gateway:
  replicas: 1
  service:
    type: ClusterIP

store:
  chunkBackend:
    kind: s3
    bucket: rio-chunks
    prefix: ""
    # RustFS subchart Service. Chart template appends `-svc` to the
    # fullname: `{release}-rustfs-svc`. Port 9000 is the S3 API.
    endpoint: http://rio-rustfs-svc:9000
  # RustFS creds are fixed dev values (no dynamic secret dance like
  # Rook's CephObjectStoreUser). Hardcoded here to match what the
  # rustfs subchart config below sets.
  extraEnv:
    - name: AWS_ACCESS_KEY_ID
      value: rustfsadmin
    - name: AWS_SECRET_ACCESS_KEY
      value: rustfsadmin

# ──────────────────────────────────────────────────────────────────────────
# Subcharts: PG + RustFS.
# ──────────────────────────────────────────────────────────────────────────
postgresql:
  enabled: true

rustfs:
  enabled: true
  replicaCount: 1
  mode:
    standalone:
      enabled: true
    distributed:
      enabled: false
  secret:
    rustfs:
      access_key: rustfsadmin
      secret_key: rustfsadmin
  config:
    rustfs:
      # Standalone needs a single local volume path.
      volumes: /data/rustfs0
  # Chart default is enabled with nginx class — kind has no ingress
  # controller, so this would be a dangling resource.
  ingress:
    enabled: false
  # Chart default is local-path (k3s's provisioner). kind ships
  # rancher.io/local-path as class "standard".
  storageclass:
    name: standard
  # Tokio reads available_parallelism() → host CPU count. On a
  # many-core host, rustfs spawns worker_threads=N + max_blocking=
  # 16384 and hits the pid limit: "Resource temporarily unavailable"
  # on thread spawn. cpu limit caps what tokio sees via cgroup.
  resources:
    limits:
      cpu: "2"
      memory: 512Mi
