# kind provider. In-cluster PG + RustFS S3, no TLS, single replicas.
# `cargo xtask k8s -p kind up`
#
# Faster than values/dev.yaml (k3s+Rook): RustFS standalone is a single
# pod vs Rook's operator+cluster+RGW (~10s vs ~2-5min). No sudo needed.

global:
  image:
    # Empty registry → bare repo names. Images are airgap-loaded via
    # `kind load image-archive`. pullPolicy IfNotPresent means kind
    # won't try to pull what's already loaded.
    tag: dev

namespace:
  # xtask pre-creates rio-system for the SSH secret before helm runs.
  # Helm won't adopt a namespace it didn't create.
  create: false

tls:
  enabled: false

podDisruptionBudget:
  enabled: false

networkPolicy:
  enabled: false

scheduler:
  replicas: 1
  # Reuse the chunk bucket for build logs — it's dev.
  logS3Bucket: rio-chunks

gateway:
  replicas: 1
  service:
    type: ClusterIP

store:
  chunkBackend:
    kind: s3
    bucket: rio-chunks
    prefix: ""
    # RustFS subchart Service. Chart template appends `-svc` to the
    # fullname: `{release}-rustfs-svc`. Port 9000 is the S3 API.
    endpoint: http://rio-rustfs-svc:9000
  # RustFS creds are fixed dev values (no dynamic secret dance like
  # Rook's CephObjectStoreUser). Hardcoded here to match what the
  # rustfs subchart config below sets.
  extraEnv:
    - name: AWS_ACCESS_KEY_ID
      value: rustfsadmin
    - name: AWS_SECRET_ACCESS_KEY
      value: rustfsadmin

# ──────────────────────────────────────────────────────────────────────────
# Subcharts: PG + RustFS.
# ──────────────────────────────────────────────────────────────────────────
postgresql:
  enabled: true

builderPool:
  enabled: true
  name: x86_64
  # P0537: STS path for smoke; CRD default is `true` (ephemeral).
  ephemeral: false
  # min=2: smoke's worker-kill chaos step needs ≥2 to kill one
  # mid-build and verify reassignment.
  replicas: {min: 2, max: 3}
  image: rio-builder
  systems: [x86_64-linux, builtin]
  # kind's docker-in-docker containerd doesn't support the device-
  # plugin path cleanly; privileged:true is the escape hatch.
  privileged: true

fetcherPool:
  enabled: true
  # Matches values.yaml default — smoke.rs expects this name.
  name: default
  # kind is single-node STS; ephemeral Job-mode would need RBAC for
  # batch/v1 in the rio-fetchers namespace and the smoke test asserts
  # on a stable pod name.
  ephemeral: false
  # kind is single-node; pin to 1. min==max → autoscaler computes
  # desired=1 always (compute_desired clamps), no scaling churn.
  replicas: {min: 1, max: 1}
  autoscaling: {metric: fodQueueDepth, targetValue: 5}
  image: rio-fetcher
  systems: [x86_64-linux, builtin]
  hostUsers: true

rustfs:
  enabled: true
  replicaCount: 1
  mode:
    standalone:
      enabled: true
    distributed:
      enabled: false
  secret:
    rustfs:
      access_key: rustfsadmin
      secret_key: rustfsadmin
  config:
    rustfs:
      # Standalone needs a single local volume path.
      volumes: /data/rustfs0
  # Chart default is enabled with nginx class — kind has no ingress
  # controller, so this would be a dangling resource.
  ingress:
    enabled: false
  # Chart default is local-path (k3s's provisioner). kind ships
  # rancher.io/local-path as class "standard".
  storageclass:
    name: standard
