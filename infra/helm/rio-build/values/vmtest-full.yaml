# Full-chart VM test profile: all rio services + bitnami PG as pods.
#
# Unlike vmtest.yaml (controller-only, systemd control plane on a
# separate VM), this renders gateway/scheduler/store/controller/PG
# templates for the first time in CI. 2-node k3s via
# nix/tests/fixtures/k3s-full.nix.
#
# Airgapped: all images preloaded via services.k3s.images. NodePort
# gateway (no cloud LB). Inline chunk backend (no S3).

global:
  image:
    tag: dev
    pullPolicy: IfNotPresent
  logLevel: debug

namespace:
  create: true
  name: rio-system
  # Workers need SYS_ADMIN for FUSE. Control plane is fine with
  # restricted but shares the namespace.
  podSecurityLabel: privileged

# cert-manager not preloaded (phase4c, needs its own airgap images).
# TLS Secrets provided out-of-band via lib/pki-k8s.nix → k3s manifest.
# Makes the fixture representative of production (mTLS on all gRPC
# links, plaintext health port on 9101/9102/9194 for K8s probes).
tls:
  enabled: true
  provisioner: external

# EKS-only (IRSA → Secrets Manager).
externalSecrets:
  enabled: false

# EKS-only (NodePool CRDs need Karpenter controller).
karpenter:
  enabled: false

# phase4c: needs kube-router/Calico enforcement pre-check.
networkPolicy:
  enabled: false

# smarter-device-manager needs (a) its own airgap image and (b) kubelet
# to honor hostUsers:false (containerd 1.7+ with idmap-mounts support).
# k3s's bundled containerd version varies; for deterministic CI, use the
# privileged:true escape hatch (workerPool.privileged below). Production
# on EKS/GKE leaves devicePlugin.enabled=true (the chart default).
devicePlugin:
  enabled: false

# Tests the pdb.yaml template. Gateway PDB with minAvailable=1 is a
# no-op at replicas=1 (blocks drain, which we don't do) but renders.
podDisruptionBudget:
  enabled: true

# Tenant bootstrap: scenarios seed via `kubectl exec rio-postgresql-0`.
bootstrap:
  enabled: false

controller:
  enabled: true
  # All rio pods share one airgap image (see nix/docker.nix `all`).
  # k3s imports serially+alphabetically before kubelet; five near-
  # identical tarballs → five decompress cycles. One image, pods set
  # command: per container. /bin/rio-* symlinked by buildLayeredImage.
  image: rio-all
  command: ["/bin/rio-controller"]
  # In-cluster Service DNS. hostNetwork=false — unlike vmtest.yaml,
  # everything is in-cluster so CoreDNS works.
  hostNetwork: false
  schedulerAddr: rio-scheduler:9001
  storeAddr: rio-store:9002
  schedulerBalanceHost: rio-scheduler-headless
  schedulerBalancePort: 9001

store:
  enabled: true
  image: rio-all
  command: ["/bin/rio-store"]
  chunkBackend:
    # inline = NARs in PG. No MinIO/Rook airgapped.
    kind: inline

scheduler:
  enabled: true
  image: rio-all
  command: ["/bin/rio-scheduler"]
  # 2 replicas → podAntiAffinity spreads across k3s server + agent.
  # Exercises leader election for scenarios/leader-election.nix.
  replicas: 2
  leaseName: rio-scheduler-leader
  storeAddr: rio-store:9002

gateway:
  enabled: true
  image: rio-all
  command: ["/bin/rio-gateway"]
  # 1 replica: no LB in VM. podAntiAffinity renders only at replicas>1.
  replicas: 1
  schedulerAddr: rio-scheduler:9001
  storeAddr: rio-store:9002
  schedulerBalanceHost: rio-scheduler-headless
  schedulerBalancePort: 9001
  service:
    # NodePort so client VM connects to k3s-server:32222. No cloud LB.
    type: NodePort
    nodePort: 32222
    annotations: {}
  ssh:
    # testScript creates this Secret from ssh-keygen output before
    # waiting for the gateway deployment.
    authorizedKeysSecret: rio-gateway-ssh
    # Empty → ephemeral host key in emptyDir. Fine for a VM test;
    # client uses StrictHostKeyChecking=no.
    hostKeySecret: ""

fodProxy:
  enabled: false

workerPool:
  enabled: true
  name: default
  replicas:
    # Scenarios that need >1 use --set workerPool.replicas.min=2.
    # min=1 so there's always a worker ready (protocol-cold doesn't
    # want to wait for autoscaling).
    min: 1
    max: 2
  autoscaling:
    metric: queueDepth
    targetValue: 2
  maxConcurrentBuilds: 1
  fuseCacheSize: 5Gi
  systems: [x86_64-linux]
  features: []
  sizeClass: ""
  # Same aggregate image as control-plane pods. builders.rs sets
  # `command: ["/bin/rio-worker"]` unconditionally (no-op for prod's
  # rio-worker image whose Entrypoint is already rio-worker).
  image: rio-all
  # Smaller than prod defaults — k3s agent VM is 4GB.
  resources:
    requests:
      cpu: "1"
      memory: "1Gi"
      ephemeral-storage: "6Gi"
  # k3s escape hatch. The device-plugin path (ADR-012, see
  # devicePlugin.enabled above) is not wired for the airgap VM test —
  # it would need the smarter-device-manager image + containerd with
  # idmap-mount support for hostUsers:false. k3s's containerd default
  # seccomp also blocks mount(2) even with CAP_SYS_ADMIN. Production
  # on EKS/GKE uses privileged:false (the chart default).
  privileged: true
  # Default is 7200 (2h, for LLVM-cold-ccache builds). Test builds
  # are ≤90s sleeps. 180s covers the longest + drain overhead.
  # Also bounds the finalizer's cleanup() wait (grace + 60s) —
  # without this, a stuck/never-Ready pod-1 stalls WorkerPool
  # delete for 2h (STS terminates reverse-ordinal; pod-0 waits).
  terminationGracePeriodSeconds: 180
  # No Karpenter nodepools → no dedicated worker nodes. Workers
  # schedule on any k3s node.
  #
  # null (not {} or []): Helm DEEP-MERGES values files. The default
  # values.yaml has nodeSelector: {rio.build/node-role: worker} and
  # a matching toleration. `{}` merges → default wins → pod Pending
  # (no node has that label). `null` deletes the key from the merge.
  tolerations: null
  nodeSelector: null

postgresql:
  enabled: true
  # Pin the image ref to what nix/docker-pulled.nix preloads.
  # Bitnami chart defaults differ from what ctr imports as
  # ("docker.io/..." via finalImageName); containerd does exact-string
  # lookup so any mismatch → ImagePullBackOff in the airgapped VM.
  # The tag is passed via --set-string in k3s-full.nix (DERIVED from
  # pulled.bitnami-postgresql.imageTag — bumping the FOD auto-bumps).
  image:
    registry: docker.io
    repository: bitnami/postgresql
    pullPolicy: IfNotPresent
  auth:
    database: rio
    username: rio
    password: rio
  primary:
    persistence:
      # k3s local-path-provisioner (default storageClass) → host disk.
      size: 2Gi
    # Tiny — k3s VM is 4GB total.
    resources:
      requests: {cpu: 250m, memory: 256Mi}
      limits: {memory: 512Mi}
