# Full-chart VM test profile: all rio services + bitnami PG as pods.
# Renders gateway/scheduler/store/controller/PG templates in CI.
# 2-node k3s via nix/tests/fixtures/k3s-full.nix.
#
# Airgapped: all images preloaded via services.k3s.images. NodePort
# gateway (no cloud LB). Inline chunk backend (no S3).

global:
  image:
    tag: dev
    pullPolicy: IfNotPresent
  logLevel: debug
  # k3s-full.nix test vlan eth1. The in-cluster bitnami PG pod is matched
  # by the toEndpoints rule (not this toCIDRSet); this value exercises
  # the same chart path EKS uses for out-of-cluster RDS.
  postgresCidr: "2001:db8:1::/64"

namespaces:
  create: true

# HMAC Secrets provided out-of-band via hmacSecretsManifest → k3s
# manifest. Plaintext gRPC; Cilium WireGuard handles transport
# encryption (cilium-render.nix).

# EKS-only (IRSA → Secrets Manager).
externalSecrets:
  enabled: false

# EKS-only (NodePool CRDs need Karpenter controller).
karpenter:
  enabled: false

# phase4c: needs kube-router/Calico enforcement pre-check.
networkPolicy:
  enabled: false

# Tests the pdb.yaml template. Gateway PDB with minAvailable=1 is a
# no-op at replicas=1 (blocks drain, which we don't do) but renders.
podDisruptionBudget:
  enabled: true

# Tenant bootstrap: scenarios seed via `kubectl exec rio-postgresql-0`.
bootstrap:
  enabled: false

controller:
  enabled: true
  # Per-component image refs (rio-<name>:dev). All six are preloaded
  # via ONE multi-manifest oci-archive (nix/docker.nix vmTestSeed →
  # services.k3s.images) so k3s does one decompress over deduped layers,
  # not six. Each image's Entrypoint is /bin/rio-<name> — no command:
  # override needed.
  image: rio-controller
  # In-cluster Service DNS. Everything is in-cluster so CoreDNS works.
  hostNetwork: false
  # ADR-019: store moved to rio-store namespace. FQDN required for
  # cross-ns resolution — short names only work same-ns. Controller
  # passes these through to builder pods (rio-builders ns) via env.
  schedulerAddr: rio-scheduler.rio-system:9001
  storeAddr: rio-store.rio-store:9002
  schedulerBalanceHost: rio-scheduler-headless.rio-system
  schedulerBalancePort: 9001

store:
  enabled: true
  image: rio-store
  chunkBackend:
    # inline = NARs in PG. No MinIO/Rook airgapped.
    kind: inline

scheduler:
  enabled: true
  image: rio-scheduler
  # 2 replicas → podAntiAffinity spreads across k3s server + agent.
  # Exercises leader election for scenarios/leader-election.nix.
  replicas: 2
  leaseName: rio-scheduler-leader
  storeAddr: rio-store.rio-store:9002
  # ADR-023 [sla] is mandatory; chart-default values.yaml's block is
  # sized for prod (probe.cpu=4 → 12 GiB cold-start), which the
  # resource-fit gate rejects on a 2 GiB k3s agent VM. Override with a
  # tiny single-tier block sized for the VM-test pool. The sla-sizing
  # scenario overlays a larger block separately.
  sla:
    tiers:
      - {name: normal}
    defaultTier: normal
    # ProbeShape::validate requires cpu ∈ [4, maxCores/4] (span≥4 reach
    # for both explore paths) → maxCores ≥ 16. memPerCore/memBase sized
    # so a 4-core probe (4×128Mi + 256Mi = 768Mi) still schedules on
    # the 2 GiB k3s agent VM.
    probe: {cpu: 4, memPerCore: 134217728, memBase: 268435456, deadlineSecs: 3600}
    maxCores: 16
    maxMem: 2147483648         # 2 GiB
    maxDisk: 6442450944        # 6 GiB
    defaultDisk: 2147483648    # 2 GiB
    # k3s VM has no Karpenter labels — key on hostname so the agent
    # node matches. hwCostSource=static (no IRSA in VM).
    hwClasses:
      vmtest:
        labels:
          - {key: kubernetes.io/hostname, value: agent}
    hwCostSource: static
    referenceHwClass: vmtest

gateway:
  enabled: true
  image: rio-gateway
  # 1 replica: no LB in VM. podAntiAffinity renders only at replicas>1.
  replicas: 1
  schedulerAddr: rio-scheduler.rio-system:9001
  storeAddr: rio-store.rio-store:9002
  schedulerBalanceHost: rio-scheduler-headless.rio-system
  schedulerBalancePort: 9001
  # No NLB in k3s VM (NodePort only) → skip preStop. Keep
  # sessionDrainSecs at the old 60 so VM-test gateway rollouts stay
  # fast; tests don't run multi-minute rsb sessions.
  nlbDeregisterSecs: 0
  sessionDrainSecs: 60
  service:
    # NodePort so client VM connects to k3s-server:32222. No cloud LB.
    type: NodePort
    nodePort: 32222
    annotations: {}
  ssh:
    # testScript creates this Secret from ssh-keygen output before
    # waiting for the gateway deployment.
    authorizedKeysSecret: rio-gateway-ssh
    # Empty → ephemeral host key in emptyDir. Fine for a VM test;
    # client uses StrictHostKeyChecking=no.
    hostKeySecret: ""

# VM tests render one Builder pool. Per-pod resources come from the
# scheduler's per-drv SpawnIntent (sized for the 4GB k3s agent VM via
# the [sla] block above). poolDefaults fields flow so the layered
# nonpriv overlay can null-clear them via Helm's deep-merge.
pools:
  - name: x86-64
    kind: Builder
    systems: [x86_64-linux]
    maxConcurrent: 2

poolDefaults:
  enabled: true
  image: rio-builder
  # 4Gi. values.yaml prod default is 50Gi → ≥51Gi ephemeral-storage
  # request floor → Unschedulable on the 24G k3s node disks (~21Gi
  # allocatable). Layered nonpriv overlay inherits via deep-merge.
  fuseCacheBytes: 4294967296
  # k3s escape hatch. Most scenarios don't care about pod security
  # posture; privileged:true skips the seccomp/hostUsers caveats (k3s's
  # containerd default seccomp blocks mount(2) even with CAP_SYS_ADMIN;
  # see vmtest-full-nonpriv.yaml). Production on EKS/GKE uses
  # privileged:false (the chart default).
  privileged: true
  # No Karpenter nodepools → no dedicated worker nodes. Workers
  # schedule on any k3s node.
  #
  # null (not {} or []): Helm DEEP-MERGES values files. `null` deletes
  # the key from the merge.
  tolerations: null
  nodeSelector: null
  seccompProfile: null

postgresql:
  enabled: true
  # Pin the image ref to what nix/docker-pulled.nix preloads.
  # Bitnami chart defaults differ from what ctr imports as
  # ("docker.io/..." via finalImageName); containerd does exact-string
  # lookup so any mismatch → ImagePullBackOff in the airgapped VM.
  # The tag is passed via --set-string in k3s-full.nix (DERIVED from
  # pulled.bitnami-postgresql.imageTag — bumping the FOD auto-bumps).
  image:
    registry: docker.io
    repository: bitnami/postgresql
    pullPolicy: IfNotPresent
  auth:
    database: rio
    username: rio
    password: rio
  primary:
    persistence:
      # k3s local-path-provisioner (default storageClass) → host disk.
      size: 2Gi
    # Tiny — k3s VM is 4GB total.
    resources:
      requests: {cpu: 250m, memory: 256Mi}
      limits: {memory: 512Mi}
