# Local k3s. In-cluster PG + Rook RGW, no TLS, single replicas.
# `helm upgrade --install rio . -f values/dev.yaml`

global:
  image:
    # Empty registry → bare repo names. Images are airgap-loaded (k3s ctr
    # images import) or pulled from a local registry; pullPolicy IfNotPresent
    # means if it's preloaded, k3s won't try to pull.
    tag: dev

namespace:
  # `just dev apply` pre-creates rio-system (for rio-s3-creds + SSH
  # secret) before helm runs. Helm won't adopt a namespace it didn't
  # create ("invalid ownership metadata").
  create: false

tls:
  enabled: false

podDisruptionBudget:
  enabled: false

networkPolicy:
  enabled: false

scheduler:
  # No HA for local dev. Lease still works (acquires immediately, no
  # contention). Faster iteration.
  replicas: 1

gateway:
  replicas: 1
  service:
    # LoadBalancer needs metallb or cloud LB controller. ClusterIP +
    # port-forward is simpler.
    type: ClusterIP

store:
  chunkBackend:
    kind: s3
    bucket: rio-chunks
    prefix: ""
    # RGW Service from rook-ceph-cluster. Service name is
    # `rook-ceph-rgw-<objectstore-name>` in the rook-ceph namespace.
    endpoint: http://rook-ceph-rgw-rio.rook-ceph.svc:80
  # AWS creds from `rio-s3-creds` — `just dev apply` copies them from
  # Rook's CephObjectStoreUser secret (which lands in rook-ceph ns;
  # cross-namespace secretKeyRef doesn't work). Rook generates
  # AccessKey/SecretKey dynamically when the user CR reconciles.
  extraEnv:
    - name: AWS_ACCESS_KEY_ID
      valueFrom:
        secretKeyRef: {name: rio-s3-creds, key: AccessKey}
    - name: AWS_SECRET_ACCESS_KEY
      valueFrom:
        secretKeyRef: {name: rio-s3-creds, key: SecretKey}

# ──────────────────────────────────────────────────────────────────────────
# Subchart: PG only. Rook is a separate `just dev apply` step (operator-
# first-then-cluster lifecycle doesn't fit conditional subchart pattern).
# ──────────────────────────────────────────────────────────────────────────
postgresql:
  enabled: true
