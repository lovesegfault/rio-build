# Non-privileged + device-plugin VM fixture variant. Used ONLY by the
# privileged-hardening-e2e scenario (nix/tests/scenarios/security.nix →
# vm-security-nonpriv-k3s). vmtest-full.yaml stays privileged:true (fast
# path — most scenarios don't care about pod security posture and the
# escape hatch avoids the device-plugin DaemonSet bring-up tax ~30-60s).
#
# Layered via `helm template -f vmtest-full.yaml -f vmtest-full-nonpriv.
# yaml` (last wins). helm-render.nix's extraValuesFiles parameter feeds
# the second -f.

workerPool:
  # Flip the escape hatch OFF. values.yaml default is already false
  # (production); vmtest-full.yaml overrides to true. This overrides
  # BACK to false for the one scenario that proves the production path
  # actually works: FUSE mount via device-plugin injection, cgroup
  # rw-remount succeeds under the RO-mounted cgroupfs, build completes.
  privileged: false
  # Opt OUT of hostUsers:false (pod userns). k3s's containerd with the
  # systemd cgroup driver doesn't chown the pod cgroup to the userns-
  # mapped root UID (runc's Cgroup.OwnerUID path not wired, or systemd
  # transient-scope ownership reset). The worker's `mkdir /sys/fs/
  # cgroup/leaf` fails EACCES → CrashLoopBackOff. Observed: k3s
  # 1.35.2, exit code 1 in <200ms, log:
  #   "cgroup v2 required: cannot create leaf cgroup /sys/fs/cgroup/
  #    leaf in namespace root: Permission denied (os error 13)"
  #
  # This still exercises the load-bearing nonpriv paths:
  #   - device-plugin /dev/fuse injection (not hostPath)
  #   - cgroup remount RW under containerd's RO mount (containerd
  #     mounts /sys/fs/cgroup RO for ANY non-privileged pod,
  #     userns or not — the MS_REMOUNT|MS_BIND at cgroup.rs
  #     delegated_root() is still load-bearing)
  #   - granular CAP_SYS_ADMIN+CHROOT (not privileged:true)
  #
  # hostUsers:false verification moves to the EKS smoke test where
  # containerd 2.0+ delegates cgroup ownership properly. The
  # sec.pod.host-users-false spec marker stays verified by the
  # builders.rs unit test (renders-shape check).
  hostUsers: true
  # seccompProfile: Unconfined — k3s's containerd RuntimeDefault does
  # NOT allowlist pivot_root even with CAP_SYS_ADMIN (differs from
  # upstream containerd's default which gates it on CAP_SYS_ADMIN).
  # nix-daemon's sandbox does pivot_root → EPERM under RuntimeDefault.
  #
  # Bisection chain (root-cause hunt, commit 8f925549):
  #   1. seccomp=Unconfined BEFORE /proc-remount: still failed at
  #      namespace-check (different issue — /proc masking)
  #   2. /proc-remount fix: namespace-check passes, pivot_root EPERM
  #   3. ambient-caps raise (capset inheritable → PR_CAP_AMBIENT_
  #      RAISE): verified CapAmb=002411eb in pre_exec diag,
  #      NoNewPrivs=0 — caps ARE propagated, pivot_root EPERM is NOT
  #      from may_mount()
  #   4. seccomp=Unconfined WITH /proc-remount+ambient: PASSES
  #
  # Production (EKS/GKE): Localhost seccomp profile (RuntimeDefault +
  # pivot_root − ptrace/bpf/setns) delivered by the seccompInstaller DS
  # — the chart default. Unconfined here is test-only: the busybox
  # installer image isn't in the airgap set, and wiring a hostPath
  # profile drop into the VM fixture isn't worth the test-surface for
  # what the EKS smoke test already covers end-to-end.
  seccompProfile:
    type: Unconfined
    # null clears the deep-merged default (values.yaml sets
    # localhostProfile: profiles/rio-worker.json alongside
    # type: Localhost). Without this, Helm merges to {type:
    # Unconfined, localhostProfile: profiles/...} which the
    # WorkerPool CRD's CEL rule rejects (localhostProfile
    # allowed iff type==Localhost). Same Helm-null-deletes-
    # key semantics as nodeSelector:null below.
    localhostProfile: null

devicePlugin:
  # vmtest-full.yaml disables this (smarter-device-manager image not in
  # the default airgap set). This scenario passes extraImages=[pulled.
  # smarter-device-manager], so flip it back on. The image override is
  # passed via extraValues in nix/tests/default.nix (derived from
  # pulled.smarter-device-manager.destNameTag — no drift window).
  enabled: true
  # VM nodes don't have rio.build/node-role labels or the worker taint.
  # null clears the chart default (same Helm deep-merge semantics as
  # workerPool.tolerations:null in vmtest-full.yaml — indexed key removal).
  nodeSelector: null
  tolerations: null
