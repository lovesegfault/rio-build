# Default values = prod topology (TLS on, external PG/S3, PDBs, NetworkPolicy).
# values/dev.yaml flips everything for local k3s.
# values/vmtest-full.yaml renders the full chart for k3s VM tests.

global:
  image:
    # Registry prefix (e.g., "123456.dkr.ecr.us-east-2.amazonaws.com").
    # Empty → bare repo names (dev: airgap-loaded images).
    # EKS: xtask passes --set global.image.registry=<ecr> from tofu output.
    registry: ""
    # Set via `--set global.image.tag=<sha>` (xtask computes via
    # git::image_tag()). NEVER committed — private ECR, dev tags include
    # -dirty-<hash>. See infra/eks/README.md.
    tag: ""
    pullPolicy: IfNotPresent
  # Region for ExternalSecrets SecretsManager provider. Set via --set from tofu output.
  region: ""
  # RUST_LOG for all rio-* binaries (gateway, scheduler, store, controller).
  # Full tracing_subscriber::EnvFilter syntax — a simple level name sets
  # everything, or target individual crates/modules:
  #   "debug"                            all crates at debug
  #   "info,rio_gateway=trace"           gateway at trace, rest at info
  #   "warn,rio_scheduler::actor=debug"  one module at debug, rest at warn
  # Empty string → env var omitted → binary's built-in "info" fallback.
  # Builder pods inherit the controller's RUST_LOG verbatim (builders.rs
  # reads its own env and passes it through), so one knob covers all.
  logLevel: "info"
  # IPv6 CIDR containing the postgres endpoint, for the store-egress
  # CiliumNetworkPolicy toCIDRSet rule. EKS: vpc_ipv6_cidr_block
  # (terraform output, set via xtask deploy --set). vmtest-full: the
  # test vlan /64. Default fc00::/7 (ULA) covers a self-hosted PG on a
  # private-range address.
  postgresCidr: "fc00::/7"

# ADR-019 four-namespace split: privileged PSA narrows to the two
# namespaces whose pods actually need CAP_SYS_ADMIN (FUSE mount).
# Control plane + store drop to restricted — runAsNonRoot, drop-ALL,
# seccomp:RuntimeDefault, readOnlyRootFilesystem (templates/
# {scheduler,gateway,controller,store}.yaml set the securityContext
# PSA enforces). All four carry `app.kubernetes.io/part-of: rio-build`
# so NetworkPolicy namespaceSelector rules match without enumerating
# names.
#
# `system` is the control-plane namespace (scheduler, gateway,
# controller) and the one `helm --namespace` anchors to. Cross-ns
# resources (store, pool) set explicit
# `metadata.namespace:` from the other entries.
namespaces:
  create: true
  system:   {name: rio-system,   psa: restricted}
  store:    {name: rio-store,    psa: restricted}
  builders: {name: rio-builders, psa: privileged}
  fetchers: {name: rio-fetchers, psa: privileged}

# LLVM coverage profraw collection. When enabled, each rio pod gets
# LLVM_PROFILE_FILE=/var/lib/rio/cov/rio-$(POD_NAME)-%p-%m.profraw + a
# hostPath volume mounted there. Profraws flush via atexit on graceful
# SIGTERM.
# The k3s-full VM test fixture passes coverage.enabled=true via --set
# when running instrumented binaries.
coverage:
  enabled: false

# JWT tenant tokens — asymmetric ed25519. Gateway signs (Secret),
# scheduler+store verify (ConfigMap). Dual-mode PERMANENT: jwt.enabled
# controls whether the K8s objects render; per-deployment operator
# choice. Off → gateway never mints, verify-side interceptor is inert
# (None pubkey → pass-through), tenant identity flows via
# SubmitBuildRequest.tenant_name instead. Both paths stay maintained.
jwt:
  enabled: false
  # 32-byte ed25519 seed, base64. Generate: `openssl rand -base64 32`.
  # NEVER commit a real value — set via --set or values override file.
  # Gateway decodes this to SigningKey::from_bytes.
  signingSeed: ""
  # 32-byte ed25519 public key, base64. Derived from signingSeed —
  # operator can compute offline or extract from a running gateway's
  # logs (it's public). Verify-side decodes to VerifyingKey::from_bytes.
  publicKey: ""

# External Secrets Operator sync from AWS Secrets Manager.
# When enabled: renders ClusterSecretStore + 3 ExternalSecrets (rio-postgres
# with templated Aurora URL, rio-hmac, rio-signing-key). Requires ESO in the
# cluster and the bootstrap Job (below) to have populated rio/hmac and
# rio/signing-key in Secrets Manager.
externalSecrets:
  enabled: false
  clusterSecretStore: rio-aws-secrets
  # ARN of the Aurora master password secret (manage_master_user_password
  # creates it). Set via --set from tofu output db_secret_arn.
  auroraSecretArn: ""
  # Aurora writer endpoint (hostname only). Set via --set from tofu output.
  auroraEndpoint: ""

# Helm pre-install/pre-upgrade hook Job. Idempotent — describe-secret guards.
# Generates rio/hmac (openssl rand 32) and rio/signing-key (nix-store
# --generate-binary-cache-key) in Secrets Manager IF THEY DON'T EXIST.
# Regenerating would invalidate in-flight assignment tokens / all narinfo
# signatures. The public signing key goes to rio/signing-key-pub so operators
# can read it without touching the private half.
bootstrap:
  enabled: false
  # Nix-built image (awscli2 + openssl + nix). See nix/docker.nix.
  image: rio-bootstrap
  serviceAccount:
    # IRSA: secretsmanager:CreateSecret, PutSecretValue, DescribeSecret on rio/*
    annotations: {}

podDisruptionBudget:
  enabled: true

networkPolicy:
  enabled: true
  # S3 VPC endpoint CIDR for store direct-S3 writes (chunk upload).
  # AWS-specific; varies by VPC. Unset → no S3 egress rule in
  # store-egress (store uses local filesystem backend only).
  storeS3Cidr: ""

# nix.conf knobs for the rio-nix-conf ConfigMap (mounted into worker
# pods at /etc/rio/nix-conf/nix.conf; see rio-builder/src/executor/
# sandbox.rs for the compiled-in fallback).
nixConf:
  # Content-addressed mirror(s) for builtin:fetchurl. When a flat-hash
  # FOD's origin URL is dead, nix-daemon tries {mirror}/{algo}/{hex}
  # first. Only fires for outputHashMode = "flat" — recursive (NAR-hash)
  # FODs skip it. Space-separated list; "" disables the lookup.
  hashedMirrors: "http://tarballs.nixos.org/"

# Prometheus-operator scrape wiring. Renders ServiceMonitor + PodMonitor +
# PrometheusRule (templates/{servicemonitor,prometheusrule}.yaml). Requires
# the monitoring.coreos.com/v1 CRDs — kube-prometheus-stack (infra/eks/
# monitoring.tf on the reference deploy) or a standalone prometheus-operator
# install. Disabled by default so the chart applies on CRD-less clusters
# (k3s VM tests); xtask k8s deploy flips it on for EKS.
monitoring:
  enabled: false
  scrapeInterval: 30s

# ──────────────────────────────────────────────────────────────────────────
# rio-controller
# ──────────────────────────────────────────────────────────────────────────
# K8s operator. Watches Pool CRDs, spawns one Job per
# build/FOD. HARD replicas=1: NOT leader-elected. Two controllers fight —
# both create Jobs for the same queue depth, doubling spawn. kube-runtime
# handles concurrent reconcile within one process but not across processes.
# 30s reschedule gap during pod restart is acceptable.
controller:
  enabled: true
  image: rio-controller
  # Addresses passed through to builder pods via the controller's env.
  # Lazy-connected per-reconcile — transient scheduler outage doesn't kill
  # the controller.
  # Cross-ns FQDNs per ADR-019 four-namespace split. Scheduler stays
  # in rio-system; store lives in rio-store. Short names only resolve
  # within the same namespace — the controller's rio-system pod can
  # resolve rio-scheduler but NOT rio-store without the .rio-store.svc
  # suffix. Spelled out here (not templated from .Values.namespaces)
  # because these are passed through to builder/fetcher pods via env,
  # and overriding one without the other is a valid dev-test pattern.
  schedulerAddr: rio-scheduler.rio-system:9001
  storeAddr: rio-store.rio-store:9002
  # Balanced-channel config also passed through to workers. Workers
  # DNS-resolve the headless Service, health-probe pod IPs, route to leader.
  # Empty → workers fall back to single-channel (VM tests don't set this).
  schedulerBalanceHost: rio-scheduler-headless.rio-system
  schedulerBalancePort: 9001
  # Same balance pattern for rio-store: workers p2c across store
  # replicas. All store pods serve (no leader); this is for load
  # distribution. Empty → single-channel fallback.
  storeBalanceHost: rio-store-headless.rio-store
  storeBalancePort: 9002
  # Extra env injected after base vars. Coverage mode injects
  # LLVM_PROFILE_FILE here.
  extraEnv: []
  # Shared Karpenter NodePool vCPU budget — fills the gap from
  # kubernetes-sigs/karpenter#1747 (no native cross-pool limit). The
  # controller patches each governed pool's spec.limits.cpu to
  # `used + (cpu − Σused)`; freeze (limit=used) when over budget. Set
  # `nodePoolBudget: ~` to disable and leave limits helm-managed.
  # `cpu` is whole cores; template ×1000 → millicores env.
  nodePoolBudget:
    cpu: 30000
    selector: rio.build/karpenter-budget=shared
  # hostNetwork: CoreDNS in k3s VM tests doesn't know NixOS-test VM
  # hostnames. hostNetwork → pod uses node's /etc/hosts.
  hostNetwork: false
  resources:
    # Controller watches all builder Jobs (kube-rs reflector cache).
    # 256Mi OOMed at ~1140 Jobs (I-147). Sized for thousands of
    # concurrent builds: ~10k Jobs × ~5KB cached + CRD watches +
    # ComponentScaler endpoint polling.
    requests: {cpu: 100m, memory: 256Mi}
    limits: {memory: 1Gi}

# ──────────────────────────────────────────────────────────────────────────
# rio-packed — second kube-scheduler (ADR-023 §13b)
# ──────────────────────────────────────────────────────────────────────────
# Upstream registry.k8s.io/kube-scheduler with a `MostAllocated`
# NodeResourcesFit scoring profile under `schedulerName: rio-packed`.
# Builder Jobs set `spec.schedulerName: rio-packed` (B12) so the
# default kube-scheduler ignores them; this instance bin-packs onto the
# fewest nodes so the nodeclaim_pool FFD simulation and Karpenter's
# consolidation see tight residuals. replicas=2, leader-elects on its
# own Lease (rio-packed in rio-system).
#
# Disabled in airgapped vmtest profiles (registry.k8s.io image isn't
# preloaded). The 10 PriorityClasses (templates/priorityclass.yaml)
# render unconditionally — they're referenced by builder pods regardless.
packedScheduler:
  enabled: true
  # Upstream kube-scheduler image. Digest-pinned (03-digest-pin policy:
  # floating third-party tag → ImagePullBackOff on upstream churn). Tag
  # tracks nix/pins.nix `kubernetes_version` so scheduler-API skew stays
  # within the supported ±1 minor; set by `xtask k8s up` from the tofu
  # `kubernetes_version` output (xtask resolves the digest).
  image: registry.k8s.io/kube-scheduler:v1.35.0@sha256:0ab622491a82532e01876d55e365c08c5bac01bcd5444a8ed58c1127ab47819f
  resources:
    requests: {cpu: 100m, memory: 128Mi}
    limits: {memory: 256Mi}

# ──────────────────────────────────────────────────────────────────────────
# rio-store
# ──────────────────────────────────────────────────────────────────────────
# PG + S3/inline chunk storage. replicas=1: stateless at runtime but
# concurrent migrations from multiple replicas would race. Add a
# migration-lock mechanism before scaling horizontally.
store:
  enabled: true
  image: rio-store
  serviceAccount:
    # EKS IRSA: eks.amazonaws.com/role-arn set via --set from tofu output.
    # Store needs S3 access; IRSA attaches IAM role via projected token.
    # NO static AWS keys.
    annotations: {}
  chunkBackend:
    # inline = NARs in PG (works out of the box, doesn't scale).
    # s3 requires bucket (+ endpoint/region/creds via env or IRSA).
    kind: s3
    bucket: ""
    # Bucket-level prefix prepended to ALL rio keys (chunks/, logs/).
    # Empty = dedicated bucket (the xtask/EKS assumption): keys land at
    # `chunks/ab/...` and `logs/...` directly. Set only when sharing a
    # bucket with non-rio data, e.g. `prefix: rio` → `rio/chunks/ab/...`.
    prefix: ""
    # For Rook RGW in dev: http://rook-ceph-rgw-rio-store.rook-ceph:80
    endpoint: ""
  # For Rook RGW dev: AWS_ACCESS_KEY_ID etc. Prod uses IRSA (no extra env).
  extraEnv: []
  # Upstream binary-cache egress allowlist. Each entry opens 443/TCP
  # to the given FQDN from the rio-store pod via CiliumNetworkPolicy
  # `toFQDNs` (DNS-aware — Cilium's L7 DNS proxy resolves and tracks
  # the IP set, no manual CIDR maintenance). Empty list → the
  # store-egress-upstream CNP does NOT render, and the store cannot
  # reach any public IP (the base store-egress policy allows only
  # DNS + postgres + S3 VPC endpoint).
  upstreamCaches: []
  # - host: cache.nixos.org
  # Max concurrent S3 PutObject calls per put_chunked. Per-replica
  # admission (r[store.substitute.admission]) bounds how many
  # put_chunked calls run at once; this bounds fan-out WITHIN one.
  # Product `substituteAdmissionPermits × this` should sit under the
  # aws-sdk's ~1024 connection pool with headroom — at the default
  # admission=64 that's 512. Lower if DispatchFailure appears in
  # store logs during large-NAR ingest (try s3MaxAttempts first).
  chunkUploadMaxConcurrent: 8
  # GetPath chunk-prefetch depth (.buffered(K)). Cold-cache throughput
  # ceiling ≈ K × 64KiB / s3_ttfb; per-stream memory ≤ K × 256KiB.
  # K=8 (the old hardcoded value) capped a cold 250MB path at ~3m
  # against S3-standard. 64 → ceiling ~90MB/s at 45ms TTFB, ≤16MiB/stream.
  chunkPrefetchK: 64
  # Max wait for in-flight GetPath body streams to complete on SIGTERM,
  # after the drain-grace endpoint-propagation sleep. ComponentScaler
  # scale-down assumes SIGTERM drains in-flight work; without this a
  # 14→2 scale-down resets the underlying h2 connection mid-stream and
  # the builder retries the whole NAR from byte 0.
  # terminationGracePeriodSeconds = 6 + this + 24.
  streamDrainSecs: 90
  # aws-sdk retry ceiling per S3 op. Raised from sdk default (3) —
  # S3-compatible backends (Rook RGW, MinIO) recycle idle connections
  # more aggressively than AWS S3; closed-pool-connection surfaces as
  # transient DispatchFailure that retries absorb. Raise further if
  # DispatchFailure persists; each retry has exponential backoff so
  # 10 attempts ≈ 30s worst-case per chunk.
  s3MaxAttempts: 10
  # Cap on paths in a FindMissingPaths request (DoS guard). 100k path
  # strings ≈ 8 MB per request. Raise if a single `nix copy` of a
  # very large closure is rejected with "too many paths"; lower on
  # memory-constrained store pods. Matches gateway wire MAX_COLLECTION_COUNT
  # (1M) — gateway is the trust boundary, store re-bounding tighter only
  # rejects batches gateway already admitted (I-130).
  maxBatchPaths: 1048576
  # PG connection pool size. The QueryPathInfo / FindMissingPaths hot
  # path under autoscaled builder load is bottlenecked on connection
  # acquisition (PK lookups, not query latency). Aurora handles
  # hundreds of connections per instance; raise this with `replicas`
  # for thousands-of-builds scale (I-076).
  #
  # Budget vs Aurora Serverless v2 at min_capacity=0.5 ACU (~105 usable
  # connections): 2×store(20) + 2×scheduler(10) + headroom(10) = 70.
  # Pools also set idle_timeout=60s so a burst-grown pool shrinks back;
  # live pg_pool_util ≈ 0.01 ⇒ ~0.5 conns actually in use (I-171).
  pgMaxConnections: 20
  # Per-replica r[store.substitute.admission] gate. Unset → derived as
  # (pgMaxConnections × 3).clamp(64, 128). Override only when the
  # derived value mis-tracks the upstream-fetch bottleneck.
  # substituteAdmissionPermits: 128
  resources:
    # NAR uploads buffer up to one chunk (4MB) per concurrent stream.
    # 10 × 4MB = 40MB working set + ChunkCache (default 2GB). 4Gi is headroom.
    requests: {cpu: 500m, memory: 1Gi}
    limits: {memory: 4Gi}

# ──────────────────────────────────────────────────────────────────────────
# ComponentScaler — predictive replica autoscaling
# ──────────────────────────────────────────────────────────────────────────
# When enabled, the controller reconciles a ComponentScaler CR into
# deployments/scale patches on rio-store. desired = ceil(Σ(queued+
# running) / learnedRatio), corrected against max(GetLoad) across
# store pods. learnedRatio persists in .status across controller
# restarts.
#
# Disabled by default: existing static-replica deployments unchanged.
# EKS opts in via xtask deploy. With enabled=true, store.replicas
# (above) is IGNORED — store.yaml omits .spec.replicas so helm upgrade
# doesn't fight the controller.
componentScaler:
  store:
    enabled: false
    min: 2
    # Aurora 16ACU ≈ 2800 max_connections / 200 pgMaxConnections = 14.
    # Raise alongside Aurora ACU; lower if pgMaxConnections is raised.
    max: 14
    # Empirically ~70 builders/replica (555-on-8, I-110); seed at 50
    # to start slightly over-provisioned and let the ratio EMA up.
    seedRatio: 50.0
    loadThresholds:
      # >0.8: immediate +1 + ratio×0.95. PG pool exhaustion is a
      # cliff (I-105) — react fast.
      high: 0.8
      # <0.3 for 30 consecutive ticks (5min): ratio×1.02. Over-
      # provisioning is cheap — react slow.
      low: 0.3

# ──────────────────────────────────────────────────────────────────────────
# rio-scheduler
# ──────────────────────────────────────────────────────────────────────────
# Leader-elected via K8s Lease. replicas=2: ONE dispatches; standby merges
# DAGs (state warm) but dispatch_ready early-returns until it acquires.
scheduler:
  enabled: true
  image: rio-scheduler
  replicas: 2
  serviceAccount:
    # EKS IRSA: eks.amazonaws.com/role-arn set via --set from tofu output.
    # Scheduler needs S3 PutObject for build-log flush.
    annotations: {}
  # All replicas contend for SAME Lease. Presence of this name ENABLES lease
  # mode (LeaseConfig::from_env returns None without RIO_LEASE_NAME →
  # always-leader mode, WRONG with replicas>1).
  leaseName: rio-scheduler-leader
  storeAddr: rio-store.rio-store:9002
  # Build logs flush to S3 from the scheduler (log aggregation lives here,
  # not the store). Empty → logs stay in PG only.
  logS3Bucket: ""
  # Scheduler-side substitute fan-out is DEFAULT_SUBSTITUTE_CONCURRENCY=256
  # (a memory-safety bound on detached tokio tasks, NOT a throughput knob).
  # Per-replica throttling lives in the store: r[store.substitute.admission].
  # RIO_SUBSTITUTE_MAX_CONCURRENT remains an operator escape hatch (env)
  # but is intentionally not chart-set.
  # I-204: requiredSystemFeatures values that are CAPABILITY HINTS, not
  # hardware gates. Stripped at DAG-insert so spawn/dispatch ignore them.
  # nixpkgs convention: big-parallel = "uses many cores", benchmark =
  # "wants quiet machine". Neither needs special hardware — any builder
  # qualifies. Without this, {big-parallel}-only work routes exclusively
  # to the kvm pool (the only one advertising it) → spawns .metal for
  # firefox/chromium. SLA `solve_intent_for` + `resource_floor` doubling
  # own initial sizing for these (D6).
  softFeatures:
    - big-parallel
    - benchmark
  # ADR-023 SLA-driven sizing. Renders the [sla] table in scheduler.toml
  # — mandatory (the SchedulerConfig has no Option arm). Durations in
  # seconds, sizes in bytes (the Rust SlaConfig deserializer is plain
  # serde — no humantime/bytesize).
  #
  # tiers: ladder of SLA targets. solve_tier picks the TIGHTEST feasible
  #   tier (sorted by p50→p90→p99); a tier with no targets is best-effort.
  # probe: cold-start sizing for never-seen (pname,system,tenant). cpu
  #   MUST be in [4, maxCores/4] — validated at scheduler boot.
  #   deadlineSecs: activeDeadlineSeconds for unfitted (probe/explore)
  #   builds; fitted keys derive from wall_p99.
  # featureProbes: per-requiredSystemFeatures override (e.g. kvm builds
  #   want a high mem floor regardless of cores).
  # max{Cores,Mem,Disk}: hard reject ceilings — solve does NOT clamp.
  #   maxCores < 1024 (PriorityClass bucket range).
  # hwClasses: h → node-label conjunction. MANDATORY (ADR-023 §13a) — keys
  #   match `<band>-<storage>-<arch>`; labels are what Karpenter NodePools
  #   stamp at templates/karpenter.yaml:123-127. 12 = band × storage × arch.
  #   arch in the label-match isolates per-arch hw_perf factor / cost /
  #   lead-time (Option B per ADR-023 hw-class arch design): the 6-class
  #   shape blended Graviton+x86 bench rows into one HwTable.factor[h] and
  #   one CostTable menu per cell. Karpenter NodePools stamp
  #   kubernetes.io/arch as a template label, so each hw-class now resolves
  #   to exactly one NodePool.
  # referenceHwClass: anchors ref-second normalization — IMMUTABLE across
  #   reloads without --allow-reference-change. mid-ebs-x86 chosen as the
  #   broadest us-east-2 quota (gen-6/7 c/m/r, no nvme constraint, x86 is
  #   the dominant build-traffic arch).
  # hwCostSource: "spot" = live DescribeSpotPriceHistory poll (lease-gated;
  #   IRSA `ec2:DescribeSpotPriceHistory` on the scheduler SA). "static" =
  #   fixed spot<od / hi>mid>lo seed ratios (cost.rs) — degrades cost
  #   ranking.
  # leadTimeSeed: populated by `xtask k8s probe-boot` AFTER first deploy.
  sla:
    tiers:
      - {name: normal, p50: 120, p90: 300, p99: 1200}
      - {name: best-effort}
    defaultTier: normal
    probe: {cpu: 16, memPerCore: 1073741824, memBase: 34359738368, deadlineSecs: 3600}
    maxCores: 64
    maxMem: 274877906944       # 256 GiB
    maxDisk: 214748364800      # 200 GiB
    defaultDisk: 107374182400  # 100 GiB
    hwCostTolerance: 0.15
    hwExploreEpsilon: 0.02
    hwBenchMemFloor: 8589934592  # 8 GiB
    maxFleetCores: 10000
    ladderBudget: 600
    maxForecastCoresPerTenant: 2000
    maxKeysPerTenant: 50000
    maxLeadTime: 600
    consolidateExploreEpsilon: 0.02
    maxNodeClaimsPerCellPerTick: 8
    hwClasses:
      hi-nvme-x86:  {labels: [{key: rio.build/hw-band, value: hi},  {key: rio.build/storage, value: nvme}, {key: kubernetes.io/arch, value: amd64}]}
      hi-nvme-arm:  {labels: [{key: rio.build/hw-band, value: hi},  {key: rio.build/storage, value: nvme}, {key: kubernetes.io/arch, value: arm64}]}
      hi-ebs-x86:   {labels: [{key: rio.build/hw-band, value: hi},  {key: rio.build/storage, value: ebs},  {key: kubernetes.io/arch, value: amd64}]}
      hi-ebs-arm:   {labels: [{key: rio.build/hw-band, value: hi},  {key: rio.build/storage, value: ebs},  {key: kubernetes.io/arch, value: arm64}]}
      mid-nvme-x86: {labels: [{key: rio.build/hw-band, value: mid}, {key: rio.build/storage, value: nvme}, {key: kubernetes.io/arch, value: amd64}]}
      mid-nvme-arm: {labels: [{key: rio.build/hw-band, value: mid}, {key: rio.build/storage, value: nvme}, {key: kubernetes.io/arch, value: arm64}]}
      mid-ebs-x86:  {labels: [{key: rio.build/hw-band, value: mid}, {key: rio.build/storage, value: ebs},  {key: kubernetes.io/arch, value: amd64}]}
      mid-ebs-arm:  {labels: [{key: rio.build/hw-band, value: mid}, {key: rio.build/storage, value: ebs},  {key: kubernetes.io/arch, value: arm64}]}
      lo-nvme-x86:  {labels: [{key: rio.build/hw-band, value: lo},  {key: rio.build/storage, value: nvme}, {key: kubernetes.io/arch, value: amd64}]}
      lo-nvme-arm:  {labels: [{key: rio.build/hw-band, value: lo},  {key: rio.build/storage, value: nvme}, {key: kubernetes.io/arch, value: arm64}]}
      lo-ebs-x86:   {labels: [{key: rio.build/hw-band, value: lo},  {key: rio.build/storage, value: ebs},  {key: kubernetes.io/arch, value: amd64}]}
      lo-ebs-arm:   {labels: [{key: rio.build/hw-band, value: lo},  {key: rio.build/storage, value: ebs},  {key: kubernetes.io/arch, value: arm64}]}
    hwCostSource: spot
    referenceHwClass: mid-ebs-x86
    nodeClassRef: rio-default
    leadTimeSeed: {}  # populated by `xtask k8s probe-boot` after first deploy
    # DESTRUCTIVE one-shot: pass --allow-reference-change for ONE
    # rollout when changing referenceHwClass (resets ref-second state),
    # then revert to false.
    allowReferenceChange: false
  resources:
    requests: {cpu: 500m, memory: 512Mi}
    # 1M-node DAG merge ≈ ~1GB (DerivationState + cycle-check color map +
    # iterative DFS stack) + steady-state node maps. Sized for thousands
    # of concurrent builds at MAX_DAG_NODES=1M (I-137).
    limits: {memory: 4Gi}

# ──────────────────────────────────────────────────────────────────────────
# rio-gateway
# ──────────────────────────────────────────────────────────────────────────
# SSH ingress. Stateless (session state per-connection, no shared state).
# LB distributes SSH round-robin. Dying gateway kills its sessions (nix
# client retries).
gateway:
  enabled: true
  image: rio-gateway
  replicas: 2
  # actBuild machineName field (what nom shows as "on <name>"). Defaults
  # to karpenter.clusterName; set explicitly to override. The cluster
  # appears as one machine to ssh-ng clients — per-pod IDs are not sent.
  machineName: ""
  schedulerAddr: rio-scheduler.rio-system:9001
  storeAddr: rio-store.rio-store:9002
  # Balanced-channel: gateway DNS-resolves headless to pod IPs, probes
  # grpc.health.v1 on each, routes to leader.
  schedulerBalanceHost: rio-scheduler-headless
  schedulerBalancePort: 9001
  # Cap on transitive input derivations resolved per build (DoS guard).
  # Matches gateway wire MAX_COLLECTION_COUNT (1M). drv_cache ≈ 1-3GB at
  # the cap (parsed Derivation, not just path strings); gateway memory
  # limit raised to 4Gi (I-134) to accommodate. Lower on memory-
  # constrained gateway pods (I-135).
  maxTransitiveInputs: 1048576
  # I-064 graceful drain. preStop sleep nlbDeregisterSecs (NLB stops
  # routing NEW connections) → SIGTERM → readiness=NotServing → wait
  # drainGraceSecs → stop accepting SSH → wait sessionDrainSecs for
  # open sessions to close → exit. terminationGracePeriodSeconds is
  # computed as nlb+drain+session+24 (template) so kubelet's SIGKILL
  # backstop sits behind all three.
  #
  # nlbDeregisterSecs covers the NLB health-check round (target-type
  # instance + ETP=Local: NLB polls healthCheckNodePort; default 10s
  # interval × 3 unhealthy threshold). drainGraceSecs is now belt-and-
  # suspenders for in-cluster Endpoints propagation post-SIGTERM.
  nlbDeregisterSecs: 30
  drainGraceSecs: 6       # readinessProbe.periodSeconds (5) + 1
  # sessionDrainSecs bounds how long a rollout waits on in-flight
  # `nix-store --realise` sessions. SLA: deploys may interrupt builds
  # running >1h on the evicted gateway replica. Builds past this still
  # get CancelBuild before exit so the scheduler hears it (vs. waiting
  # for its own session-timeout). Surge-first means the new pod is
  # already serving; cost of a long drain is only the old pod's
  # resources, not availability.
  sessionDrainSecs: 3600
  service:
    type: LoadBalancer
    # NO AWS LB annotations here — base is cloud-agnostic. Set via
    # --set-json per deployment. Putting them here was wrong twice: leaks
    # AWS specifics AND legacy in-tree-provider syntax that
    # aws-load-balancer-controller silently ignores.
    #
    # AWS NLB graceful drain: align target-group deregistration with
    # the gateway's own session_drain so the NLB holds existing
    # connections while the pod drains, e.g.:
    #   service.beta.kubernetes.io/aws-load-balancer-target-group-attributes: deregistration_delay.timeout_seconds=60
    annotations: {}
    # CIDRs allowed to reach the LoadBalancer. Empty = no restriction
    # at the LB layer (the default `internal` scheme already scopes to
    # the VPC). When a deployment sets this AND `aws-load-balancer-
    # scheme: internet-facing`, the controller writes NLB SG ingress
    # rules so only these source ranges can connect on port 22.
    loadBalancerSourceRanges: []
  ssh:
    # Secret with key `authorized_keys`. Without it: gateway has no keys to
    # check → all SSH auth fails. Empty string → don't mount (gateway
    # generates ephemeral host key, useful for VM tests that don't SSH in).
    authorizedKeysSecret: rio-gateway-ssh
    # Secret with key `host_key` (persistent SSH host key). Empty → emptyDir
    # holds an auto-generated key (survives container restart, regenerates on
    # pod reschedule — breaks known_hosts). Prod with replicas>1 should use a
    # real Secret so both replicas present the same host key.
    hostKeySecret: ""
  resources:
    # Gateway buffers NAR uploads in-memory (~1MB/concurrent upload, streaming
    # via tee). The dominant cost is drv_cache (parsed Derivation per uploaded
    # .drv, capped at maxTransitiveInputs per session): a 100k-path closure ≈
    # 150-300MB/session (I-134). 4Gi headroom for a few concurrent large-DAG
    # sessions.
    requests: {cpu: 250m, memory: 512Mi}
    limits: {memory: 4Gi}


# ──────────────────────────────────────────────────────────────────────────
# Karpenter NodePools + EC2NodeClass
# ──────────────────────────────────────────────────────────────────────────
# In the chart (not terraform) so `helm rollback` takes node config with
# the rest, and because kubernetes_manifest has the plan-time GVK trap
# (Karpenter CRDs don't exist until helm_release.karpenter applies).
#
# Requires helm_release.karpenter in terraform to have run (installs CRDs).
# xtask deploy sets enabled=true + clusterName + nodeRoleName from
# tofu outputs.
karpenter:
  enabled: false
  clusterName: ""   # from tofu output cluster_name
  nodeRoleName: ""  # from tofu output karpenter_node_role_name
  # ADR-021: NixOS node AMI (full cutover — no Bottlerocket). The
  # rio-default EC2NodeClass selects by `rio.build/ami=<tag>` EC2 tag
  # (one term per arch). `cargo xtask k8s -p eks up --ami` builds
  # .#node-ami-{x86_64,aarch64}, registers them, tags rio.build/ami=
  # <12-hex drvPath hash>, and writes .rio-ami-tag — `up --deploy`
  # reads that file (or recomputes the hash) and sets this. No
  # default: a missing tag is "AMI not built", not
  # "use whatever was last tagged".
  amiTag: ""
  # Root volume (/dev/xvda — single root, NixOS doesn't split OS/data).
  # boot.growPartition expands / to fill on first boot. xlarge requests
  # 96Gi ephemeral-storage; kubelet reserves ~10% for eviction threshold
  # + image cache, so the node needs headroom above the largest request.
  dataVolumeSize: 200Gi
  # gp3 provisioned IOPS+throughput (max for gp3). Build workloads are
  # IOPS-bound; baseline 3000 throttles -j32+. gp3 has no separate
  # provisioned-IOPS account quota — io1/io2 do (300k/100k → 18/6
  # nodes at 16k each). Switch to io1/io2 after quota increase
  # (L-B3A130E6) lands.
  dataVolumeIops: 16000
  dataVolumeThroughputMiBps: 1000

  # AWS bare-metal instance-size suffixes, c/m/r gen6+. Single source
  # for the metal/virtualized partition (I-205). New `metal-*` size →
  # add HERE only; templates/karpenter.yaml injects `instance-size In`
  # on rio-metal pools and `NotIn` on every other pool from this list.
  metalSizes: [metal, metal-16xl, metal-24xl, metal-32xl, metal-48xl]

  # ADR-023 phase-13: 12 builder NodePools — `rio-builder-{hi,mid,lo}-
  # {ebs,nvme}-{x86,aarch64}` — plus metal/fetcher/general. Each carries
  # a static `rio.build/hw-band` label and an `instance-generation In
  # [...]` requirement (hi=gen8, mid=gen7, lo=gen6); each admits BOTH
  # `capacity-type In [spot, on-demand]` so the scheduler's per-(band,
  # cap) solve selects via `karpenter.sh/capacity-type` nodeSelector.
  #
  # `weight` is uniform within a `(storage, arch)` pair: the SCHEDULER
  # picks the band (cost-softmax), not Karpenter. Karpenter only
  # disambiguates when a pod has no `rio.build/hw-band` selector
  # (probe path / `[sla].hw_cost_source` unset) — it then prefers
  # whichever is cheapest at the time.
  #
  # `builderBands` is the cartesian source; templates/karpenter.yaml
  # ranges over `band × storage × arch` and emits one NodePool each.
  # Adding a band = one entry here (requirements/common labels live in
  # the template).
  builderBands:
    - {name: hi, generations: ["8"]}
    # mid spans 6+7: gen-7 amd64 c/m/r have no `d` (local-NVMe) variants
    # in us-east-2, so mid-nvme-x86 would resolve empty on ["7"] alone.
    # arm64 has c7gd/m7gd; amd64 falls back to c6id/m6id. hw_perf_factors
    # normalizes per instance-type, so the band label stays a coarse grouping.
    - {name: mid, generations: ["6", "7"]}
    - {name: lo, generations: ["6"]}
  builderStorages:
    - {name: ebs, nodeClass: rio-default, nvme: false}
    - {name: nvme, nodeClass: rio-nvme, nvme: true}
  builderArchs:
    - {name: x86, k8s: amd64}
    - {name: aarch64, k8s: arm64}
  # Per-pool vCPU limit. 12 pools × 8000 = 96000 vCPU ceiling (vs
  # 40000 under the old preferred+fallback split) — the shared
  # nodepool-budget reconciler caps the SUM, so this is per-cell
  # headroom not aggregate.
  builderPoolCpuLimit: 8000
  nodePools:
    # Builder metal: bare-metal instances expose /dev/kvm (nested virt)
    # for nixos-test / qemu-kvm derivations (requiredSystemFeatures =
    # ["kvm"]). Tainted rio.build/kvm so ONLY pools with features:[kvm]
    # land here (controller appends the toleration — r[ctrl.pool.
    # kvm-device]). Arch-agnostic: I-098's per-pod kubernetes.io/arch
    # nodeSelector picks c7a.metal-48xl vs c7g.metal etc. Weight 1 +
    # tight cpu limit + short consolidateAfter: metal is expensive
    # (~$5-10/hr each), don't let Karpenter prefer it for non-kvm pods
    # that happen to tolerate both taints, and reap aggressively.
    - name: rio-builder-metal
      sharedBudget: true
      weight: 1
      # I-205: x86_64 .metal SKUs reject UEFI AMIs (legacy-bios only).
      # rio-metal NodeClass selects node-ami-x86_64-bios for amd64 and
      # the regular UEFI AMI for arm64. See templates/karpenter.yaml.
      nodeClass: rio-metal
      labels:
        rio.build/node-role: builder
        rio.build/kvm: "true"
      taints:
        - key: rio.build/builder
          value: "true"
          effect: NoSchedule
        - key: rio.build/kvm
          value: "true"
          effect: NoSchedule
      requirements:
        - key: karpenter.k8s.aws/instance-category
          operator: In
          values: [c, m, r]
        - key: karpenter.k8s.aws/instance-generation
          operator: Gt
          values: ["5"]
        # instance-size partition injected template-side from
        # `karpenter.metalSizes` (I-205) — see templates/karpenter.yaml.
        - key: karpenter.sh/capacity-type
          operator: In
          values: [on-demand]
      # ~52 metal hosts max at 192 vCPU each — the only fanout gate
      # for kvm builders now that per-class maxConcurrent is gone.
      # consolidateAfter:30s reaps idle metal fast.
      limits: {cpu: 10000}
      consolidateAfter: 30s

    # r[impl fetcher.node.dedicated]
    #
    # Fetcher: dedicated NodePool with rio.build/fetcher taint. Keeps
    # fetchers off builder nodes and vice versa — an escaped fetcher
    # lands on a node running only other fetchers. Network-bound (FOD
    # fetchurl/git), not CPU-bound: cheap burstable t3a. Low weight so
    # Karpenter doesn't prefer it for unrelated pods that happen to
    # tolerate the taint.
    - name: rio-fetcher
      sharedBudget: true
      weight: 5
      labels:
        rio.build/node-role: fetcher
      taints:
        - key: rio.build/fetcher
          value: "true"
          effect: NoSchedule
      requirements:
        # I-208: was a fixed t3a/t4g.{medium,large} list. Fetcher
        # classes now mirror builder tiers (up to 128cpu xlarge for
        # chromium-source-class FODs), so use the same c/m/r gen6+
        # selector as rio-builder-preferred and let Karpenter pick
        # cheapest-fit. Per-Pool kubernetes.io/arch nodeSelector
        # still picks arch; single NodePool keeps the
        # rio.build/node-role:fetcher taint+label model intact
        # (NetworkPolicy keys on that, not arch).
        - key: karpenter.k8s.aws/instance-category
          operator: In
          values: [c, m, r]
        - key: karpenter.k8s.aws/instance-generation
          operator: Gt
          values: ["5"]
        - key: kubernetes.io/arch
          operator: In
          values: [amd64, arm64]
        - key: karpenter.sh/capacity-type
          operator: In
          values: [on-demand]
      # Most FODs stay tiny (2cpu); upper tiers fire on reactive
      # promotion only. This is now the ONLY fetcher fanout gate
      # (controller-side maxConcurrent removed) — raise it to widen
      # FOD parallelism. 5000 vCPU ≈ 2500 concurrent tiny fetchers.
      limits: {cpu: 5000}
      consolidateAfter: 10m

    # General: untainted, for future gateway/scheduler HPA overflow.
    # System nodegroup (min=3 max=5) handles today's load; this absorbs
    # scale-up past that. Longer consolidateAfter because gateway/scheduler
    # pods are connection-stateful (SSH sessions, gRPC streams) — don't churn.
    - name: rio-general
      weight: 50
      labels:
        rio.build/node-role: general
      taints: []
      requirements:
        # Pinned to AMD gen-8 (c8a/m8a/r8a, all amd64) — simplicity
        # over multi-arch placement for control-plane. Images stay
        # multi-arch (xtask still builds+pushes arm64) so the aarch64
        # build path stays exercised; only scheduling is constrained.
        # Graviton4 (c8g) is ~10-20% cheaper per vCPU; revisit the pin
        # if cost matters more than single-arch debug simplicity.
        - key: karpenter.k8s.aws/instance-family
          operator: In
          values: [c8a, m8a, r8a]
        - key: karpenter.sh/capacity-type
          operator: In
          values: [on-demand]
      limits: {cpu: 1500}
      consolidateAfter: 5m
      # Control-plane pods are connection-stateful (SSH sessions, gRPC
      # streams). Karpenter's default 10% Drifted budget evicted them
      # mid-session on every AMI change despite PDB minAvailable:1.
      # Budget=0 means rio-general nodes stay Drifted=True until the
      # operator runs `xtask k8s rotate-general` during a quiet
      # window. Builder/fetcher pools keep the default 10% (builders
      # carry karpenter.sh/do-not-disrupt per I-126, so Karpenter
      # waits for the build to finish anyway).
      budgets:
        - nodes: "0"
          reasons: [Drifted]

# ──────────────────────────────────────────────────────────────────────────
# rio-dashboard (Cilium Gateway API)
# ──────────────────────────────────────────────────────────────────────────
# Svelte SPA + Cilium Gateway routing to rio-scheduler, which serves
# gRPC-Web natively via tonic-web (D3). The GatewayClass/Gateway/
# GRPCRoute in dashboard-gateway.yaml render when enabled; they need
# Cilium installed with gatewayAPI.enabled=true and the upstream
# Gateway API CRDs present (cilium-render.nix vendors them).
#
# Disabled by default. Enabling renders BOTH the Gateway API CRs and
# the SPA Deployment (dashboard.yaml — nginx + static bundle).
dashboard:
  enabled: false
  # nginx pod carrying the Svelte dist/ bundle (nix build .#docker-
  # dashboard). Stateless — scale for availability, not load (static
  # SPA + thin proxy).
  replicas: 1
  image: rio-dashboard
  resources:
    requests: {cpu: 50m, memory: 64Mi}
    limits: {memory: 128Mi}
  # ── Method-level authz (r[dash.auth.method-gate+2]) ───────────────────
  # Expose ClearPoison/DrainExecutor/CreateTenant/TriggerGC via the
  # dashboard gateway. Default false — the GRPCRoute for mutating
  # methods is NOT rendered, so envoy returns 404 on those paths.
  # Use rio-cli with an mTLS client cert for admin operations until
  # dashboard-native authz lands. Flipping this to true is fail-open:
  # any browser that can reach the gateway can issue mutating RPCs
  # (CORS is advisory — a curl client ignores it).
  enableMutatingMethods: false
  # CORS allowed origins for gRPC-Web. The previous default was "*"
  # (any origin could fetch admin RPCs). The dashboard nginx Service
  # is the only legitimate browser origin in-cluster; external access
  # (Ingress/LoadBalancer) should add its public hostname here.
  # Override in prod values with the actual Ingress URL.
  cors:
    allowOrigins:
      # In-cluster nginx Service DNS. Browsers don't normally reach
      # this directly (they hit the Ingress), but it's a safe default
      # that isn't "*". Port-forwarded dev sessions hit localhost,
      # which is also NOT "*" — add localhost in values/dev.yaml if
      # needed.
      - "http://rio-dashboard.rio-system.svc.cluster.local"

# ──────────────────────────────────────────────────────────────────────────
# Pools (one per arch×kind) — Builder OR Fetcher executor pools
# ──────────────────────────────────────────────────────────────────────────
# One Pool per (arch, kind). `pools` is the list to render (each entry
# needs at minimum `name` + `kind` + `systems`); every other field is
# deep-merged from `poolDefaults`. Per-entry overrides go on the list
# item (e.g. arm-specific nodeSelector, kvm-pool features). Overlays
# that want to change a property for ALL pools set it on `poolDefaults`.
# Overlays that want a different POOL LIST replace `pools` (lists are
# replaced wholesale).
#
# Per-pod (cores, mem, disk) come from the scheduler's per-drv
# SpawnIntent (ADR-023) — there is NO per-pool resources knob.
pools:
  - name: x86-64
    kind: Builder
    # r[builder.platform.i686]: x86_64 hosts run i686 natively.
    systems: [x86_64-linux, i686-linux]
  - name: x86-64-fetcher
    kind: Fetcher
    # `builtin` so the spawn-signal intent is self-describing.
    systems: [x86_64-linux, i686-linux, builtin]
    # null-clear so the reconciler injects the rio.build/fetcher default
    # (poolDefaults carries the builder toleration; without this the
    # fetcher pod selects fetcher nodes but tolerates only the builder
    # taint → permanently Pending).
    tolerations: null
    nodeSelector:
      rio.build/node-role: fetcher
      kubernetes.io/arch: amd64
  # Multi-arch: add per-arch entries (EKS deploy.rs does this via
  # --set-json pools):
  #   - {name: aarch64, kind: Builder, systems: [aarch64-linux]}
  #   - {name: aarch64-fetcher, kind: Fetcher,
  #      systems: [aarch64-linux, builtin], tolerations: null,
  #      nodeSelector: {rio.build/node-role: fetcher, kubernetes.io/arch: arm64}}

# Base for every Pool. The pool.yaml template deep-merges each
# `pools[]` entry over this, so security posture (privileged/
# hostUsers/seccompProfile) and scheduling (tolerations/nodeSelector)
# stay single-sourced across all per-arch pools. Helm's `null`-deletes-
# key deep-merge semantics work for overlays.
#
# kind=Fetcher entries SHOULD NOT inherit privileged/hostUsers/
# seccompProfile (CRD CEL rejects them at admission); the reconciler
# forces ADR-019 hardening regardless. Fetcher entries typically override
# `nodeSelector`; image stays `rio-builder` (controller injects
# RIO_EXECUTOR_KIND per-pod).
poolDefaults:
  enabled: false
  features: []
  image: rio-builder
  # 50Gi. Reconciler adds this verbatim to every worker pod's
  # ephemeral-storage request/limit AND the fuse-cache emptyDir
  # sizeLimit. CRD-side default when unset is the safe minimum
  # (8Gi/4Gi) so non-helm Pools schedule on small-disk nodes; prod
  # overrides UP here.
  fuseCacheBytes: 53687091200
  # privileged:true is an ESCAPE HATCH for clusters whose containerd
  # lacks base_runtime_spec device injection. It disables seccomp
  # entirely (ADR-012) and is unacceptable for multi-tenant.
  # Production on EKS/GKE should NOT need this.
  #
  # privileged=false + seccompProfile=Localhost: containerd's
  # RuntimeDefault seccomp profile omits pivot_root from the
  # CAP_SYS_ADMIN allowlist. The Localhost profile (nix/nixos-node/
  # seccomp/rio-builder.json, baked into the AMI) is RuntimeDefault +
  # pivot_root − {ptrace, bpf, setns, process_vm_*}.
  #
  # hostUsers default = true here so k3s VM tests work without
  # idmap-mount support on /dev/fuse. EKS (NixOS AMI with containerd
  # cgroup_writable=true) overrides to false via xtask deploy.rs.
  privileged: false
  hostUsers: true
  seccompProfile:
    type: Localhost
    localhostProfile: operator/rio-builder.json
  # Pairs with the NodePool taint.
  tolerations:
    - key: rio.build/builder
      operator: Equal
      value: "true"
      effect: NoSchedule
  nodeSelector:
    rio.build/node-role: builder

# ──────────────────────────────────────────────────────────────────────────
# Conditional subchart: PG (dev only). From nixhelm (FOD), not vendored.
# Dev S3 (Rook) is NOT a subchart — operator-first-then-cluster lifecycle
# doesn't fit; `cargo xtask k8s -p k3s up` installs it as separate helm
# releases.
# ──────────────────────────────────────────────────────────────────────────
postgresql:
  enabled: false
  auth:
    database: rio
    username: rio
    # Used ONLY when existingSecret is unset (VM tests — airgapped,
    # hardcoded is fine). xtask k3s deploy generates a random
    # password, pre-creates rio-postgres + rio-postgres-auth Secrets,
    # and sets existingSecret so this value and postgres-secret.yaml
    # are both bypassed. Keeps the password out of helm values.
    password: rio
    existingSecret: ""
  primary:
    persistence:
      size: 5Gi
