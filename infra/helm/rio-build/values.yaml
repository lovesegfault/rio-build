# Default values = prod topology (TLS on, external PG/S3, PDBs, NetworkPolicy).
# values/dev.yaml flips everything for local k3s/kind.
# values/vmtest.yaml renders controller-only for VM test k3s injection.

global:
  image:
    # Registry prefix (e.g., "123456.dkr.ecr.us-east-2.amazonaws.com").
    # Empty → bare repo names (dev: airgap-loaded images).
    # EKS: `just eks deploy` passes --set global.image.registry=<ecr> from tofu output.
    registry: ""
    # Set via `--set global.image.tag=<sha>` (read from .rio-image-tag by
    # `just eks deploy`). NEVER committed — private ECR, dev tags include
    # -dirty-<hash>. See infra/eks/README.md.
    tag: ""
    pullPolicy: IfNotPresent
  # Region for ExternalSecrets SecretsManager provider. Set via --set from tofu output.
  region: ""
  # RUST_LOG for all rio-* binaries (gateway, scheduler, store, controller).
  # Full tracing_subscriber::EnvFilter syntax — a simple level name sets
  # everything, or target individual crates/modules:
  #   "debug"                            all crates at debug
  #   "info,rio_gateway=trace"           gateway at trace, rest at info
  #   "warn,rio_scheduler::actor=debug"  one module at debug, rest at warn
  # Empty string → env var omitted → binary's built-in "info" fallback.
  # Worker pods inherit the controller's RUST_LOG verbatim (builders.rs
  # reads its own env and passes it through), so one knob covers all.
  logLevel: "info"

namespace:
  create: true
  name: rio-system
  # Workers need SYS_ADMIN (FUSE mount); restricted/baseline PSA reject it.
  # Workers live in SAME namespace (WorkerPool CRD is namespaced, reconciler
  # creates STS there). Possible future split: workers → dedicated privileged
  # ns, control plane → baseline.
  podSecurityLabel: privileged

# TLS on → mounts TLS secrets into each Deployment + sets RIO_TLS__* env +
# retargets store's readiness probe to the plaintext health port (9102).
#
# provisioner:
#   cert-manager — renders ClusterIssuer bootstrap + root CA + namespaced
#     Issuer + per-component Certificates. Requires cert-manager in cluster.
#   external — Secrets (rio-{scheduler,store,gateway,controller,worker}-tls)
#     are provided out-of-band. Use for VM tests (openssl PKI) or any
#     deployment that doesn't use cert-manager.
# LLVM coverage profraw collection. When enabled, each rio pod gets
# LLVM_PROFILE_FILE=/var/lib/rio/cov/rio-%p-%m.profraw + a hostPath
# volume mounted there. Profraws flush via atexit on graceful SIGTERM.
# The k3s-full VM test fixture passes coverage.enabled=true via --set
# when running instrumented binaries.
coverage:
  enabled: false

tls:
  enabled: true
  provisioner: cert-manager

# JWT tenant tokens — asymmetric ed25519. Gateway signs (Secret),
# scheduler+store verify (ConfigMap). Dual-mode PERMANENT: jwt.enabled
# controls whether the K8s objects render; per-deployment operator
# choice. Off → gateway never mints, verify-side interceptor is inert
# (None pubkey → pass-through), tenant identity flows via
# SubmitBuildRequest.tenant_name instead. Both paths stay maintained.
jwt:
  enabled: false
  # 32-byte ed25519 seed, base64. Generate: `openssl rand -base64 32`.
  # NEVER commit a real value — set via --set or values override file.
  # Gateway decodes this to SigningKey::from_bytes.
  signingSeed: ""
  # 32-byte ed25519 public key, base64. Derived from signingSeed —
  # operator can compute offline or extract from a running gateway's
  # logs (it's public). Verify-side decodes to VerifyingKey::from_bytes.
  publicKey: ""

# External Secrets Operator sync from AWS Secrets Manager.
# When enabled: renders ClusterSecretStore + 3 ExternalSecrets (rio-postgres
# with templated Aurora URL, rio-hmac, rio-signing-key). Requires ESO in the
# cluster and the bootstrap Job (below) to have populated rio/hmac and
# rio/signing-key in Secrets Manager.
externalSecrets:
  enabled: false
  clusterSecretStore: rio-aws-secrets
  # ARN of the Aurora master password secret (manage_master_user_password
  # creates it). Set via --set from tofu output db_secret_arn.
  auroraSecretArn: ""
  # Aurora writer endpoint (hostname only). Set via --set from tofu output.
  auroraEndpoint: ""

# Helm pre-install/pre-upgrade hook Job. Idempotent — describe-secret guards.
# Generates rio/hmac (openssl rand 32) and rio/signing-key (nix-store
# --generate-binary-cache-key) in Secrets Manager IF THEY DON'T EXIST.
# Regenerating would invalidate in-flight assignment tokens / all narinfo
# signatures. The public signing key goes to rio/signing-key-pub so operators
# can read it without touching the private half.
bootstrap:
  enabled: false
  # Nix-built image (awscli2 + openssl + nix). See nix/docker.nix.
  image: rio-bootstrap
  serviceAccount:
    # IRSA: secretsmanager:CreateSecret, PutSecretValue, DescribeSecret on rio/*
    annotations: {}

podDisruptionBudget:
  enabled: true

networkPolicy:
  enabled: true

# ──────────────────────────────────────────────────────────────────────────
# rio-controller
# ──────────────────────────────────────────────────────────────────────────
# K8s operator. Watches WorkerPool CRDs, reconciles StatefulSets.
# HARD replicas=1: NOT leader-elected. Two controllers fight — both SSA-patch
# same StatefulSet, fieldManager conflicts. kube-runtime handles concurrent
# reconcile within one process but not across processes. 30s reschedule gap
# during pod restart is acceptable.
controller:
  enabled: true
  image: rio-controller
  # Addresses passed through to worker pods via the controller's env.
  # Lazy-connected per-reconcile — transient scheduler outage doesn't kill
  # the controller.
  schedulerAddr: rio-scheduler:9001
  storeAddr: rio-store:9002
  # Balanced-channel config also passed through to workers. Workers
  # DNS-resolve the headless Service, health-probe pod IPs, route to leader.
  # Empty → workers fall back to single-channel (VM tests don't set this).
  schedulerBalanceHost: rio-scheduler-headless
  schedulerBalancePort: 9001
  # Extra env injected after base vars. VM tests use this for autoscaler
  # tuning (RIO_AUTOSCALER_POLL_SECS=3 etc); coverage mode injects
  # LLVM_PROFILE_FILE here.
  extraEnv: []
  # hostNetwork: CoreDNS in k3s VM tests doesn't know NixOS-test VM
  # hostnames. hostNetwork → pod uses node's /etc/hosts.
  hostNetwork: false
  resources:
    requests: {cpu: 100m, memory: 128Mi}
    limits: {memory: 256Mi}

# ──────────────────────────────────────────────────────────────────────────
# rio-store
# ──────────────────────────────────────────────────────────────────────────
# PG + S3/inline chunk storage. replicas=1: stateless at runtime but
# concurrent migrations from multiple replicas would race. Add a
# migration-lock mechanism before scaling horizontally.
store:
  enabled: true
  image: rio-store
  serviceAccount:
    # EKS IRSA: eks.amazonaws.com/role-arn set via --set from tofu output.
    # Store needs S3 access; IRSA attaches IAM role via projected token.
    # NO static AWS keys.
    annotations: {}
  chunkBackend:
    # inline = NARs in PG (works out of the box, doesn't scale).
    # s3 requires bucket (+ endpoint/region/creds via env or IRSA).
    kind: s3
    bucket: ""
    prefix: chunks/
    # For MinIO in dev: http://rio-build-minio:9000 (bitnami subchart svc name)
    endpoint: ""
  # Build logs go to the same bucket (different prefix). Empty → logs stay
  # in PG only.
  logS3Bucket: ""
  # For MinIO dev: AWS_ACCESS_KEY_ID etc. Prod uses IRSA (no extra env).
  extraEnv: []
  resources:
    # NAR uploads buffer up to one chunk (4MB) per concurrent stream.
    # 10 × 4MB = 40MB working set + ChunkCache (default 2GB). 4Gi is headroom.
    requests: {cpu: 500m, memory: 1Gi}
    limits: {memory: 4Gi}

# ──────────────────────────────────────────────────────────────────────────
# rio-scheduler
# ──────────────────────────────────────────────────────────────────────────
# Leader-elected via K8s Lease. replicas=2: ONE dispatches; standby merges
# DAGs (state warm) but dispatch_ready early-returns until it acquires.
scheduler:
  enabled: true
  image: rio-scheduler
  replicas: 2
  # All replicas contend for SAME Lease. Presence of this name ENABLES lease
  # mode (LeaseConfig::from_env returns None without RIO_LEASE_NAME →
  # always-leader mode, WRONG with replicas>1).
  leaseName: rio-scheduler-leader
  storeAddr: rio-store:9002
  resources:
    requests: {cpu: 500m, memory: 512Mi}
    limits: {memory: 2Gi}

# ──────────────────────────────────────────────────────────────────────────
# rio-gateway
# ──────────────────────────────────────────────────────────────────────────
# SSH ingress. Stateless (session state per-connection, no shared state).
# LB distributes SSH round-robin. Dying gateway kills its sessions (nix
# client retries).
gateway:
  enabled: true
  image: rio-gateway
  replicas: 2
  schedulerAddr: rio-scheduler:9001
  storeAddr: rio-store:9002
  # Balanced-channel: gateway DNS-resolves headless to pod IPs, probes
  # grpc.health.v1 on each, routes to leader.
  schedulerBalanceHost: rio-scheduler-headless
  schedulerBalancePort: 9001
  service:
    type: LoadBalancer
    # NO AWS LB annotations here — base is cloud-agnostic. Set via
    # --set-json per deployment. Putting them here was wrong twice: leaks
    # AWS specifics AND legacy in-tree-provider syntax that
    # aws-load-balancer-controller silently ignores.
    annotations: {}
  ssh:
    # Secret with key `authorized_keys`. Without it: gateway has no keys to
    # check → all SSH auth fails. Empty string → don't mount (gateway
    # generates ephemeral host key, useful for VM tests that don't SSH in).
    authorizedKeysSecret: rio-gateway-ssh
    # Secret with key `host_key` (persistent SSH host key). Empty → emptyDir
    # holds an auto-generated key (survives container restart, regenerates on
    # pod reschedule — breaks known_hosts). Prod with replicas>1 should use a
    # real Secret so both replicas present the same host key.
    hostKeySecret: ""
  resources:
    # Gateway buffers NAR uploads in-memory (streaming via tee — ~1MB per
    # concurrent upload since phase2b's dump_path_streaming).
    requests: {cpu: 250m, memory: 256Mi}
    limits: {memory: 1Gi}

# ──────────────────────────────────────────────────────────────────────────
# rio-fod-proxy
# ──────────────────────────────────────────────────────────────────────────
# Squid forward proxy for FOD (fixed-output derivation) fetches. FODs need
# internet; default NetworkPolicy denies all worker egress. Worker → Squid
# (cluster IP, allowed by NetPol exception) → internet. Squid's allowlist =
# FODs can ONLY fetch from known source hosts. Defense in depth: FOD sandbox
# already verifies output hash (malicious source can't inject content that
# PASSES) but could exfiltrate via request if builder compromised.
# Harmless if unused — ~50MB, idle, no traffic unless a WorkerPool points at it.
fodProxy:
  enabled: true
  image: rio-fod-proxy
  # URL the WorkerPool CR points workers at. Empty → templated to the
  # in-cluster Service DNS name (http://rio-fod-proxy.<ns>.svc:3128).
  # Override if the proxy runs outside this chart (mesh sidecar,
  # centralized egress proxy, different port).
  url: ""
  # Squid `acl allowed_domains dstdomain`. `.example.com` matches example.com
  # AND subdomains. Covers the vast majority of nixpkgs fetchurl sources.
  allowedDomains:
    - .nixos.org
    - .github.com
    - .githubusercontent.com
    - .gitlab.com
    - .crates.io
    - .pypi.org
    - .pythonhosted.org
    - .npmjs.org
    - .rubygems.org
    - .golang.org
    - .debian.org
    - .kernel.org
    - .sourceforge.net
    - .gnu.org
  resources:
    requests: {cpu: 100m, memory: 128Mi}
    limits: {memory: 256Mi}

# ──────────────────────────────────────────────────────────────────────────
# Karpenter NodePools + EC2NodeClass
# ──────────────────────────────────────────────────────────────────────────
# In the chart (not terraform) so `helm rollback` takes node config with
# the rest, and because kubernetes_manifest has the plan-time GVK trap
# (Karpenter CRDs don't exist until helm_release.karpenter applies).
#
# Requires helm_release.karpenter in terraform to have run (installs CRDs).
# `just eks deploy` sets enabled=true + clusterName + nodeRoleName from
# tofu outputs.
karpenter:
  enabled: false
  clusterName: ""   # from tofu output cluster_name
  nodeRoleName: ""  # from tofu output karpenter_node_role_name
  # bottlerocket@latest: container-optimized, immutable root fs, smaller
  # attack surface. Worker pods need CAP_SYS_ADMIN (FUSE) + hostUsers:false
  # (containerd ≥ 1.7 idmap mounts) — Bottlerocket ships both.
  amiAlias: bottlerocket@latest
  # Bottlerocket data volume (/dev/xvdb — container images + emptyDir +
  # logs). AMI default is ~20GB; worker pods request 25Gi ephemeral-
  # storage (fuseCacheSize + headroom). Size for a few workers bin-packed
  # on one node plus image layers. gp3 at 100Gi is ~$8/mo per node.
  dataVolumeSize: 100Gi

  # Three NodePools, one EC2NodeClass. Weighted priority: Karpenter tries
  # high-weight first, falls through if pod doesn't fit or capacity is
  # unavailable. Forward-compat with phase 4c: WorkerPoolSet creates pools
  # with different resources → Karpenter bin-packs across the size range
  # the NodePool requirements allow. No NodePool rework needed.
  nodePools:
    # Worker preferred: c6a/c7a (AMD EPYC compute-optimized). Tainted so
    # ONLY worker pods (with the matching toleration) land here.
    - name: rio-worker-preferred
      weight: 100
      labels:
        rio.build/node-role: worker
      taints:
        - key: rio.build/worker
          value: "true"
          effect: NoSchedule
      requirements:
        - key: karpenter.k8s.aws/instance-family
          operator: In
          values: [c6a, c7a]
        - key: karpenter.sh/capacity-type
          operator: In
          values: [on-demand]
      # Test ceiling. Production target: max=1000 workers * ~4 cpu/pod = 4000.
      limits: {cpu: 256}
      consolidateAfter: 30s

    # Worker fallback: m/r categories, any family. If c-capacity is
    # unavailable (rare on-demand, common for spot) Karpenter falls
    # through here.
    - name: rio-worker-fallback
      weight: 10
      labels:
        rio.build/node-role: worker
      taints:
        - key: rio.build/worker
          value: "true"
          effect: NoSchedule
      requirements:
        - key: karpenter.k8s.aws/instance-category
          operator: In
          values: [m, r]
        - key: karpenter.k8s.aws/instance-generation
          operator: Gt
          values: ["4"]
        - key: karpenter.sh/capacity-type
          operator: In
          values: [on-demand]
      limits: {cpu: 256}
      consolidateAfter: 30s

    # General: untainted, for future gateway/scheduler HPA overflow.
    # System nodegroup (min=3 max=5) handles today's load; this absorbs
    # scale-up past that. Longer consolidateAfter because gateway/scheduler
    # pods are connection-stateful (SSH sessions, gRPC streams) — don't churn.
    - name: rio-general
      weight: 50
      labels:
        rio.build/node-role: general
      taints: []
      requirements:
        - key: karpenter.k8s.aws/instance-category
          operator: In
          values: [m]
        - key: karpenter.k8s.aws/instance-generation
          operator: Gt
          values: ["4"]
        - key: karpenter.sh/capacity-type
          operator: In
          values: [on-demand]
      limits: {cpu: 500}
      consolidateAfter: 5m

# ──────────────────────────────────────────────────────────────────────────
# rio-dashboard (Envoy Gateway)
# ──────────────────────────────────────────────────────────────────────────
# Svelte SPA + Envoy Gateway gRPC-Web → gRPC+mTLS translation. The
# GatewayClass/Gateway/GRPCRoute CRDs in dashboard-gateway*.yaml render
# when enabled; they need the Envoy Gateway operator (gateway-helm via
# nix/helm-charts.nix) installed first or the CRDs don't exist.
#
# Disabled by default — phase 5 feature. Enabling renders BOTH the
# Gateway API CRDs (dashboard-gateway*.yaml — operator-managed envoy)
# AND the SPA Deployment (dashboard.yaml — nginx + static bundle).
# The Envoy Gateway operator (gateway-helm via nix/helm-charts.nix)
# must be installed first or the Gateway/GRPCRoute CRDs don't exist.
dashboard:
  enabled: false
  # nginx pod carrying the Svelte dist/ bundle (nix build .#docker-
  # dashboard). Stateless — scale for availability, not load (static
  # SPA + thin proxy).
  replicas: 1
  image: rio-dashboard
  resources:
    requests: {cpu: 50m, memory: 64Mi}
    limits: {memory: 128Mi}
  # ── Envoy Gateway data-plane tuning ───────────────────────────────────
  # EnvoyProxy.spec.provider.kubernetes.envoyService.name — stable
  # Service name for the operator-managed envoy data-plane. Without
  # this, the operator generates envoy-{gateway-ns}-{gateway-name}-
  # {hash} which is awkward to target. The nginx image bakes this
  # DNS name into its upstream config (nix/docker.nix) — changing it
  # here requires a docker-dashboard rebuild, not just a helm upgrade.
  envoyServiceName: rio-dashboard-envoy
  # EnvoyProxy.spec.provider.kubernetes.envoyService.type — ClusterIP
  # by default (nginx sits in-cluster and proxies to this Service).
  # Set to NodePort for VM tests or LoadBalancer for direct external
  # gRPC-Web access (bypassing the SPA).
  envoyServiceType: ClusterIP
  # Envoy data-plane image. The operator defaults to a compiled-in
  # version (v1.7.1 → envoy:distroless-v1.37.1); digest-pinned here so
  # airgapped VM tests and private-registry prod can override. Bump via
  # `crane digest docker.io/envoyproxy/envoy:distroless-v<new>` on
  # upstream releases. Tag portion is cosmetic (kubelet pulls by digest).
  # Kept in sync with nix/docker-pulled.nix:94 (same digest, airgap set).
  envoyImage: docker.io/envoyproxy/envoy:distroless-v1.37.1@sha256:4d9226b9fd4d1449887de7cde785beb24b12e47d6e79021dec3c79e362609432
  # ── Method-level authz (r[dash.auth.method-gate]) ─────────────────────
  # Expose ClearPoison/DrainWorker/CreateTenant/TriggerGC via the
  # dashboard gateway. Default false — the GRPCRoute for mutating
  # methods is NOT rendered, so envoy returns 404 on those paths.
  # Use rio-cli with an mTLS client cert for admin operations until
  # dashboard-native authz lands. Flipping this to true is fail-open:
  # any browser that can reach the gateway can issue mutating RPCs
  # (CORS is advisory — a curl client ignores it).
  enableMutatingMethods: false
  # CORS allowed origins for gRPC-Web. The previous default was "*"
  # (any origin could fetch admin RPCs). The dashboard nginx Service
  # is the only legitimate browser origin in-cluster; external access
  # (Ingress/LoadBalancer) should add its public hostname here.
  # Override in prod values with the actual Ingress URL.
  cors:
    allowOrigins:
      # In-cluster nginx Service DNS. Browsers don't normally reach
      # this directly (they hit the Ingress), but it's a safe default
      # that isn't "*". Port-forwarded dev sessions hit localhost,
      # which is also NOT "*" — add localhost in values/dev.yaml if
      # needed.
      - "http://rio-dashboard.rio-system.svc.cluster.local"

# ──────────────────────────────────────────────────────────────────────────
# FUSE Device Plugin
# ──────────────────────────────────────────────────────────────────────────
# smarter-device-manager DaemonSet: exposes /dev/fuse as an extended
# resource (smarter-devices/fuse). Worker pods request it via
# resources.limits instead of a hostPath volume, which makes
# hostUsers:false + granular caps work (ADR-012 Phase 1a spike).
#
# enabled=true by default because workerPool.privileged=false (below)
# depends on it. Disable on clusters where privileged:true is the escape
# hatch (k3s/kind without node-level device-plugin support).
devicePlugin:
  enabled: true
  # Upstream image. Digest-pinned — bump via `skopeo inspect docker://
  # <repo>:<new-tag> --format '{{.Digest}}'` on upstream releases. Tag
  # portion is cosmetic (kubelet pulls by digest). The helm-lint check
  # enforces the pin (a prior default referenced a never-published
  # upstream tag → ImagePullBackOff → worker pods Pending on a
  # default-values deploy).
  image: ghcr.io/smarter-project/smarter-device-manager:v1.20.12@sha256:228f7f44594a3182571559e62f2e3fe8a3f26180fb5dd7fc0cb7bf7d22a5bbcd
  # Per-node ceiling on how many pods can claim /dev/fuse. Each worker
  # pod requests 1. Set this >= max worker pods per node (which is
  # typically 1 given the resource requests below, but bursty
  # autoscaling + small nodes could pack more).
  fuseMaxDevices: 100
  # Same nodeSelector as workerPool: plugin runs on worker nodes only.
  # Control-plane nodes don't need /dev/fuse.
  nodeSelector:
    rio.build/node-role: worker
  # Tolerate the worker-node taint so the DaemonSet schedules there.
  tolerations:
    - key: rio.build/worker
      operator: Equal
      value: "true"
      effect: NoSchedule

# ──────────────────────────────────────────────────────────────────────────
# Default WorkerPool
# ──────────────────────────────────────────────────────────────────────────
# One-size-fits-all baseline for phase 4b — phase 4c WorkerPoolSet
# supersedes with per-size-class pools. When WPS lands, set enabled=false
# here and apply a WPS CR instead.
workerPool:
  enabled: false
  name: default
  replicas:
    # min=2 for smoke-test worker-kill phase: need >=2 workers so killing
    # one leaves another for immediate reassign. With min=0 and instant
    # dispatch (no queue pressure), autoscaler never scales past 1.
    # Production target: min=0 (scale-to-zero via SCALE_DOWN_WINDOW).
    min: 2
    max: 10
  autoscaling:
    metric: queueDepth
    targetValue: 5   # scale up when queued / active_workers > 5
  maxConcurrentBuilds: 2
  fuseCacheSize: 20Gi
  systems: [x86_64-linux]
  features: []
  sizeClass: ""   # unclassified — scheduler with size_classes configured
                  # would reject this; phase 4b baseline doesn't configure
                  # size_classes
  image: rio-worker
  # Phase 4b placeholder. Fits on c6a.large (2 vCPU / 4Gi) and up.
  # Karpenter picks cheapest-fit — request, not node-size mandate.
  # TODO(phase4c): WorkerPoolSet derives this from build_history per
  # size class.
  resources:
    requests:
      cpu: "2"
      memory: "4Gi"
      ephemeral-storage: "25Gi"   # fuseCacheSize (20Gi) + headroom
  # Device cgroup: /dev/fuse is provided by smarter-device-manager
  # (templates/device-plugin.yaml) via resources.limits. With the
  # device plugin, granular SYS_ADMIN+SYS_CHROOT caps suffice and
  # hostUsers:false works (hostPath /dev/fuse breaks idmap mounts).
  #
  # privileged:true is an ESCAPE HATCH for k3s/kind without the
  # device plugin. It disables seccomp entirely (ADR-012:10) and
  # is unacceptable for multi-tenant (ADR-012:18). Production on
  # EKS/GKE with the device plugin deployed should NOT need this.
  privileged: false
  # Pairs with the NodePool taint. Change NodePool taint/labels → change
  # these too.
  tolerations:
    - key: rio.build/worker
      operator: Equal
      value: "true"
      effect: NoSchedule
  nodeSelector:
    rio.build/node-role: worker

# ──────────────────────────────────────────────────────────────────────────
# Conditional subchart: PG (dev only). From nixhelm (FOD), not vendored.
# Dev S3 (Rook) is NOT a subchart — operator-first-then-cluster lifecycle
# doesn't fit; `just dev apply` installs it as separate helm releases.
# ──────────────────────────────────────────────────────────────────────────
postgresql:
  enabled: false
  # When enabled, also renders a rio-postgres Secret with the connection
  # string (templates/postgres-secret.yaml).
  auth:
    database: rio
    username: rio
    password: rio
  primary:
    persistence:
      size: 5Gi
