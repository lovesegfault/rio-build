# Default values = prod topology (TLS on, external PG/S3, PDBs, NetworkPolicy).
# values/dev.yaml flips everything for local k3s/kind.
# values/vmtest.yaml renders controller-only for VM test k3s injection.

global:
  image:
    # Registry prefix (e.g., "123456.dkr.ecr.us-east-2.amazonaws.com").
    # Empty → bare repo names (dev: airgap-loaded images).
    # EKS: `just eks deploy` passes --set global.image.registry=<ecr> from tofu output.
    registry: ""
    # Set via `--set global.image.tag=<sha>` (read from .rio-image-tag by
    # `just eks deploy`). NEVER committed — private ECR, dev tags include
    # -dirty-<hash>. See infra/eks/README.md.
    tag: ""
    pullPolicy: IfNotPresent
  # Region for ExternalSecrets SecretsManager provider. Set via --set from tofu output.
  region: ""
  # RUST_LOG for all rio-* binaries (gateway, scheduler, store, controller).
  # Full tracing_subscriber::EnvFilter syntax — a simple level name sets
  # everything, or target individual crates/modules:
  #   "debug"                            all crates at debug
  #   "info,rio_gateway=trace"           gateway at trace, rest at info
  #   "warn,rio_scheduler::actor=debug"  one module at debug, rest at warn
  # Empty string → env var omitted → binary's built-in "info" fallback.
  # Builder pods inherit the controller's RUST_LOG verbatim (builders.rs
  # reads its own env and passes it through), so one knob covers all.
  logLevel: "info"

namespace:
  create: true
  # Control-plane namespace (scheduler, gateway, controller). Most
  # templates reference this via `.Values.namespace.name` — it's the
  # "default" ns, the one `helm --namespace` anchors to. Cross-ns
  # resources (store, builderpool, fetcherpool) set explicit
  # `metadata.namespace:` from the `namespaces` map below.
  name: rio-system

# ADR-019 four-namespace split: privileged PSA narrows to the two
# namespaces whose pods actually need CAP_SYS_ADMIN (FUSE mount).
# Control plane + store drop to restricted — runAsNonRoot, drop-ALL,
# seccomp:RuntimeDefault, readOnlyRootFilesystem (templates/
# {scheduler,gateway,controller,store}.yaml set the securityContext
# PSA enforces). All four carry `app.kubernetes.io/part-of: rio-build`
# so NetworkPolicy namespaceSelector rules match without enumerating
# names.
namespaces:
  system:   {name: rio-system,   psa: restricted}
  store:    {name: rio-store,    psa: restricted}
  builders: {name: rio-builders, psa: privileged}
  fetchers: {name: rio-fetchers, psa: privileged}

# TLS on → mounts TLS secrets into each Deployment + sets RIO_TLS__* env +
# retargets store's readiness probe to the plaintext health port (9102).
#
# provisioner:
#   cert-manager — renders ClusterIssuer bootstrap + root CA + namespaced
#     Issuer + per-component Certificates. Requires cert-manager in cluster.
#   external — Secrets (rio-{scheduler,store,gateway,controller,worker}-tls)
#     are provided out-of-band. Use for VM tests (openssl PKI) or any
#     deployment that doesn't use cert-manager.
# LLVM coverage profraw collection. When enabled, each rio pod gets
# LLVM_PROFILE_FILE=/var/lib/rio/cov/rio-%p-%m.profraw + a hostPath
# volume mounted there. Profraws flush via atexit on graceful SIGTERM.
# The k3s-full VM test fixture passes coverage.enabled=true via --set
# when running instrumented binaries.
coverage:
  enabled: false

tls:
  enabled: true
  provisioner: cert-manager

# JWT tenant tokens — asymmetric ed25519. Gateway signs (Secret),
# scheduler+store verify (ConfigMap). Dual-mode PERMANENT: jwt.enabled
# controls whether the K8s objects render; per-deployment operator
# choice. Off → gateway never mints, verify-side interceptor is inert
# (None pubkey → pass-through), tenant identity flows via
# SubmitBuildRequest.tenant_name instead. Both paths stay maintained.
jwt:
  enabled: false
  # 32-byte ed25519 seed, base64. Generate: `openssl rand -base64 32`.
  # NEVER commit a real value — set via --set or values override file.
  # Gateway decodes this to SigningKey::from_bytes.
  signingSeed: ""
  # 32-byte ed25519 public key, base64. Derived from signingSeed —
  # operator can compute offline or extract from a running gateway's
  # logs (it's public). Verify-side decodes to VerifyingKey::from_bytes.
  publicKey: ""

# External Secrets Operator sync from AWS Secrets Manager.
# When enabled: renders ClusterSecretStore + 3 ExternalSecrets (rio-postgres
# with templated Aurora URL, rio-hmac, rio-signing-key). Requires ESO in the
# cluster and the bootstrap Job (below) to have populated rio/hmac and
# rio/signing-key in Secrets Manager.
externalSecrets:
  enabled: false
  clusterSecretStore: rio-aws-secrets
  # ARN of the Aurora master password secret (manage_master_user_password
  # creates it). Set via --set from tofu output db_secret_arn.
  auroraSecretArn: ""
  # Aurora writer endpoint (hostname only). Set via --set from tofu output.
  auroraEndpoint: ""

# Helm pre-install/pre-upgrade hook Job. Idempotent — describe-secret guards.
# Generates rio/hmac (openssl rand 32) and rio/signing-key (nix-store
# --generate-binary-cache-key) in Secrets Manager IF THEY DON'T EXIST.
# Regenerating would invalidate in-flight assignment tokens / all narinfo
# signatures. The public signing key goes to rio/signing-key-pub so operators
# can read it without touching the private half.
bootstrap:
  enabled: false
  # Nix-built image (awscli2 + openssl + nix). See nix/docker.nix.
  image: rio-bootstrap
  serviceAccount:
    # IRSA: secretsmanager:CreateSecret, PutSecretValue, DescribeSecret on rio/*
    annotations: {}

podDisruptionBudget:
  enabled: true

# Dual-stack Service ipFamilyPolicy. P0542: builders may run on a v6 pod
# CIDR (I-073/I-079 — IPv4 /24 subnets exhaust at ~100-node autoscale).
# `enabled: true` adds `ipFamilyPolicy: PreferDualStack` to scheduler/
# store/gateway Services so they get both A and AAAA ClusterIPs (and the
# headless Services return AAAA pod IPs to BalancedChannel). PreferDualStack
# (not Require) means the chart still applies on v4-only clusters — the
# apiserver assigns the single available family.
#
# THE CHART CHANGE ALONE DOES NOT FLIP A V4-ONLY CLUSTER. The cluster's
# CNI must hand out v6 pod IPs. EKS: cluster created with `ip_family =
# "ipv6"` OR a dual-stack VPC + aws-vpc-cni `ENABLE_IPv6=true`. GKE/AKS/
# bare-metal Cilium/Calico: their respective dual-stack mode. Until then
# `PreferDualStack` is a harmless no-op.
dualStack:
  enabled: true
  # Override to RequireDualStack to make the apiserver REJECT the chart on
  # v4-only clusters (fail-fast instead of silent v4-only assignment).
  policy: PreferDualStack
  # Family preference order. Default empty → omit `ipFamilies` and let
  # PreferDualStack default it (single-stack cluster → its one family;
  # dual-stack → cluster-primary first). EXPLICIT lists are validated
  # regardless of policy — `[IPv6, IPv4]` is REJECTED on single-stack
  # clusters (EKS ipFamily is ipv4|ipv6, never both — no dual-stack
  # Service CIDR; bare v4-only k3s likewise). Set explicitly only in
  # overlays for known dual-stack clusters (vmtest-full sets
  # `[IPv6, IPv4]` for v6-primary ordering).
  ipFamilies: []

networkPolicy:
  enabled: true
  # S3 VPC endpoint CIDR for builder direct-S3 reads (presigned URLs
  # from store). AWS-specific; varies by VPC. Unset → no S3 egress rule
  # rendered (builder fetches chunks via store gRPC only).
  builderS3Cidr: ""
  # S3 VPC endpoint CIDR for store direct-S3 writes (chunk upload).
  # Same operator-set pattern as builderS3Cidr. Unset → no S3 egress
  # rule in store-egress (store uses local filesystem backend only).
  storeS3Cidr: ""

# Prometheus-operator scrape wiring. Renders ServiceMonitor + PodMonitor +
# PrometheusRule (templates/{servicemonitor,prometheusrule}.yaml). Requires
# the monitoring.coreos.com/v1 CRDs — kube-prometheus-stack (infra/eks/
# monitoring.tf on the reference deploy) or a standalone prometheus-operator
# install. Disabled by default so the chart applies on CRD-less clusters
# (k3s VM tests, kind); xtask k8s deploy flips it on for EKS.
monitoring:
  enabled: false
  scrapeInterval: 30s

# ──────────────────────────────────────────────────────────────────────────
# rio-controller
# ──────────────────────────────────────────────────────────────────────────
# K8s operator. Watches BuilderPool CRDs, reconciles StatefulSets.
# HARD replicas=1: NOT leader-elected. Two controllers fight — both SSA-patch
# same StatefulSet, fieldManager conflicts. kube-runtime handles concurrent
# reconcile within one process but not across processes. 30s reschedule gap
# during pod restart is acceptable.
controller:
  enabled: true
  image: rio-controller
  # Addresses passed through to builder pods via the controller's env.
  # Lazy-connected per-reconcile — transient scheduler outage doesn't kill
  # the controller.
  # Cross-ns FQDNs per ADR-019 four-namespace split. Scheduler stays
  # in rio-system; store lives in rio-store. Short names only resolve
  # within the same namespace — the controller's rio-system pod can
  # resolve rio-scheduler but NOT rio-store without the .rio-store.svc
  # suffix. Spelled out here (not templated from .Values.namespaces)
  # because these are passed through to builder/fetcher pods via env,
  # and overriding one without the other is a valid dev-test pattern.
  schedulerAddr: rio-scheduler.rio-system:9001
  storeAddr: rio-store.rio-store:9002
  # Balanced-channel config also passed through to workers. Workers
  # DNS-resolve the headless Service, health-probe pod IPs, route to leader.
  # Empty → workers fall back to single-channel (VM tests don't set this).
  schedulerBalanceHost: rio-scheduler-headless.rio-system
  schedulerBalancePort: 9001
  # Same balance pattern for rio-store: workers p2c across store
  # replicas. All store pods serve (no leader); this is for load
  # distribution. Empty → single-channel fallback.
  storeBalanceHost: rio-store-headless.rio-store
  storeBalancePort: 9002
  # P0541: Localhost seccomp profiles are written to /var/lib/kubelet/
  # seccomp/operator/ BEFORE kubelet starts (Bottlerocket bootstrap
  # container, EC2NodeClass userData essential=true). When true, the
  # controller skips the wait-seccomp initContainer + host-seccomp
  # hostPath volumes — the file is guaranteed present, the wait is
  # dead weight (5-15s × thousands of ephemeral Jobs/hour).
  #
  # Default false: VM-test k3s + non-EKS providers still use SPO (or
  # privileged:true with no Localhost profile at all). EKS deploy.rs
  # sets this true alongside disabling securityProfilesOperator.
  seccompPreinstalled: false
  # Extra env injected after base vars. VM tests use this for autoscaler
  # tuning (RIO_AUTOSCALER_POLL_SECS=3 etc); coverage mode injects
  # LLVM_PROFILE_FILE here.
  extraEnv: []
  # hostNetwork: CoreDNS in k3s VM tests doesn't know NixOS-test VM
  # hostnames. hostNetwork → pod uses node's /etc/hosts.
  hostNetwork: false
  resources:
    # Controller watches all builder Jobs (kube-rs reflector cache).
    # 256Mi OOMed at ~1140 Jobs (I-147). Sized for thousands of
    # concurrent builds: ~10k Jobs × ~5KB cached + CRD watches +
    # ComponentScaler endpoint polling.
    requests: {cpu: 100m, memory: 256Mi}
    limits: {memory: 1Gi}

# ──────────────────────────────────────────────────────────────────────────
# rio-store
# ──────────────────────────────────────────────────────────────────────────
# PG + S3/inline chunk storage. replicas=1: stateless at runtime but
# concurrent migrations from multiple replicas would race. Add a
# migration-lock mechanism before scaling horizontally.
store:
  enabled: true
  image: rio-store
  serviceAccount:
    # EKS IRSA: eks.amazonaws.com/role-arn set via --set from tofu output.
    # Store needs S3 access; IRSA attaches IAM role via projected token.
    # NO static AWS keys.
    annotations: {}
  chunkBackend:
    # inline = NARs in PG (works out of the box, doesn't scale).
    # s3 requires bucket (+ endpoint/region/creds via env or IRSA).
    kind: s3
    bucket: ""
    prefix: chunks/
    # For Rook RGW in dev: http://rook-ceph-rgw-rio-store.rook-ceph:80
    endpoint: ""
  # For Rook RGW dev: AWS_ACCESS_KEY_ID etc. Prod uses IRSA (no extra env).
  extraEnv: []
  # Upstream binary-cache egress allowlist. Each entry opens 443/TCP
  # to the given CIDR from the rio-store pod. Empty list → the
  # store-egress-upstream NetworkPolicy does NOT render, and the store
  # cannot reach any public IP (the base store-egress policy allows
  # only DNS + postgres + S3 VPC endpoint).
  #
  # NetworkPolicy has no FQDN support — resolve cache.nixos.org etc.
  # to their current CIDRs at deploy time. For cache.nixos.org the
  # backing CDN is Fastly; `dig cache.nixos.org +short` gives the
  # anycast IPs. If CIDR churn is operational pain, a CNI with
  # FQDN-aware policies (Cilium toFQDNs, Calico domain matchers) is
  # the upgrade path.
  upstreamCaches: []
  # - name: cache.nixos.org
  #   cidr: 151.101.0.0/16  # Fastly
  # Max concurrent S3 PutObject calls per put_chunked. With
  # scheduler.substituteMaxConcurrent=16 (below), 16*32=512 in-flight
  # S3 puts under full substitution burst — kept under the aws-sdk
  # ~1024 default pool. Lower if DispatchFailure appears in store
  # logs during large-NAR ingest (but try s3MaxAttempts first).
  chunkUploadMaxConcurrent: 32
  # aws-sdk retry ceiling per S3 op. Raised from sdk default (3) —
  # S3-compatible backends (rustfs, MinIO) recycle idle connections
  # more aggressively than AWS S3; closed-pool-connection surfaces as
  # transient DispatchFailure that retries absorb. Raise further if
  # DispatchFailure persists; each retry has exponential backoff so
  # 10 attempts ≈ 30s worst-case per chunk.
  s3MaxAttempts: 10
  # Cap on paths in a FindMissingPaths request (DoS guard). 100k path
  # strings ≈ 8 MB per request. Raise if a single `nix copy` of a
  # very large closure is rejected with "too many paths"; lower on
  # memory-constrained store pods. Matches gateway wire MAX_COLLECTION_COUNT
  # (1M) — gateway is the trust boundary, store re-bounding tighter only
  # rejects batches gateway already admitted (I-130).
  maxBatchPaths: 1048576
  # PG connection pool size. The QueryPathInfo / FindMissingPaths hot
  # path under autoscaled builder load is bottlenecked on connection
  # acquisition (PK lookups, not query latency). Aurora handles
  # hundreds of connections per instance; raise this with `replicas`
  # for thousands-of-builds scale (I-076).
  #
  # Budget vs Aurora Serverless v2 at min_capacity=0.5 ACU (~105 usable
  # connections): 2×store(20) + 2×scheduler(10) + headroom(10) = 70.
  # Pools also set idle_timeout=60s so a burst-grown pool shrinks back;
  # live pg_pool_util ≈ 0.01 ⇒ ~0.5 conns actually in use (I-171).
  pgMaxConnections: 20
  resources:
    # NAR uploads buffer up to one chunk (4MB) per concurrent stream.
    # 10 × 4MB = 40MB working set + ChunkCache (default 2GB). 4Gi is headroom.
    requests: {cpu: 500m, memory: 1Gi}
    limits: {memory: 4Gi}

# ──────────────────────────────────────────────────────────────────────────
# ComponentScaler — predictive replica autoscaling
# ──────────────────────────────────────────────────────────────────────────
# When enabled, the controller reconciles a ComponentScaler CR into
# deployments/scale patches on rio-store. desired = ceil(Σ(queued+
# running) / learnedRatio), corrected against max(GetLoad) across
# store pods. learnedRatio persists in .status across controller
# restarts.
#
# Disabled by default: existing static-replica deployments unchanged.
# EKS opts in via xtask deploy. With enabled=true, store.replicas
# (above) is IGNORED — store.yaml omits .spec.replicas so helm upgrade
# doesn't fight the controller.
componentScaler:
  store:
    enabled: false
    min: 2
    # Aurora 16ACU ≈ 2800 max_connections / 200 pgMaxConnections = 14.
    # Raise alongside Aurora ACU; lower if pgMaxConnections is raised.
    max: 14
    # Empirically ~70 builders/replica (555-on-8, I-110); seed at 50
    # to start slightly over-provisioned and let the ratio EMA up.
    seedRatio: 50.0
    loadThresholds:
      # >0.8: immediate +1 + ratio×0.95. PG pool exhaustion is a
      # cliff (I-105) — react fast.
      high: 0.8
      # <0.3 for 30 consecutive ticks (5min): ratio×1.02. Over-
      # provisioning is cheap — react slow.
      low: 0.3

# ──────────────────────────────────────────────────────────────────────────
# rio-scheduler
# ──────────────────────────────────────────────────────────────────────────
# Leader-elected via K8s Lease. replicas=2: ONE dispatches; standby merges
# DAGs (state warm) but dispatch_ready early-returns until it acquires.
scheduler:
  enabled: true
  image: rio-scheduler
  replicas: 2
  serviceAccount:
    # EKS IRSA: eks.amazonaws.com/role-arn set via --set from tofu output.
    # Scheduler needs S3 PutObject for build-log flush.
    annotations: {}
  # All replicas contend for SAME Lease. Presence of this name ENABLES lease
  # mode (LeaseConfig::from_env returns None without RIO_LEASE_NAME →
  # always-leader mode, WRONG with replicas>1).
  leaseName: rio-scheduler-leader
  storeAddr: rio-store.rio-store:9002
  # Build logs flush to S3 from the scheduler (log aggregation lives here,
  # not the store). Empty → logs stay in PG only.
  logS3Bucket: ""
  # Max concurrent substitute eager-fetch calls at merge time. Bounds the
  # QueryPathInfo fan-out so the store's S3 connection pool doesn't
  # saturate. Raise if the store runs with a larger aws-sdk pool; lower
  # if you see "dispatch failure" demotes in scheduler logs.
  substituteMaxConcurrent: 16
  # Size-class routing config. When non-empty, renders a
  # rio-scheduler-config ConfigMap mounted at /etc/rio/scheduler.toml
  # with [[size_classes]] entries; the scheduler's classify() routes
  # each derivation to the smallest covering class. MUST agree with
  # builderPoolSetDefaults.classes (or manually-created BuilderPools'
  # spec.sizeClass) — the scheduler classifies, the controller
  # provisions; mismatched names mean work classified into a class
  # with no workers (queues forever).
  #
  # Each entry: {name, cutoffSecs, memLimitBytes, cpuLimitCores?}.
  # memLimitBytes is the bump threshold — a build whose EMA peak
  # memory exceeds it routes to the NEXT larger class even if duration
  # fits. Set it to ≈ the class's resources.limits.memory.
  sizeClasses: []
  resources:
    requests: {cpu: 500m, memory: 512Mi}
    # 1M-node DAG merge ≈ ~1GB (DerivationState + cycle-check color map +
    # iterative DFS stack) + steady-state node maps. Sized for thousands
    # of concurrent builds at MAX_DAG_NODES=1M (I-137).
    limits: {memory: 4Gi}

# ──────────────────────────────────────────────────────────────────────────
# rio-gateway
# ──────────────────────────────────────────────────────────────────────────
# SSH ingress. Stateless (session state per-connection, no shared state).
# LB distributes SSH round-robin. Dying gateway kills its sessions (nix
# client retries).
gateway:
  enabled: true
  image: rio-gateway
  replicas: 2
  schedulerAddr: rio-scheduler.rio-system:9001
  storeAddr: rio-store.rio-store:9002
  # Balanced-channel: gateway DNS-resolves headless to pod IPs, probes
  # grpc.health.v1 on each, routes to leader.
  schedulerBalanceHost: rio-scheduler-headless
  schedulerBalancePort: 9001
  # Cap on transitive input derivations resolved per build (DoS guard).
  # Matches gateway wire MAX_COLLECTION_COUNT (1M). drv_cache ≈ 1-3GB at
  # the cap (parsed Derivation, not just path strings); gateway memory
  # limit raised to 4Gi (I-134) to accommodate. Lower on memory-
  # constrained gateway pods (I-135).
  maxTransitiveInputs: 1048576
  # I-064 graceful drain. SIGTERM → readiness=NotServing → wait
  # drainGraceSecs (NLB target deregister) → stop accepting SSH → wait
  # sessionDrainSecs for open sessions to close → exit.
  # terminationGracePeriodSeconds is computed as drain+session+24
  # (template) so kubelet's SIGKILL backstop sits behind both timeouts.
  drainGraceSecs: 6       # readinessProbe.periodSeconds (5) + 1
  sessionDrainSecs: 60
  service:
    type: LoadBalancer
    # NO AWS LB annotations here — base is cloud-agnostic. Set via
    # --set-json per deployment. Putting them here was wrong twice: leaks
    # AWS specifics AND legacy in-tree-provider syntax that
    # aws-load-balancer-controller silently ignores.
    #
    # AWS NLB graceful drain: align target-group deregistration with
    # the gateway's own session_drain so the NLB holds existing
    # connections while the pod drains, e.g.:
    #   service.beta.kubernetes.io/aws-load-balancer-target-group-attributes: deregistration_delay.timeout_seconds=60
    annotations: {}
  ssh:
    # Secret with key `authorized_keys`. Without it: gateway has no keys to
    # check → all SSH auth fails. Empty string → don't mount (gateway
    # generates ephemeral host key, useful for VM tests that don't SSH in).
    authorizedKeysSecret: rio-gateway-ssh
    # Secret with key `host_key` (persistent SSH host key). Empty → emptyDir
    # holds an auto-generated key (survives container restart, regenerates on
    # pod reschedule — breaks known_hosts). Prod with replicas>1 should use a
    # real Secret so both replicas present the same host key.
    hostKeySecret: ""
  resources:
    # Gateway buffers NAR uploads in-memory (~1MB/concurrent upload, streaming
    # via tee). The dominant cost is drv_cache (parsed Derivation per uploaded
    # .drv, capped at maxTransitiveInputs per session): a 100k-path closure ≈
    # 150-300MB/session (I-134). 4Gi headroom for a few concurrent large-DAG
    # sessions.
    requests: {cpu: 250m, memory: 512Mi}
    limits: {memory: 4Gi}


# ──────────────────────────────────────────────────────────────────────────
# Karpenter NodePools + EC2NodeClass
# ──────────────────────────────────────────────────────────────────────────
# In the chart (not terraform) so `helm rollback` takes node config with
# the rest, and because kubernetes_manifest has the plan-time GVK trap
# (Karpenter CRDs don't exist until helm_release.karpenter applies).
#
# Requires helm_release.karpenter in terraform to have run (installs CRDs).
# `just eks deploy` sets enabled=true + clusterName + nodeRoleName from
# tofu outputs.
karpenter:
  enabled: false
  clusterName: ""   # from tofu output cluster_name
  nodeRoleName: ""  # from tofu output karpenter_node_role_name
  # bottlerocket@latest: container-optimized, immutable root fs, smaller
  # attack surface. Builder pods need CAP_SYS_ADMIN (FUSE) + hostUsers:false
  # (containerd ≥ 1.7 idmap mounts) — Bottlerocket ships both.
  amiAlias: bottlerocket@latest
  # Bottlerocket data volume (/dev/xvdb — container images + emptyDir +
  # logs). AMI default is ~20GB; builder pods request 25Gi ephemeral-
  # storage (fuseCacheSize + headroom). Size for a few workers bin-packed
  # on one node plus image layers. gp3 at 100Gi is ~$8/mo per node.
  dataVolumeSize: 100Gi

  # Three NodePools, one EC2NodeClass. Weighted priority: Karpenter tries
  # high-weight first, falls through if pod doesn't fit or capacity is
  # unavailable. Forward-compat with phase 4c: BuilderPoolSet creates pools
  # with different resources → Karpenter bin-packs across the size range
  # the NodePool requirements allow. No NodePool rework needed.
  nodePools:
    # Worker preferred: c6a/c7a (AMD EPYC compute-optimized). Tainted so
    # ONLY builder pods (with the matching toleration) land here.
    - name: rio-builder-preferred
      weight: 100
      labels:
        rio.build/node-role: builder
      taints:
        - key: rio.build/builder
          value: "true"
          effect: NoSchedule
      requirements:
        - key: karpenter.k8s.aws/instance-category
          operator: In
          # I-118: any c/m/r gen6+ — karpenter picks the cheapest
          # available. I-098 puts kubernetes.io/arch on each pod, so
          # arm64 lands on *g families, x86 on *a/*i. Adaptive sizing
          # (I-117) means tiny pods bin-pack onto whatever's cheapest.
          values: [c, m, r]
        - key: karpenter.k8s.aws/instance-generation
          operator: Gt
          values: ["5"]
        - key: karpenter.sh/capacity-type
          operator: In
          values: [on-demand]
      # I-118: 4000 vCPU — adaptive sizing (I-117) packs ~8 tiny pods
      # per c6a.xlarge (vs ~2 medium), so the same node count serves
      # more builders. 4000 cpu ≈ 1000 c6a.xlarge ≈ 8000 tiny builders.
      limits: {cpu: 4000}
      consolidateAfter: 30s

    # Worker fallback: m/r categories, any family. If c-capacity is
    # unavailable (rare on-demand, common for spot) Karpenter falls
    # through here.
    - name: rio-builder-fallback
      weight: 10
      labels:
        rio.build/node-role: builder
      taints:
        - key: rio.build/builder
          value: "true"
          effect: NoSchedule
      requirements:
        # No arch constraint: rio images are multi-arch (x86_64 + aarch64
        # via OCI manifest list, see infra/eks/push-images.sh). m6g/m7g/
        # r6g/r7g Graviton nodes are now eligible — containerd pulls the
        # arm64 image, pod runs natively. Re-add `kubernetes.io/arch In
        # [amd64]` only if an arch-specific regression surfaces.
        - key: karpenter.k8s.aws/instance-category
          operator: In
          values: [m, r]
        - key: karpenter.k8s.aws/instance-generation
          operator: Gt
          values: ["4"]
        - key: karpenter.sh/capacity-type
          operator: In
          values: [on-demand]
      # Overflow capacity when c6a/c7a is unavailable. preferred (2000)
      # + fallback (500) = 2500 vCPU total builder ceiling.
      limits: {cpu: 2000}
      consolidateAfter: 30s

    # Builder metal: bare-metal instances expose /dev/kvm (nested virt)
    # for nixos-test / qemu-kvm derivations (requiredSystemFeatures =
    # ["kvm"]). Tainted rio.build/kvm so ONLY pools with features:[kvm]
    # land here (controller appends the toleration — r[ctrl.builderpool.
    # kvm-device]). Arch-agnostic: I-098's per-pod kubernetes.io/arch
    # nodeSelector picks c7a.metal-48xl vs c7g.metal etc. Weight 1 +
    # tight cpu limit + short consolidateAfter: metal is expensive
    # (~$5-10/hr each), don't let Karpenter prefer it for non-kvm pods
    # that happen to tolerate both taints, and reap aggressively.
    - name: rio-builder-metal
      weight: 1
      labels:
        rio.build/node-role: builder
        rio.build/kvm: "true"
      taints:
        - key: rio.build/builder
          value: "true"
          effect: NoSchedule
        - key: rio.build/kvm
          value: "true"
          effect: NoSchedule
      requirements:
        - key: karpenter.k8s.aws/instance-category
          operator: In
          values: [c, m, r]
        - key: karpenter.k8s.aws/instance-generation
          operator: Gt
          values: ["5"]
        # instance-size=metal* covers metal, metal-24xl, metal-48xl
        # across c/m/r gen6+ (incl. Graviton c7g.metal). Karpenter's
        # well-known label — no instance-type enumeration needed.
        - key: karpenter.k8s.aws/instance-size
          operator: In
          values: [metal, metal-24xl, metal-48xl]
        - key: karpenter.sh/capacity-type
          operator: In
          values: [on-demand]
      # ~2-3 metal hosts max (96-192 vCPU each). nixos-test derivations
      # are rare relative to the general build stream; queue a little
      # rather than burn $$ on idle metal.
      limits: {cpu: 512}
      consolidateAfter: 30s

    # r[impl fetcher.node.dedicated]
    #
    # Fetcher: dedicated NodePool with rio.build/fetcher taint. Keeps
    # fetchers off builder nodes and vice versa — an escaped fetcher
    # lands on a node running only other fetchers. Network-bound (FOD
    # fetchurl/git), not CPU-bound: cheap burstable t3a. Low weight so
    # Karpenter doesn't prefer it for unrelated pods that happen to
    # tolerate the taint.
    - name: rio-fetcher
      weight: 5
      labels:
        rio.build/node-role: fetcher
      taints:
        - key: rio.build/fetcher
          value: "true"
          effect: NoSchedule
      requirements:
        - key: node.kubernetes.io/instance-type
          operator: In
          values: [t3a.medium, t3a.large]
        - key: karpenter.sh/capacity-type
          operator: In
          values: [on-demand]
      # FODs are short (~seconds) but spike at build start (40+ FODs
      # ready simultaneously in a nixpkgs bootstrap). 128 vCPU at
      # ~2 cpu/fetcher = ~64 fetchers — handles the spike without
      # queueing FODs behind builders.
      limits: {cpu: 128}
      consolidateAfter: 30s

    # General: untainted, for future gateway/scheduler HPA overflow.
    # System nodegroup (min=3 max=5) handles today's load; this absorbs
    # scale-up past that. Longer consolidateAfter because gateway/scheduler
    # pods are connection-stateful (SSH sessions, gRPC streams) — don't churn.
    - name: rio-general
      weight: 50
      labels:
        rio.build/node-role: general
      taints: []
      requirements:
        # No arch constraint: multi-arch images. Gateway/scheduler/
        # store/controller all have arm64 builds. Gen 8+ for control-
        # plane perf at thousands-of-builds scale (c8a/m8a/r8a/c8g/
        # m8g/r8g — DDR5, faster single-thread, better network).
        - key: karpenter.k8s.aws/instance-category
          operator: In
          values: [c, m, r]
        - key: karpenter.k8s.aws/instance-generation
          operator: Gt
          values: ["7"]
        - key: karpenter.sh/capacity-type
          operator: In
          values: [on-demand]
      limits: {cpu: 500}
      consolidateAfter: 5m

# ──────────────────────────────────────────────────────────────────────────
# rio-dashboard (Envoy Gateway)
# ──────────────────────────────────────────────────────────────────────────
# Svelte SPA + Envoy Gateway gRPC-Web → gRPC+mTLS translation. The
# GatewayClass/Gateway/GRPCRoute CRDs in dashboard-gateway*.yaml render
# when enabled; they need the Envoy Gateway operator (gateway-helm via
# nix/helm-charts.nix) installed first or the CRDs don't exist.
#
# Disabled by default — phase 5 feature. Enabling renders BOTH the
# Gateway API CRDs (dashboard-gateway*.yaml — operator-managed envoy)
# AND the SPA Deployment (dashboard.yaml — nginx + static bundle).
# The Envoy Gateway operator (gateway-helm via nix/helm-charts.nix)
# must be installed first or the Gateway/GRPCRoute CRDs don't exist.
dashboard:
  enabled: false
  # nginx pod carrying the Svelte dist/ bundle (nix build .#docker-
  # dashboard). Stateless — scale for availability, not load (static
  # SPA + thin proxy).
  replicas: 1
  image: rio-dashboard
  resources:
    requests: {cpu: 50m, memory: 64Mi}
    limits: {memory: 128Mi}
  # ── Envoy Gateway data-plane tuning ───────────────────────────────────
  # EnvoyProxy.spec.provider.kubernetes.envoyService.name — stable
  # Service name for the operator-managed envoy data-plane. Without
  # this, the operator generates envoy-{gateway-ns}-{gateway-name}-
  # {hash} which is awkward to target. The nginx image bakes this
  # DNS name into its upstream config (nix/docker.nix) — changing it
  # here requires a docker-dashboard rebuild, not just a helm upgrade.
  envoyServiceName: rio-dashboard-envoy
  # Namespace where the Envoy Gateway operator runs (ControllerNamespaceMode
  # default). Envoy data-plane pods/Services land here even though the
  # Gateway/GRPCRoute CRs live in rio-system. Also hardcoded in
  # nix/docker.nix (nginx upstream hostname — baked at image build time,
  # not templated). Change BOTH together.
  envoyGatewayNamespace: envoy-gateway-system
  # ClientTrafficPolicy.timeout.http.streamIdleTimeout — kills a quiet
  # server-stream (GetBuildLogs, WatchBuild) after this. Envoy's default
  # is 5m which is too aggressive for slow builds. 1h is a practical
  # ceiling (if a stream is truly quiet for an hour, the build is stuck).
  streamIdleTimeout: 1h
  # EnvoyProxy.spec.provider.kubernetes.envoyService.type — ClusterIP
  # by default (nginx sits in-cluster and proxies to this Service).
  # Set to NodePort for VM tests or LoadBalancer for direct external
  # gRPC-Web access (bypassing the SPA).
  envoyServiceType: ClusterIP
  # Envoy data-plane image. The operator defaults to a compiled-in
  # version (v1.7.1 → envoy:distroless-v1.37.1); digest-pinned here so
  # airgapped VM tests and private-registry prod can override. Bump via
  # `crane digest docker.io/envoyproxy/envoy:distroless-v<new>` on
  # upstream releases. Tag portion is cosmetic (kubelet pulls by digest).
  # LOCKSTEP with nix/docker-pulled.nix envoy-distroless entry (same
  # digest, airgap set). Bump BOTH — helm-lint assert (P0304-T136)
  # checks tag match.
  envoyImage: docker.io/envoyproxy/envoy:distroless-v1.37.1@sha256:4d9226b9fd4d1449887de7cde785beb24b12e47d6e79021dec3c79e362609432
  # ── Method-level authz (r[dash.auth.method-gate]) ─────────────────────
  # Expose ClearPoison/DrainWorker/CreateTenant/TriggerGC via the
  # dashboard gateway. Default false — the GRPCRoute for mutating
  # methods is NOT rendered, so envoy returns 404 on those paths.
  # Use rio-cli with an mTLS client cert for admin operations until
  # dashboard-native authz lands. Flipping this to true is fail-open:
  # any browser that can reach the gateway can issue mutating RPCs
  # (CORS is advisory — a curl client ignores it).
  enableMutatingMethods: false
  # CORS allowed origins for gRPC-Web. The previous default was "*"
  # (any origin could fetch admin RPCs). The dashboard nginx Service
  # is the only legitimate browser origin in-cluster; external access
  # (Ingress/LoadBalancer) should add its public hostname here.
  # Override in prod values with the actual Ingress URL.
  cors:
    allowOrigins:
      # In-cluster nginx Service DNS. Browsers don't normally reach
      # this directly (they hit the Ingress), but it's a safe default
      # that isn't "*". Port-forwarded dev sessions hit localhost,
      # which is also NOT "*" — add localhost in values/dev.yaml if
      # needed.
      - "http://rio-dashboard.rio-system.svc.cluster.local"

# ──────────────────────────────────────────────────────────────────────────
# FUSE Device Plugin
# ──────────────────────────────────────────────────────────────────────────
# smarter-device-manager DaemonSet: exposes /dev/fuse as an extended
# resource (smarter-devices/fuse). Builder pods request it via
# resources.limits instead of a hostPath volume, which makes
# hostUsers:false + granular caps work (ADR-012 Phase 1a spike).
#
# enabled=true by default because builderPoolDefaults.privileged=false (below)
# depends on it. Disable on clusters where privileged:true is the escape
# hatch (k3s/kind without node-level device-plugin support).
devicePlugin:
  enabled: true
  # Upstream image. Digest-pinned — bump via `skopeo inspect docker://
  # <repo>:<new-tag> --format '{{.Digest}}'` on upstream releases. Tag
  # portion is cosmetic (kubelet pulls by digest). The helm-lint check
  # enforces the pin (a prior default referenced a never-published
  # upstream tag → ImagePullBackOff → builder pods Pending on a
  # default-values deploy).
  image: ghcr.io/smarter-project/smarter-device-manager:v1.20.12@sha256:228f7f44594a3182571559e62f2e3fe8a3f26180fb5dd7fc0cb7bf7d22a5bbcd
  # Per-node ceiling on how many pods can claim /dev/fuse. Each worker
  # pod requests 1. Set this >= max builder pods per node (which is
  # typically 1 given the resource requests below, but bursty
  # autoscaling + small nodes could pack more).
  fuseMaxDevices: 100
  # Per-node ceiling on /dev/kvm claims. Only metal nodes have /dev/kvm
  # (the plugin advertises 0 elsewhere). A single .metal box hosts many
  # qemu-kvm guests concurrently; 100 matches fuseMaxDevices so the
  # binding constraint stays cpu/memory, not the device count.
  kvmMaxDevices: 100
  # r[impl sec.pod.fuse-device-plugin]
  # r[impl fetcher.node.dedicated]
  #
  # Schedule on BOTH builder AND fetcher nodes. FetcherPool pods request
  # smarter-devices/fuse:1 same as BuilderPool (both use FUSE-backed
  # store mounts). nodeSelector is matchLabels-only (no set-based In);
  # nodeAffinity.matchExpressions covers both node-role values.
  # Control-plane + general nodes: no match → no DS pod.
  nodeSelector: {}
  nodeAffinity:
    requiredDuringSchedulingIgnoredDuringExecution:
      nodeSelectorTerms:
        - matchExpressions:
            - key: rio.build/node-role
              operator: In
              values: [builder, fetcher]
  # Tolerate BOTH executor-node taints so the DaemonSet schedules on
  # either. Without the fetcher toleration, the fetcher NodePool's
  # taint keeps the DS off → no smarter-devices/fuse advertised →
  # FetcherPool pods Pending forever.
  tolerations:
    - key: rio.build/builder
      operator: Equal
      value: "true"
      effect: NoSchedule
    - key: rio.build/fetcher
      operator: Equal
      value: "true"
      effect: NoSchedule
    # Metal NodePool carries an additional rio.build/kvm taint (kvm pods
    # only). The DS must tolerate it to advertise smarter-devices/{fuse,
    # kvm} there — without this, kvm-feature pods Pending forever (same
    # failure mode as the missing fetcher toleration above).
    - key: rio.build/kvm
      operator: Equal
      value: "true"
      effect: NoSchedule

# ──────────────────────────────────────────────────────────────────────────
# security-profiles-operator (SeccompProfile CR distribution)
# ──────────────────────────────────────────────────────────────────────────
# Renders SeccompProfile CRs from files/seccomp-rio-{builder,fetcher}.json.
# SPO's spod DaemonSet reconciles them to /var/lib/kubelet/seccomp/operator/
# {name}.json on every node it schedules to. Builder/fetcher pods reference
# those paths via seccompProfile.type=Localhost.
#
# SPO itself is installed BEFORE this chart (xtask k8s deploy applies the
# vendored infra/k8s/security-profiles-operator.yaml; cert-manager is its
# prerequisite, installed by tofu addons.tf). This block only renders the
# CRs and the spod scheduling-constraint CR.
#
# Disable when builderPoolDefaults.seccompProfile.type != Localhost (RuntimeDefault,
# Unconfined, privileged:true escape hatch) — the CRs are dead weight then.
securityProfilesOperator:
  enabled: true
  # Constrain spod to builder + fetcher nodes — control-plane nodes don't
  # need the profiles. Same shape as the devicePlugin DS constraints.
  nodeAffinity:
    requiredDuringSchedulingIgnoredDuringExecution:
      nodeSelectorTerms:
        - matchExpressions:
            - key: rio.build/node-role
              operator: In
              values: [builder, fetcher]
  tolerations:
    - key: rio.build/builder
      operator: Equal
      value: "true"
      effect: NoSchedule
    - key: rio.build/fetcher
      operator: Equal
      value: "true"
      effect: NoSchedule
    - key: rio.build/kvm
      operator: Equal
      value: "true"
      effect: NoSchedule

# ──────────────────────────────────────────────────────────────────────────
# Default BuilderPool
# ──────────────────────────────────────────────────────────────────────────
# I-108: one BuilderPool per arch. `builderPools` is the list of pools to
# render (each entry needs at minimum `name` + `systems`); every other
# field is deep-merged from `builderPoolDefaults`. Per-pool entries can
# override any default. Overlays that want to change a property for ALL
# pools (privileged, seccompProfile, resources, …) set it on
# `builderPoolDefaults` — Helm's `null`-deletes-key deep-merge semantics
# work there. Overlays that want a different POOL SET replace
# `builderPools` (lists are replaced wholesale, not merged).
#
# Phase-4c BuilderPoolSet supersedes with per-size-class pools. When WPS
# lands, set builderPoolDefaults.enabled=false and apply a WPS CR instead.
#
# I-117: BuilderPoolSet renders alongside builderPools[] below; either
# can be enabled independently. EKS deploy.rs enables builderPoolSets and
# disables builderPoolDefaults.enabled so only the per-class pools exist.
#
# I-117b: same list/defaults split as I-108's builderPools — one
# BuilderPoolSet per arch. `builderPoolSets` is the list of sets to
# render (each entry needs at minimum `name` + `systems`); every other
# field is deep-merged from `builderPoolSetDefaults`. Per-set entries
# can override `classes` (e.g., aarch64 wants different maxReplicas) or
# `poolTemplate` (e.g., arm-specific nodeSelector). Overlays that want
# to change a property for ALL sets (classes, poolTemplate.ephemeral)
# set it on `builderPoolSetDefaults`. Overlays that want a different
# SET LIST replace `builderPoolSets` (lists are replaced wholesale).
builderPoolSets:
  # Becomes the BPS metadata.name AND the child-pool name prefix:
  # `{name}-{class.name}` (e.g., `x86-64-tiny`). RFC 1123 — combined
  # length ≤ 63 chars (controller validates).
  - name: x86-64
    systems: [x86_64-linux]
  # Multi-arch: add a second entry (EKS deploy.rs does this via
  # --set-json):
  #   - name: aarch64
  #     systems: [aarch64-linux]

builderPoolSetDefaults:
  enabled: false
  # Size classes. Each becomes a child BuilderPool `{name}-{class}`
  # with the given resources. cutoffSecs/mem feed the SCHEDULER's
  # classify() (via scheduler.sizeClasses — keep names in sync).
  # Five-tier default sized for c6a/c7a bin-packing on EKS:
  #   tiny→c6a.large, small→c6a.xlarge, medium→c6a.2xlarge,
  #   large→c6a.4xlarge, xlarge→c6a.8xlarge.
  # Memory limit at 2× request (same blast-radius cap as
  # builderPoolDefaults.resources). No CPU limit — compressible.
  classes:
    - name: tiny
      cutoffSecs: 30
      maxReplicas: 200
      resources:
        # I-118: 2Gi storage — hello-class builds need <500MB FUSE
        # cache + overlay. 10Gi was the dominant scheduling blocker
        # (4 pods/node instead of ~8 by cpu/mem).
        requests: {cpu: "500m", memory: "512Mi", ephemeral-storage: "2Gi"}
        limits: {memory: "1Gi"}
    - name: small
      cutoffSecs: 120
      maxReplicas: 200
      resources:
        requests: {cpu: "1", memory: "2Gi", ephemeral-storage: "8Gi"}
        limits: {memory: "4Gi"}
    - name: medium
      cutoffSecs: 600
      maxReplicas: 100
      resources:
        requests: {cpu: "2", memory: "4Gi", ephemeral-storage: "25Gi"}
        limits: {memory: "8Gi"}
    - name: large
      cutoffSecs: 1800
      maxReplicas: 50
      resources:
        requests: {cpu: "4", memory: "8Gi", ephemeral-storage: "40Gi"}
        limits: {memory: "16Gi"}
    - name: xlarge
      cutoffSecs: 7200
      maxReplicas: 20
      resources:
        requests: {cpu: "8", memory: "16Gi", ephemeral-storage: "60Gi"}
        limits: {memory: "32Gi"}
  # poolTemplate fields layer over builderPoolDefaults (deep-merge), so
  # seccomp/tolerations/nodeSelector/privileged/hostUsers stay single-
  # sourced. Override here only what differs from the flat-pool defaults.
  poolTemplate: {}

builderPools:
  # I-104: pool name is the suffix in `rio-builder-<name>`. RFC 1123 —
  # lowercase alphanumeric + `-` (so `x86-64`, not `x86_64`).
  - name: x86-64
    systems: [x86_64-linux]
  # Multi-arch example — add as a second entry (EKS deploy.rs does this
  # via --set-json):
  #   - name: aarch64
  #     systems: [aarch64-linux]
  #     replicas: {min: 1, max: 100}

builderPoolDefaults:
  enabled: false
  # P0537: CRD default is `true` (one Job per build). The chart's
  # default pool is long-lived (StatefulSet) for autoscaler-driven
  # smoke testing — opt out explicitly. Ephemeral pools must also set
  # replicas.min=0 (CEL-enforced).
  ephemeral: false
  replicas:
    # min=2 for smoke-test worker-kill phase: need >=2 workers so killing
    # one leaves another for immediate reassign. With min=0 and instant
    # dispatch (no queue pressure), autoscaler never scales past 1.
    # Production target: min=0 (scale-to-zero via SCALE_DOWN_WINDOW).
    # max=500 paired with karpenter.nodePools rio-builder-preferred
    # cpu=2000 (500 builders × 2 cpu/builder = 1000 vCPU baseline,
    # 2000 NodePool limit gives Karpenter bin-packing headroom).
    min: 2
    max: 500
  autoscaling:
    metric: queueDepth
    targetValue: 5   # scale up when queued / active_workers > 5
  fuseCacheSize: 20Gi
  features: []
  sizeClass: ""   # unclassified — scheduler with size_classes configured
                  # would reject this; phase 4b baseline doesn't configure
                  # size_classes
  image: rio-builder
  # Phase 4b placeholder. Fits on c6a.large (2 vCPU / 4Gi) and up.
  # Karpenter picks cheapest-fit — request, not node-size mandate.
  # TODO(P0503): ADR-020 supersedes — per-derivation capacity manifest
  # (P0501-P0505) replaces static sizing. Until the manifest reconciler
  # lands, this is the cold-start floor. P0435 (per-class Static-mode
  # tuning) demoted to prio 35 — Manifest mode is the primary path.
  # Memory limit at 2× request: EKS stress testing (I-005) found that an
  # unbounded builder can consume all node memory and OOM the node (taking
  # out neighbours — kubelet, containerd, anything). 8Gi caps the blast
  # radius to one pod while still allowing reasonable burst over the 4Gi
  # request. No CPU limit — CPU is compressible, throttling is safe.
  # Builders now report memory_total_bytes=8Gi (was 0 = unknown-ceiling);
  # scheduler sees a real number. ADR-020 manifest mode will set
  # limits=requests per-pod from EMA, superseding this static cap.
  resources:
    requests:
      cpu: "2"
      memory: "4Gi"
      ephemeral-storage: "25Gi"   # fuseCacheSize (20Gi) + headroom
    limits:
      memory: "8Gi"
  # Device cgroup: /dev/fuse is provided by smarter-device-manager
  # (templates/device-plugin.yaml) via resources.limits. With the
  # device plugin, granular SYS_ADMIN+SYS_CHROOT caps suffice and
  # hostUsers:false works (hostPath /dev/fuse breaks idmap mounts).
  #
  # privileged:true is an ESCAPE HATCH for k3s/kind without the
  # device plugin. It disables seccomp entirely (ADR-012:10) and
  # is unacceptable for multi-tenant (ADR-012:18). Production on
  # EKS/GKE with the device plugin deployed should NOT need this.
  #
  # EKS + Karpenter cold-start: a NodeOverlay (templates/karpenter.yaml)
  # declares smarter-devices/fuse capacity synthetically so Karpenter
  # can bin-pack from zero nodes. Requires Karpenter ≥1.7 with the
  # nodeOverlay feature gate (infra/eks/karpenter.tf).
  #
  # privileged=false + seccompProfile=Localhost: containerd's RuntimeDefault
  # seccomp profile omits pivot_root from the CAP_SYS_ADMIN allowlist (not
  # Bottlerocket-specific — same gap on AL2023). The Localhost profile
  # (files/seccomp-rio-builder.json, distributed via SeccompProfile CR) is
  # RuntimeDefault + pivot_root − {ptrace, bpf, setns, process_vm_*}.
  # Keeps granular caps, container_t SELinux confinement, and the
  # device-plugin /dev/fuse path while denying the syscalls a
  # sandbox escapee with CAP_SYS_ADMIN would otherwise have.
  #
  # hostUsers=true override: runc only chowns the pod cgroup to the userns
  # root when the OCI spec mounts /sys/fs/cgroup rw. containerd passes ro
  # unless cgroup_writable=true is set on the runc runtime (containerd
  # #11131, v2.1+), and Bottlerocket's settings API does not expose that
  # flag (bottlerocket-os/bottlerocket#2408 — no arbitrary containerd TOML).
  # Without the chown, /sys/fs/cgroup/ is nobody:nobody inside the userns;
  # the worker's mkdir /sys/fs/cgroup/leaf fails EACCES even after its rw
  # remount (CAP_DAC_OVERRIDE can't touch unmapped UIDs) → CrashLoopBackOff.
  # The builder's default hostUsers:false (ADR-012 userns isolation) is
  # overridden here. Still vastly better than privileged:true — keeps
  # granular caps + SELinux + device-plugin. Revisit once Bottlerocket
  # exposes cgroup_writable or KEP-5474 (writable cgroups in pod spec) lands.
  privileged: false
  hostUsers: true
  seccompProfile:
    type: Localhost
    # Relative to /var/lib/kubelet/seccomp/. The SeccompProfile CR
    # (templates/seccomp-profiles.yaml) is reconciled by SPO's spod
    # DaemonSet to operator/rio-builder.json on every node spod runs.
    # SeccompProfile is cluster-scoped since SPO v0.9.0, so no
    # namespace component in the path.
    localhostProfile: operator/rio-builder.json
  # Pairs with the NodePool taint. Change NodePool taint/labels → change
  # these too.
  tolerations:
    - key: rio.build/builder
      operator: Equal
      value: "true"
      effect: NoSchedule
  nodeSelector:
    rio.build/node-role: builder

# ──────────────────────────────────────────────────────────────────────────
# Default FetcherPool (SKELETON — reconciler wiring is a follow-on plan)
# ──────────────────────────────────────────────────────────────────────────
# FOD-only executors with open internet egress. See ADR-019.
fetcherPool:
  enabled: false
  # I-104: pool name is the suffix in `rio-fetcher-<name>`. Fetchers are
  # arch-agnostic (FODs are `builtin`) — single pool named `default`.
  name: default
  # P0541: ephemeral defaults true at the CRD level. The chart's
  # default pool sets it explicitly here so flipping the chart
  # default is a one-line diff (and so `helm get values` shows the
  # mode without consulting the CRD schema). false → STS path,
  # min=2 standing set; true → Job-per-FOD, requires min=0.
  ephemeral: false
  # ephemeralDeadlineSeconds: ~  # only with ephemeral:true; default 300
  replicas:
    # min=2: matches the smoke test's parallel-FOD coverage. Same
    # rationale as builderPoolDefaults.replicas.min — there's always a warm
    # fetcher so the first FOD doesn't wait for cold-start.
    min: 2
    # max paired with karpenter rio-fetcher cpu=128. FODs spike at
    # build start (40+ ready when chains hit FOD-phase together) but
    # are short (~seconds) — the 30s scale-up window is enough to
    # catch the spike, the 10m scale-down is plenty to ride out the
    # tail.
    max: 32
  autoscaling:
    metric: fodQueueDepth
    targetValue: 5   # scale up when queued_fod / fetchers > 5
  systems: [x86_64-linux]
  # Same binary as builders; RIO_EXECUTOR_KIND=fetcher env baked into
  # the image (nix/docker.nix rio-fetcher wraps rio-builder).
  image: rio-fetcher
  # Same cgroup-chown constraint as builderPoolDefaults (see comment above).
  # Same binary, same /sys/fs/cgroup/leaf mkdir at startup.
  hostUsers: true
  # I-170: fetchers run arbitrary code (the FOD's `builder` script);
  # a large source unpack+NAR-serialize can OOM a 2Gi pod (5+
  # OOMKilled on chromium-source.drv at medium-mixed-32x). Unlike
  # builders there's no a-priori signal — routing is reactive (FOD
  # fails on tiny → retry on small). `tiny` matches the pre-I-170
  # single pool; `small` handles the chromium-source tier.
  #
  # MUST agree with scheduler.toml `[[fetcher_size_classes]]` (rendered
  # from this list in templates/scheduler.yaml — single source of truth).
  # Set to `[]` for a single-size pool at the legacy `resources:` field.
  classes:
    - name: tiny
      resources:
        requests: {cpu: 500m, memory: 1Gi}
        limits: {memory: 2Gi}
    - name: small
      # minReplicas: 0 — small is the rare-promotion tier; tolerate
      # cold-start (a drv that already burned a retry can wait 30s).
      minReplicas: 0
      maxReplicas: 4
      resources:
        requests: {cpu: "1", memory: 4Gi}
        limits: {memory: 8Gi}
  tolerations:
    - key: rio.build/fetcher
      operator: Equal
      value: "true"
      effect: NoSchedule
  nodeSelector:
    rio.build/node-role: fetcher

# ──────────────────────────────────────────────────────────────────────────
# Conditional subchart: PG (dev only). From nixhelm (FOD), not vendored.
# Dev S3 (Rook) is NOT a subchart — operator-first-then-cluster lifecycle
# doesn't fit; `just dev apply` installs it as separate helm releases.
# ──────────────────────────────────────────────────────────────────────────
postgresql:
  enabled: false
  auth:
    database: rio
    username: rio
    # Used ONLY when existingSecret is unset (VM tests — airgapped,
    # hardcoded is fine). xtask k3s/kind deploy generates a random
    # password, pre-creates rio-postgres + rio-postgres-auth Secrets,
    # and sets existingSecret so this value and postgres-secret.yaml
    # are both bypassed. Keeps the password out of helm values.
    password: rio
    existingSecret: ""
  primary:
    persistence:
      size: 5Gi

# RustFS S3 backend (kind provider only). Standalone mode — single pod,
# local-path PVC. See values/kind.yaml for the enabled configuration.
rustfs:
  enabled: false
