{{- if .Values.fodProxy.enabled }}
{{- $f := .Values.fodProxy -}}
apiVersion: v1
kind: ConfigMap
metadata:
  name: rio-fod-proxy-config
  namespace: {{ .Values.namespace.name }}
  labels:
    {{- include "rio.labels" (dict "root" . "name" "rio-fod-proxy" "component" "proxy") | nindent 4 }}
data:
  squid.conf: |
    # Listen on the standard proxy port. Workers connect here.
    http_port 3128

    # Allowlisted domains. `.example.com` matches `example.com`
    # AND all subdomains. Operators extend via values.yaml.
    acl allowed_domains dstdomain \
    {{- range $i, $d := $f.allowedDomains }}
      {{ $d }}{{ if lt (add1 $i) (len $f.allowedDomains) }} \{{ end }}
    {{- end }}

    # Pod-to-pod traffic comes from the cluster CIDR — can't restrict by
    # pod identity in Squid (that's what NetworkPolicy is for). Real access
    # control is the NetworkPolicy allowing only workers to reach this pod.
    http_access allow allowed_domains
    http_access deny all

    # No caching. Forward proxy for access control, not performance. Caching
    # would complicate invalidation (tarball URL might change content) and
    # the FOD builder verifies by hash anyway.
    cache deny all

    # stdout for `kubectl logs`. Default /var/log/squid/ is lost on restart.
    access_log stdio:/dev/stdout

    # No PID file. Default /var/run/squid.pid needs root (or writable
    # /var/run). K8s manages process lifecycle.
    pid_filename none

    # Squid wants a cache dir for coredumps etc even with `cache deny all`.
    coredump_dir /var/spool/squid
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: rio-fod-proxy
  namespace: {{ .Values.namespace.name }}
  labels:
    {{- include "rio.labels" (dict "root" . "name" "rio-fod-proxy" "component" "proxy") | nindent 4 }}
spec:
  replicas: 1
  selector:
    matchLabels:
      {{- include "rio.selectorLabels" "rio-fod-proxy" | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "rio.labels" (dict "root" . "name" "rio-fod-proxy" "component" "proxy") | nindent 8 }}
      annotations:
        # Restart on ConfigMap change (squid.conf is not hot-reloaded).
        checksum/config: {{ $f.allowedDomains | toJson | sha256sum }}
    spec:
      # UID 31 is `squid` on Ubuntu. stdout logging BREAKS under root — Squid
      # drops privileges but stdio:/dev/stdout was opened before that →
      # permission mismatch. Running as target user from the start avoids
      # the dance. POD-level, not container-level.
      securityContext:
        runAsNonRoot: true
        runAsUser: 31
        runAsGroup: 31
      containers:
        - name: squid
          # Nix-built (nix/docker.nix), pushed to ECR. Previously
          # ubuntu/squid:5.7-22.04_beta — tag never existed, ImagePullBackOff
          # in production. Third-party tags can vanish; ours can't (IMMUTABLE).
          image: {{ include "rio.image" (list . $f.image) }}
          imagePullPolicy: {{ .Values.global.image.pullPolicy }}
          ports:
            - name: proxy
              containerPort: 3128
          volumeMounts:
            # subPath mounts ONLY squid.conf, leaving rest of /etc/squid
            # alone (image has defaults for error pages etc).
            - name: config
              mountPath: /etc/squid/squid.conf
              subPath: squid.conf
              readOnly: true
            - name: spool
              mountPath: /var/spool/squid
          # Squid exposes nothing for health; TCP on the proxy port is all
          # we get.
          readinessProbe:
            tcpSocket: {port: 3128}
            periodSeconds: 10
          resources:
            {{- toYaml $f.resources | nindent 12 }}
      volumes:
        - name: config
          configMap:
            name: rio-fod-proxy-config
        # tmpfs for Squid's working dirs. Writes even with `cache deny all`
        # (connection state). 64Mi is plenty.
        - name: spool
          emptyDir:
            medium: Memory
            sizeLimit: 64Mi
---
apiVersion: v1
kind: Service
metadata:
  name: rio-fod-proxy
  namespace: {{ .Values.namespace.name }}
  labels:
    {{- include "rio.labels" (dict "root" . "name" "rio-fod-proxy" "component" "proxy") | nindent 4 }}
spec:
  type: ClusterIP
  selector:
    {{- include "rio.selectorLabels" "rio-fod-proxy" | nindent 4 }}
  ports:
    - name: proxy
      port: 3128
      targetPort: proxy
{{- end }}
