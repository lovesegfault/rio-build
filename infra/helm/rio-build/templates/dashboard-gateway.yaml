{{- if .Values.dashboard.enabled }}
{{- $ns := .Values.namespace.name -}}
# r[impl dash.envoy.grpc-web-translate]
# r[impl dash.auth.method-gate]
#   (markers are documentary — tracey does not scan yaml; the r[verify]
#    for both lives at nix/tests/default.nix which IS scanned)
#
# Envoy Gateway CRDs. Attaching a GRPCRoute to a listener triggers
# grpc_web filter injection into that listener's HTTP filter chain —
# an Envoy Gateway implementation detail (NOT in the Gateway API
# spec itself). Verified at v1.7.1: when the IR listener has
# IsHTTP2=true (set by GRPCRoute attachment,
# internal/gatewayapi/route.go:1293-1295), the translator appends
# xdsfilters.GRPCWeb + xdsfilters.GRPCStats to the HTTP filter chain
# (internal/xds/translator/listener.go:424-425).
#
# SINGLE LISTENER on purpose — dodges upstream bug
# envoyproxy/gateway#7559 where the grpc_web filter is silently
# omitted when a GRPCRoute attaches to a non-first listener on a
# multi-listener Gateway. The dashboard only needs one HTTP listener
# anyway.
---
# Cluster-scoped: one GatewayClass shared by however many dashboard
# Gateways exist. parametersRef → EnvoyProxy in our namespace (the
# operator resolves namespaced parametersRef since v1.1.0). The
# EnvoyProxy object itself lives in dashboard-gateway-tls.yaml so
# backendTLS and provider settings stay together.
apiVersion: gateway.networking.k8s.io/v1
kind: GatewayClass
metadata:
  name: rio-dashboard
  labels:
    {{- include "rio.labels" (dict "root" . "name" "rio-dashboard-gateway" "component" "dashboard") | nindent 4 }}
spec:
  controllerName: gateway.envoyproxy.io/gatewayclass-controller
  parametersRef:
    group: gateway.envoyproxy.io
    kind: EnvoyProxy
    name: rio-dashboard-proxy
    namespace: {{ $ns }}
---
apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: rio-dashboard
  namespace: {{ $ns }}
  labels:
    {{- include "rio.labels" (dict "root" . "name" "rio-dashboard-gateway" "component" "dashboard") | nindent 4 }}
spec:
  gatewayClassName: rio-dashboard
  # Single listener — see #7559 comment at top. Port 8080 is non-
  # privileged so the envoy container doesn't need CAP_NET_BIND_SERVICE
  # (EnvoyProxy.spec.provider.kubernetes.useListenerPortAsContainerPort
  # defaults to false → port-shift for privileged ports, but 8080 is
  # already ephemeral-range so the shift is a no-op).
  listeners:
    - name: http
      protocol: HTTP
      port: 8080
      allowedRoutes:
        kinds:
          - kind: GRPCRoute
---
# ── Read-only methods: routed unconditionally ─────────────────────────
# r[dash.auth.method-gate] — the method split is here. Status/list/log/
# graph RPCs are idempotent reads; the dashboard hits these on every
# page load. Exposing them via gRPC-Web is low-risk (worst case: an
# attacker learns cluster state they could also learn from /metrics).
#
# SchedulerService: the dashboard only calls WatchBuild (streaming
# status updates for the DAG view) and QueryBuildStatus (poll fallback).
# SubmitBuild/CancelBuild are mutating — the production entrypoint for
# those is ssh-ng via rio-gateway, not the dashboard.
apiVersion: gateway.networking.k8s.io/v1
kind: GRPCRoute
metadata:
  name: rio-scheduler-readonly
  namespace: {{ $ns }}
  labels:
    {{- include "rio.labels" (dict "root" . "name" "rio-dashboard-gateway" "component" "dashboard") | nindent 4 }}
spec:
  parentRefs:
    - name: rio-dashboard
  rules:
    - matches:
        - method: { service: rio.admin.AdminService, method: ClusterStatus }
        - method: { service: rio.admin.AdminService, method: ListWorkers }
        - method: { service: rio.admin.AdminService, method: ListBuilds }
        - method: { service: rio.admin.AdminService, method: GetBuildLogs }
        - method: { service: rio.admin.AdminService, method: ListTenants }
        - method: { service: rio.admin.AdminService, method: GetBuildGraph }
        - method: { service: rio.admin.AdminService, method: GetSizeClassStatus }
        - method: { service: rio.scheduler.SchedulerService, method: WatchBuild }
        - method: { service: rio.scheduler.SchedulerService, method: QueryBuildStatus }
      backendRefs:
        - name: rio-scheduler
          port: 9001
{{- if .Values.dashboard.enableMutatingMethods }}
---
# ── Mutating methods: gated behind values flag ────────────────────────
# ClearPoison   — un-brakes a deliberately blocked derivation
# DrainWorker   — marks a worker draining; can stall the fleet if abused
# CreateTenant  — writes PG rows; resource creation
# TriggerGC     — deletes store paths; data loss potential
#
# These are NOT rendered by default (enableMutatingMethods: false).
# With the route absent, envoy has no match → returns 404 on e.g.
# POST /rio.admin.AdminService/ClearPoison. Use rio-cli with an mTLS
# client cert for these until dashboard-native authz lands.
apiVersion: gateway.networking.k8s.io/v1
kind: GRPCRoute
metadata:
  name: rio-scheduler-mutating
  namespace: {{ $ns }}
  labels:
    {{- include "rio.labels" (dict "root" . "name" "rio-dashboard-gateway" "component" "dashboard") | nindent 4 }}
spec:
  parentRefs:
    - name: rio-dashboard
  rules:
    - matches:
        - method: { service: rio.admin.AdminService, method: ClearPoison }
        - method: { service: rio.admin.AdminService, method: DrainWorker }
        - method: { service: rio.admin.AdminService, method: CreateTenant }
        - method: { service: rio.admin.AdminService, method: TriggerGC }
      backendRefs:
        - name: rio-scheduler
          port: 9001
{{- end }}
{{- end }}
