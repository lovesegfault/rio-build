{{- $root := . -}}
{{- range .Values.builderPoolSets }}
{{- /* per-set entry deep-merged over builderPoolSetDefaults. mergeOverwrite
       mutates its first arg, so deepCopy the defaults each iteration. */ -}}
{{- $bps := mergeOverwrite (deepCopy $root.Values.builderPoolSetDefaults) . -}}
{{- $tpl := mergeOverwrite (deepCopy $root.Values.builderPoolDefaults) $bps.poolTemplate -}}
{{- if $bps.enabled }}
---
# BuilderPoolSet: one child BuilderPool per size class. The scheduler's
# classify() routes each derivation to the smallest covering class by
# (est_duration, peak_memory, peak_cpu); the controller spawns workers
# sized by classes[].resources.
#
# poolTemplate inherits from builderPoolDefaults (deep-merge) so
# seccomp/tolerations/nodeSelector/hostUsers stay single-sourced.
# Per-BPS overrides go on the builderPoolSets[] entry's .poolTemplate.
apiVersion: rio.build/v1alpha1
kind: BuilderPoolSet
metadata:
  name: {{ $bps.name }}
  namespace: {{ $root.Values.namespaces.builders.name }}
  labels:
    app.kubernetes.io/part-of: rio-build
    rio.build/role: builder
spec:
  classes:
    {{- range $bps.classes }}
    - name: {{ .name }}
      cutoffSecs: {{ .cutoffSecs }}
      {{- with .maxConcurrent }}
      maxConcurrent: {{ . }}
      {{- end }}
      resources:
        {{- toYaml .resources | nindent 8 }}
    {{- end }}
  poolTemplate:
    image: {{ include "rio.image" (list $root $tpl.image) }}
    systems:
      {{- toYaml $bps.systems | nindent 6 }}
    features:
      {{- toYaml $tpl.features | nindent 6 }}
    {{- if $root.Values.tls.enabled }}
    tlsSecretName: rio-builder-tls
    {{- end }}
    {{- include "rio.optBool" (list $tpl "privileged" $tpl.privileged) | nindent 4 }}
    {{- include "rio.optBool" (list $tpl "hostUsers" $tpl.hostUsers) | nindent 4 }}
    {{- with $tpl.seccompProfile }}
    seccompProfile:
      {{- toYaml . | nindent 6 }}
    {{- end }}
    {{- with $tpl.tolerations }}
    tolerations:
      {{- toYaml . | nindent 6 }}
    {{- end }}
    {{- with $tpl.nodeSelector }}
    nodeSelector:
      {{- toYaml . | nindent 6 }}
    {{- end }}
{{- end }}
{{- end }}
