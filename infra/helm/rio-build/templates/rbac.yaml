{{- $ns := .Values.namespace.name -}}
# ServiceAccounts first. gateway/store/worker get
# automountServiceAccountToken: false — no K8s API access. Dedicated SA
# anyway for IRSA annotations + NetworkPolicy scoping.
#
# automountServiceAccountToken is TOP-LEVEL (sibling of metadata), not
# under metadata. Easy to mis-indent.
{{- if .Values.controller.enabled }}
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: rio-controller
  namespace: {{ $ns }}
  labels:
    {{- include "rio.labels" (dict "root" . "name" "rio-controller" "component" "controller") | nindent 4 }}
{{- end }}
{{- if .Values.gateway.enabled }}
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: rio-gateway
  namespace: {{ $ns }}
  labels:
    {{- include "rio.labels" (dict "root" . "name" "rio-gateway" "component" "gateway") | nindent 4 }}
automountServiceAccountToken: false
{{- end }}
{{- if .Values.store.enabled }}
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: rio-store
  namespace: {{ $ns }}
  labels:
    {{- include "rio.labels" (dict "root" . "name" "rio-store" "component" "store") | nindent 4 }}
  {{- with .Values.store.serviceAccount.annotations }}
  # EKS IRSA: eks.amazonaws.com/role-arn attaches an IAM role via projected
  # token. Store needs S3 access. NO static AWS keys.
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
automountServiceAccountToken: false
{{- end }}
---
# Worker SA is always created — WorkerPool reconciler references it even
# when nothing else in this chart is enabled (vmtest profile).
apiVersion: v1
kind: ServiceAccount
metadata:
  name: rio-worker
  namespace: {{ $ns }}
  labels:
    {{- include "rio.labels" (dict "root" . "name" "rio-worker" "component" "worker") | nindent 4 }}
automountServiceAccountToken: false
{{- if .Values.scheduler.enabled }}
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: rio-scheduler
  namespace: {{ $ns }}
  labels:
    {{- include "rio.labels" (dict "root" . "name" "rio-scheduler" "component" "scheduler") | nindent 4 }}
{{- end }}

{{- if .Values.controller.enabled }}
---
# Controller watches CRDs cluster-wide → ClusterRole.
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: rio-controller
  labels:
    {{- include "rio.labels" (dict "root" . "name" "rio-controller" "component" "controller") | nindent 4 }}
rules:
  # Full lifecycle. `update` for finalizer add/remove (finalizer() patches
  # metadata.finalizers).
  - apiGroups: [rio.build]
    resources: [workerpools]
    verbs: [get, list, watch, create, update, patch, delete]
  # Status subresource = separate permission. Never GET /status separately
  # (it's in the main GET).
  - apiGroups: [rio.build]
    resources: [workerpools/status]
    verbs: [get, patch]
  # WorkerPoolSet: aggregating CRD — one WPS spawns one child WorkerPool
  # per size class. Reconciler watches WPS, SSA-applies child WPs, refreshes
  # per-class status. No `create`/`delete` — operators `kubectl apply` the
  # WPS; reconciler only reads it + patches metadata.finalizers (`update`)
  # and status (below). Child WorkerPool lifecycle is covered by the rule
  # above.
  - apiGroups: [rio.build]
    resources: [workerpoolsets]
    verbs: [get, list, watch, patch, update]
  # Per-class status (effective_cutoff_secs + queued from scheduler's
  # GetSizeClassStatus, joined with observed child WP replicas).
  - apiGroups: [rio.build]
    resources: [workerpoolsets/status]
    verbs: [get, patch, update]
  # /finalizers subresource: OwnerReferencesPermissionEnforcement
  # admission plugin checks `update` on `<owner>/finalizers` when
  # creating a child with `blockOwnerDeletion: true` (which
  # controller_owner_ref sets). Without this verb, child-WP create
  # fails with "cannot set blockOwnerDeletion ... not permitted to
  # update the owner resource" — NOT a finalizer() helper concern
  # (that uses JSON-patch on the main resource).
  - apiGroups: [rio.build]
    resources: [workerpoolsets/finalizers]
    verbs: [update]
  # Owned children. `create` because SSA PATCH creates if missing but some
  # clusters still check `create` perm.
  - apiGroups: [apps]
    resources: [statefulsets]
    verbs: [get, list, watch, create, update, patch, delete]
  # List/watch: the DisruptionTarget watcher (disruption.rs) watches for
  # status.conditions[DisruptionTarget=True] to fire preemptive DrainWorker;
  # the finalizer enumerates pods by label for graceful scale-to-0.
  # No mutation — pod lifecycle is the StatefulSet controller's job.
  - apiGroups: [""]
    resources: [pods]
    verbs: [get, list, watch]
  # Headless Service per WorkerPool. Created by apply(), deleted by ownerRef GC.
  - apiGroups: [""]
    resources: [services]
    verbs: [get, list, watch, create, update, patch, delete]
  # `kubectl describe workerpool` shows events. create/patch for
  # aggregation (K8s dedups by key). events.k8s.io (NOT core "")
  # — kube-runtime's Recorder uses the events.k8s.io/v1 API. K8s
  # mirrors events to core/v1 automatically for kubectl describe.
  - apiGroups: [events.k8s.io]
    resources: [events]
    verbs: [create, patch]
  # Per-WorkerPool PDB (maxUnavailable=1) managed by reconciler.
  - apiGroups: [policy]
    resources: [poddisruptionbudgets]
    verbs: [get, list, watch, create, update, patch, delete]
  # Ephemeral WorkerPool (spec.ephemeral=true): per-assignment Jobs
  # instead of StatefulSet. reconcile_ephemeral lists Jobs by label
  # to count active-vs-ceiling, creates new Jobs when queued > 0.
  # `delete` not needed — ttlSecondsAfterFinished reaps; ownerRef GC
  # handles WorkerPool-delete cleanup.
  - apiGroups: [batch]
    resources: [jobs]
    verbs: [get, list, watch, create]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: rio-controller
  labels:
    {{- include "rio.labels" (dict "root" . "name" "rio-controller" "component" "controller") | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: rio-controller
subjects:
  - kind: ServiceAccount
    name: rio-controller
    namespace: {{ $ns }}
{{- end }}

{{- if .Values.scheduler.enabled }}
---
# Scheduler touches ONE Lease in ONE namespace → Role suffices (least
# privilege). In-house election (src/lease/election.rs): GET to observe,
# CREATE on first acquire, UPDATE (PUT via kube::Api::replace) for
# renew/steal/step_down. resourceVersion-guarded — 409 on race.
#
# VM tests won't catch RBAC misconfig here: k3s controller-as-systemd uses
# admin kubeconfig, bypassing RBAC. The Helm-rendered controller path
# (values/vmtest.yaml) will.
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: rio-scheduler-lease
  namespace: {{ $ns }}
  labels:
    {{- include "rio.labels" (dict "root" . "name" "rio-scheduler" "component" "scheduler") | nindent 4 }}
rules:
  - apiGroups: [coordination.k8s.io]
    resources: [leases]
    verbs: [get, create, update]
  # pod-deletion-cost annotation: leader PATCHes own Pod's
  # metadata.annotations so K8s kills standby first during RollingUpdate.
  # Namespace-wide (NOT resourceNames-scoped) because pod name is dynamic
  # (Deployment-generated). Code only patches cfg.holder_id = HOSTNAME =
  # own pod. `get` needed: kube-rs's Api::patch GETs first for
  # resourceVersion (Merge doesn't strictly need it but client does
  # GET-before-PATCH anyway).
  - apiGroups: [""]
    resources: [pods]
    verbs: [get, patch]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: rio-scheduler-lease
  namespace: {{ $ns }}
  labels:
    {{- include "rio.labels" (dict "root" . "name" "rio-scheduler" "component" "scheduler") | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: rio-scheduler-lease
subjects:
  - kind: ServiceAccount
    name: rio-scheduler
    namespace: {{ $ns }}
{{- end }}
