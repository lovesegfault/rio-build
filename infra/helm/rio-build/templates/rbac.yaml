{{- $ns := .Values.namespaces.system.name -}}
# ServiceAccounts. controller + scheduler automount (k8s API access for
# CRD watch / lease); the rest get automountServiceAccountToken: false —
# dedicated SA anyway for IRSA annotations + NetworkPolicy scoping.
# automountServiceAccountToken is TOP-LEVEL (sibling of metadata), not
# under metadata. Easy to mis-indent.
#
# IRSA: store (S3 chunk bucket) and scheduler (S3 build-log flush) get
# eks.amazonaws.com/role-arn via projected token — NO static AWS keys.
#
# builder/fetcher SAs always rendered (vmtest profile needs them even when
# nothing else in this chart is enabled); the Pool reconciler references
# them from the per-build Jobs it creates.
{{- range $sa := list
      (dict "name" "rio-controller" "ns" $ns                              "comp" "controller" "on" .Values.controller.enabled "automount" true)
      (dict "name" "rio-gateway"    "ns" $ns                              "comp" "gateway"    "on" .Values.gateway.enabled    "automount" false)
      (dict "name" "rio-store"      "ns" .Values.namespaces.store.name    "comp" "store"      "on" .Values.store.enabled      "automount" false "annot" .Values.store.serviceAccount.annotations)
      (dict "name" "rio-builder"    "ns" .Values.namespaces.builders.name "comp" "worker"     "on" true                       "automount" false)
      (dict "name" "rio-fetcher"    "ns" .Values.namespaces.fetchers.name "comp" "worker"     "on" true                       "automount" false)
      (dict "name" "rio-scheduler"  "ns" $ns                              "comp" "scheduler"  "on" .Values.scheduler.enabled  "automount" true  "annot" .Values.scheduler.serviceAccount.annotations)
}}
{{- if $sa.on }}
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ $sa.name }}
  namespace: {{ $sa.ns }}
  labels:
    {{- include "rio.labels" (dict "root" $ "name" $sa.name "component" $sa.comp) | nindent 4 }}
  {{- with $sa.annot }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
{{- if not $sa.automount }}
automountServiceAccountToken: false
{{- end }}
{{- end }}
{{- end }}

{{- if .Values.controller.enabled }}
---
# Controller watches CRDs cluster-wide → ClusterRole.
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: rio-controller
  labels:
    {{- include "rio.labels" (dict "root" . "name" "rio-controller" "component" "controller") | nindent 4 }}
rules:
  # rio.build CRD lifecycle. `update` covers finalizer add/remove
  # (finalizer() patches metadata.finalizers). /status is a separate
  # permission; never GET /status separately (it's in the main GET).
  #
  # /finalizers subresource: OwnerReferencesPermissionEnforcement admission
  # plugin checks `update` on `<owner>/finalizers` when creating a child
  # with `blockOwnerDeletion: true` (which controller_owner_ref sets).
  # Without this verb, child creates fail with "cannot set
  # blockOwnerDeletion ... not permitted to update the owner resource."
  # NOT a finalizer() helper concern (that uses JSON-patch on the main
  # resource).
  #
  # Per-CRD verb sets:
  #   pools — full lifecycle. Reconciler SSA-applies per-build/per-FOD
  #     Jobs into rio-builders/rio-fetchers (ADR-019); the
  #     ClusterRoleBinding below grants batch/jobs cluster-wide so
  #     no per-namespace RoleBinding needed.
  #   componentscalers — predictive store autoscaling. No create/delete
  #     (operators apply the CR via this chart); reconciler reads spec,
  #     writes status (learnedRatio persists across restarts), patches
  #     the target Deployment's /scale subresource. No /finalizers (no
  #     owned children).
  {{- $full := list "get" "list" "watch" "create" "update" "patch" "delete" }}
  {{- $ro   := list "get" "list" "watch" "patch" "update" }}
  {{- range $r := list
        (dict "name" "pools"            "verbs" $full "status" (list "get" "patch")          "finalizers" true)
        (dict "name" "componentscalers" "verbs" $ro   "status" (list "get" "patch" "update") "finalizers" false)
  }}
  - apiGroups: [rio.build]
    resources: [{{ $r.name }}]
    verbs: {{ toJson $r.verbs }}
  - apiGroups: [rio.build]
    resources: [{{ $r.name }}/status]
    verbs: {{ toJson $r.status }}
  {{- if $r.finalizers }}
  - apiGroups: [rio.build]
    resources: [{{ $r.name }}/finalizers]
    verbs: [update]
  {{- end }}
  {{- end }}
  # Deployment read for current .spec.replicas + /scale subresource
  # for the patch. Pool reconcilers don't touch Deployments — this is
  # ComponentScaler-only.
  - apiGroups: [apps]
    resources: [deployments]
    verbs: [get, list, watch]
  - apiGroups: [apps]
    resources: [deployments/scale]
    verbs: [get, patch, update]
  # Reconciler inventories live worker pods by label to compute Job
  # deficit. `patch`: node_informer's run_pod_annotator stamps the
  # rio.build/hw-class annotation (Patch::Merge) so the builder's
  # downward-API → RIO_HW_CLASS feeds hw_perf_samples. Pod lifecycle
  # itself stays the Job controller's.
  - apiGroups: [""]
    resources: [pods]
    verbs: [get, list, watch, patch]
  # node_informer: Node watch → NodeLabelCache (hw-band label join for
  # the per-(band,cap) cost solve). Cluster-scoped.
  - apiGroups: [""]
    resources: [nodes]
    verbs: [get, list, watch]
  # node_informer: core/v1 Event watch for reason=SpotInterrupted
  # (Karpenter posts on the NodeClaim) → λ[h] spot-rate self-
  # calibration. core "" — the watcher uses k8s_openapi::api::core::
  # v1::Event, not events.k8s.io.
  - apiGroups: [""]
    resources: [events]
    verbs: [list, watch]
  # `kubectl describe pool` shows events. create/patch for
  # aggregation (K8s dedups by key). events.k8s.io (NOT core "")
  # — kube-runtime's Recorder uses the events.k8s.io/v1 API. K8s
  # mirrors events to core/v1 automatically for kubectl describe.
  - apiGroups: [events.k8s.io]
    resources: [events]
    verbs: [create, patch]
  # Owned children: one Job per build/FOD. reconcile_* lists Jobs by
  # label for inventory, creates new Jobs for deficit. `delete`:
  # excess-Pending reap (r[ctrl.ephemeral.reap-excess-pending]) and
  # orphan-Running reap; ownerRef GC handles Pool-delete cleanup.
  - apiGroups: [batch]
    resources: [jobs]
    verbs: [get, list, watch, create, delete]
  # NodePool budget reconciler (r[ctrl.nodepoolbudget]): list governed
  # pools by label, read .status.resources.cpu, merge-patch
  # .spec.limits.cpu. Cluster-scoped resource → ClusterRole rule.
  - apiGroups: [karpenter.sh]
    resources: [nodepools]
    verbs: [get, list, watch, patch]
  # nodeclaim_pool reconciler (ADR-023 §13b, B6-B11): direct NodeClaim
  # create/delete for anchor+bulk deficit cover and unhealthy-node reap.
  # Karpenter still owns the Node lifecycle; controller only manages
  # NodeClaims it labelled. nodes:{list,watch} + events:{list,watch}
  # (SpotInterrupted feed) already granted above for node_informer.
  - apiGroups: [karpenter.sh]
    resources: [nodeclaims]
    verbs: [get, list, watch, create, delete]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: rio-controller
  labels:
    {{- include "rio.labels" (dict "root" . "name" "rio-controller" "component" "controller") | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: rio-controller
subjects:
  - kind: ServiceAccount
    name: rio-controller
    namespace: {{ $ns }}
{{- end }}

{{- if .Values.scheduler.enabled }}
---
# Scheduler touches ONE Lease in ONE namespace → Role suffices (least
# privilege). In-house election (src/lease/election.rs): GET to observe,
# CREATE on first acquire, UPDATE (PUT via kube::Api::replace) for
# renew/steal/step_down. resourceVersion-guarded — 409 on race.
#
# VM tests won't catch RBAC misconfig here: k3s controller-as-systemd uses
# admin kubeconfig, bypassing RBAC. The Helm-rendered controller path
# (values/vmtest-full.yaml) will.
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: rio-scheduler-lease
  namespace: {{ $ns }}
  labels:
    {{- include "rio.labels" (dict "root" . "name" "rio-scheduler" "component" "scheduler") | nindent 4 }}
rules:
  - apiGroups: [coordination.k8s.io]
    resources: [leases]
    verbs: [get, create, update]
  # pod-deletion-cost annotation: leader PATCHes own Pod's
  # metadata.annotations so K8s kills standby first during RollingUpdate.
  # Namespace-wide (NOT resourceNames-scoped) because pod name is dynamic
  # (Deployment-generated). Code only patches cfg.holder_id = HOSTNAME =
  # own pod. `get` needed: kube-rs's Api::patch GETs first for
  # resourceVersion (Merge doesn't strictly need it but client does
  # GET-before-PATCH anyway).
  - apiGroups: [""]
    resources: [pods]
    verbs: [get, patch]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: rio-scheduler-lease
  namespace: {{ $ns }}
  labels:
    {{- include "rio.labels" (dict "root" . "name" "rio-scheduler" "component" "scheduler") | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: rio-scheduler-lease
subjects:
  - kind: ServiceAccount
    name: rio-scheduler
    namespace: {{ $ns }}
{{- end }}

{{- if .Values.packedScheduler.enabled }}
---
# rio-packed second kube-scheduler RBAC (ADR-023 §13b). Upstream
# `system:kube-scheduler` + `system:volume-scheduler` ClusterRoles
# cover pods/bindings/nodes/PV/PVC/CSI; bind the rio-packed SA to
# both. Second-scheduler SAs aren't auto-bound (only the User
# `system:kube-scheduler` is) — without these the pod 403s on every
# watch.
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: rio-packed-scheduler
  labels:
    {{- include "rio.labels" (dict "root" . "name" "rio-packed-scheduler" "component" "scheduler") | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: system:kube-scheduler
subjects:
  - kind: ServiceAccount
    name: rio-packed-scheduler
    namespace: {{ $ns }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: rio-packed-volume-scheduler
  labels:
    {{- include "rio.labels" (dict "root" . "name" "rio-packed-scheduler" "component" "scheduler") | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: system:volume-scheduler
subjects:
  - kind: ServiceAccount
    name: rio-packed-scheduler
    namespace: {{ $ns }}
---
# kube-scheduler reads kube-system/extension-apiserver-authentication
# at startup (delegated authn config). The bootstrap Role exists in
# every cluster; bind our SA to it so the second scheduler doesn't
# log `unable to load configmap based request-header-client-ca-file`.
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: rio-packed-auth-reader
  namespace: kube-system
  labels:
    {{- include "rio.labels" (dict "root" . "name" "rio-packed-scheduler" "component" "scheduler") | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: extension-apiserver-authentication-reader
subjects:
  - kind: ServiceAccount
    name: rio-packed-scheduler
    namespace: {{ $ns }}
---
# Own Lease (`rio-packed` in {{ $ns }}). system:kube-scheduler only
# grants leases on resourceNames=[kube-scheduler] in kube-system; the
# KubeSchedulerConfiguration points leaderElection at {{ $ns }}/
# rio-packed instead so the two schedulers never contend.
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: rio-packed-lease
  namespace: {{ $ns }}
  labels:
    {{- include "rio.labels" (dict "root" . "name" "rio-packed-scheduler" "component" "scheduler") | nindent 4 }}
rules:
  - apiGroups: [coordination.k8s.io]
    resources: [leases]
    verbs: [create]
  - apiGroups: [coordination.k8s.io]
    resources: [leases]
    resourceNames: [rio-packed]
    verbs: [get, update]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: rio-packed-lease
  namespace: {{ $ns }}
  labels:
    {{- include "rio.labels" (dict "root" . "name" "rio-packed-scheduler" "component" "scheduler") | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: rio-packed-lease
subjects:
  - kind: ServiceAccount
    name: rio-packed-scheduler
    namespace: {{ $ns }}
{{- end }}
