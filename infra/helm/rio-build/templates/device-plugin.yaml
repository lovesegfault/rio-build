{{- if and .Values.devicePlugin.enabled (not .Values.karpenter.enabled) }}
{{- $dp := .Values.devicePlugin -}}
# smarter-device-manager: exposes /dev/fuse as an extended resource
# (smarter-devices/fuse) so builder pods request it via resources.limits
# instead of a hostPath volume.
#
# DaemonSet path is for k3s/kind ONLY (karpenter.enabled=false). On EKS
# the plugin runs as a Bottlerocket static pod via EC2NodeClass userData
# (see karpenter.yaml + _helpers.tpl rio.devicePluginPodManifest) —
# kubelet starts it at node boot, ~1-2s vs the ~5-15s DS schedule+pull+
# register latency. Same image, same conf.yaml (rio.devicePluginConf
# helper), same extended-resource semantics; only the delivery differs.
#
# Why this matters (ADR-012):
#   - hostPath /dev/fuse + hostUsers:false is INCOMPATIBLE — the kernel
#     rejects idmap mounts on device nodes ("failed to set MOUNT_ATTR_IDMAP
#     on /dev/fuse: invalid argument"). A device plugin injects /dev/fuse
#     into the container's device cgroup allowlist without a hostPath mount,
#     so hostUsers:false works.
#   - Without the device plugin, CAP_SYS_ADMIN alone is insufficient for
#     /dev/fuse access — the container's device cgroup doesn't include
#     major 10 minor 229 by default. The only alternative is privileged:true,
#     which contradicts the entire point of granular caps.
#
# DaemonSet runs on builder AND fetcher nodes (nodeAffinity In operator;
# both pool kinds request smarter-devices/fuse). The plugin registers
# with kubelet's device-plugin API; kubelet then
# advertises node.status.allocatable["smarter-devices/fuse"]=<nummaxdevices>.
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: rio-device-plugin-config
  namespace: {{ .Values.namespaces.builders.name }}
  labels:
    app.kubernetes.io/name: rio-device-plugin
    app.kubernetes.io/part-of: rio-build
data:
  # Regex against /dev/* entries. ^fuse$ matches exactly /dev/fuse (not
  # /dev/fuse0 or fuse-ctl). nummaxdevices is the per-node ceiling — each
  # worker pod requests 1. ^kvm$: present only on .metal instance types;
  # smarter-device-manager advertises 0 where /dev/kvm is absent. Body
  # comes from rio.devicePluginConf so the static-pod path (karpenter.yaml
  # userData) renders the identical list.
  conf.yaml: |
    {{- include "rio.devicePluginConf" . | nindent 4 }}
---
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: rio-device-plugin
  namespace: {{ .Values.namespaces.builders.name }}
  labels:
    app.kubernetes.io/name: rio-device-plugin
    app.kubernetes.io/part-of: rio-build
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: rio-device-plugin
  updateStrategy:
    type: RollingUpdate
  template:
    metadata:
      labels:
        app.kubernetes.io/name: rio-device-plugin
        app.kubernetes.io/part-of: rio-build
    spec:
      # priorityClassName system-node-critical: device plugins must be
      # running before builder pods can schedule (kubelet won't advertise
      # the extended resource until the plugin registers). Without this,
      # a node under memory pressure might evict the plugin → all workers
      # on that node become Unschedulable.
      priorityClassName: system-node-critical
      {{- with $dp.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with $dp.nodeAffinity }}
      affinity:
        nodeAffinity:
          {{- toYaml . | nindent 10 }}
      {{- end }}
      {{- with $dp.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: smarter-device-manager
          image: {{ $dp.image }}
          imagePullPolicy: {{ .Values.global.image.pullPolicy }}
          securityContext:
            # The plugin itself needs privileged to inspect /dev and
            # write to the kubelet device-plugin socket. This is the
            # one privileged pod per node; builder pods (the actual
            # attack surface — they run arbitrary build code) stay
            # unprivileged.
            privileged: true
            allowPrivilegeEscalation: true
          resources:
            requests:
              cpu: 10m
              memory: 16Mi
            limits:
              cpu: 100m
              memory: 32Mi
          volumeMounts:
            - name: device-plugin
              mountPath: /var/lib/kubelet/device-plugins
            - name: dev
              mountPath: /dev
            - name: config
              mountPath: /root/config
      volumes:
        - name: device-plugin
          hostPath:
            path: /var/lib/kubelet/device-plugins
        - name: dev
          hostPath:
            path: /dev
        - name: config
          configMap:
            name: rio-device-plugin-config
      # hostNetwork: the plugin only talks to kubelet via a unix socket
      # (/var/lib/kubelet/device-plugins/). It doesn't NEED pod
      # networking — but without hostNetwork, aws-cni assigns it a pod
      # IP from the (small) subnet. At 100-node burst that's 100 wasted
      # IPs and the DS pods themselves get stuck `failed to assign an
      # IP address to container` (I-079). hostNetwork skips CNI.
      hostNetwork: true
      terminationGracePeriodSeconds: 30
{{- end }}
