{{- /*
SeccompProfile CRs (security-profiles-operator).

The spod DaemonSet reconciles these to /var/lib/kubelet/seccomp/operator/
{name}.json on every node it runs on. Builder/fetcher pods reference
them via securityContext.seccompProfile.localhostProfile = operator/
rio-builder.json (see builderPoolDefaults.seccompProfile in values.yaml; the
fetcher path is hardcoded in rio-controller fetcherpool/mod.rs).

Source-of-truth is files/seccomp-rio-{builder,fetcher}.json. Those JSON
files carry "//" comment keys for human readability (provenance, why
each syscall is denied) — the OCI runtime spec ignores unknown keys but
the SeccompProfile CRD does NOT (strict schema). The toSeccompSpec
helper below picks ONLY the schema fields, dropping comments.

SeccompProfile is CLUSTER-scoped since SPO v0.9.0 (PR #2694). The
operator writes profiles to operator/{name}.json (no namespace path
component); status.localhostProfile reflects the actual on-disk path.

See docs/src/security.md r[worker.seccomp.localhost-profile].
*/}}
{{- define "rio.toSeccompSpec" -}}
{{- $j := . | fromJson -}}
defaultAction: {{ $j.defaultAction }}
architectures:
{{- range $j.architectures }}
  - {{ . }}
{{- end }}
syscalls:
{{- range $j.syscalls }}
  - action: {{ .action }}
    names:
    {{- range .names }}
      - {{ . }}
    {{- end }}
    {{- with .errnoRet }}
    errnoRet: {{ . }}
    {{- end }}
    {{- with .args }}
    args:
    {{- range . }}
      - index: {{ .index }}
        op: {{ .op }}
        {{- if hasKey . "value" }}
        value: {{ .value }}
        {{- end }}
        {{- if hasKey . "valueTwo" }}
        valueTwo: {{ .valueTwo }}
        {{- end }}
    {{- end }}
    {{- end }}
{{- end }}
{{- end -}}
{{- if .Values.securityProfilesOperator.enabled }}
{{- $spo := .Values.securityProfilesOperator -}}
---
apiVersion: security-profiles-operator.x-k8s.io/v1beta1
kind: SeccompProfile
metadata:
  name: rio-builder
  labels:
    {{- include "rio.labels" (dict "root" . "name" "rio-seccomp" "component" "worker") | nindent 4 }}
spec:
  {{- include "rio.toSeccompSpec" (.Files.Get "files/seccomp-rio-builder.json") | nindent 2 }}
---
apiVersion: security-profiles-operator.x-k8s.io/v1beta1
kind: SeccompProfile
metadata:
  name: rio-fetcher
  labels:
    {{- include "rio.labels" (dict "root" . "name" "rio-seccomp" "component" "worker") | nindent 4 }}
spec:
  {{- include "rio.toSeccompSpec" (.Files.Get "files/seccomp-rio-fetcher.json") | nindent 2 }}
{{- end }}
{{- /*
The `spod` SecurityProfilesOperatorDaemon CR is NOT managed by this
chart. The SPO operator creates a default `spod` instance on startup;
helm's ownership model can't adopt an operator-created resource without
annotation surgery.

EKS does not use SPO at all — the NixOS AMI bakes the profiles via
systemd-tmpfiles (nix/nixos-node/hardening.nix, ADR-021) and `xtask k8s
eks deploy` sets securityProfilesOperator.enabled=false +
controller.seccompPreinstalled=true. For non-EKS clusters that DO enable
SPO, spod scheduling constraints (tolerations/nodeAffinity to
builder/fetcher nodes) are the deployer's responsibility: patch the
operator-created `spod` CR via server-side-apply after the operator is
ready.
*/}}
