{{- if .Values.jwt.enabled }}
# ed25519 JWT signing seed — GATEWAY ONLY. Mounted into gateway pods;
# scheduler/store never see this (asymmetric: they get the pubkey via
# the ConfigMap below). 32 bytes from which ed25519-dalek derives the
# keypair (SigningKey::from_bytes). NOT a PKCS#8 DER blob — raw seed.
#
# jwt.signingSeed is base64-INPUT: operator provides the raw 32 bytes
# base64'd (`openssl rand -base64 32`), Helm's `b64enc` wraps that for
# Secret.data (double-b64 is correct: Secret.data is always b64, the
# operator input is itself already b64 because 32 raw bytes aren't
# YAML-safe). Gateway decodes BOTH layers: Secret mount gives the
# operator's b64 string, gateway base64-decodes to get 32 bytes.
apiVersion: v1
kind: Secret
metadata:
  name: rio-jwt-signing
  namespace: {{ .Values.namespace.name }}
  labels:
    {{- include "rio.labels" (dict "root" . "name" "rio-gateway" "component" "gateway") | nindent 4 }}
type: Opaque
data:
  ed25519_seed: {{ .Values.jwt.signingSeed | b64enc }}
{{- end }}
