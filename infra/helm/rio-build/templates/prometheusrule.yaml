{{- if .Values.monitoring.enabled }}
---
apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: rio-alerts
  namespace: {{ .Values.namespaces.system.name }}
  labels:
    {{- include "rio.labels" (dict "root" . "name" "rio-alerts" "component" "monitoring") | nindent 4 }}
spec:
  groups:
    - name: rio.rules
      rules:
        # I-139/I-140: dispatch tail latency was invisible — actor cmd p99
        # >1s means the single-threaded actor loop is backed up (mailbox
        # contention, slow reconcile_one, or a blocking await in the hot
        # path). 2m `for` filters single-tick GC pauses.
        - alert: RioSchedulerActorSlow
          expr: histogram_quantile(0.99, sum by (le) (rate(rio_scheduler_actor_cmd_seconds_bucket[2m]))) > 1
          for: 2m
          labels:
            severity: warning
          annotations:
            summary: scheduler actor p99 command latency >1s
            description: >-
              rio-scheduler actor loop p99 is {{`{{ $value | humanizeDuration }}`}}.
              The actor is single-threaded; sustained >1s means dispatch,
              heartbeat, and SubmitBuild are all queueing.

        # Any controller restart is notable — replicas=1, NOT leader-
        # elected. A restart is a 30s reconcile gap; >0 in 5m means it
        # crash-looped at least once.
        - alert: RioControllerRestarts
          expr: increase(kube_pod_container_status_restarts_total{container="controller"}[5m]) > 0
          for: 0m
          labels:
            severity: warning
          annotations:
            summary: rio-controller restarted
            description: >-
              rio-controller container restarted
              {{`{{ $value | humanize }}`}} time(s) in the last 5m.

        # I-095/I-097 ghost-dispatch shape: workers registered but not
        # running anything. workers_active counts heartbeating executors;
        # derivations_running counts in-flight builds. A sustained gap
        # >50 means dispatch is starved (closed-channel ghosts, system/kind
        # mismatch, or the actor is wedged — cross-ref RioSchedulerActorSlow).
        - alert: RioDispatchStarved
          expr: rio_scheduler_workers_active - rio_scheduler_derivations_running > 50
          for: 5m
          labels:
            severity: warning
          annotations:
            summary: ">50 idle executors with work queued"
            description: >-
              {{`{{ $value | humanize }}`}} executors are heartbeating but
              idle for 5m. Check system/kind routing and ghost-executor
              accumulation.

        # ADR-023 §13b: kube-build-scheduler second kube-scheduler.
        # Builder pods set `schedulerName: kube-build-scheduler`; if
        # THIS scheduler's active queue is non-empty for 60s, builder
        # pods are stuck Pending (kube-build-scheduler crashlooped,
        # RBAC drift, or NodeClaim deficit cover stalled). The default
        # kube-scheduler ignores kube-build-scheduler pods so they stay
        # Pending forever — page-worthy.
        - alert: KubeBuildSchedulerPendingStuck
          # Upstream `scheduler_pending_pods` is labeled by `queue` only
          # (process-global SchedulingQueue, not per-profile). Select by
          # the ServiceMonitor's `job` label instead.
          expr: scheduler_pending_pods{queue="active",job="kube-build-scheduler"} > 0
          for: 60s
          labels:
            severity: warning
          annotations:
            summary: kube-build-scheduler has pods stuck Pending
            description: >-
              {{`{{ $value | humanize }}`}} builder pod(s) are in the
              kube-build-scheduler active queue for >60s. Check
              kube-build-scheduler pod health and nodeclaim_pool
              reconciler deficit cover.

        # ADR-023 §Observability: prediction_ratio = actual/predicted
        # (dim=wall|mem; 1.0=perfect). Sustained p50 outside [0.5, 2.0]
        # means the model is systematically off by 2× — fits are stale,
        # hw_perf_factors drifted, or a hot pname's curve regressed.
        # `sla explain <pname>` to inspect; `sla reset <pname>` to refit.
        - alert: RioSlaPredictionDrift
          expr: |
            histogram_quantile(0.5, sum by (le, dim) (rate(rio_scheduler_sla_prediction_ratio_bucket[15m]))) > 2.0
              or
            histogram_quantile(0.5, sum by (le, dim) (rate(rio_scheduler_sla_prediction_ratio_bucket[15m]))) < 0.5
          for: 15m
          labels:
            severity: warning
          annotations:
            summary: "SLA prediction p50 off by >2× ({{`{{ $labels.dim }}`}})"
            description: >-
              rio_scheduler_sla_prediction_ratio p50 for dim={{`{{ $labels.dim }}`}}
              is {{`{{ $value | humanize }}`}} (1.0=perfect). Model is
              systematically over/under-predicting. Run `rio-cli sla status`
              and `sla explain` on the top pnames; `sla reset` to refit.

        # ADR-023 §Observability: prior_divergence = fleet-median prior
        # parameter ÷ operator-probe basis (labeled `param`). The gauge
        # is set unconditionally every refit; outside [0.5, 2.0] the
        # value is clamped to the band edge (prior.rs `clamp_field`), so
        # ≥2.0 or ≤0.5 ⇔ clamped. Sustained clamp means the [sla].probe
        # operator basis has drifted from what the fleet is actually
        # building — re-probe or widen the band.
        - alert: RioSlaPriorDivergenceClamped
          expr: |
            max by (param) (rio_scheduler_sla_prior_divergence) >= 2.0
              or
            min by (param) (rio_scheduler_sla_prior_divergence) <= 0.5
          for: 10m
          labels:
            severity: warning
          annotations:
            summary: "SLA prior parameter clamped ({{`{{ $labels.param }}`}})"
            description: >-
              rio_scheduler_sla_prior_divergence{param={{`{{ $labels.param }}`}}}
              is {{`{{ $value | humanize }}`}} (clamp band [0.5, 2.0]).
              Fleet-median prior has diverged from the operator-probe
              basis. Check `[sla].probe` config vs `rio-cli sla status`.

        # ADR-023 §Observability: age of the hw-band $/vCPU·hr snapshot.
        # Spot poller refreshes every 600s (cost.rs POLL_INTERVAL_SECS);
        # at 6× (3600s) cost.rs itself clamps price_ratio to the helm
        # seed and emits _hw_cost_fallback_total{reason=stale}. Alert at
        # 3× (1800s) so the operator sees the poller failing BEFORE the
        # cost-ranking degrades. Not emitted under hwCostSource=static
        # (no live source) so this is a no-op in vmtest-full.
        - alert: RioSlaHwCostStale
          expr: rio_scheduler_sla_hw_cost_stale_seconds > 1800
          for: 5m
          labels:
            severity: warning
          annotations:
            summary: "SLA hw-cost snapshot stale >30m"
            description: >-
              hw-band $/vCPU·hr snapshot is
              {{`{{ $value | humanizeDuration }}`}} old (poller tick=10m;
              auto-clamp at 60m). Check scheduler leader-lease and
              ec2:DescribeSpotPriceHistory IRSA; see
              rio_scheduler_sla_hw_cost_fallback_total{reason}.

        # ADR-023 §13b: ≥3 distinct cells reaping for `reason=ice`
        # (Launched=False — InsufficientCapacity / quota / unfulfillable
        # instance-type). One cell ICE is routine spot churn; ≥3
        # concurrently means an AZ/quota/AMI-tag problem and the
        # admissible-set is shrinking toward `_hw_ladder_exhausted`.
        - alert: RioNodeclaimPoolIceMaskedHigh
          # Both ICE-mask paths feed `report_unfulfillable`: `classify`
          # emits reason=ice; `detect_vanished` (Karpenter ~1s GC outpaces
          # the 10s tick) emits reason=vanished. Match both.
          expr: count(sum by (cell) (rate(rio_controller_nodeclaim_reaped_total{reason=~"ice|vanished"}[5m])) > 0) >= 3
          for: 5m
          labels:
            severity: warning
          annotations:
            summary: "≥3 hw-class cells ICE-masked"
            description: >-
              {{`{{ $value | humanize }}`}} (hw_class,cap) cells are
              reaping NodeClaims for reason=ice. Check Karpenter
              controller logs for InsufficientInstanceCapacity / quota,
              and `rio_scheduler_sla_hw_ladder_exhausted_total`.

        # ADR-023 §13b/§13c: oldest in-flight NodeClaim (created, not
        # Registered) older than 3× the cell's expected boot time.
        # Per-cell threshold (r33 bug_001): a single hardcoded `> 90`
        # was calibrated for the EBS band (leadTimeSeed 17-21s) and
        # false-fires for the entire 7-15min metal boot once §13c adds
        # `metal-*:od` leadTimeSeed=600. Both gauges are emitted with
        # `cell` from the same loop in `emit_live_gauges`
        # (rio-controller nodeclaim_pool/mod.rs), so the join cannot
        # drop a series. `clamp(.., 90, 1800)`: the 90s floor preserves
        # the EBS band's behaviour (lead≈18s → 3×=54s would false-fire
        # on autoscaler queueing tail) AND covers the unseeded cell
        # where lead reads 0 (3×0=0 → 90); the 1800s cap stops an
        # absurd seed from disarming the alert. Sits above the
        # controller's own 2×seed reap timeout (health.rs) — a healthy
        # boot or a successful reap clears the gauge before the alert
        # window; a firing alert means the reaper itself failed.
        # Keys on per-cell max age, NOT count: under sustained scale-up
        # the inflight count never touches 0 even when every individual
        # claim registers in ~18s, so a count-based `for` fires on
        # every healthy burst. Either Launched=False (ICE — see
        # reaped{reason=ice|vanished}) or Launched=True but kubelet never
        # joined (AMI/nodeadm/CNI break).
        - alert: RioNodeclaimPoolStuckPending
          expr: |
            rio_controller_nodeclaim_inflight_age_max_seconds
              > clamp(3 * rio_controller_nodeclaim_lead_time_seconds, 90, 1800)
          for: 30s
          labels:
            severity: warning
          annotations:
            summary: "NodeClaim stuck pre-Registered ({{`{{ $labels.cell }}`}})"
            description: >-
              cell={{`{{ $labels.cell }}`}} has a NodeClaim
              {{`{{ $value | humanizeDuration }}`}} past creation without
              Registered=True (threshold: 3× the cell's lead-time gauge,
              floor 90s, cap 30m). Check `kubectl get nodeclaims`
              Launched/Registered conditions and
              rio_controller_nodeclaim_reaped_total{reason=ice|boot-timeout|vanished}.

        # Forward-compat: rio_store_putpath_retries_total lands in P0539d.
        # Until then this expr evaluates empty (no series) → never fires.
        # >10/s sustained means S3/PG backpressure or the chunk-dedup
        # CAS loop is thrashing.
        - alert: RioStorePutPathRetries
          expr: rate(rio_store_putpath_retries_total[1m]) > 10
          for: 2m
          labels:
            severity: warning
          annotations:
            summary: rio-store PutPath retrying >10/s
            description: >-
              PutPath retry rate is {{`{{ $value | humanize }}`}}/s.
              Check S3 5xx rate and PG connection-pool saturation.
{{- end }}
