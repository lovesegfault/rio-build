{{- if .Values.controller.enabled }}
{{- $c := .Values.controller -}}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: rio-controller
  namespace: {{ .Values.namespace.name }}
  labels:
    {{- include "rio.labels" (dict "root" . "name" "rio-controller" "component" "controller") | nindent 4 }}
spec:
  # HARD replicas=1. NOT leader-elected. Two controllers fight — both
  # spawn Jobs for the same queue depth, doubling pods. kube-runtime
  # handles concurrent reconcile within one process but not across
  # processes. 30s reschedule gap during pod restart is acceptable.
  replicas: 1
  selector:
    matchLabels:
      {{- include "rio.selectorLabels" "rio-controller" | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "rio.labels" (dict "root" . "name" "rio-controller" "component" "controller") | nindent 8 }}
    spec:
      serviceAccountName: rio-controller
      {{- if $c.hostNetwork }}
      # VM-test concession: CoreDNS doesn't know NixOS-test VM hostnames.
      # hostNetwork → pod uses node's /etc/hosts. Production never sets this.
      hostNetwork: true
      dnsPolicy: ClusterFirstWithHostNet
      {{- end }}
      {{- include "rio.podSecurityContext" . | nindent 6 }}
      containers:
        - name: controller
          image: {{ include "rio.image" (list . $c.image) }}
          imagePullPolicy: {{ .Values.global.image.pullPolicy }}
          {{- include "rio.containerSecurityContext" . | nindent 10 }}
          {{- with $c.command }}
          command: {{ toJson . }}
          {{- end }}
          ports:
            - name: metrics
              containerPort: 9094
            - name: health
              containerPort: 9194
          env:
            {{- include "rio.rustLogEnv" . | nindent 12 }}
            {{- include "rio.covEnv" . | nindent 12 }}
            - name: RIO_SCHEDULER_ADDR
              value: {{ $c.schedulerAddr | quote }}
            - name: RIO_STORE_ADDR
              value: {{ $c.storeAddr | quote }}
            {{- if $c.schedulerBalanceHost }}
            # Passed through to builder pods. Workers DNS-resolve the headless
            # Service, health-probe pod IPs, route to leader. Unset → workers
            # fall back to single-channel.
            - name: RIO_SCHEDULER_BALANCE_HOST
              value: {{ $c.schedulerBalanceHost | quote }}
            - name: RIO_SCHEDULER_BALANCE_PORT
              value: {{ $c.schedulerBalancePort | quote }}
            {{- end }}
            {{- if $c.storeBalanceHost }}
            # Same balance pattern for rio-store, but for load
            # distribution across replicas (no leader/standby).
            - name: RIO_STORE_BALANCE_HOST
              value: {{ $c.storeBalanceHost | quote }}
            - name: RIO_STORE_BALANCE_PORT
              value: {{ $c.storeBalancePort | quote }}
            {{- end }}
            {{- if $c.seccompPreinstalled }}
            - name: RIO_SECCOMP_PREINSTALLED
              value: "true"
            {{- end }}
            {{- include "rio.tlsEnv" . | nindent 12 }}
            {{- with $c.extraEnv }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          {{- if or .Values.tls.enabled .Values.coverage.enabled }}
          volumeMounts:
            {{- include "rio.tlsVolumeMount" . | nindent 12 }}
            {{- include "rio.covVolumeMount" . | nindent 12 }}
          {{- end }}
          # /healthz serves 200 once kube client + scheduler admin client
          # connected. Controller that can't watch CRDs is useless → NotReady
          # is correct. Already plaintext HTTP — no TLS retarget needed.
          readinessProbe:
            httpGet: {path: /healthz, port: health}
            periodSeconds: 5
          livenessProbe:
            httpGet: {path: /healthz, port: health}
            periodSeconds: 10
            failureThreshold: 3
          resources:
            {{- toYaml $c.resources | nindent 12 }}
      {{- if or .Values.tls.enabled .Values.coverage.enabled }}
      volumes:
        {{- include "rio.tlsVolume" (dict "root" . "name" "rio-controller-tls") | nindent 8 }}
        {{- include "rio.covVolume" . | nindent 8 }}
      {{- end }}
{{- end }}
