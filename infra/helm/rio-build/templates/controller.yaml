{{- /* Named template so the ConfigMap body and the checksum annotation
       hash the SAME rendered string. bug_022: hashing a hand-maintained
       list of input keys (`.scheduler.sla`, `.karpenter.nodeclaimPool`)
       missed `poolDefaults.fuseCacheBytes` + `karpenter.metalSizes` —
       the ConfigMap re-rendered, the (subPath-mounted) pod did not roll.
       `define` must be at top level (not inside `if`). */}}
{{- define "rio.controllerToml" -}}
{{- with .Values.scheduler.sla -}}
[nodeclaim_pool]
lease_name = {{ $.Values.karpenter.nodeclaimPool.leaseName | default "rio-controller-nodeclaim-pool" | quote }}
node_class_ref = {{ .nodeClassRef | default "rio-default" | quote }}
reference_hw_class = {{ .referenceHwClass | quote }}
max_fleet_cores = {{ int64 .maxFleetCores }}
max_node_claims_per_cell_per_tick = {{ int64 .maxNodeClaimsPerCellPerTick }}
max_lead_time = {{ printf "%.1f" (float64 .maxLeadTime) }}
max_node_cores = {{ int64 .maxCores }}
fuse_cache_bytes = {{ int64 $.Values.poolDefaults.fuseCacheBytes }}
metal_sizes = {{ toJson $.Values.karpenter.metalSizes }}
{{- with .maxConsolidationTime }}
max_consolidation_time = {{ printf "%.1f" (float64 .) }}
{{- end }}
{{- with .leadTimeSeed }}

[nodeclaim_pool.lead_time_seed]
{{- range $cell, $v := . }}
{{ $cell | quote }} = {{ printf "%.1f" (float64 $v) }}
{{- end }}
{{- end }}
{{- end }}
{{- end }}
{{- if .Values.controller.enabled }}
{{- $c := .Values.controller -}}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: rio-controller
  namespace: {{ .Values.namespaces.system.name }}
  labels:
    {{- include "rio.labels" (dict "root" . "name" "rio-controller" "component" "controller") | nindent 4 }}
spec:
  # HARD replicas=1. NOT leader-elected. Two controllers fight — both
  # spawn Jobs for the same queue depth, doubling pods. kube-runtime
  # handles concurrent reconcile within one process but not across
  # processes. 30s reschedule gap during pod restart is acceptable.
  replicas: 1
  selector:
    matchLabels:
      {{- include "rio.selectorLabels" "rio-controller" | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "rio.labels" (dict "root" . "name" "rio-controller" "component" "controller") | nindent 8 }}
      annotations:
        # Controller reads /etc/rio/controller.toml once at boot; subPath
        # mounts don't live-update. Hash the RENDERED body (not a key
        # list — that drifts) so any input that lands in the TOML rolls
        # the pod. helm/16-controller-checksum-covers-toml.sh enforces.
        checksum/controller-toml: {{ include "rio.controllerToml" . | sha256sum }}
    spec:
      serviceAccountName: rio-controller
      {{- if .Values.karpenter.enabled }}
      nodeSelector:
        rio.build/node-role: general
      {{- end }}
      {{- if $c.hostNetwork }}
      # VM-test concession: CoreDNS doesn't know NixOS-test VM hostnames.
      # hostNetwork → pod uses node's /etc/hosts. Production never sets this.
      hostNetwork: true
      dnsPolicy: ClusterFirstWithHostNet
      {{- end }}
      {{- include "rio.podSecurityContext" . | nindent 6 }}
      containers:
        - name: controller
          image: {{ include "rio.image" (list . $c.image) }}
          imagePullPolicy: {{ .Values.global.image.pullPolicy }}
          {{- include "rio.containerSecurityContext" . | nindent 10 }}
          ports:
            - name: metrics
              containerPort: 9094
            - name: health
              containerPort: 9194
          env:
            {{- include "rio.rustLogEnv" . | nindent 12 }}
            {{- include "rio.mounts" (dict "root" . "form" "env" "want" (list "cov" "serviceHmac")) | nindent 12 }}
            - name: RIO_SCHEDULER__ADDR
              value: {{ $c.schedulerAddr | quote }}
            - name: RIO_STORE__ADDR
              value: {{ $c.storeAddr | quote }}
            {{- if $c.schedulerBalanceHost }}
            # Passed through to builder pods. Workers DNS-resolve the headless
            # Service, health-probe pod IPs, route to leader. Unset → workers
            # fall back to single-channel.
            - name: RIO_SCHEDULER__BALANCE_HOST
              value: {{ $c.schedulerBalanceHost | quote }}
            - name: RIO_SCHEDULER__BALANCE_PORT
              value: {{ $c.schedulerBalancePort | quote }}
            {{- end }}
            {{- if $c.storeBalanceHost }}
            # Same balance pattern for rio-store, but for load
            # distribution across replicas (no leader/standby).
            - name: RIO_STORE__BALANCE_HOST
              value: {{ $c.storeBalanceHost | quote }}
            - name: RIO_STORE__BALANCE_PORT
              value: {{ $c.storeBalancePort | quote }}
            {{- end }}
            {{- with .Values.scheduler.sla }}
            # ADR-023 §13a hw-bench gate: same floor as the scheduler's
            # `[sla].hw_bench_mem_floor` so the controller's create-time
            # `rio.build/hw-bench-needed` decision and the scheduler's
            # threat-model assumption never diverge.
            - name: RIO_HW_BENCH_MEM_FLOOR
              value: {{ int64 .hwBenchMemFloor | quote }}
            {{- end }}
            # database_url stays env (Secret-sourced; never lands in the
            # ConfigMap-rendered TOML). lease_namespace via downward API
            # so the chart isn't namespace-pinned.
            - name: RIO_NODECLAIM_POOL__DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: rio-postgres
                  key: url
            - name: RIO_NODECLAIM_POOL__LEASE_NAMESPACE
              valueFrom:
                fieldRef: {fieldPath: metadata.namespace}
            {{- with $c.extraEnv }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          volumeMounts:
            {{- include "rio.mounts" (dict "root" . "form" "mount" "want" (list "cov" "serviceHmac")) | nindent 12 }}
            # rio_common::config::load reads /etc/rio/controller.toml. The
            # ConfigMap carries [nodeclaim_pool] (lead_time_seed is a
            # nested map — figment's Env provider only yields strings, so
            # it MUST come from TOML). subPath: serviceHmac mounts at
            # /etc/rio/service-hmac; whole-dir CM mount would shadow it.
            # checksum annotation rolls the pod on CM change.
            - name: config
              mountPath: /etc/rio/controller.toml
              subPath: controller.toml
              readOnly: true
          # /healthz: unconditional 200 (process alive + tokio
          # responsive) — bound BEFORE connect_forever so liveness
          # passes during scheduler cold-start. /readyz: 503 until
          # scheduler admin client connected. Already plaintext HTTP —
          # no TLS retarget needed.
          readinessProbe:
            httpGet: {path: /readyz, port: health}
            periodSeconds: 5
          livenessProbe:
            httpGet: {path: /healthz, port: health}
            periodSeconds: 10
            failureThreshold: 3
          resources:
            {{- toYaml $c.resources | nindent 12 }}
      volumes:
        {{- include "rio.mounts" (dict "root" . "form" "volume" "want" (list "cov" "serviceHmac")) | nindent 8 }}
        - name: config
          configMap:
            name: rio-controller-config
---
# Mounted at /etc/rio/controller.toml. figment merges this UNDER env (RIO_*
# wins for scalars). The [nodeclaim_pool] table is the ONLY way to
# populate lead_time_seed: figment's Env provider yields bare strings, so
# a `HashMap<String, f64>` field cannot load from env. Scalars duplicate
# the scheduler's `[sla]` rendering (single source: `.Values.scheduler.
# sla`) so the controller's deficit-cover caps and the scheduler's
# solve_intent ceilings never diverge. database_url stays env
# (Secret-sourced).
apiVersion: v1
kind: ConfigMap
metadata:
  name: rio-controller-config
  namespace: {{ .Values.namespaces.system.name }}
  labels:
    {{- include "rio.labels" (dict "root" . "name" "rio-controller" "component" "controller") | nindent 4 }}
data:
  controller.toml: |
    {{- include "rio.controllerToml" . | nindent 4 }}
{{- end }}
