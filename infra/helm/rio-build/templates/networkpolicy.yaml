{{- if .Values.networkPolicy.enabled }}
{{- $ns := .Values.namespaces -}}
# Defense in depth. Compromised executor (malicious .drv through the
# sandbox, or sandbox escape) should only reach rio-scheduler and
# rio-store — not exfil, not cloud metadata, not K8s apiserver.
#
# ADR-019 four-namespace split: builders are airgapped (DNS + scheduler
# + store only). Fetchers get world:80,443 minus cluster/link-local —
# the FOD hash check at verify_fod_hashes() is the integrity boundary.
#
# CiliumNetworkPolicy (cilium.io/v2), not networking.k8s.io/v1. The k8s
# NetworkPolicy semantics broke under Cilium: `ipBlock` rules match
# CIDR-as-world only — they do NOT match in-cluster endpoints (pods,
# nodes, apiserver) which Cilium identifies by identity, not IP. The
# old controller-egress `ipBlock: 10.0.0.0/8` (meant to allow
# apiserver) and store-egress `ipBlock: 10.0.0.0/8 port 5432` (meant
# to allow in-cluster postgres) matched nothing under Cilium →
# CrashLoopBackOff. CNP's `toEntities` and `toEndpoints` are the
# identity-aware equivalents.
#
# ONE policy per selector — Cilium merges additively like k8s NP.
---
# r[impl builder.netpol.airgap]
# r[impl builder.netpol.deny-kube-api]
#
# Builder egress: DNS, scheduler, store. AIRGAPPED per ADR-019 — no
# internet egress, no kube-apiserver. FODs route to FetcherPool
# (separate policy below). NO `toEntities: [kube-apiserver]` and no
# world rule → both DENIED (default-deny on policed endpoints). The
# kube-apiserver deny is the load-bearing isolation: a sandbox-escaped
# builder cannot read Secrets, list pods, or escalate via RBAC.
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: builder-egress
  namespace: {{ $ns.builders.name }}
  labels:
    app.kubernetes.io/part-of: rio-build
spec:
  # Matches pods created by BuilderPool reconciler — the Job pod-spec
  # builder sets rio.build/role (common/pod.rs ROLE_LABEL).
  endpointSelector:
    matchLabels:
      rio.build/role: builder
  egress:
    # CoreDNS. L4-only (port 53 allow); the L7 DNS-proxy rule
    # (`rules: dns:`) is omitted — it would give Hubble DNS visibility
    # and enable toFQDNs, but requires the Cilium DNS proxy to be
    # functional which adds a moving part. toFQDNs (store-egress-
    # upstream) is gated on .Values.store.upstreamCaches and re-adds
    # the L7 rule when actually needed.
    - toEndpoints:
        - matchLabels:
            k8s:io.kubernetes.pod.namespace: kube-system
            k8s:k8s-app: kube-dns
      toPorts:
        - ports:
            - {port: "53", protocol: UDP}
            - {port: "53", protocol: TCP}
    # Scheduler: Heartbeat/BuildExecution. Cross-ns endpoint match via
    # the auto-injected k8s:io.kubernetes.pod.namespace label.
    - toEndpoints:
        - matchLabels:
            k8s:io.kubernetes.pod.namespace: {{ $ns.system.name }}
            k8s:app.kubernetes.io/name: rio-scheduler
      toPorts: [{ports: [{port: "9001", protocol: TCP}]}]
    # Store: GetPath inputs, PutPath outputs.
    - toEndpoints:
        - matchLabels:
            k8s:io.kubernetes.pod.namespace: {{ $ns.store.name }}
            k8s:app.kubernetes.io/name: rio-store
      toPorts: [{ports: [{port: "9002", protocol: TCP}]}]
    {{- with .Values.networkPolicy.builderS3Cidr }}
    # S3 VPC endpoint CIDR — builder reads chunks via presigned URL.
    # toCIDR (not toEndpoints) — S3 endpoint is outside the cluster.
    - toCIDR: [{{ . | quote }}]
      toPorts: [{ports: [{port: "443", protocol: TCP}]}]
    {{- end }}
---
# r[impl fetcher.netpol.egress-open]
#
# Fetcher egress: same three as builder PLUS world:80,443. Fetchers run
# FODs only (scheduler hard_filter routes by ExecutorKind); the FOD
# outputHash check is the integrity boundary. `toEntities: [world]`
# matches any IP NOT known to Cilium as a cluster identity — so it
# inherently EXCLUDES pod/service/node IPs and the link-local range
# (no manual `except:` carve-out needed; Cilium's identity model does
# it). IMDS (169.254.169.254 / fd00:ec2::254) is host-local → covered
# by the `host` entity, NOT `world` → DENIED.
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: fetcher-egress
  namespace: {{ $ns.fetchers.name }}
  labels:
    app.kubernetes.io/part-of: rio-build
spec:
  endpointSelector:
    matchLabels:
      rio.build/role: fetcher
  egress:
    - toEndpoints:
        - matchLabels:
            k8s:io.kubernetes.pod.namespace: kube-system
            k8s:k8s-app: kube-dns
      toPorts:
        - ports:
            - {port: "53", protocol: UDP}
            - {port: "53", protocol: TCP}
    - toEndpoints:
        - matchLabels:
            k8s:io.kubernetes.pod.namespace: {{ $ns.system.name }}
            k8s:app.kubernetes.io/name: rio-scheduler
      toPorts: [{ports: [{port: "9001", protocol: TCP}]}]
    - toEndpoints:
        - matchLabels:
            k8s:io.kubernetes.pod.namespace: {{ $ns.store.name }}
            k8s:app.kubernetes.io/name: rio-store
      toPorts: [{ports: [{port: "9002", protocol: TCP}]}]
    # Public internet on 80/443. `world` entity = any non-cluster IP.
    - toEntities: [world]
      toPorts:
        - ports:
            - {port: "80", protocol: TCP}
            - {port: "443", protocol: TCP}
---
# Controller egress: DNS + kube-apiserver. The controller's ONLY
# upstream is the k8s API (watch/patch CRs across namespaces). The old
# k8s-NP `ipBlock: 10.0.0.0/8` was a workaround for apiserver-isn't-a-
# pod; CNP's `kube-apiserver` entity is the direct expression. No
# RFC1918 CIDR needed.
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: rio-controller-egress
  namespace: {{ $ns.system.name }}
  labels:
    app.kubernetes.io/part-of: rio-build
spec:
  endpointSelector:
    matchLabels:
      app.kubernetes.io/name: rio-controller
  egress:
    - toEndpoints:
        - matchLabels:
            k8s:io.kubernetes.pod.namespace: kube-system
            k8s:k8s-app: kube-dns
      toPorts:
        - ports:
            - {port: "53", protocol: UDP}
            - {port: "53", protocol: TCP}
    # kube-apiserver entity covers managed-k8s where the apiserver is
    # outside the cluster. In k3s/embedded-apiserver, the apiserver
    # runs on a cluster node and is classified as `host`/`remote-node`
    # instead. Both are listed so the rule works in either topology.
    - toEntities: [kube-apiserver, host, remote-node]
    # Scheduler (ClusterStatus/DrainExecutor admin RPCs) + store (GC
    # tick connects to StoreAdminService). The old k8s-NP RFC1918
    # ipBlock incidentally matched these (ClusterIPs in 10/8); CNP
    # toCIDR does not match in-cluster endpoints.
    - toEndpoints:
        - matchLabels: {app.kubernetes.io/name: rio-scheduler}
      toPorts: [{ports: [{port: "9001", protocol: TCP}]}]
    - toEndpoints:
        - matchLabels:
            k8s:io.kubernetes.pod.namespace: {{ $ns.store.name }}
            k8s:app.kubernetes.io/name: rio-store
      toPorts: [{ports: [{port: "9002", protocol: TCP}]}]
---
# Scheduler ingress: gRPC from rio components + health/metrics from
# host (kubelet probes, Prometheus). `host`/`remote-node` entities
# cover kubelet (host-network) without an ipBlock for the node CIDR.
# The Cilium per-Gateway envoy (dashboard route) lives in the Gateway's
# namespace ({{ $ns.system.name }}) under label `gateway.networking.
# k8s.io/gateway-name: rio-dashboard` — same-ns so no namespace label
# needed in its matchLabels.
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: scheduler-ingress
  namespace: {{ $ns.system.name }}
  labels:
    app.kubernetes.io/part-of: rio-build
spec:
  endpointSelector:
    matchLabels:
      app.kubernetes.io/name: rio-scheduler
  ingress:
    - fromEndpoints:
        - matchLabels: {app.kubernetes.io/name: rio-gateway}
        - matchLabels: {app.kubernetes.io/name: rio-controller}
        - matchLabels: {gateway.networking.k8s.io/gateway-name: rio-dashboard}
        - matchLabels:
            k8s:io.kubernetes.pod.namespace: {{ $ns.builders.name }}
        - matchLabels:
            k8s:io.kubernetes.pod.namespace: {{ $ns.fetchers.name }}
      toPorts: [{ports: [{port: "9001", protocol: TCP}]}]
    # Metrics: Prometheus scrape from host-network kubelet.
    # `cluster` covers apiserver pods/proxy (kubectl get --raw).
    - fromEntities: [host, remote-node, cluster]
      toPorts:
        - ports:
            - {port: "9091", protocol: TCP}
---
# Store ingress: GetPath/PutPath/FindMissingPaths from rio components
# across three namespaces.
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: store-ingress
  namespace: {{ $ns.store.name }}
  labels:
    app.kubernetes.io/part-of: rio-build
spec:
  endpointSelector:
    matchLabels:
      app.kubernetes.io/name: rio-store
  ingress:
    - fromEndpoints:
        - matchLabels:
            k8s:io.kubernetes.pod.namespace: {{ $ns.system.name }}
        - matchLabels:
            k8s:io.kubernetes.pod.namespace: {{ $ns.builders.name }}
        - matchLabels:
            k8s:io.kubernetes.pod.namespace: {{ $ns.fetchers.name }}
      toPorts: [{ports: [{port: "9002", protocol: TCP}]}]
    - fromEntities: [host, remote-node, cluster]
      toPorts:
        - ports:
            - {port: "9092", protocol: TCP}
---
# r[impl store.netpol.egress]
#
# Store egress: DNS + postgres + S3 VPC endpoint. The store holds S3
# creds + postgres creds — a compromised store should NOT reach IMDS
# or arbitrary public IPs. No `world` rule, no `kube-apiserver` entity
# → both DENIED.
#
# Postgres reachability needs BOTH selector forms: in-cluster PG (VM
# tests, dev) is a pod with a Cilium identity → `toEndpoints` matches
# it; external PG (RDS, CloudSQL) is a VPC IP outside the cluster →
# `toCIDRSet` matches it. The old k8s-NP used only ipBlock which
# matched RDS but NOT the in-cluster pod under Cilium (CIDR-as-world).
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: store-egress
  namespace: {{ $ns.store.name }}
  labels:
    app.kubernetes.io/part-of: rio-build
spec:
  endpointSelector:
    matchLabels:
      app.kubernetes.io/name: rio-store
  egress:
    - toEndpoints:
        - matchLabels:
            k8s:io.kubernetes.pod.namespace: kube-system
            k8s:k8s-app: kube-dns
      toPorts:
        - ports:
            - {port: "53", protocol: UDP}
            - {port: "53", protocol: TCP}
    # In-cluster postgres (bitnami chart, VM tests / dev). Subchart
    # deploys into the helm release namespace (system), not store.
    - toEndpoints:
        - matchLabels:
            k8s:io.kubernetes.pod.namespace: {{ $ns.system.name }}
            k8s:app.kubernetes.io/name: postgresql
      toPorts: [{ports: [{port: "5432", protocol: TCP}]}]
    # External postgres (RDS / CloudSQL) — RFC1918 + ULA. These are
    # outside the cluster so toCIDRSet matches as `world` subspace.
    - toCIDRSet:
        - {cidr: 10.0.0.0/8}
        - {cidr: 172.16.0.0/12}
        - {cidr: 192.168.0.0/16}
        - {cidr: fc00::/7}
      toPorts: [{ports: [{port: "5432", protocol: TCP}]}]
    {{- with .Values.networkPolicy.storeS3Cidr }}
    # S3 VPC endpoint CIDR — store writes chunks directly.
    - toCIDR: [{{ . | quote }}]
      toPorts: [{ports: [{port: "443", protocol: TCP}]}]
    {{- end }}
{{- if .Values.store.upstreamCaches }}
---
# r[impl store.substitute.upstream]
#
# Store egress allowlist for upstream binary caches. CNP `toFQDNs`
# replaces the operator-maintained CIDR list — Cilium DNS-proxies the
# lookups (the DNS rule above) and tracks IP→FQDN, so the policy
# matches by hostname. The old k8s-NP comment "upgrade path is a CNI
# with FQDN-aware policies" — this is that upgrade.
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: store-egress-upstream
  namespace: {{ $ns.store.name }}
  labels:
    app.kubernetes.io/part-of: rio-build
spec:
  endpointSelector:
    matchLabels:
      app.kubernetes.io/name: rio-store
  egress:
    # toFQDNs requires the L7 DNS proxy so Cilium can map IP→FQDN.
    # This is the ONLY policy that needs it — re-add the rules:dns
    # block here (the base store-egress DNS rule above is L4-only).
    - toEndpoints:
        - matchLabels:
            k8s:io.kubernetes.pod.namespace: kube-system
            k8s:k8s-app: kube-dns
      toPorts:
        - ports:
            - {port: "53", protocol: UDP}
            - {port: "53", protocol: TCP}
          rules:
            dns:
              {{- range .Values.store.upstreamCaches }}
              - matchName: {{ .host | quote }}
              {{- end }}
    - toFQDNs:
        {{- range .Values.store.upstreamCaches }}
        - matchName: {{ .host | quote }}
        {{- end }}
      toPorts: [{ports: [{port: "443", protocol: TCP}]}]
{{- end }}
{{- if .Values.dashboard.enabled }}
---
# Dashboard egress: DNS + the Cilium per-Gateway envoy. nginx proxies
# /rio.* to the Gateway's listener; Cilium's envoy forwards to
# rio-scheduler (same-ns, plaintext-over-WireGuard). The dashboard pod
# never talks to scheduler directly — a compromised SPA container
# can't speak gRPC to anything. Cilium creates the envoy Deployment in
# the Gateway's OWN namespace with label `gateway.networking.k8s.io/
# gateway-name: <name>` — same-ns, so no cross-ns selector needed.
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: rio-dashboard-egress
  namespace: {{ $ns.system.name }}
  labels:
    app.kubernetes.io/part-of: rio-build
spec:
  endpointSelector:
    matchLabels:
      app.kubernetes.io/name: rio-dashboard
  egress:
    - toEndpoints:
        - matchLabels:
            k8s:io.kubernetes.pod.namespace: kube-system
            k8s:k8s-app: kube-dns
      toPorts:
        - ports:
            - {port: "53", protocol: UDP}
            - {port: "53", protocol: TCP}
    - toEndpoints:
        - matchLabels:
            gateway.networking.k8s.io/gateway-name: rio-dashboard
      toPorts: [{ports: [{port: "8080", protocol: TCP}]}]
{{- end }}
{{- end }}
