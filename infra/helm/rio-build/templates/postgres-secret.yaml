{{- if and .Values.postgresql.enabled (not .Values.postgresql.auth.existingSecret) }}
# Bridge between the bitnami subchart and rio's expected Secret format.
# Scheduler/store read RIO_DATABASE_URL from `rio-postgres` Secret key `url`.
#
# Only rendered when `postgresql.auth.existingSecret` is NOT set — i.e.,
# for VM tests (airgapped, xtask doesn't run, hardcoded `rio` password is
# fine). For kind/k3s via xtask, deploy() pre-creates both rio-postgres
# and rio-postgres-auth with a generated password, then passes
# `--set postgresql.auth.existingSecret=rio-postgres-auth` so this
# template is skipped and the password never touches helm values.
apiVersion: v1
kind: Secret
metadata:
  name: rio-postgres
  namespace: {{ .Values.namespace.name }}
  labels:
    app.kubernetes.io/part-of: rio-build
stringData:
  url: "postgres://{{ .Values.postgresql.auth.username }}:{{ .Values.postgresql.auth.password | urlquery }}@{{ .Release.Name }}-postgresql:5432/{{ .Values.postgresql.auth.database }}"
{{- end }}
