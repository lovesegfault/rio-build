{{- if and .Values.postgresql.enabled (not .Values.postgresql.auth.existingSecret) }}
{{- $url := printf "postgres://%s:%s@%s-postgresql.%s:5432/%s" .Values.postgresql.auth.username (.Values.postgresql.auth.password | urlquery) .Release.Name .Values.namespace.name .Values.postgresql.auth.database -}}
# Bridge between the bitnami subchart and rio's expected Secret format.
# Scheduler/store read RIO_DATABASE_URL from `rio-postgres` Secret key `url`.
#
# Only rendered when `postgresql.auth.existingSecret` is NOT set — i.e.,
# for VM tests (airgapped, xtask doesn't run, hardcoded `rio` password is
# fine). For k3s via xtask, deploy() pre-creates rio-postgres in
# BOTH namespaces (scheduler reads from rio-system, store from rio-store
# — Secrets are namespace-scoped) plus rio-postgres-auth for the subchart,
# then passes `--set postgresql.auth.existingSecret=rio-postgres-auth` so
# this template is skipped and the password never touches helm values.
#
# ADR-019: store moved to its own namespace. Secret duplicated — the
# postgresql Service FQDN is spelled out (.rio-system suffix) so the
# rio-store copy resolves across the ns boundary.
apiVersion: v1
kind: Secret
metadata:
  name: rio-postgres
  namespace: {{ .Values.namespace.name }}
  labels:
    app.kubernetes.io/part-of: rio-build
stringData:
  url: {{ $url | quote }}
---
apiVersion: v1
kind: Secret
metadata:
  name: rio-postgres
  namespace: {{ .Values.namespaces.store.name }}
  labels:
    app.kubernetes.io/part-of: rio-build
stringData:
  url: {{ $url | quote }}
{{- end }}
