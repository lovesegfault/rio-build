{{- if .Values.postgresql.enabled }}
# Bridge between the bitnami subchart and rio's expected Secret format.
# Scheduler/store read RIO_DATABASE_URL from `rio-postgres` Secret key `url`.
# Bitnami's PG doesn't emit a connection-string secret, so we build one from
# the values we set. fullnameOverride isn't set, so the subchart's Service
# is `<release>-postgresql`.
apiVersion: v1
kind: Secret
metadata:
  name: rio-postgres
  namespace: {{ .Values.namespace.name }}
  labels:
    app.kubernetes.io/part-of: rio-build
stringData:
  url: "postgres://{{ .Values.postgresql.auth.username }}:{{ .Values.postgresql.auth.password }}@{{ .Release.Name }}-postgresql:5432/{{ .Values.postgresql.auth.database }}"
{{- end }}
