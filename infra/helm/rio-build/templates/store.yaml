{{- if .Values.store.enabled }}
{{- $s := .Values.store -}}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: rio-store
  namespace: {{ .Values.namespaces.store.name }}
  labels:
    {{- include "rio.labels" (dict "root" . "name" "rio-store" "component" "store") | nindent 4 }}
spec:
  {{- if not .Values.componentScaler.store.enabled }}
  # Stateless at runtime (PG + S3 hold everything). sqlx::migrate! takes
  # a PG advisory lock, so concurrent replica startup is safe.
  #
  # OMITTED when componentScaler.store.enabled=true: the ComponentScaler
  # reconciler patches deployments/scale; if helm also rendered
  # .spec.replicas here, every `helm upgrade` would reset it and fight
  # the controller. K8s defaults an absent .spec.replicas to 1 on first
  # apply; the reconciler's first 10s tick corrects to spec.replicas.min.
  replicas: {{ $s.replicas | default 1 }}
  {{- end }}
  selector:
    matchLabels:
      {{- include "rio.selectorLabels" "rio-store" | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "rio.labels" (dict "root" . "name" "rio-store" "component" "store") | nindent 8 }}
    spec:
      serviceAccountName: rio-store
      {{- include "rio.podSecurityContext" . | nindent 6 }}
      containers:
        - name: store
          image: {{ include "rio.image" (list . $s.image) }}
          imagePullPolicy: {{ .Values.global.image.pullPolicy }}
          {{- include "rio.containerSecurityContext" . | nindent 10 }}
          ports:
            - name: grpc
              containerPort: 9002
            - name: metrics
              containerPort: 9092
          env:
            {{- include "rio.rustLogEnv" . | nindent 12 }}
            {{- include "rio.mounts" (dict "root" . "form" "env" "want" (list "cov" "jwtVerify" "serviceHmac")) | nindent 12 }}
            - name: RIO_LISTEN_ADDR
              value: "[::]:9002"
            # P0542: s3.dualstack.{region}.amazonaws.com has AAAA;
            # the default endpoint is v4-only. Without this, v6-only
            # pods reach S3 via DNS64+NAT64 (works, but adds a hop).
            - name: AWS_USE_DUALSTACK_ENDPOINT
              value: "true"
            - name: RIO_DRAIN_GRACE_SECS
              value: "6"  # readinessProbe.periodSeconds (5) + 1
            - name: RIO_CHUNK_UPLOAD_MAX_CONCURRENT
              value: {{ $s.chunkUploadMaxConcurrent | quote }}
            - name: RIO_S3_MAX_ATTEMPTS
              value: {{ $s.s3MaxAttempts | quote }}
            - name: RIO_MAX_BATCH_PATHS
              value: {{ $s.maxBatchPaths | int | quote }}
            - name: RIO_PG_MAX_CONNECTIONS
              value: {{ $s.pgMaxConnections | quote }}
            - name: RIO_DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: rio-postgres
                  key: url
            {{- with $s.chunkBackend }}
            {{- if .kind }}
            - name: RIO_CHUNK_BACKEND__KIND
              value: {{ .kind | quote }}
            {{- end }}
            {{- if .bucket }}
            - name: RIO_CHUNK_BACKEND__BUCKET
              value: {{ .bucket | quote }}
            {{- end }}
            {{- if hasKey . "prefix" }}
            - name: RIO_CHUNK_BACKEND__PREFIX
              value: {{ .prefix | quote }}
            {{- end }}
            {{- if .endpoint }}
            - name: AWS_ENDPOINT_URL
              value: {{ .endpoint | quote }}
            {{- end }}
            {{- end }}
            {{- with $s.extraEnv }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          volumeMounts:
            {{- include "rio.mounts" (dict "root" . "form" "mount" "want" (list "cov" "jwtVerify" "serviceHmac")) | nindent 12 }}
          # tonic-health set_serving() runs AFTER migrations in main.rs —
          # "PG connected + migrations done" = Ready.
          readinessProbe:
            grpc:
              port: 9002
              service: rio.store.StoreService
            periodSeconds: 5
            failureThreshold: 3
          livenessProbe:
            tcpSocket: {port: 9002}
            periodSeconds: 10
            failureThreshold: 6
          resources:
            {{- toYaml $s.resources | nindent 12 }}
      volumes:
        {{- include "rio.mounts" (dict "root" . "form" "volume" "want" (list "cov" "jwtVerify" "serviceHmac")) | nindent 8 }}
# ClusterIP + headless pair (see rio.grpcServicePair). Builders/fetchers
# resolve the headless name to pod IPs and p2c across them — a sticky
# single-channel against the ClusterIP means scaling rio-store doesn't
# help (I-077: 60 builders all hit pod-0).
{{ include "rio.grpcServicePair" (dict "root" . "name" "rio-store" "ns" .Values.namespaces.store.name "component" "store" "port" 9002) }}
{{- end }}
