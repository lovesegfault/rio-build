{{- if .Values.externalSecrets.enabled }}
{{- $ns := .Values.namespace.name -}}
{{- $es := .Values.externalSecrets -}}
---
apiVersion: external-secrets.io/v1
kind: ClusterSecretStore
metadata:
  name: {{ $es.clusterSecretStore }}
  labels:
    app.kubernetes.io/part-of: rio-build
spec:
  provider:
    aws:
      service: SecretsManager
      region: {{ .Values.global.region }}
      auth:
        jwt:
          serviceAccountRef:
            name: external-secrets
            namespace: external-secrets
---
# Aurora URL. ESO's template engine pulls the password from Secrets Manager
# and builds the full connection string. ?sslmode=require: Aurora has rds.force_ssl=1;
# sqlx's tls-rustls-aws-lc-rs handles the handshake. `require` = encrypt,
# don't verify (RDS CA not in container). Good enough for in-VPC.
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: rio-postgres
  namespace: {{ $ns }}
  labels:
    app.kubernetes.io/part-of: rio-build
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: {{ $es.clusterSecretStore }}
  target:
    name: rio-postgres
    template:
      data:
        url: "postgres://rio:{{ "{{ .password }}" }}@{{ $es.auroraEndpoint }}:5432/rio?sslmode=require"
  data:
    - secretKey: password
      remoteRef:
        key: {{ $es.auroraSecretArn }}
        property: password
---
# HMAC + signing key: written to Secrets Manager by the bootstrap Job
# (below), ESO syncs them back into k8s Secrets. Regenerating either would
# be bad (in-flight assignment tokens invalidated / all narinfo signatures
# invalidated), so the bootstrap Job's describe-secret guard is load-bearing.
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: rio-hmac
  namespace: {{ $ns }}
  labels:
    app.kubernetes.io/part-of: rio-build
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: {{ $es.clusterSecretStore }}
  target:
    name: rio-hmac
  data:
    - secretKey: key
      remoteRef:
        key: rio/hmac
        # Binary secret (openssl rand 32, not base64-encoded text).
        decodingStrategy: None
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: rio-signing-key
  namespace: {{ $ns }}
  labels:
    app.kubernetes.io/part-of: rio-build
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: {{ $es.clusterSecretStore }}
  target:
    name: rio-signing-key
  data:
    - secretKey: key
      remoteRef:
        key: rio/signing-key
{{- end }}
