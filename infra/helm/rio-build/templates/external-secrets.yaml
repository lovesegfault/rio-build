{{- if .Values.externalSecrets.enabled }}
{{- $ns := .Values.namespace.name -}}
{{- $nsStore := .Values.namespaces.store.name -}}
{{- $es := .Values.externalSecrets -}}
---
apiVersion: external-secrets.io/v1
kind: ClusterSecretStore
metadata:
  name: {{ $es.clusterSecretStore }}
  labels:
    app.kubernetes.io/part-of: rio-build
spec:
  provider:
    aws:
      service: SecretsManager
      region: {{ .Values.global.region }}
      auth:
        jwt:
          serviceAccountRef:
            name: external-secrets
            namespace: external-secrets
{{- /*
Aurora URL + HMAC synced into BOTH rio-system (scheduler) AND rio-store
(store). k8s can't mount cross-namespace secrets, so we duplicate the
ExternalSecret into each consumer's namespace. ESO syncs the same
upstream Secrets Manager value into both — they stay in lockstep.

Signing key is store-only (narinfo signing per rio-store/src/main.rs:73).
*/}}
{{- range $targetNs := list $ns $nsStore }}
---
# Aurora URL. ESO's template engine pulls the password from Secrets Manager
# and builds the full connection string. ?sslmode=require: Aurora has rds.force_ssl=1;
# sqlx's tls-rustls-aws-lc-rs handles the handshake. `require` = encrypt,
# don't verify (RDS CA not in container). Good enough for in-VPC.
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: rio-postgres
  namespace: {{ $targetNs }}
  labels:
    app.kubernetes.io/part-of: rio-build
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: {{ $es.clusterSecretStore }}
  target:
    name: rio-postgres
    template:
      data:
        # urlquery: Aurora's auto-generated password can contain
        # @ : / # — any of which breaks URL parsing (sqlx reads a
        # stray : as the port delimiter → "invalid port number").
        url: "postgres://rio:{{ "{{ .password | urlquery }}" }}@{{ $es.auroraEndpoint }}:5432/rio?sslmode=require"
  data:
    - secretKey: password
      remoteRef:
        key: {{ $es.auroraSecretArn }}
        property: password
---
# HMAC: written to Secrets Manager by the bootstrap Job, ESO syncs it
# back. Regenerating invalidates in-flight assignment tokens, so the
# bootstrap Job's describe-secret guard is load-bearing.
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: rio-hmac
  namespace: {{ $targetNs }}
  labels:
    app.kubernetes.io/part-of: rio-build
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: {{ $es.clusterSecretStore }}
  target:
    name: rio-hmac
  data:
    - secretKey: key
      remoteRef:
        key: rio/hmac
        # Binary secret (openssl rand 32, not base64-encoded text).
        decodingStrategy: None
{{- end }}
---
# Signing key (narinfo .narinfo signatures). Store-only.
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: rio-signing-key
  namespace: {{ $nsStore }}
  labels:
    app.kubernetes.io/part-of: rio-build
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: {{ $es.clusterSecretStore }}
  target:
    name: rio-signing-key
  data:
    - secretKey: key
      remoteRef:
        key: rio/signing-key
{{- end }}
