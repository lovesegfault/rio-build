{{- $root := . -}}
{{- range .Values.fetcherPools }}
{{- /* One FetcherPool per entry, deep-merged over
       fetcherPoolDefaults (same pattern as I-117b builderpoolset.yaml).
       mergeOverwrite mutates its first arg, so deepCopy the defaults
       each iteration. */ -}}
{{- $fp := mergeOverwrite (deepCopy $root.Values.fetcherPoolDefaults) . -}}
{{- if $fp.enabled }}
---
# FetcherPool: FOD-only executors with open internet egress. See ADR-019.
apiVersion: rio.build/v1alpha1
kind: FetcherPool
metadata:
  name: {{ $fp.name }}
  namespace: {{ $root.Values.namespaces.fetchers.name }}
  labels:
    app.kubernetes.io/part-of: rio-build
    rio.build/role: fetcher
spec:
  {{- with $fp.deadlineSeconds }}
  deadlineSeconds: {{ . }}
  {{- end }}
  {{- with $fp.maxConcurrent }}
  maxConcurrent: {{ . }}
  {{- end }}
  systems:
    {{- toYaml $fp.systems | nindent 4 }}
  image: {{ include "rio.image" (list $root $fp.image) }}
  {{- include "rio.optBool" (list $fp "hostUsers" $fp.hostUsers) | nindent 2 }}
  # I-170: per-class fetcher pools. Tiered model is the settled
  # architecture (I-208 — fetcher tiers mirror builder tiers); the
  # legacy single-size `spec.resources` path has been removed.
  classes:
    {{- toYaml (required "fetcherPool: classes must be non-empty" $fp.classes) | nindent 4 }}
  {{- with $fp.tolerations }}
  tolerations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
  {{- with $fp.nodeSelector }}
  nodeSelector:
    {{- toYaml . | nindent 4 }}
  {{- end }}
{{- end }}
{{- end }}
