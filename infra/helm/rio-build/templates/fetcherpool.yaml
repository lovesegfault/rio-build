{{- if hasKey .Values "fetcherPool" -}}
{{- fail "values key `fetcherPool` (singular) was renamed to `fetcherPools` (list) + `fetcherPoolDefaults` — update your --set/values overrides" -}}
{{- end -}}
{{- $root := . -}}
{{- range .Values.fetcherPools }}
{{- /* One FetcherPool per entry, deep-merged over
       fetcherPoolDefaults (same pattern as I-117b builderpoolset.yaml).
       mergeOverwrite mutates its first arg, so deepCopy the defaults
       each iteration. */ -}}
{{- $fp := mergeOverwrite (deepCopy $root.Values.fetcherPoolDefaults) . -}}
{{- if $fp.enabled }}
---
# FetcherPool: FOD-only executors with open internet egress. See ADR-019.
apiVersion: rio.build/v1alpha1
kind: FetcherPool
metadata:
  name: {{ $fp.name }}
  namespace: {{ $root.Values.namespaces.fetchers.name }}
  labels:
    app.kubernetes.io/part-of: rio-build
    rio.build/role: fetcher
spec:
  ephemeral: {{ $fp.ephemeral }}
  {{- with $fp.ephemeralDeadlineSeconds }}
  ephemeralDeadlineSeconds: {{ . }}
  {{- end }}
  replicas:
    min: {{ $fp.replicas.min }}
    max: {{ $fp.replicas.max }}
  autoscaling:
    metric: {{ $fp.autoscaling.metric }}
    targetValue: {{ $fp.autoscaling.targetValue }}
  systems:
    {{- toYaml $fp.systems | nindent 4 }}
  image: {{ include "rio.image" (list $root $fp.image) }}
  {{- if $root.Values.tls.enabled }}
  # Secret must exist in rio-fetchers namespace (cross-ns Secret mount
  # not supported). cert-manager.yaml creates rio-fetcher-tls here;
  # pki-k8s.nix creates it for VM tests.
  tlsSecretName: rio-fetcher-tls
  {{- end }}
  {{- include "rio.optBool" (list $fp "hostUsers" $fp.hostUsers) | nindent 2 }}
  {{- with $fp.classes }}
  # I-170: per-class fetcher pools. CEL on the CRD enforces
  # classes[] XOR resources — render exactly one.
  classes:
    {{- toYaml . | nindent 4 }}
  {{- else }}
  {{- with $fp.resources }}
  resources:
    {{- toYaml . | nindent 4 }}
  {{- end }}
  {{- end }}
  {{- with $fp.tolerations }}
  tolerations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
  {{- with $fp.nodeSelector }}
  nodeSelector:
    {{- toYaml . | nindent 4 }}
  {{- end }}
{{- end }}
{{- end }}
