{{- $root := . -}}
{{- range .Values.builderPools }}
{{- /* I-108: per-pool entry deep-merged over builderPoolDefaults. mergeOverwrite
       mutates its first arg, so deepCopy the defaults each iteration. */ -}}
{{- $bp := mergeOverwrite (deepCopy $root.Values.builderPoolDefaults) . -}}
{{- if $bp.enabled }}
---
apiVersion: rio.build/v1alpha1
kind: BuilderPool
metadata:
  name: {{ $bp.name }}
  namespace: {{ $root.Values.namespaces.builders.name }}
  labels:
    app.kubernetes.io/part-of: rio-build
    rio.build/role: builder
spec:
  maxConcurrent: {{ $bp.maxConcurrent }}
  fuseCacheSize: {{ $bp.fuseCacheSize }}
  systems:
    {{- toYaml $bp.systems | nindent 4 }}
  features:
    {{- toYaml $bp.features | nindent 4 }}
  sizeClass: {{ $bp.sizeClass | quote }}
  image: {{ include "rio.image" (list $root $bp.image) }}
  {{- if $root.Values.tls.enabled }}
  tlsSecretName: rio-builder-tls
  {{- end }}
  # Phase 4b placeholder — phase 4c BuilderPoolSet replaces this with
  # per-size-class requests derived from build_history. Without it,
  # Karpenter doesn't know what to provision (zero-request pods
  # schedule anywhere, including nodes too small).
  resources:
    {{- toYaml $bp.resources | nindent 4 }}
  privileged: {{ $bp.privileged }}
  {{- /* rio.optBool: hasKey-based so `hostUsers: false` renders (with skips falsy). */}}
  {{- include "rio.optBool" (list $bp "hostUsers" $bp.hostUsers) | nindent 2 }}
  {{- with $bp.seccompProfile }}
  seccompProfile:
    {{- toYaml . | nindent 4 }}
  {{- end }}
  {{- with $bp.terminationGracePeriodSeconds }}
  terminationGracePeriodSeconds: {{ . }}
  {{- end }}
  {{- with $bp.tolerations }}
  tolerations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
  {{- with $bp.nodeSelector }}
  nodeSelector:
    {{- toYaml . | nindent 4 }}
  {{- end }}
{{- end }}
{{- end }}
