{{- if .Values.scheduler.enabled }}
{{- $s := .Values.scheduler -}}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: rio-scheduler
  namespace: {{ .Values.namespaces.system.name }}
  labels:
    {{- include "rio.labels" (dict "root" . "name" "rio-scheduler" "component" "scheduler") | nindent 4 }}
spec:
  replicas: {{ $s.replicas }}
  # RollingUpdate works now that readiness ≠ leadership. Both pods Ready →
  # Available condition true. pod-deletion-cost annotation (set by leader on
  # acquire, lease.rs) makes K8s kill the standby first:
  #   1. surge: new pod up, Ready, stays standby
  #   2. scale-down: K8s picks lowest cost = old standby, kills it
  #   3. repeat: new pod up, old leader step_down on SIGTERM, new pod
  #      acquires, balanced-channel clients reroute in ~3s
  # → ONE leadership flip per rollout instead of two.
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 1
      maxSurge: 1
  selector:
    matchLabels:
      {{- include "rio.selectorLabels" "rio-scheduler" | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "rio.labels" (dict "root" . "name" "rio-scheduler" "component" "scheduler") | nindent 8 }}
      annotations:
        # Scheduler reads /etc/rio/scheduler.toml once at boot; kubelet
        # CM-remount alone doesn't trigger reload. Roll on any
        # ConfigMap-rendered field change (subPath mounts don't
        # live-update either way).
        checksum/scheduler-toml: {{ list (toJson $s.softFeatures) (toJson $s.sla) | join "" | sha256sum }}
    spec:
      serviceAccountName: rio-scheduler
      {{- if .Values.karpenter.enabled }}
      # Explicit pin to rio-general NodePool. Belt-and-suspenders over
      # the NodePool's instance-family requirement — keeps control-plane
      # off the EKS-managed `system` m5.large nodes if those untaint.
      nodeSelector:
        rio.build/node-role: general
      {{- end }}
      {{- include "rio.podSecurityContext" . | nindent 6 }}
      {{- if gt (int $s.replicas) 1 }}
      # REQUIRE different nodes for replicas>1. Both on one node → node drain
      # kills both (PDB blocks it, but that stalls drain — still bad).
      # requiredDuringScheduling is safe on any multi-node cluster; single-node
      # dev uses replicas=1 so this block doesn't render.
      affinity:
        podAntiAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            - labelSelector:
                matchLabels:
                  {{- include "rio.selectorLabels" "rio-scheduler" | nindent 18 }}
              topologyKey: kubernetes.io/hostname
      {{- end }}
      containers:
        - name: scheduler
          image: {{ include "rio.image" (list . $s.image) }}
          imagePullPolicy: {{ .Values.global.image.pullPolicy }}
          {{- include "rio.containerSecurityContext" . | nindent 10 }}
          {{- if $s.sla.allowReferenceChange }}
          # DESTRUCTIVE one-shot: M_058 reference_hw_class guard. Set
          # for ONE rollout after changing referenceHwClass, then unset
          # — leaving it set means a FUTURE referenceHwClass change
          # silently TRUNCATEs instead of failing closed.
          args: ["--allow-reference-change"]
          {{- end }}
          ports:
            - name: grpc
              containerPort: 9001
            - name: metrics
              containerPort: 9091
          env:
            {{- include "rio.rustLogEnv" . | nindent 12 }}
            {{- include "rio.mounts" (dict "root" . "form" "env" "want" (list "cov" "jwtVerify" "serviceHmac")) | nindent 12 }}
            # All replicas contend for SAME Lease. Presence ENABLES lease mode
            # (LeaseConfig::from_env returns None without it → always-leader,
            # WRONG with replicas>1).
            - name: RIO_LEASE_NAME
              value: {{ $s.leaseName | quote }}
            # Downward API — matches wherever deployed.
            - name: RIO_LEASE_NAMESPACE
              valueFrom:
                fieldRef: {fieldPath: metadata.namespace}
            # Holder ID = pod name. Unique per replica.
            - name: HOSTNAME
              valueFrom:
                fieldRef: {fieldPath: metadata.name}
            - name: RIO_LISTEN_ADDR
              value: "[::]:9001"
            - name: RIO_DRAIN_GRACE_SECS
              value: "6"  # readinessProbe.periodSeconds (5) + 1
            - name: RIO_STORE__ADDR
              value: {{ $s.storeAddr | quote }}
            - name: RIO_DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: rio-postgres
                  key: url
            {{- if $s.logS3Bucket }}
            - name: RIO_LOG_S3_BUCKET
              value: {{ $s.logS3Bucket | quote }}
            {{- end }}
            # D3: scheduler serves gRPC-Web natively; CORS allow-origins
            # come from values.yaml dashboard.cors.allowOrigins (the same
            # list previously rendered into the Envoy SecurityPolicy CRD).
            - name: RIO_DASHBOARD__CORS_ALLOW_ORIGINS
              value: {{ .Values.dashboard.cors.allowOrigins | join "," | quote }}
          volumeMounts:
            {{- include "rio.mounts" (dict "root" . "form" "mount" "want" (list "cov" "jwtVerify" "serviceHmac")) | nindent 12 }}
            # rio_common::config::load reads /etc/rio/scheduler.toml. The
            # ConfigMap carries the [sla] table + soft_features;
            # everything else stays env-driven (figment merges TOML under
            # env). subPath: tls/jwt mount at /etc/rio/{tls,jwt}; a
            # whole-dir CM mount here would race their visibility.
            # subPath puts just the one file. Tradeoff: subPath mounts
            # don't pick up CM updates — fine, the checksum annotation
            # rolls the pod anyway.
            - name: config
              mountPath: /etc/rio/scheduler.toml
              subPath: scheduler.toml
              readOnly: true
          # TCP, NOT gRPC. "is gRPC server listening." NOT gated on is_leader
          # — that's the whole design point. Both pods Ready; clients route
          # via health-aware balancer which DOES check is_leader (via
          # grpc.health.v1 on named service). The old gRPC-named-service probe
          # is still what the BALANCER uses — just not what K8s uses.
          #
          # No TLS retarget: tcpSocket handshake completes before TLS layer.
          readinessProbe:
            tcpSocket: {port: 9001}
            periodSeconds: 5
            failureThreshold: 3
          # Longer threshold. Standby is NOT_SERVING but ALIVE — don't restart.
          # Liveness only fires if gRPC server itself dead. grpc.service
          # liveness would ALSO fail on standby → wrong.
          livenessProbe:
            tcpSocket: {port: 9001}
            periodSeconds: 10
            failureThreshold: 6
          # TCP (NOT named gRPC). Named SchedulerService only goes SERVING
          # when is_leader=true; standby never acquires while leader healthy
          # → named-service startupProbe would crash-loop standby. Generous:
          # migrations + PG connect + store connect ~60s worst case.
          startupProbe:
            tcpSocket: {port: 9001}
            periodSeconds: 5
            failureThreshold: 12
          resources:
            {{- toYaml $s.resources | nindent 12 }}
      volumes:
        {{- include "rio.mounts" (dict "root" . "form" "volume" "want" (list "cov" "jwtVerify" "serviceHmac")) | nindent 8 }}
        - name: config
          configMap:
            name: rio-scheduler-config
# ClusterIP + headless pair (see rio.grpcServicePair). Headless: balanced-
# channel clients (gateway, worker) resolve pod IPs, probe each via
# grpc.health.v1, route to the SERVING one (= leader). ClusterIP: per-call
# connects (controller reconcilers, rio-cli, tests) — UNAVAILABLE ~50% and
# retry, fine off the hot path.
{{ include "rio.grpcServicePair" (dict "root" . "name" "rio-scheduler" "ns" .Values.namespaces.system.name "component" "scheduler" "port" 9001) }}
---
# Mounted at /etc/rio/scheduler.toml. figment merges this UNDER env (RIO_*
# wins). The [sla] table is mandatory — the SchedulerConfig has no
# Option<SlaConfig> arm; an absent block falls back to the tiny
# test_default ceilings, which under-spawn for any real workload.
# checksum annotation on the pod template triggers rollout when [sla]/
# soft_features change (kubelet remounts the CM but the scheduler
# reads it once at boot).
apiVersion: v1
kind: ConfigMap
metadata:
  name: rio-scheduler-config
  namespace: {{ .Values.namespaces.system.name }}
  labels:
    {{- include "rio.labels" (dict "root" . "name" "rio-scheduler" "component" "scheduler") | nindent 4 }}
data:
  scheduler.toml: |
    {{- /* I-213: soft_features string array. */}}
    soft_features = [{{ range $i, $f := $s.softFeatures }}{{ if $i }}, {{ end }}{{ $f | quote }}{{ end }}]
    {{- /* ADR-023 [sla]: scalar block first, then nested tables, then
           array-of-tables — TOML requires tables after the scalars of
           their parent. p50/p90/p99 are optional per-tier. */ -}}
    {{- with required "scheduler.sla mandatory (ADR-023)" $s.sla }}
    [sla]
    cluster = {{ (.cluster | default $.Values.karpenter.clusterName | default "") | quote }}
    default_tier = {{ .defaultTier | quote }}
    max_cores = {{ printf "%.1f" (float64 .maxCores) }}
    max_mem = {{ int64 .maxMem }}
    max_disk = {{ int64 .maxDisk }}
    default_disk = {{ int64 .defaultDisk }}
    hw_cost_tolerance = {{ printf "%v" (float64 .hwCostTolerance) }}
    hw_explore_epsilon = {{ printf "%v" (float64 .hwExploreEpsilon) }}
    hw_bench_mem_floor = {{ int64 .hwBenchMemFloor }}
    max_fleet_cores = {{ int64 .maxFleetCores }}
    ladder_budget = {{ printf "%.1f" (float64 .ladderBudget) }}
    max_forecast_cores_per_tenant = {{ int64 .maxForecastCoresPerTenant }}
    max_keys_per_tenant = {{ int64 .maxKeysPerTenant }}
    max_lead_time = {{ printf "%.1f" (float64 .maxLeadTime) }}
    consolidate_explore_epsilon = {{ printf "%v" (float64 .consolidateExploreEpsilon) }}
    max_node_claims_per_cell_per_tick = {{ int64 .maxNodeClaimsPerCellPerTick }}
    {{- with .maxConsolidationTime }}
    max_consolidation_time = {{ printf "%.1f" (float64 .) }}
    {{- end }}
    reference_hw_class = {{ required "scheduler.sla.referenceHwClass is mandatory (ADR-023 §13a)" .referenceHwClass | quote }}
    hw_cost_source = {{ required "scheduler.sla.hwCostSource is mandatory (ADR-023 §13a)" .hwCostSource | quote }}
    {{- with .leadTimeSeed }}

    [sla.lead_time_seed]
    {{- range $cell, $v := . }}
    {{ $cell | quote }} = {{ printf "%.1f" (float64 $v) }}
    {{- end }}
    {{- end }}
    {{- range $h, $def := .hwClasses }}

    [sla.hw_classes.{{ $h | quote }}]
    labels = [
      {{- range $def.labels }}
      { key = {{ .key | quote }}, value = {{ .value | quote }} },
      {{- end }}
    ]
    requirements = [
      {{- range $def.requirements }}
      { key = {{ .key | quote }}, operator = {{ .operator | quote }}, values = {{ toJson .values }} },
      {{- end }}
    ]
    node_class = {{ required (printf "scheduler.sla.hwClasses.%s.nodeClass is mandatory (rio-default / rio-nvme / rio-metal)" $h) $def.nodeClass | quote }}
    max_cores = {{ $def.maxCores | default $.Values.scheduler.sla.maxCores | int64 }}
    max_mem = {{ $def.maxMem | default $.Values.scheduler.sla.maxMem | int64 }}
    {{- /* §13c: only emit when set — serde defaults are already
           [Spot, Od] / [] / None; the helm/15 check covers the
           required (non-default) keys. */}}
    {{- with $def.taints }}
    taints = [
      {{- range . }}
      { key = {{ .key | quote }}, value = {{ .value | quote }}, effect = {{ .effect | quote }} },
      {{- end }}
    ]
    {{- end }}
    {{- with $def.providesFeatures }}
    provides_features = {{ toJson . }}
    {{- end }}
    {{- with $def.maxFleetCores }}
    max_fleet_cores = {{ int64 . }}
    {{- end }}
    {{- with $def.capacityTypes }}
    capacity_types = {{ toJson . }}
    {{- end }}
    {{- end }}

    [sla.probe]
    cpu = {{ printf "%.1f" (float64 .probe.cpu) }}
    mem_per_core = {{ int64 .probe.memPerCore }}
    mem_base = {{ int64 .probe.memBase }}
    deadline_secs = {{ int64 (default 3600 .probe.deadlineSecs) }}
    {{- range $feat, $p := .featureProbes }}

    [sla.feature_probes.{{ $feat | quote }}]
    cpu = {{ printf "%.1f" (float64 $p.cpu) }}
    mem_per_core = {{ int64 $p.memPerCore }}
    mem_base = {{ int64 $p.memBase }}
    deadline_secs = {{ int64 (default 3600 $p.deadlineSecs) }}
    {{- end }}
    {{- range .tiers }}

    [[sla.tiers]]
    name = {{ .name | quote }}
    {{- with .p50 }}
    p50 = {{ printf "%.1f" (float64 .) }}
    {{- end }}
    {{- with .p90 }}
    p90 = {{ printf "%.1f" (float64 .) }}
    {{- end }}
    {{- with .p99 }}
    p99 = {{ printf "%.1f" (float64 .) }}
    {{- end }}
    {{- end }}
    {{- end }}
{{- end }}
