{{- if .Values.gateway.enabled }}
{{- $g := .Values.gateway -}}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: rio-gateway
  namespace: {{ .Values.namespaces.system.name }}
  labels:
    {{- include "rio.labels" (dict "root" . "name" "rio-gateway" "component" "gateway") | nindent 4 }}
spec:
  replicas: {{ $g.replicas }}
  # I-064: surge first so the NLB has a healthy target throughout the
  # rollout. With maxUnavailable: 0 the old pod stays Serving until the
  # new one is Ready; then old goes NotReady → drains sessions → exits.
  # Without this (default 25%/25%), a 2-replica rollout takes one down
  # immediately and any NLB-routed-but-not-yet-propagated connection to
  # the other replica's IP races its termination too.
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      {{- include "rio.selectorLabels" "rio-gateway" | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "rio.labels" (dict "root" . "name" "rio-gateway" "component" "gateway") | nindent 8 }}
    spec:
      serviceAccountName: rio-gateway
      # ≥ drainGraceSecs + sessionDrainSecs + slack. kubelet SIGKILLs at
      # this deadline, which kills any session still open after the
      # gateway's own session_drain timeout (a backstop, not the primary
      # mechanism — the gateway's timeout fires first and exits cleanly).
      terminationGracePeriodSeconds: {{ add $g.drainGraceSecs $g.sessionDrainSecs 24 }}
      {{- include "rio.podSecurityContext" . | nindent 6 }}
      containers:
        - name: gateway
          image: {{ include "rio.image" (list . $g.image) }}
          imagePullPolicy: {{ .Values.global.image.pullPolicy }}
          {{- include "rio.containerSecurityContext" . | nindent 10 }}
          ports:
            - name: ssh
              containerPort: 2222
            - name: metrics
              containerPort: 9090
            # tonic-health on separate port (gateway uses russh for SSH, not
            # tonic). Already plaintext — no TLS retarget needed.
            - name: health
              containerPort: 9190
          env:
            {{- include "rio.rustLogEnv" . | nindent 12 }}
            {{- include "rio.mounts" (dict "root" . "form" "env" "want" (list "cov" "jwtSign" "tls")) | nindent 12 }}
            - name: RIO_LISTEN_ADDR
              value: "[::]:2222"
            # actBuild machineName field — what nom shows as "on <name>".
            # The cluster appears as one machine to ssh-ng clients;
            # per-pod executor IDs are an abstraction leak.
            - name: RIO_GATEWAY_MACHINE_NAME
              value: {{ .Values.gateway.machineName | default .Values.karpenter.clusterName | default "" | quote }}
            - name: RIO_DRAIN_GRACE_SECS
              value: {{ $g.drainGraceSecs | quote }}
            - name: RIO_SESSION_DRAIN_SECS
              value: {{ $g.sessionDrainSecs | quote }}
            # Still used even with balance host — it's the TLS verify domain
            # (cert SAN is `rio-scheduler`).
            - name: RIO_SCHEDULER__ADDR
              value: {{ $g.schedulerAddr | quote }}
            - name: RIO_SCHEDULER__BALANCE_HOST
              value: {{ $g.schedulerBalanceHost | quote }}
            - name: RIO_SCHEDULER__BALANCE_PORT
              value: {{ $g.schedulerBalancePort | quote }}
            - name: RIO_STORE__ADDR
              value: {{ $g.storeAddr | quote }}
            - name: RIO_MAX_TRANSITIVE_INPUTS
              value: {{ $g.maxTransitiveInputs | int | quote }}
            {{- if $g.ssh.authorizedKeysSecret }}
            - name: RIO_HOST_KEY
              value: /var/lib/rio/gateway/host_key
            - name: RIO_AUTHORIZED_KEYS
              value: /etc/rio/ssh/authorized_keys
            {{- end }}
          volumeMounts:
            - name: service-hmac
              mountPath: /etc/rio/hmac
              readOnly: true
            {{- if $g.ssh.authorizedKeysSecret }}
            - name: gateway-state
              mountPath: /var/lib/rio/gateway
            - name: gateway-ssh
              mountPath: /etc/rio/ssh
              readOnly: true
            {{- end }}
            {{- include "rio.mounts" (dict "root" . "form" "mount" "want" (list "cov" "jwtSign")) | nindent 12 }}
          # tonic-health server — SERVING after connect_scheduler succeeds.
          readinessProbe:
            grpc: {port: 9190}
            periodSeconds: 5
            failureThreshold: 3
          # SSH port listening = process alive.
          livenessProbe:
            tcpSocket: {port: 2222}
            periodSeconds: 10
            failureThreshold: 6
          resources:
            {{- toYaml $g.resources | nindent 12 }}
      volumes:
        - name: service-hmac
          secret:
            secretName: rio-service-hmac
        {{- if $g.ssh.authorizedKeysSecret }}
        {{- if $g.ssh.hostKeySecret }}
        # Persistent host key — survives pod reschedule, same key across
        # replicas so clients' known_hosts stays valid.
        - name: gateway-state
          secret:
            secretName: {{ $g.ssh.hostKeySecret }}
        {{- else }}
        # emptyDir: auto-generated host key survives container restart,
        # regenerates on pod reschedule. Breaks known_hosts on reschedule.
        # Prod with replicas>1 should set ssh.hostKeySecret.
        - name: gateway-state
          emptyDir: {}
        {{- end }}
        - name: gateway-ssh
          secret:
            secretName: {{ $g.ssh.authorizedKeysSecret }}
        {{- end }}
        {{- include "rio.mounts" (dict "root" . "form" "volume" "want" (list "cov" "jwtSign")) | nindent 8 }}
---
apiVersion: v1
kind: Service
metadata:
  name: rio-gateway
  namespace: {{ .Values.namespaces.system.name }}
  labels:
    {{- include "rio.labels" (dict "root" . "name" "rio-gateway" "component" "gateway") | nindent 4 }}
  annotations:
    {{- if eq $g.service.type "LoadBalancer" }}
    # Cilium cluster-pool pod IPs are overlay (ULA fd42::/104), NOT
    # VPC-routable — NLB target-type:ip can't reach them. instance
    # mode targets node IPs; Cilium's eBPF kube-proxy-replacement
    # handles the NodePort→pod hop in-kernel.
    service.beta.kubernetes.io/aws-load-balancer-nlb-target-type: instance
    {{- end }}
    {{- with $g.service.annotations }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
spec:
  {{- include "rio.ipFamily" . | nindent 2 }}
  type: {{ $g.service.type }}
  {{- if eq $g.service.type "LoadBalancer" }}
  # Preserve client source IP for SSH audit logging. With Cilium DSR
  # (loadBalancer.dsrDispatch=geneve in addons.tf), Local works
  # without the usual "traffic only to nodes with a pod" limitation.
  externalTrafficPolicy: Local
  {{- end }}
  selector:
    {{- include "rio.selectorLabels" "rio-gateway" | nindent 4 }}
  ports:
    # External 22 → container 2222. Running on 2222 means no
    # CAP_NET_BIND_SERVICE (ports <1024 need it). Service remap is free.
    - name: ssh
      port: 22
      targetPort: ssh
      {{- with $g.service.nodePort }}
      nodePort: {{ . }}
      {{- end }}
{{- end }}
