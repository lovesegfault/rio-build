{{- if .Values.bootstrap.enabled }}
{{- $ns := .Values.namespace.name -}}
{{- $b := .Values.bootstrap -}}
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: rio-bootstrap
  namespace: {{ $ns }}
  labels:
    app.kubernetes.io/part-of: rio-build
  annotations:
    # Hooks run BEFORE all normal chart resources. If the SA were a normal
    # resource, the Job (a hook) would schedule before the SA exists →
    # "serviceaccount not found" → pod forbidden → deadlock until timeout.
    # Weight -1 orders the SA before the Job (weight 0).
    helm.sh/hook: pre-install,pre-upgrade
    helm.sh/hook-weight: "-1"
    helm.sh/hook-delete-policy: before-hook-creation
    {{- with $b.serviceAccount.annotations }}
    # IRSA: secretsmanager:CreateSecret, PutSecretValue, DescribeSecret on
    # arn:aws:secretsmanager:*:*:secret:rio/*
    {{- toYaml . | nindent 4 }}
    {{- end }}
automountServiceAccountToken: false
---
# Helm pre-install/pre-upgrade hook: runs BEFORE any other chart resource.
# Idempotent — the script checks describe-secret first. On first-ever install,
# generates rio/hmac + rio/signing-key + rio/signing-key-pub in Secrets Manager.
# Subsequent upgrades: describe-secret returns 0, script exits 0, no-op. ESO
# (external-secrets.yaml) then syncs them into k8s Secrets.
#
# before-hook-creation: Helm deletes the previous Job before creating a new
# one. Without this, a second upgrade would conflict with the completed Job
# from the first.
apiVersion: batch/v1
kind: Job
metadata:
  name: rio-bootstrap
  namespace: {{ $ns }}
  labels:
    app.kubernetes.io/part-of: rio-build
  annotations:
    helm.sh/hook: pre-install,pre-upgrade
    helm.sh/hook-weight: "0"
    helm.sh/hook-delete-policy: before-hook-creation
spec:
  backoffLimit: 2
  template:
    metadata:
      labels:
        app.kubernetes.io/name: rio-bootstrap
        app.kubernetes.io/part-of: rio-build
    spec:
      serviceAccountName: rio-bootstrap
      restartPolicy: Never
      {{- include "rio.podSecurityContext" . | nindent 6 }}
      containers:
        - name: bootstrap
          image: {{ include "rio.image" (list . $b.image) }}
          imagePullPolicy: {{ .Values.global.image.pullPolicy }}
          {{- include "rio.containerSecurityContext" . | nindent 10 }}
          env:
            - name: AWS_REGION
              value: {{ .Values.global.region | quote }}
            - name: CHUNK_BUCKET
              value: {{ .Values.store.chunkBackend.bucket | quote }}
          # readOnlyRootFilesystem=true (rio.containerSecurityContext) makes
          # the in-image /tmp read-only. Script writes /tmp/hmac + mktemp -d
          # → needs a writable mount. emptyDir inherits the pod's fsGroup
          # (65532 from rio.podSecurityContext) so the nonroot UID can write.
          volumeMounts:
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: tmp
          emptyDir: {}
{{- end }}
