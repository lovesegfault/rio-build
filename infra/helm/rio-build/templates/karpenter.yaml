{{- if .Values.karpenter.enabled }}
{{- $k := .Values.karpenter -}}
# Karpenter NodePools + EC2NodeClass. In the chart (not terraform) so
# `helm rollback` takes node config with the rest, and to dodge the
# kubernetes_manifest plan-time GVK trap (Karpenter CRDs don't exist
# until helm_release.karpenter applies).
---
# r[impl infra.node.nixos-ami]
# ADR-021: NixOS node AMI (full cutover — no Bottlerocket fallback).
# amiFamily: AL2023 makes Karpenter emit the NodeConfig MIME userData
# that nodeadm (packaged in the AMI) consumes — Karpenter doesn't
# validate the AMI IS AL2023, only that the selector resolves.
# amiSelectorTerms by tag (not pinned ID) so `xtask ami push` tags
# rio.build/ami=<git-sha> and Drift rolls nodes on resolved-ID change.
# One term per arch: Karpenter matches the term whose kubernetes.io/arch
# tag agrees with the NodePool requirement.
#
# NO userData: sysctls, seccomp profiles, and the device plugin are
# baked into the AMI (nix/nixos-node/hardening.nix + eks-node.nix).
# Karpenter's generated NodeConfig MIME is the ONLY runtime input.
#
# blockDeviceMappings: NixOS is single-root (no Bottlerocket OS/data
# split). boot.growPartition (amazon-image.nix default) expands / to
# fill the volume on first boot.
apiVersion: karpenter.k8s.aws/v1
kind: EC2NodeClass
metadata:
  name: rio-default
  labels:
    app.kubernetes.io/part-of: rio-build
spec:
  amiFamily: AL2023
  amiSelectorTerms:
    - tags:
        rio.build/ami: {{ required "karpenter.amiTag is required when karpenter.enabled=true — run `cargo xtask k8s -p eks up --ami` first" $k.amiTag }}
        kubernetes.io/arch: amd64
    - tags:
        rio.build/ami: {{ $k.amiTag }}
        kubernetes.io/arch: arm64
  role: {{ required "karpenter.nodeRoleName is required when karpenter.enabled=true" $k.nodeRoleName }}
  subnetSelectorTerms:
    - tags:
        karpenter.sh/discovery: {{ required "karpenter.clusterName is required when karpenter.enabled=true" $k.clusterName }}
  securityGroupSelectorTerms:
    - tags:
        karpenter.sh/discovery: {{ $k.clusterName }}
  # IMDSv2 hop limit 2: limit 1 was the "pods can't reach IMDS" defense,
  # but vpc-cni installs an iptables SNAT rule for 169.254.169.254 that
  # adds a hop even for hostNetwork agents — so limit 1 also breaks
  # ssm-agent / ecr-credential-provider after aws-node starts. Limit 2
  # keeps the defense for non-hostNetwork pods (vpc-cni veth = +1 hop →
  # TTL 0 at IMDS) while letting hostNetwork agents through. IRSA
  # remains the actual pod credential path; this is belt-and-braces.
  metadataOptions:
    httpEndpoint: enabled
    httpTokens: required
    httpPutResponseHopLimit: 2
  blockDeviceMappings:
    - deviceName: /dev/xvda
      ebs:
        volumeSize: {{ $k.dataVolumeSize }}
        volumeType: gp3
        deleteOnTermination: true
        encrypted: true
  tags:
    karpenter.sh/discovery: {{ $k.clusterName }}
---
# NodeOverlay: tells Karpenter that worker-role instances provide
# smarter-devices/fuse capacity BEFORE the node exists. Solves the
# cold-start deadlock: builder pods request smarter-devices/fuse:1, but
# the device-plugin only advertises that resource AFTER a node boots and
# the plugin registers with kubelet — so from zero nodes Karpenter can't
# bin-pack and never provisions. The overlay declares the capacity
# synthetically; once the node is up, the smarter-device-manager systemd
# unit (baked into the AMI, nix/nixos-node/eks-node.nix) registers the
# real capacity (same value, devicePlugin.fuseMaxDevices). Host systemd
# starts the plugin at boot — but Karpenter's bin-packing happens before
# ANY node exists, so the overlay is structurally required regardless of
# how fast the plugin registers.
#
# Alpha feature — requires settings.featureGates.nodeOverlay=true on the
# Karpenter controller (set in infra/eks/karpenter.tf).
apiVersion: karpenter.sh/v1alpha1
kind: NodeOverlay
metadata:
  name: rio-builder-fuse
  labels:
    app.kubernetes.io/part-of: rio-build
spec:
  # Match builder + fetcher NodePools via node-role. NOT rio-general:
  # the systemd device-plugin DOES run there (the AMI is shared) and
  # advertises fuse capacity at runtime, but executor pods carry node-
  # role selectors that exclude general anyway. Keeping the overlay
  # narrow means Karpenter never provisions a rio-general node FOR a
  # fuse-requesting pod at cold start.
  requirements:
    - key: rio.build/node-role
      operator: In
      values: [builder, fetcher]
  capacity:
    smarter-devices/fuse: {{ .Values.devicePlugin.fuseMaxDevices | quote }}
---
# NodeOverlay (kvm): synthetic smarter-devices/kvm capacity for the metal
# NodePool. Same cold-start deadlock as fuse above — a kvm-feature pod
# requests smarter-devices/kvm:1, but no node advertises it until the
# systemd device-plugin registers on a booted metal node. Matches by the
# rio.build/kvm label (only the metal NodePool sets it) so non-metal
# builder nodes don't falsely advertise kvm — the plugin would correct
# it to 0 post-boot, but Karpenter would have already wasted a provision
# cycle.
apiVersion: karpenter.sh/v1alpha1
kind: NodeOverlay
metadata:
  name: rio-builder-kvm
  labels:
    app.kubernetes.io/part-of: rio-build
spec:
  requirements:
    - key: rio.build/kvm
      operator: In
      values: ["true"]
  capacity:
    smarter-devices/kvm: {{ .Values.devicePlugin.kvmMaxDevices | quote }}
{{- range $k.nodePools }}
---
apiVersion: karpenter.sh/v1
kind: NodePool
metadata:
  name: {{ .name }}
  labels:
    app.kubernetes.io/part-of: rio-build
spec:
  weight: {{ .weight }}
  template:
    metadata:
      labels:
        {{- toYaml .labels | nindent 8 }}
    spec:
      nodeClassRef:
        group: karpenter.k8s.aws
        kind: EC2NodeClass
        name: rio-default
      {{- with .taints }}
      taints:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      requirements:
        {{- toYaml .requirements | nindent 8 }}
  limits:
    cpu: {{ .limits.cpu }}
  disruption:
    # WhenEmpty only — builds are long-running; don't consolidate a
    # node with a worker pod on it even if underutilized.
    # rio-controller's 10-min SCALE_DOWN_WINDOW scales pods to 0 →
    # THEN Karpenter sees an empty node and consolidates.
    consolidationPolicy: WhenEmpty
    consolidateAfter: {{ .consolidateAfter | default "30s" }}
{{- end }}
{{- end }}
