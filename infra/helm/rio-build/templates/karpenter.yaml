{{- if .Values.karpenter.enabled }}
{{- $k := .Values.karpenter -}}
# Karpenter NodePools + EC2NodeClass. In the chart (not terraform) so
# `helm rollback` takes node config with the rest, and to dodge the
# kubernetes_manifest plan-time GVK trap (Karpenter CRDs don't exist
# until helm_release.karpenter applies).
# r[impl infra.node.nixos-ami]
# ADR-021: NixOS node AMI (full cutover — no Bottlerocket fallback).
# amiFamily: AL2023 makes Karpenter emit the NodeConfig MIME userData
# that nodeadm (packaged in the AMI) consumes — Karpenter doesn't
# validate the AMI IS AL2023, only that the selector resolves.
# amiSelectorTerms by tag (not pinned ID) so `xtask ami push` tags
# rio.build/ami=<git-sha> and Drift rolls nodes on resolved-ID change.
# One term per arch: Karpenter matches the term whose kubernetes.io/arch
# tag agrees with the NodePool requirement.
#
# NO userData: sysctls, seccomp profiles, and the device plugin are
# baked into the AMI (nix/nixos-node/hardening.nix + eks-node.nix).
# Karpenter's generated NodeConfig MIME is the ONLY runtime input.
#
# blockDeviceMappings: NixOS is single-root (no Bottlerocket OS/data
# split). boot.growPartition (amazon-image.nix default) expands / to
# fill the volume on first boot.
#
# I-205: x86_64 .metal SKUs are legacy-bios ONLY (zero support UEFI per
# `aws ec2 describe-instance-types`), so metal NodeClaims can't use the
# UEFI/UKI AMI on x86. rio-metal selects the `node-ami-x86_64-bios`
# variant for amd64 and the regular UEFI image for arm64 (Graviton
# .metal requires UEFI). Spec is otherwise identical to rio-default;
# §13c: only the §13b `metal-*` hwClasses reference rio-metal (via
# `nodeClass: rio-metal`), virtualized pools stay on rio-default
# (UEFI/UKI).
{{- /* rio-nvme: instanceStorePolicy: RAID0 set so Karpenter's bin-pack
       sim sees the NVMe capacity (else only EBS root → 50Gi+ ephemeral
       requests look unschedulable at provisioning time). nodeadm does
       NOT act on it: AMI invokes `nodeadm init --skip run --daemon
       kubelet`, which never runs the local-disk aspect. The AMI's
       rio-nvme-mount.service (before=nodeadm-init+tmpfiles) owns
       mdadm→mkfs.xfs+prjquota→mount. */}}
{{- range $nc := list (dict "name" "rio-default" "amd64Boot" "uefi") (dict "name" "rio-metal" "amd64Boot" "legacy-bios") (dict "name" "rio-nvme" "amd64Boot" "uefi") }}
---
apiVersion: karpenter.k8s.aws/v1
kind: EC2NodeClass
metadata:
  name: {{ $nc.name }}
  labels:
    app.kubernetes.io/part-of: rio-build
spec:
  amiFamily: AL2023
  amiSelectorTerms:
    - tags:
        rio.build/ami: {{ required "karpenter.amiTag is required when karpenter.enabled=true — run `cargo xtask k8s -p eks up --ami` first" $k.amiTag }}
        kubernetes.io/arch: amd64
        rio.build/boot: {{ $nc.amd64Boot }}
    - tags:
        rio.build/ami: {{ $k.amiTag }}
        kubernetes.io/arch: arm64
        rio.build/boot: uefi
  role: {{ required "karpenter.nodeRoleName is required when karpenter.enabled=true" $k.nodeRoleName }}
  subnetSelectorTerms:
    - tags:
        karpenter.sh/discovery: {{ required "karpenter.clusterName is required when karpenter.enabled=true" $k.clusterName }}
  securityGroupSelectorTerms:
    - tags:
        karpenter.sh/discovery: {{ $k.clusterName }}
  # IMDSv2 hop-limit 1 + v6 endpoint enabled. primary-ipv6-init (host
  # netns) reaches fd00:ec2::254 directly (hop 0 → token-PUT works);
  # a non-hostNetwork pod's token-PUT response decrements TTL to 0
  # crossing host→veth→pod and is dropped — pod TCP-connects (gets 401
  # on bare GET) but cannot obtain a token. Live spike confirmed both
  # halves at hop-limit=1 and full pod IMDS read at hop-limit=2, so
  # hop-limit IS load-bearing here. Second independent control:
  # explicit egressDeny toCIDR fd00:ec2::254/128 + 169.254.169.254/32
  # in networkpolicy.yaml (builder-egress + fetcher-egress CCNPs). The
  # old limit-2 rationale was vpc-cni's SNAT hop; Cilium adds none, and
  # hostNetwork agents work fine at limit 1.
  metadataOptions:
    httpEndpoint: enabled
    httpTokens: required
    httpPutResponseHopLimit: 1
    httpProtocolIPv6: enabled
  blockDeviceMappings:
    - deviceName: /dev/xvda
      ebs:
        volumeSize: {{ $k.dataVolumeSize }}
        # gp3 with provisioned IOPS+throughput. Build workloads are
        # IOPS-bound (NAR extract, cc1 -MMD dep writes, link); gp3
        # baseline 3000 IOPS throttles -j32+. gp3 max is 16k IOPS /
        # 1000 MiB/s — same IOPS we wanted from io2, but NO separate
        # provisioned-IOPS account quota (io1/io2 cap at 300k/100k
        # account-wide → 18/6 nodes at 16k each). io1/io2 once the
        # quota increase lands (L-B3A130E6).
        volumeType: gp3
        iops: {{ $k.dataVolumeIops }}
        throughput: {{ $k.dataVolumeThroughputMiBps }}
        deleteOnTermination: true
        encrypted: true
  {{- if eq $nc.name "rio-nvme" }}
  instanceStorePolicy: RAID0
  {{- end }}
  tags:
    karpenter.sh/discovery: {{ $k.clusterName }}
{{- end }}
---
# ADR-023 §13b shim — Karpenter sees this NodePool, never provisions
# from it (cpu:0). rio-controller's `nodeclaim_pool` reconciler creates
# NodeClaims directly with `karpenter.sh/nodepool: rio-nodeclaim-shim`.
apiVersion: karpenter.sh/v1
kind: NodePool
metadata:
  name: rio-nodeclaim-shim
  labels:
    app.kubernetes.io/part-of: rio-build
spec:
  template:
    spec:
      nodeClassRef:
        group: karpenter.k8s.aws
        kind: EC2NodeClass
        name: rio-default
      requirements:
        - key: kubernetes.io/os
          operator: In
          values: [linux]
        # I-205 partition (matches every other rio-default pool). Academic
        # since `limits.cpu: 0` means this pool never provisions, but
        # keeps the partition invariant universal across all uefi pools.
        - key: karpenter.k8s.aws/instance-size
          operator: NotIn
          values: {{ toJson $k.metalSizes }}
      expireAfter: Never
  limits:
    cpu: "0"
  disruption:
    consolidationPolicy: WhenEmpty
    consolidateAfter: Never
    budgets:
      - nodes: "0"
{{- range $k.nodePools }}
---
apiVersion: karpenter.sh/v1
kind: NodePool
metadata:
  name: {{ .name }}
  labels:
    app.kubernetes.io/part-of: rio-build
spec:
  weight: {{ .weight }}
  template:
    metadata:
      labels:
        {{- toYaml .labels | nindent 8 }}
    spec:
      nodeClassRef:
        group: karpenter.k8s.aws
        kind: EC2NodeClass
        name: {{ .nodeClass | default "rio-default" }}
      {{- with .taints }}
      taints:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      requirements:
        {{- toYaml .requirements | nindent 8 }}
        # I-205 template-side guard: every static NodePool gets the
        # metal exclusion. §13c: there is no static metal NodePool —
        # `metal-*` hwClasses get the `In` side from §13b
        # `cover::build_nodeclaim`. Single source `$.Values.karpenter.
        # metalSizes` (also `controller.toml metal_sizes`). Don't
        # open-code instance-size in `requirements:`.
        - key: karpenter.k8s.aws/instance-size
          operator: NotIn
          values: {{ toJson $k.metalSizes }}
  limits:
    cpu: {{ .limits.cpu }}
  disruption:
    # WhenEmpty only — builds are long-running; don't consolidate a
    # node with a worker pod on it even if underutilized. 10m default:
    # ephemeral builds arrive in bursts; a node provisioned for one
    # stays warm for the next, avoiding ~90s cold-start churn per
    # build.
    consolidationPolicy: WhenEmpty
    consolidateAfter: {{ .consolidateAfter | default "10m" }}
    {{- with .budgets }}
    budgets:
      {{- toYaml . | nindent 6 }}
    {{- end }}
{{- end }}
{{- end }}
