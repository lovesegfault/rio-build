{{- define "rio.buildSchedulerConfig" -}}
apiVersion: kubescheduler.config.k8s.io/v1
kind: KubeSchedulerConfiguration
leaderElection:
  leaderElect: true
  resourceName: kube-build-scheduler
  resourceNamespace: {{ .Values.namespaces.system.name }}
profiles:
  - schedulerName: kube-build-scheduler
    pluginConfig:
      - name: NodeResourcesFit
        args:
          scoringStrategy:
            type: MostAllocated
            resources:
              - name: cpu
                weight: 1
{{- end }}
{{- if .Values.buildScheduler.enabled }}
{{- $ns := .Values.namespaces.system.name -}}
# ADR-023 §13b: second kube-scheduler instance with `schedulerName:
# kube-build-scheduler` and MostAllocated scoring. Builder pods set
# `spec.schedulerName: kube-build-scheduler` (B12) so the default
# kube-scheduler ignores them; this instance bin-packs onto the fewest
# nodes (vs the default LeastAllocated spread) so the nodeclaim_pool
# reconciler's FFD simulation (B7) and Karpenter's consolidation see
# tight residuals.
#
# Leader-elects on its OWN Lease (`kube-build-scheduler` in {{ $ns }},
# NOT the cluster-default `kube-scheduler` lease in kube-system) so two
# replicas active/standby without contending with the cluster's primary
# scheduler.
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: kube-build-scheduler-config
  namespace: {{ $ns }}
  labels:
    {{- include "rio.labels" (dict "root" . "name" "kube-build-scheduler" "component" "scheduler") | nindent 4 }}
data:
  config.yaml: |
    {{- include "rio.buildSchedulerConfig" . | nindent 4 }}
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: kube-build-scheduler
  namespace: {{ $ns }}
  labels:
    {{- include "rio.labels" (dict "root" . "name" "kube-build-scheduler" "component" "scheduler") | nindent 4 }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: kube-build-scheduler
  namespace: {{ $ns }}
  labels:
    {{- include "rio.labels" (dict "root" . "name" "kube-build-scheduler" "component" "scheduler") | nindent 4 }}
spec:
  replicas: 2
  selector:
    matchLabels:
      {{- include "rio.selectorLabels" "kube-build-scheduler" | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "rio.labels" (dict "root" . "name" "kube-build-scheduler" "component" "scheduler") | nindent 8 }}
      annotations:
        # ConfigMap edits don't restart pods on their own — checksum the
        # rendered config so a scoringStrategy change rolls the Deployment.
        checksum/config: {{ include "rio.buildSchedulerConfig" . | sha256sum }}
    spec:
      serviceAccountName: kube-build-scheduler
      {{- if .Values.karpenter.enabled }}
      nodeSelector:
        rio.build/node-role: general
      {{- end }}
      {{- include "rio.podSecurityContext" . | nindent 6 }}
      containers:
        - name: kube-scheduler
          # Upstream image, digest-pinned (03-digest-pin); tag tracks the
          # EKS control-plane minor so scheduler-API skew stays within ±1.
          image: {{ required "buildScheduler.enabled requires .Values.buildScheduler.image" .Values.buildScheduler.image }}
          imagePullPolicy: {{ .Values.global.image.pullPolicy }}
          {{- include "rio.containerSecurityContext" . | nindent 10 }}
          command:
            - kube-scheduler
            - --config=/etc/kubernetes/config.yaml
            - --v=2
            # Prometheus scrapes /metrics with its own SA token, not a
            # SubjectAccessReview-authorized identity. always-allow makes
            # the path bypass the kube-scheduler's delegated authorizer.
            - --authorization-always-allow-paths=/metrics
          ports:
            - name: https-metrics
              containerPort: 10259
          livenessProbe:
            httpGet:
              path: /healthz
              port: 10259
              scheme: HTTPS
            periodSeconds: 10
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /healthz
              port: 10259
              scheme: HTTPS
            periodSeconds: 5
          volumeMounts:
            - name: config
              mountPath: /etc/kubernetes
              readOnly: true
          resources:
            {{- toYaml .Values.buildScheduler.resources | nindent 12 }}
      volumes:
        - name: config
          configMap:
            name: kube-build-scheduler-config
{{- if .Values.monitoring.enabled }}
---
# Headless metrics Service + ServiceMonitor so Prometheus scrapes :10259.
# Without this, `scheduler_pending_pods{job="kube-build-scheduler"}` does
# not exist and `KubeBuildSchedulerPendingStuck` can never fire.
apiVersion: v1
kind: Service
metadata:
  name: kube-build-scheduler-metrics
  namespace: {{ $ns }}
  labels:
    {{- include "rio.labels" (dict "root" . "name" "kube-build-scheduler" "component" "scheduler") | nindent 4 }}
spec:
  clusterIP: None
  selector:
    {{- include "rio.selectorLabels" "kube-build-scheduler" | nindent 4 }}
  ports:
    - name: https-metrics
      port: 10259
      targetPort: https-metrics
---
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: kube-build-scheduler
  namespace: {{ $ns }}
  labels:
    {{- include "rio.labels" (dict "root" . "name" "kube-build-scheduler" "component" "scheduler") | nindent 4 }}
spec:
  selector:
    matchLabels:
      {{- include "rio.selectorLabels" "kube-build-scheduler" | nindent 6 }}
  endpoints:
    - port: https-metrics
      scheme: https
      interval: {{ .Values.monitoring.scrapeInterval }}
      # kube-scheduler serves a self-signed cert on :10259. The scrape is
      # cluster-internal over Cilium-encrypted overlay; cert validation
      # adds nothing.
      tlsConfig:
        insecureSkipVerify: true
{{- end }}
{{- end }}
