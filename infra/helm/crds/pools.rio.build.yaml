apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: pools.rio.build
spec:
  group: rio.build
  names:
    categories: []
    kind: Pool
    plural: pools
    shortNames:
    - pl
    singular: pool
  scope: Namespaced
  versions:
  - additionalPrinterColumns:
    - jsonPath: .spec.kind
      name: Kind
      type: string
    - jsonPath: .status.readyReplicas
      name: Ready
      type: integer
    - jsonPath: .status.desiredReplicas
      name: Desired
      type: integer
    - jsonPath: .metadata.creationTimestamp
      name: Age
      type: date
    name: v1alpha1
    schema:
      openAPIV3Schema:
        description: Auto-generated derived type for PoolSpec via `CustomResource`
        properties:
          spec:
            description: "Spec for a pool. The derive generates a `Pool` struct with\n\
              `.metadata`, `.spec` (this), `.status`.\n\n`namespaced` because Pools\
              \ are per-namespace (multiple tenants can\nhave their own pools). Printer\
              \ columns: what `kubectl get pools`\nshows \u2014 Kind/Ready/Desired\
              \ at a glance is the main thing operators\nwant.\n\n`KubeSchema` alongside\
              \ `CustomResource`: KubeSchema processes\n`#[x_kube(validation)]` attrs\
              \ into x-kubernetes-validations.\nCustomResource alone ignores them\
              \ \u2014 the schema would have no\nCEL rules and the apiserver would\
              \ accept invalid specs. The\ntwo derives cooperate: CustomResource generates\
              \ the full CRD\nwrapper, KubeSchema handles the schema internals (including\n\
              the JsonSchema impl, so don't derive that separately)."
            properties:
              features:
                default: []
                description: "requiredSystemFeatures this pool advertises (e.g., \"\
                  kvm\",\n\"big-parallel\"). Worker's Nix config `system-features`.\n\
                  Fetchers don't advertise features \u2014 FODs route by\nis_fixed_output\
                  \ alone."
                items:
                  type: string
                type: array
              fuseCacheBytes:
                description: "`fuse-cache` emptyDir sizeLimit AND the matching addend\
                  \ to the\ncontainer's `ephemeral-storage` request/limit (kubelet\
                  \ sums\ndisk-backed emptyDirs against that limit, so the two MUST\
                  \ agree).\n`None` = per-kind safe-minimum default (8Gi builder,\
                  \ 4Gi fetcher)\nso non-helm Pools schedule on small-disk clusters.\
                  \ Helm prod\n`poolDefaults.fuseCacheBytes` overrides upward (50Gi).\
                  \ Applies\nto BOTH kinds \u2014 NOT CEL-gated for Fetcher."
                format: uint64
                minimum: 0.0
                nullable: true
                type: integer
              fusePassthrough:
                description: "FUSE passthrough mode (kernel handles reads directly,\
                  \ no\nuserspace copy). Maps to `RIO_FUSE_PASSTHROUGH`. `None` =\n\
                  worker default (`true`). Set `false` only as a diagnostic\nescape\
                  \ hatch \u2014 disabling adds ~2x per-build latency.\nRequires kernel\
                  \ >= 6.9 + `CAP_SYS_ADMIN`. Builder-only."
                nullable: true
                type: boolean
              fuseThreads:
                description: 'FUSE dispatcher thread count. Maps to `RIO_FUSE_THREADS`.

                  `None` = worker default (4). Tune up for NAR-heavy build

                  profiles where FUSE readahead is the bottleneck. Builder-only.'
                format: uint32
                minimum: 0.0
                nullable: true
                type: integer
              hostNetwork:
                description: 'Use the node''s network namespace (`hostNetwork: true`).

                  None/false = pod has its own netns (the default).


                  Constraint: `hostNetwork: true` requires `privileged: true`.

                  CEL-forbidden for `kind=Fetcher`.'
                nullable: true
                type: boolean
              hostUsers:
                description: 'Explicit `hostUsers` override. `None` defaults to `hostUsers:

                  false` (userns isolation per ADR-012). Set `true` for k3s/

                  containerd deployments that don''t chown the pod cgroup to the

                  userns-mapped root UID. NOT CEL-gated for `kind=Fetcher` (k3s

                  escape hatch); the reconciler default `false` is the safety net.'
                nullable: true
                type: boolean
              image:
                description: "Container image ref. Required \u2014 there's no sensible\
                  \ default\n(depends on how operators build/tag)."
                type: string
              imagePullPolicy:
                description: "Container imagePullPolicy. None = K8s default (IfNotPresent\n\
                  for tagged images, Always for `:latest`). Airgap/dev clusters\n\
                  (k3s with `ctr images import`) MUST set \"IfNotPresent\" or\n\"\
                  Never\" \u2014 `:latest` otherwise tries docker.io and fails."
                nullable: true
                type: string
              kind:
                description: "Builder or Fetcher. Required \u2014 there is no sensible\
                  \ default\n(the two have opposite network postures)."
                enum:
                - Builder
                - Fetcher
                type: string
              maxConcurrent:
                description: "Concurrent-Job ceiling. The reconciler spawns one Job\
                  \ per\ndispatch-need up to this many active at once. `None` = no\n\
                  controller-side cap \u2014 Karpenter's NodePool `limits.cpu` (and\n\
                  ultimately the AWS vCPU service quota) becomes the only gate.\n\
                  Excess Jobs sit Pending until nodes provision; reap-excess-\npending\
                  \ trims them if demand drops."
                format: uint32
                minimum: 0.0
                nullable: true
                type: integer
              nodeSelector:
                additionalProperties:
                  type: string
                description: Node selector for the Job pod spec.
                nullable: true
                type: object
              privileged:
                description: 'Run the worker container privileged. None/false = the

                  default granular caps (SYS_ADMIN + SYS_CHROOT), which is

                  sufficient on most clusters. true = full privileged,

                  which disables seccomp and grants ALL caps.


                  When to set true: clusters whose containerd seccomp profile

                  blocks mount(2) even with SYS_ADMIN and whose nodes don''t

                  pre-install the Localhost profile. Production on EKS/GKE

                  with proper runtime config should NOT need this.

                  CEL-forbidden for `kind=Fetcher`.'
                nullable: true
                type: boolean
              seccompProfile:
                description: "Seccomp profile kind. `None`/`RuntimeDefault` = the\
                  \ runtime's\ndefault filter. `Localhost` = a profile JSON installed\
                  \ at\n`/var/lib/kubelet/seccomp/<localhost_profile>` on every node.\n\
                  `Unconfined` = no filter (debugging only).\n\nIgnored when `privileged:\
                  \ true` \u2014 privileged disables seccomp\nat the runtime level.\
                  \ CEL-forbidden for `kind=Fetcher` (the\nreconciler forces `Localhost\
                  \ operator/rio-fetcher.json`)."
                nullable: true
                properties:
                  localhostProfile:
                    description: 'Path relative to `/var/lib/kubelet/seccomp/`. REQUIRED
                      when

                      `type: Localhost`, FORBIDDEN otherwise (CEL enforces both).'
                    nullable: true
                    type: string
                  type:
                    description: '`RuntimeDefault` / `Localhost` / `Unconfined`. K8s
                      convention

                      is the field is literally `type` in YAML.'
                    type: string
                required:
                - type
                type: object
                x-kubernetes-validations:
                - rule: self.type in ['RuntimeDefault', 'Localhost', 'Unconfined']
                - rule: 'self.type == ''Localhost'' ? has(self.localhostProfile) :
                    !has(self.localhostProfile)'
              systems:
                description: 'Target systems (e.g., `["x86_64-linux"]`). Builders
                  AND

                  fetchers execute derivation `builder` scripts, so the host

                  system must match.'
                items:
                  type: string
                type: array
              terminationGracePeriodSeconds:
                description: "Pod terminationGracePeriodSeconds. SIGTERM \u2192 executor\
                  \ drain\n(DrainExecutor + wait for in-flight builds to complete).\
                  \ After\nthis many seconds: SIGKILL, builds lost.\n\n`None` = per-kind\
                  \ default (7200 builders, 600 fetchers \u2014 nix\nbuilds can legitimately\
                  \ take 2h; fetches are short). Clusters\nwith known-shorter builds\
                  \ should set this lower so Pool\ndeletion doesn't stall on a stuck/never-Ready\
                  \ pod."
                format: int64
                nullable: true
                type: integer
              tolerations:
                description: 'Tolerations for the Job pod spec. Typed `Toleration`
                  (not

                  `serde_json::Value`); `any_object_array` passthrough because

                  k8s-openapi types don''t impl JsonSchema.'
                items:
                  type: object
                  x-kubernetes-preserve-unknown-fields: true
                nullable: true
                type: array
            required:
            - image
            - kind
            - systems
            type: object
            x-kubernetes-validations:
            - message: "systems must be non-empty \u2014 a pool with no target systems\
                \ accepts no work"
              rule: size(self.systems) > 0
            - message: "hostNetwork:true requires privileged:true \u2014 Kubernetes\
                \ rejects hostUsers:false with hostNetwork:true at admission; the\
                \ non-privileged path sets hostUsers:false (see ADR-012)"
              rule: '!(has(self.hostNetwork) && self.hostNetwork) || (has(self.privileged)
                && self.privileged)'
            - message: "kind=Fetcher forbids privileged:true \u2014 fetchers face\
                \ the open internet; the escape hatch stays closed (ADR-019)"
              rule: self.kind != 'Fetcher' || (!has(self.privileged) || !self.privileged)
            - message: "kind=Fetcher forbids hostNetwork:true \u2014 fetchers run\
                \ on dedicated nodes with pod networking (ADR-019)"
              rule: self.kind != 'Fetcher' || (!has(self.hostNetwork) || !self.hostNetwork)
            - message: "kind=Fetcher forbids seccompProfile \u2014 the reconciler\
                \ forces Localhost operator/rio-fetcher.json (ADR-019)"
              rule: self.kind != 'Fetcher' || !has(self.seccompProfile)
            - message: "kind=Fetcher forbids FUSE tuning knobs \u2014 fetches are\
                \ network-bound, not FUSE-bound"
              rule: self.kind != 'Fetcher' || (!has(self.fuseThreads) && !has(self.fusePassthrough))
          status:
            description: "Pool status \u2014 reconciler writes, operators read.\n\n\
              `Default` because kube-rs initializes it to `None` \u2192\n`Some(default())`\
              \ on first reconcile. All fields zero-value-is-\nmeaningful (0 replicas\
              \ is a valid observed state)."
            nullable: true
            properties:
              conditions:
                default: []
                description: "Standard K8s Conditions. Currently one type:\n`SchedulerUnreachable`\
                  \ (status=True when the reconciler's\n`GetSpawnIntents` RPC fails\
                  \ \u2014 disambiguates \"scheduler idle,\nqueued=0\" from \"scheduler\
                  \ down, queued unknown\")."
                items:
                  properties:
                    type:
                      type: string
                  required:
                  - type
                  type: object
                  x-kubernetes-preserve-unknown-fields: true
                nullable: true
                type: array
                x-kubernetes-list-map-keys:
                - type
                x-kubernetes-list-type: map
              desiredReplicas:
                default: 0
                description: Concurrent-Job target the reconciler is converging on.
                format: int32
                type: integer
              readyReplicas:
                default: 0
                description: 'Jobs whose pod has passed readinessProbe (heartbeating
                  to

                  scheduler).'
                format: int32
                type: integer
              replicas:
                default: 0
                description: 'Active Job count. What''s actually running (may lag
                  desired

                  during cold start).'
                format: int32
                type: integer
            type: object
        required:
        - spec
        title: Pool
        type: object
    served: true
    storage: true
    subresources:
      status: {}
