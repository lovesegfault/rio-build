apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: builderpools.rio.build
spec:
  group: rio.build
  names:
    categories: []
    kind: BuilderPool
    plural: builderpools
    shortNames:
    - bp
    singular: builderpool
  scope: Namespaced
  versions:
  - additionalPrinterColumns:
    - jsonPath: .status.readyReplicas
      name: Ready
      type: integer
    - jsonPath: .status.desiredReplicas
      name: Desired
      type: integer
    - jsonPath: .spec.sizeClass
      name: Class
      type: string
    - jsonPath: .metadata.creationTimestamp
      name: Age
      type: date
    name: v1alpha1
    schema:
      openAPIV3Schema:
        description: Auto-generated derived type for BuilderPoolSpec via `CustomResource`
        properties:
          spec:
            description: "Spec for a builder pool. The derive generates a `BuilderPool`\n\
              struct with `.metadata`, `.spec` (this), `.status`.\n\n`namespaced`\
              \ because BuilderPools are per-namespace (multiple\ntenants can have\
              \ their own pools). Cluster-scoped would mean\none global set \u2014\
              \ too rigid.\n\nPrinter columns: what `kubectl get builderpools` shows.\
              \ Ready/\nDesired at a glance is the main thing operators want.\n\n\
              `KubeSchema` alongside `CustomResource`: KubeSchema processes\n`#[x_kube(validation)]`\
              \ attrs into x-kubernetes-validations.\nCustomResource alone ignores\
              \ them \u2014 the schema would have no\nCEL rules and the apiserver\
              \ would accept invalid specs. The\ntwo derives cooperate: CustomResource\
              \ generates the full CRD\nwrapper, KubeSchema handles the schema internals\
              \ (including\nthe JsonSchema impl, so don't derive that separately)."
            properties:
              daemonTimeoutSecs:
                description: 'Timeout (seconds) for the local nix-daemon subprocess
                  when

                  the client didn''t specify `BuildOptions.build_timeout`.

                  Maps to `RIO_DAEMON_TIMEOUT_SECS`. `None` = worker default

                  (7200 = 2h). Raise for pools running known-long builds

                  (LLVM, chromium, full NixOS closure from cold cache).'
                format: uint64
                minimum: 0.0
                nullable: true
                type: integer
              deadlineSeconds:
                description: 'Backstop `activeDeadlineSeconds` on Jobs. `None` = per-role

                  default (3600 for builders, 300 for fetchers).'
                format: uint32
                minimum: 0.0
                nullable: true
                type: integer
              features:
                default: []
                description: 'requiredSystemFeatures this pool advertises (e.g., "kvm",

                  "big-parallel"). Worker''s Nix config `system-features`.'
                items:
                  type: string
                type: array
              fusePassthrough:
                description: "FUSE passthrough mode (kernel handles reads directly,\
                  \ no\nuserspace copy). Maps to `RIO_FUSE_PASSTHROUGH`. `None` =\n\
                  worker default (`true`). Set `false` only as a diagnostic\nescape\
                  \ hatch \u2014 disabling adds ~2x per-build latency.\nRequires kernel\
                  \ >= 6.9 + `CAP_SYS_ADMIN` (the worker\ncontainer always has SYS_ADMIN\
                  \ for the FUSE mount itself)."
                nullable: true
                type: boolean
              fuseThreads:
                description: 'FUSE dispatcher thread count. Maps to `RIO_FUSE_THREADS`.

                  `None` = worker default (4). Tune up for NAR-heavy build

                  profiles where FUSE readahead is the bottleneck (visible

                  as `rio_builder_fuse_read_latency_seconds` tail > 10ms

                  with low CPU).'
                format: uint32
                minimum: 0.0
                nullable: true
                type: integer
              hostNetwork:
                description: "Use the node's network namespace (`hostNetwork: true`).\n\
                  None/false = pod has its own netns (the default, CNI-\nassigned\
                  \ IP). true = pod shares the node's IP + DNS +\n/etc/hosts.\n\n\
                  When to set true: VM tests where scheduler/store run on\na separate\
                  \ VM reachable by node hostname but not cluster\nDNS; or bare-metal\
                  \ where pod networking adds unwanted\nlatency (worker \u2192 store\
                  \ is NAR-heavy).\n\nCaveat: hostNetwork pods can't use containerPort-based\n\
                  Services. The worker doesn't serve anything inbound\n(metrics/health\
                  \ are scraped from the node), so this\ndoesn't break it.\n\nConstraint:\
                  \ `hostNetwork: true` requires `privileged: true`.\nKubernetes rejects\
                  \ `hostUsers: false` + `hostNetwork: true`\nat admission (user-namespace\
                  \ remap is incompatible with the\nhost netns). The non-privileged\
                  \ path sets `hostUsers: false`\n(ADR-012), so hostNetwork implies\
                  \ the privileged escape\nhatch. CRD CEL validation enforces this\
                  \ \u2014 see the\n`host-users-network-exclusive` marker in controller.md."
                nullable: true
                type: boolean
              hostUsers:
                description: "Explicit `hostUsers` override. `None` defaults to `hostUsers:\n\
                  false` (userns isolation per ADR-012). Set `true` for k3s/\ncontainerd\
                  \ deployments that don't chown the pod cgroup to the\nuserns-mapped\
                  \ root UID \u2014 see `BuilderPoolSpec.host_users` doc\nfor the\
                  \ full diagnostic."
                nullable: true
                type: boolean
              image:
                description: "Container image ref. Required \u2014 there's no sensible\
                  \ default\n(depends on how operators build/tag)."
                type: string
              imagePullPolicy:
                description: "Container imagePullPolicy. None = K8s default (IfNotPresent\n\
                  for tagged images, Always for `:latest`). Airgap/dev clusters\n\
                  (k3s with `ctr images import`) MUST set \"IfNotPresent\" or\n\"\
                  Never\" \u2014 `:latest` otherwise tries docker.io and fails.\n\n\
                  Controller-managed Jobs can't be kustomize-patched (the CRD\nis\
                  \ patched, not the generated Job), so this has to be a CRD\nfield."
                nullable: true
                type: string
              maxConcurrent:
                description: 'Concurrent-Job ceiling. The reconciler spawns one Job
                  per

                  dispatch-need up to this many active at once. Both CRDs add

                  a struct-level CEL `self.maxConcurrent > 0`.'
                format: uint32
                minimum: 0.0
                type: integer
              nodeSelector:
                additionalProperties:
                  type: string
                description: Node selector for the Job pod spec.
                nullable: true
                type: object
              privileged:
                description: 'Run the worker container privileged. None/false = the

                  default granular caps (SYS_ADMIN + SYS_CHROOT), which is

                  sufficient on most clusters. true = full privileged,

                  which disables seccomp and grants ALL caps.


                  When to set true: clusters whose containerd seccomp profile

                  blocks mount(2) even with SYS_ADMIN and whose nodes don''t

                  pre-install the Localhost profile. Production on EKS/GKE

                  with proper runtime config should NOT need this.'
                nullable: true
                type: boolean
              resources:
                description: "K8s resource requests/limits for the executor container.\n\
                  `any_object` passthrough \u2014 see `crate::any_object` for why."
                nullable: true
                type: object
                x-kubernetes-preserve-unknown-fields: true
              seccompProfile:
                description: "Seccomp profile kind. `None`/`RuntimeDefault` = the\
                  \ runtime's\ndefault filter (blocks ~40 syscalls: kexec_load, userfaultfd,\n\
                  open_by_handle_at etc). `Localhost` = a profile JSON installed\n\
                  at `/var/lib/kubelet/seccomp/<localhost_profile>` on every node\n\
                  \u2014 rio ships one at `infra/helm/rio-build/files/seccomp-rio-\n\
                  worker.json` that additionally denies `ptrace`, `bpf`, `setns`,\n\
                  `process_vm_{read,write}v` (syscalls a sandbox escapee with\nCAP_SYS_ADMIN\
                  \ would otherwise have). `Unconfined` = no filter\n(debugging only).\n\
                  \nLocalhost is PRODUCTION-ONLY: the node-level profile install\n\
                  (DaemonSet + hostPath or node-prep script) is outside the\ncontroller's\
                  \ scope. VM test fixtures use RuntimeDefault. See\ndocs/src/security.md\
                  \ `r[builder.seccomp.localhost-profile]`.\n\nIgnored when `privileged:\
                  \ true` \u2014 privileged disables seccomp\nat the runtime level\
                  \ regardless of what profile is set."
                nullable: true
                properties:
                  localhostProfile:
                    description: 'Path relative to `/var/lib/kubelet/seccomp/`. REQUIRED
                      when

                      `type: Localhost`, FORBIDDEN otherwise (CEL enforces both).

                      rio''s profiles are written by systemd-tmpfiles on every node

                      before kubelet starts (`nix/nixos-node/hardening.nix`) and land

                      at `operator/{name}.json`; the chart''s default builderPool

                      value is `operator/rio-builder.json`.'
                    nullable: true
                    type: string
                  type:
                    description: "`RuntimeDefault` \u2014 the runtime's default filter\
                      \ (~40 syscalls\nblocked). `Localhost` \u2014 a profile JSON\
                      \ at `/var/lib/kubelet/\nseccomp/<localhostProfile>` on the\
                      \ node; rio ships one at\n`infra/helm/rio-build/files/seccomp-rio-builder.json`\
                      \ that\nadditionally denies ptrace/bpf/setns/process_vm_*.\n\
                      `Unconfined` \u2014 no filter (debugging ONLY; never production).\n\
                      \n`type_` with serde rename: `type` is a Rust keyword. K8s\n\
                      convention is the field is literally `type` in YAML."
                    type: string
                required:
                - type
                type: object
                x-kubernetes-validations:
                - rule: self.type in ['RuntimeDefault', 'Localhost', 'Unconfined']
                - rule: 'self.type == ''Localhost'' ? has(self.localhostProfile) :
                    !has(self.localhostProfile)'
              sizeClass:
                default: ''
                description: "Size class name. Maps to `RIO_SIZE_CLASS` env. Scheduler\n\
                  routes by this (classify() \u2192 matching-class workers).\nEmpty\
                  \ = unclassified (scheduler with size_classes\nconfigured REJECTS\
                  \ unclassified workers \u2014 visible\nmisconfig failure).\n\nConvention:\
                  \ pool name = size class name. Not enforced\n(you might have `small-x86`\
                  \ and `small-arm` pools both\nsize_class=\"small\")."
                type: string
              sizeClassCutoffSecs:
                description: 'The class''s `cutoffSecs` (upper-bound predicted build
                  duration).

                  Stamped onto BuilderPoolSet children from `SizeClassSpec.cutoff_

                  secs`; standalone BuilderPools may set it directly. When set and

                  `deadline_seconds` is unset, Jobs derive `activeDeadlineSeconds

                  = cutoff * DEADLINE_MULTIPLIER` instead of the flat 3600

                  default --- per-class hung-build detection (I-200,

                  `r[ctrl.ephemeral.per-class-deadline]`). f64 to match

                  `SizeClassSpec.cutoff_secs` (EMA-smoothed cutoffs are

                  fractional); the controller `ceil`s before casting.'
                format: double
                nullable: true
                type: number
              sizing:
                default: Static
                description: 'Pod sizing mode (ADR-020). `Static` = operator-set

                  `spec.resources`. `Manifest` = controller polls

                  `GetCapacityManifest`, spawns Jobs with per-derivation resources.

                  `#[serde(default)]` + `#[default] Static` means existing YAMLs

                  without `sizing:` parse unchanged.'
                enum:
                - Static
                - Manifest
                type: string
              systems:
                description: 'Target systems (e.g., `["x86_64-linux"]`). Builders
                  AND

                  fetchers execute derivation `builder` scripts, so the host

                  system must match.'
                items:
                  type: string
                type: array
              terminationGracePeriodSeconds:
                description: "Pod terminationGracePeriodSeconds. SIGTERM \u2192 executor\
                  \ drain\n(DrainExecutor + wait for in-flight builds to complete).\
                  \ After\nthis many seconds: SIGKILL, builds lost.\n\nDefault 7200\
                  \ (2h) \u2014 nix builds can legitimately take that\nlong (LLVM\
                  \ from cold ccache, full NixOS closure). Clusters\nwith known-shorter\
                  \ builds (e.g., VM test fixtures with \u226490s\nsleeps) should\
                  \ set this lower so BuilderPool deletion doesn't\nstall on a stuck/never-Ready\
                  \ pod for 2h."
                format: int64
                nullable: true
                type: integer
              tlsSecretName:
                description: "mTLS client cert Secret name (`tls.crt`/`tls.key`/`ca.crt`).\n\
                  Same cert across builders and fetchers \u2014 same binary, same\n\
                  scheduler/store endpoints. Unset = plaintext gRPC (dev mode)."
                nullable: true
                type: string
              tolerations:
                description: 'Tolerations for the Job pod spec. Typed `Toleration`
                  (not

                  `serde_json::Value`); `any_object_array` passthrough because

                  k8s-openapi types don''t impl JsonSchema.'
                items:
                  type: object
                  x-kubernetes-preserve-unknown-fields: true
                nullable: true
                type: array
            required:
            - image
            - maxConcurrent
            - systems
            type: object
            x-kubernetes-validations:
            - message: "maxConcurrent must be > 0 \u2014 it is the concurrent-Job\
                \ ceiling"
              rule: self.maxConcurrent > 0
            - message: "systems must be non-empty \u2014 a builder pool with no target\
                \ systems accepts no work"
              rule: size(self.systems) > 0
            - message: "hostNetwork:true requires privileged:true \u2014 Kubernetes\
                \ rejects hostUsers:false with hostNetwork:true at admission; the\
                \ non-privileged path sets hostUsers:false (see ADR-012)"
              rule: '!(has(self.hostNetwork) && self.hostNetwork) || (has(self.privileged)
                && self.privileged)'
          status:
            description: "BuilderPool status \u2014 reconciler writes, operators read.\n\
              \n`Default` because kube-rs initializes it to `None` \u2192 `Some(default())`\n\
              on first reconcile. All fields zero-value-is-meaningful (0 replicas\n\
              is a valid observed state)."
            nullable: true
            properties:
              conditions:
                default: []
                description: "Standard K8s Conditions. Both pools currently expose\
                  \ one type:\n`SchedulerUnreachable` (status=True when the reconciler's\n\
                  `ClusterStatus` RPC fails \u2014 disambiguates \"scheduler idle,\n\
                  queued=0\" from \"scheduler down, queued unknown\")."
                items:
                  type: object
                  x-kubernetes-preserve-unknown-fields: true
                nullable: true
                type: array
              desiredReplicas:
                default: 0
                description: Concurrent-Job target the reconciler is converging on.
                format: int32
                type: integer
              readyReplicas:
                default: 0
                description: 'Jobs whose pod has passed readinessProbe (heartbeating
                  to

                  scheduler).'
                format: int32
                type: integer
              replicas:
                default: 0
                description: 'Active Job count. What''s actually running (may lag
                  desired

                  during cold start).'
                format: int32
                type: integer
            type: object
        required:
        - spec
        title: BuilderPool
        type: object
    served: true
    storage: true
    subresources:
      status: {}
