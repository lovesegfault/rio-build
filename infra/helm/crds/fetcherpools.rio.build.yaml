apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: fetcherpools.rio.build
spec:
  group: rio.build
  names:
    categories: []
    kind: FetcherPool
    plural: fetcherpools
    shortNames:
    - fp
    singular: fetcherpool
  scope: Namespaced
  versions:
  - additionalPrinterColumns:
    - jsonPath: .status.readyReplicas
      name: Ready
      type: integer
    - jsonPath: .status.desiredReplicas
      name: Desired
      type: integer
    - jsonPath: .metadata.creationTimestamp
      name: Age
      type: date
    name: v1alpha1
    schema:
      openAPIV3Schema:
        description: Auto-generated derived type for FetcherPoolSpec via `CustomResource`
        properties:
          spec:
            description: "FetcherPool spec. The reconciler labels pods `rio.build/role:\n\
              fetcher` and sets stricter `securityContext` (`readOnlyRootFilesystem:\n\
              true`, stricter seccomp).\n\nOptionally size-classed via `classes[]`\
              \ (I-170): fetchers run\narbitrary code (the FOD's `builder` script)\
              \ and a large source\nunpack+NAR-serialize can OOM a 2Gi pod. Unlike\
              \ BuilderPoolSet\nthere is no a-priori signal (no `build_samples` history,\
              \ no\nduration cutoff) \u2014 the scheduler routes FODs to the smallest\n\
              class by default and reactively promotes on transient failure\n(`r[sched.fod.size-class-reactive]`).\n\
              \n`KubeSchema` alongside `CustomResource`: same pattern as\nBuilderPoolSpec.\
              \ No CEL on this struct yet, but KubeSchema\nkeeps the door open without\
              \ a re-derive."
            properties:
              classes:
                description: "Optional size classes (I-170). When empty (default),\
                  \ single\nJob loop at `spec.resources`. When non-empty, the reconciler\n\
                  runs one Job loop per class; each registers with\n`size_class =\
                  \ name` so the scheduler can route by\n`DerivationState.size_class_floor`.\n\
                  \nUnlike `BuilderPoolSet.classes[]` there is NO `cutoff_secs` \u2014\
                  \nfetchers have no a-priori duration estimate (FODs are excluded\n\
                  from `build_samples`; ADR-019). Routing is reactive only: a\nFOD\
                  \ that fails on class N retries on class N+1. Order classes\nsmallest\u2192\
                  largest; the scheduler treats `classes[0]` as the\ndefault floor.\n\
                  \nNOT a separate `FetcherPoolSet` CRD: the BuilderPoolSet\u2192\
                  child\nindirection exists for per-class autoscaling targets keyed\
                  \ on\nper-class queue depth. Fetcher classes are expected to be\n\
                  `[tiny, small]` with `small` rarely used \u2014 flat `classes[]`\n\
                  on the existing CRD is simpler. Per-arch is handled by\nrendering\
                  \ multiple `FetcherPool` CRs (helm `fetcherPools[]`),\nnot by a\
                  \ *Set CRD. Promote to a *Set CRD later if per-class-\nper-arch\
                  \ autoscaling targets diverge."
                items:
                  description: "One fetcher size class. Mirrors `SizeClassSpec` minus\n\
                    `cutoff_secs` \u2014 fetchers route by reactive floor only, not\n\
                    duration estimate. The scheduler's `[[fetcher_size_classes]]`\n\
                    config carries just the names (for ordering); per-class\n`resources`\
                    \ live here on the controller side."
                  properties:
                    maxConcurrent:
                      description: 'Concurrent-Job ceiling for this class. `None`
                        = inherit

                        `spec.max_concurrent`.'
                      format: uint32
                      minimum: 0.0
                      nullable: true
                      type: integer
                    name:
                      description: 'Class name. Becomes the child pool / Job name
                        suffix AND the

                        `RIO_SIZE_CLASS` env the executor reports in its heartbeat.'
                      type: string
                    resources:
                      description: "K8s resource requests/limits for this class's\
                        \ pods.\nNON-Option: distinct resource profiles are the entire\
                        \ point\nof size classes. `any_object` passthrough \u2014\
                        \ see\n`crate::any_object` for why."
                      nullable: true
                      type: object
                      x-kubernetes-preserve-unknown-fields: true
                  required:
                  - name
                  - resources
                  type: object
                type: array
              deadlineSeconds:
                description: 'Backstop `activeDeadlineSeconds` on Jobs. `None` = per-role

                  default (3600 for builders, 300 for fetchers).'
                format: uint32
                minimum: 0.0
                nullable: true
                type: integer
              hostUsers:
                description: "Explicit `hostUsers` override. `None` defaults to `hostUsers:\n\
                  false` (userns isolation per ADR-012). Set `true` for k3s/\ncontainerd\
                  \ deployments that don't chown the pod cgroup to the\nuserns-mapped\
                  \ root UID \u2014 see `BuilderPoolSpec.host_users` doc\nfor the\
                  \ full diagnostic."
                nullable: true
                type: boolean
              image:
                description: "Container image ref. Required \u2014 there's no sensible\
                  \ default\n(depends on how operators build/tag)."
                type: string
              maxConcurrent:
                description: 'Concurrent-Job ceiling. The reconciler spawns one Job
                  per

                  dispatch-need up to this many active at once. Both CRDs add

                  a struct-level CEL `self.maxConcurrent > 0`.'
                format: uint32
                minimum: 0.0
                type: integer
              nodeSelector:
                additionalProperties:
                  type: string
                description: Node selector for the Job pod spec.
                nullable: true
                type: object
              resources:
                description: "K8s resource requests/limits for the executor container.\n\
                  `any_object` passthrough \u2014 see `crate::any_object` for why."
                nullable: true
                type: object
                x-kubernetes-preserve-unknown-fields: true
              systems:
                description: 'Target systems (e.g., `["x86_64-linux"]`). Builders
                  AND

                  fetchers execute derivation `builder` scripts, so the host

                  system must match.'
                items:
                  type: string
                type: array
              tlsSecretName:
                description: "mTLS client cert Secret name (`tls.crt`/`tls.key`/`ca.crt`).\n\
                  Same cert across builders and fetchers \u2014 same binary, same\n\
                  scheduler/store endpoints. Unset = plaintext gRPC (dev mode)."
                nullable: true
                type: string
              tolerations:
                description: 'Tolerations for the Job pod spec. Typed `Toleration`
                  (not

                  `serde_json::Value`); `any_object_array` passthrough because

                  k8s-openapi types don''t impl JsonSchema.'
                items:
                  type: object
                  x-kubernetes-preserve-unknown-fields: true
                nullable: true
                type: array
            required:
            - image
            - maxConcurrent
            - systems
            type: object
            x-kubernetes-validations:
            - message: "maxConcurrent must be > 0 \u2014 it is the concurrent-Job\
                \ ceiling"
              rule: self.maxConcurrent > 0
            - message: "classes[] and resources are mutually exclusive \u2014 set\
                \ per-class resources in classes[].resources, or omit classes[] for\
                \ a single-size pool"
              rule: size(self.classes) == 0 || !has(self.resources)
          status:
            description: FetcherPool status. Reconciler writes; `kubectl get fp` reads.
            nullable: true
            properties:
              conditions:
                default: []
                description: "Standard K8s Conditions. Both pools currently expose\
                  \ one type:\n`SchedulerUnreachable` (status=True when the reconciler's\n\
                  `ClusterStatus` RPC fails \u2014 disambiguates \"scheduler idle,\n\
                  queued=0\" from \"scheduler down, queued unknown\")."
                items:
                  type: object
                  x-kubernetes-preserve-unknown-fields: true
                nullable: true
                type: array
              desiredReplicas:
                default: 0
                description: Concurrent-Job target the reconciler is converging on.
                format: int32
                type: integer
              readyReplicas:
                default: 0
                description: 'Jobs whose pod has passed readinessProbe (heartbeating
                  to

                  scheduler).'
                format: int32
                type: integer
            type: object
        required:
        - spec
        title: FetcherPool
        type: object
    served: true
    storage: true
    subresources:
      status: {}
