apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: fetcherpools.rio.build
spec:
  group: rio.build
  names:
    categories: []
    kind: FetcherPool
    plural: fetcherpools
    shortNames:
    - fp
    singular: fetcherpool
  scope: Namespaced
  versions:
  - additionalPrinterColumns:
    - jsonPath: .status.readyReplicas
      name: Ready
      type: integer
    - jsonPath: .status.desiredReplicas
      name: Desired
      type: integer
    - jsonPath: .metadata.creationTimestamp
      name: Age
      type: date
    name: v1alpha1
    schema:
      openAPIV3Schema:
        description: Auto-generated derived type for FetcherPoolSpec via `CustomResource`
        properties:
          spec:
            description: "FetcherPool spec. The reconciler labels pods `rio.build/role:\n\
              fetcher` and sets stricter `securityContext` (`readOnlyRootFilesystem:\n\
              true`, stricter seccomp).\n\nOptionally size-classed via `classes[]`\
              \ (I-170): fetchers run\narbitrary code (the FOD's `builder` script)\
              \ and a large source\nunpack+NAR-serialize can OOM a 2Gi pod. Unlike\
              \ BuilderPoolSet\nthere is no a-priori signal (no `build_samples` history,\
              \ no\nduration cutoff) \u2014 the scheduler routes FODs to the smallest\n\
              class by default and reactively promotes on transient failure\n(`r[sched.fod.size-class-reactive]`).\n\
              \n`KubeSchema` alongside `CustomResource`: same pattern as\nBuilderPoolSpec.\
              \ No CEL on this struct yet, but KubeSchema\nkeeps the door open without\
              \ a re-derive."
            properties:
              autoscaling:
                description: 'Autoscaling policy. Same struct as BuilderPool. The
                  expected

                  `metric` is `"fodQueueDepth"` (`ClusterStatus.queued_fod_

                  derivations`); the controller''s autoscaler validates and

                  surfaces unrecognized metrics in `.status.conditions`.'
                properties:
                  metric:
                    default: queueDepth
                    description: "Metric driving scale decisions. Currently only \"\
                      queueDepth\"\n(scheduler's ClusterStatus.queued_derivations).\
                      \ String not\nenum so future metrics don't need a CRD version\
                      \ bump \u2014\nunknown metric is a RECONCILE error (surfaces\
                      \ in\n.status.conditions), not a schema rejection."
                    type: string
                  targetValue:
                    default: 5
                    description: 'Scale up when `queued_derivations / active_executors
                      >

                      target_value`. "5" means "scale up when there are more

                      than 5 queued builds per worker." Lower = more aggressive

                      scaling (more pods, lower queue latency, higher cost).'
                    format: int32
                    type: integer
                type: object
              classes:
                description: "Optional size classes (I-170). When empty (default),\
                  \ single\nSTS/Job-set at `spec.resources` \u2014 original behavior.\
                  \ When\nnon-empty, the reconciler stamps one StatefulSet (or\nephemeral\
                  \ Job loop) per class; each registers with\n`size_class = name`\
                  \ so the scheduler can route by\n`DerivationState.size_class_floor`.\n\
                  \nUnlike `BuilderPoolSet.classes[]` there is NO `cutoff_secs` \u2014\
                  \nfetchers have no a-priori duration estimate (FODs are excluded\n\
                  from `build_samples`; ADR-019). Routing is reactive only: a\nFOD\
                  \ that fails on class N retries on class N+1. Order classes\nsmallest\u2192\
                  largest; the scheduler treats `classes[0]` as the\ndefault floor.\n\
                  \nNOT a separate `FetcherPoolSet` CRD: the BuilderPoolSet\u2192\
                  child\nindirection exists for per-class autoscaling targets keyed\
                  \ on\nper-class queue depth. Fetcher classes are expected to be\n\
                  `[tiny, small]` with `small` rarely used \u2014 flat `classes[]`\n\
                  on the existing CRD is simpler. Promote to a *Set CRD later\nif\
                  \ per-class autoscaling matters."
                items:
                  description: "One fetcher size class. Mirrors `SizeClassSpec` minus\n\
                    `cutoff_secs` \u2014 fetchers route by reactive floor only, not\n\
                    duration estimate. The scheduler's `[[fetcher_size_classes]]`\n\
                    config carries just the names (for ordering); per-class\n`resources`\
                    \ live here on the controller side."
                  properties:
                    maxReplicas:
                      description: Replica ceiling. `None` = inherit `spec.replicas.max`.
                      format: int32
                      nullable: true
                      type: integer
                    minReplicas:
                      description: 'Replica floor for this class''s StatefulSet. `None`
                        = inherit

                        `spec.replicas.min`. Per-class because "tiny" wants warm

                        replicas (most FODs land here) while "small" tolerates

                        scale-from-zero (rare promotions; +30s spinup is fine for
                        a

                        drv that already burned a retry).'
                      format: int32
                      nullable: true
                      type: integer
                    name:
                      description: 'Class name. Becomes the StatefulSet name suffix

                        (`rio-fetcher-{pool}-{name}`) AND the `RIO_SIZE_CLASS` env

                        the executor reports in its heartbeat. Convention: "tiny"
                        /

                        "small"; nothing enforces that.'
                      type: string
                    resources:
                      description: "K8s resource requests/limits for this class's\
                        \ fetcher pods.\nNON-Option: distinct resource profiles are\
                        \ the entire point\nof size classes. `any_object` passthrough\
                        \ \u2014 see\nbuilderpool.rs for why."
                      nullable: true
                      type: object
                      x-kubernetes-preserve-unknown-fields: true
                  required:
                  - name
                  - resources
                  type: object
                type: array
              ephemeral:
                default: true
                description: "Ephemeral mode: one Job per FOD instead of a StatefulSet.\
                  \ The\nreconciler polls `queued_fod_derivations` and spawns Jobs\
                  \ (one\nper outstanding FOD, up to `replicas.max`). Each pod runs\
                  \ with\n`RIO_EPHEMERAL=1` \u2192 exits after one fetch \u2192 `ttlSecondsAfter\n\
                  Finished` reaps. Same Job lifecycle as ephemeral BuilderPool;\n\
                  see `r[ctrl.pool.ephemeral]`.\n\nDefault `true` (P0541, follows\
                  \ P0537): one pod, one fetch,\nexit. Long-lived StatefulSet pools\
                  \ must set `ephemeral: false`.\n\nFODs are seconds-long and bursty\
                  \ (40+ ready when build-chain\nFOD phases align), which is exactly\
                  \ the Job-mode shape: no\n10min scale-down stabilization tax for\
                  \ spikes, no idle pods\nbetween bursts."
                type: boolean
              ephemeralDeadlineSeconds:
                description: "Backstop `activeDeadlineSeconds` on ephemeral Jobs.\
                  \ Same field\nas BuilderPool. Default 300 (`reconcilers/fetcherpool/\n\
                  ephemeral.rs::FOD_EPHEMERAL_DEADLINE_SECS`) \u2014 fetches are\n\
                  network-bound and short; a stuck download is the failure mode,\n\
                  not a 90min compile. Only meaningful when `ephemeral: true`\n(CEL-enforced)."
                format: uint32
                minimum: 0.0
                nullable: true
                type: integer
              hostUsers:
                description: "Explicit `hostUsers` override \u2014 same semantics\
                  \ as BuilderPool.\n`None` defaults to `hostUsers: false` (userns\
                  \ isolation). Set\n`true` for k3s/containerd deployments that don't\
                  \ chown the pod\ncgroup to the userns-mapped root UID (rio-builder's\
                  \ `mkdir\n/sys/fs/cgroup/leaf` fails EACCES \u2192 CrashLoopBackOff).\
                  \ See\nbuilderpool.rs's `host_users` doc for the full diagnostic."
                nullable: true
                type: boolean
              image:
                description: 'Container image. Same binary as builders (`rio-builder`),

                  different `RIO_EXECUTOR_KIND` env baked into the pod spec.'
                type: string
              nodeSelector:
                additionalProperties:
                  type: string
                description: 'Node selector. Pairs with `rio.build/node-role: fetcher`

                  label on the Karpenter NodePool (spec: fetcher.node.dedicated).'
                nullable: true
                type: object
              replicas:
                description: "Replica bounds. Autoscaler clamps to [min, max] based\
                  \ on\n`ClusterStatus.queued_fod_derivations`.\n\nSame `{min, max}`\
                  \ shape as BuilderPool. FODs spike at build\nstart (40+ FODs ready\
                  \ simultaneously when chains hit FOD-phase\ntogether) but are short\
                  \ (~seconds each), so the autoscaler\nscales up fast (30s window)\
                  \ and back down slow (10m window) \u2014\nsame stabilization timing\
                  \ as builders.\n\n**BREAKING** (I-014): was `replicas: i32`. Existing\
                  \ FetcherPool\nCRs need `kubectl edit` or re-apply with `{min: N,\
                  \ max: N}` to\npin the prior static count."
                properties:
                  max:
                    description: "Ceiling. Cost control \u2014 don't burn through\
                      \ the cluster\nunder a pathological burst."
                    format: int32
                    type: integer
                  min:
                    description: 'Floor. Autoscaler never scales below this, even
                      with empty

                      queue. Keeps a warm pool for fast dispatch when builds

                      arrive (cold start = minutes of pod scheduling + FUSE warm).'
                    format: int32
                    type: integer
                required:
                - max
                - min
                type: object
                x-kubernetes-validations:
                - message: replicas.min must be <= replicas.max
                  rule: self.min <= self.max
              resources:
                description: "K8s resource requests/limits for a single-size pool.\
                  \ Fetchers\nare typically lighter than builders (network-bound)\
                  \ \u2014 500m/1Gi\ndefault. Mutually exclusive with `classes[]`\
                  \ (CEL-enforced):\nwhen `classes` is non-empty, per-class resources\
                  \ apply and this\nfield MUST be unset. `any_object` passthrough\
                  \ \u2014 see\nbuilderpool.rs for why."
                nullable: true
                type: object
                x-kubernetes-preserve-unknown-fields: true
              systems:
                description: 'Target systems (e.g., `["x86_64-linux"]`). Fetchers
                  still

                  execute the FOD''s `builder` script (curl, git, etc.), so the

                  system must match.'
                items:
                  type: string
                type: array
              tlsSecretName:
                description: 'mTLS Secret name (tls.crt/tls.key/ca.crt) for outgoing
                  gRPC

                  to scheduler + store. Same cert as builders (same binary,

                  same client role). If unset, the fetcher runs without TLS

                  and the scheduler rejects the heartbeat in mTLS deployments.'
                nullable: true
                type: string
              tolerations:
                description: 'Tolerations. Pairs with `rio.build/fetcher=true:NoSchedule`

                  taint on fetcher nodes. Typed `Toleration` (not

                  serde_json::Value); `any_object_array` passthrough because

                  k8s-openapi types don''t impl JsonSchema.'
                items:
                  type: object
                  x-kubernetes-preserve-unknown-fields: true
                nullable: true
                type: array
            required:
            - autoscaling
            - image
            - replicas
            - systems
            type: object
            x-kubernetes-validations:
            - message: "ephemeral:true requires replicas.min==0 and replicas.max>0\
                \ \u2014 ephemeral has no standing set, only a concurrent-Job ceiling"
              rule: '!self.ephemeral || (self.replicas.min == 0 && self.replicas.max
                > 0)'
            - message: "ephemeralDeadlineSeconds is only valid with ephemeral:true\
                \ \u2014 the field sets the Job's activeDeadlineSeconds; STS pools\
                \ have no Jobs"
              rule: '!has(self.ephemeralDeadlineSeconds) || self.ephemeral'
            - message: "classes[] and resources are mutually exclusive \u2014 set\
                \ per-class resources in classes[].resources, or omit classes[] for\
                \ a single-size pool"
              rule: size(self.classes) == 0 || !has(self.resources)
          status:
            description: 'FetcherPool status. Reconciler + autoscaler write; `kubectl
              get fp`

              reads. Same SSA field-manager split as BuilderPool: reconciler owns

              `readyReplicas`/`desiredReplicas`, autoscaler owns `lastScaleTime`/

              `conditions`.'
            nullable: true
            properties:
              conditions:
                default: []
                description: 'Standard K8s Conditions. One type, `Scaling`: reason

                  ScaledUp / ScaledDown / Stabilizing / UnknownMetric.'
                items:
                  type: object
                  x-kubernetes-preserve-unknown-fields: true
                nullable: true
                type: array
              desiredReplicas:
                default: 0
                description: 'What the autoscaler set on `StatefulSet.spec.replicas`
                  (or

                  `min` on first create). Reconciler reads this back from the

                  STS so the printcolumn tracks autoscaler decisions.'
                format: int32
                type: integer
              lastScaleTime:
                description: 'Last actual replica patch. For stabilization-window

                  observability.'
                nullable: true
                type: string
              readyReplicas:
                default: 0
                description: 'StatefulSet `.status.readyReplicas`. Passed readinessProbe

                  = heartbeating to scheduler as `ExecutorKind::Fetcher`.'
                format: int32
                type: integer
            type: object
        required:
        - spec
        title: FetcherPool
        type: object
    served: true
    storage: true
    subresources:
      status: {}
