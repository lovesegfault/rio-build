apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: fetcherpools.rio.build
spec:
  group: rio.build
  names:
    categories: []
    kind: FetcherPool
    plural: fetcherpools
    shortNames:
    - fp
    singular: fetcherpool
  scope: Namespaced
  versions:
  - additionalPrinterColumns:
    - jsonPath: .status.readyReplicas
      name: Ready
      type: integer
    - jsonPath: .status.desiredReplicas
      name: Desired
      type: integer
    - jsonPath: .metadata.creationTimestamp
      name: Age
      type: date
    name: v1alpha1
    schema:
      openAPIV3Schema:
        description: Auto-generated derived type for FetcherPoolSpec via `CustomResource`
        properties:
          spec:
            description: "FetcherPool spec. The reconciler labels pods `rio.build/role:\n\
              fetcher` and sets stricter `securityContext` (`readOnlyRootFilesystem:\n\
              true`, stricter seccomp).\n\nOptionally size-classed via `classes[]`\
              \ (I-170): fetchers run\narbitrary code (the FOD's `builder` script)\
              \ and a large source\nunpack+NAR-serialize can OOM a 2Gi pod. Unlike\
              \ BuilderPoolSet\nthere is no a-priori signal (no `build_samples` history,\
              \ no\nduration cutoff) \u2014 the scheduler routes FODs to the smallest\n\
              class by default and reactively promotes on transient failure\n(`r[sched.fod.size-class-reactive]`).\n\
              \n`KubeSchema` alongside `CustomResource`: same pattern as\nBuilderPoolSpec.\
              \ No CEL on this struct yet, but KubeSchema\nkeeps the door open without\
              \ a re-derive."
            properties:
              classes:
                description: "Optional size classes (I-170). When empty (default),\
                  \ single\nSTS/Job-set at `spec.resources` \u2014 original behavior.\
                  \ When\nnon-empty, the reconciler stamps one StatefulSet (or\nephemeral\
                  \ Job loop) per class; each registers with\n`size_class = name`\
                  \ so the scheduler can route by\n`DerivationState.size_class_floor`.\n\
                  \nUnlike `BuilderPoolSet.classes[]` there is NO `cutoff_secs` \u2014\
                  \nfetchers have no a-priori duration estimate (FODs are excluded\n\
                  from `build_samples`; ADR-019). Routing is reactive only: a\nFOD\
                  \ that fails on class N retries on class N+1. Order classes\nsmallest\u2192\
                  largest; the scheduler treats `classes[0]` as the\ndefault floor.\n\
                  \nNOT a separate `FetcherPoolSet` CRD: the BuilderPoolSet\u2192\
                  child\nindirection exists for per-class autoscaling targets keyed\
                  \ on\nper-class queue depth. Fetcher classes are expected to be\n\
                  `[tiny, small]` with `small` rarely used \u2014 flat `classes[]`\n\
                  on the existing CRD is simpler. Per-arch is handled by\nrendering\
                  \ multiple `FetcherPool` CRs (helm `fetcherPools[]`),\nnot by a\
                  \ *Set CRD. Promote to a *Set CRD later if per-class-\nper-arch\
                  \ autoscaling targets diverge."
                items:
                  description: "One fetcher size class. Mirrors `SizeClassSpec` minus\n\
                    `cutoff_secs` \u2014 fetchers route by reactive floor only, not\n\
                    duration estimate. The scheduler's `[[fetcher_size_classes]]`\n\
                    config carries just the names (for ordering); per-class\n`resources`\
                    \ live here on the controller side."
                  properties:
                    maxConcurrent:
                      description: 'Concurrent-Job ceiling for this class. `None`
                        = inherit

                        `spec.max_concurrent`.'
                      format: uint32
                      minimum: 0.0
                      nullable: true
                      type: integer
                    name:
                      description: 'Class name. Becomes the StatefulSet name suffix

                        (`rio-fetcher-{name}`) AND the `RIO_SIZE_CLASS` env the

                        executor reports in its heartbeat. Convention: "tiny" /

                        "small"; nothing enforces that.'
                      type: string
                    resources:
                      description: "K8s resource requests/limits for this class's\
                        \ fetcher pods.\nNON-Option: distinct resource profiles are\
                        \ the entire point\nof size classes. `any_object` passthrough\
                        \ \u2014 see\nbuilderpool.rs for why."
                      nullable: true
                      type: object
                      x-kubernetes-preserve-unknown-fields: true
                  required:
                  - name
                  - resources
                  type: object
                type: array
              deadlineSeconds:
                description: "Backstop `activeDeadlineSeconds` on Jobs. Same field\
                  \ as\nBuilderPool. Default 300 (`reconcilers/fetcherpool/\nephemeral.rs::FOD_DEADLINE_SECS`)\
                  \ \u2014 fetches are network-bound\nand short; a stuck download\
                  \ is the failure mode, not a 90min\ncompile."
                format: uint32
                minimum: 0.0
                nullable: true
                type: integer
              hostUsers:
                description: "Explicit `hostUsers` override \u2014 same semantics\
                  \ as BuilderPool.\n`None` defaults to `hostUsers: false` (userns\
                  \ isolation). Set\n`true` for k3s/containerd deployments that don't\
                  \ chown the pod\ncgroup to the userns-mapped root UID (rio-builder's\
                  \ `mkdir\n/sys/fs/cgroup/leaf` fails EACCES \u2192 CrashLoopBackOff).\
                  \ See\nbuilderpool.rs's `host_users` doc for the full diagnostic."
                nullable: true
                type: boolean
              image:
                description: 'Container image. Same binary as builders (`rio-builder`),

                  different `RIO_EXECUTOR_KIND` env baked into the pod spec.'
                type: string
              maxConcurrent:
                description: 'Concurrent-Job ceiling. The reconciler spawns one Job
                  per

                  outstanding FOD up to this many active at once. FODs spike at

                  build start (40+ ready simultaneously when chains hit FOD-phase

                  together) but are short (~seconds each).'
                format: uint32
                minimum: 0.0
                type: integer
              nodeSelector:
                additionalProperties:
                  type: string
                description: 'Node selector. Pairs with `rio.build/node-role: fetcher`

                  label on the Karpenter NodePool (spec: fetcher.node.dedicated).'
                nullable: true
                type: object
              resources:
                description: "K8s resource requests/limits for a single-size pool.\
                  \ Fetchers\nare typically lighter than builders (network-bound)\
                  \ \u2014 500m/1Gi\ndefault. Mutually exclusive with `classes[]`\
                  \ (CEL-enforced):\nwhen `classes` is non-empty, per-class resources\
                  \ apply and this\nfield MUST be unset. `any_object` passthrough\
                  \ \u2014 see\nbuilderpool.rs for why."
                nullable: true
                type: object
                x-kubernetes-preserve-unknown-fields: true
              systems:
                description: 'Target systems (e.g., `["x86_64-linux"]`). Fetchers
                  still

                  execute the FOD''s `builder` script (curl, git, etc.), so the

                  system must match.'
                items:
                  type: string
                type: array
              tlsSecretName:
                description: 'mTLS Secret name (tls.crt/tls.key/ca.crt) for outgoing
                  gRPC

                  to scheduler + store. Same cert as builders (same binary,

                  same client role). If unset, the fetcher runs without TLS

                  and the scheduler rejects the heartbeat in mTLS deployments.'
                nullable: true
                type: string
              tolerations:
                description: 'Tolerations. Pairs with `rio.build/fetcher=true:NoSchedule`

                  taint on fetcher nodes. Typed `Toleration` (not

                  serde_json::Value); `any_object_array` passthrough because

                  k8s-openapi types don''t impl JsonSchema.'
                items:
                  type: object
                  x-kubernetes-preserve-unknown-fields: true
                nullable: true
                type: array
            required:
            - image
            - maxConcurrent
            - systems
            type: object
            x-kubernetes-validations:
            - message: "maxConcurrent must be > 0 \u2014 it is the concurrent-Job\
                \ ceiling"
              rule: self.maxConcurrent > 0
            - message: "classes[] and resources are mutually exclusive \u2014 set\
                \ per-class resources in classes[].resources, or omit classes[] for\
                \ a single-size pool"
              rule: size(self.classes) == 0 || !has(self.resources)
          status:
            description: FetcherPool status. Reconciler writes; `kubectl get fp` reads.
            nullable: true
            properties:
              conditions:
                default: []
                description: Standard K8s Conditions.
                items:
                  type: object
                  x-kubernetes-preserve-unknown-fields: true
                nullable: true
                type: array
              desiredReplicas:
                default: 0
                description: 'In-flight Job count the reconciler is targeting (queued
                  FOD

                  demand, capped at `maxConcurrent`).'
                format: int32
                type: integer
              readyReplicas:
                default: 0
                description: 'Count of active Jobs whose pod passed readinessProbe

                  (heartbeating to scheduler as `ExecutorKind::Fetcher`).'
                format: int32
                type: integer
            type: object
        required:
        - spec
        title: FetcherPool
        type: object
    served: true
    storage: true
    subresources:
      status: {}
