apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: fetcherpools.rio.build
spec:
  group: rio.build
  names:
    categories: []
    kind: FetcherPool
    plural: fetcherpools
    shortNames:
    - fp
    singular: fetcherpool
  scope: Namespaced
  versions:
  - additionalPrinterColumns:
    - jsonPath: .status.readyReplicas
      name: Ready
      type: integer
    - jsonPath: .status.desiredReplicas
      name: Desired
      type: integer
    - jsonPath: .metadata.creationTimestamp
      name: Age
      type: date
    name: v1alpha1
    schema:
      openAPIV3Schema:
        description: Auto-generated derived type for FetcherPoolSpec via `CustomResource`
        properties:
          spec:
            description: "FetcherPool spec. The reconciler labels pods `rio.build/role:\n\
              fetcher` and sets stricter `securityContext` (`readOnlyRootFilesystem:\n\
              true`, stricter seccomp).\n\nSize-classed via `classes[]` (I-170/I-208):\
              \ fetchers run arbitrary\ncode (the FOD's `builder` script) and a large\
              \ source unpack+NAR-\nserialize can OOM a 2Gi pod. Unlike BuilderPoolSet\
              \ there is no\na-priori signal (no `build_samples` history, no duration\
              \ cutoff) \u2014\nthe scheduler routes FODs to the smallest class by\
              \ default and\nreactively promotes on transient failure\n(`r[sched.fod.size-class-reactive]`).\n\
              \n`KubeSchema` alongside `CustomResource`: same pattern as\nBuilderPoolSpec."
            properties:
              classes:
                description: "Size classes (I-170/I-208). The reconciler runs one\
                  \ Job loop\nper class; each registers with `size_class = name` so\
                  \ the\nscheduler can route by `DerivationState.size_class_floor`.\n\
                  CEL-enforced non-empty \u2014 the legacy single-size\n`spec.resources`\
                  \ path has been removed.\n\nUnlike `BuilderPoolSet.classes[]` there\
                  \ is NO `cutoff_secs` \u2014\nfetchers have no a-priori duration\
                  \ estimate (FODs are excluded\nfrom `build_samples`; ADR-019). Routing\
                  \ is reactive only: a\nFOD that fails on class N retries on class\
                  \ N+1. Order classes\nsmallest\u2192largest; the scheduler treats\
                  \ `classes[0]` as the\ndefault floor.\n\nNOT a separate `FetcherPoolSet`\
                  \ CRD: the BuilderPoolSet\u2192child\nindirection exists for per-class\
                  \ autoscaling targets keyed on\nper-class queue depth. Fetcher classes\
                  \ are expected to be\n`[tiny, small]` with `small` rarely used \u2014\
                  \ flat `classes[]`\non the existing CRD is simpler. Per-arch is\
                  \ handled by\nrendering multiple `FetcherPool` CRs (helm `fetcherPools[]`),\n\
                  not by a *Set CRD. Promote to a *Set CRD later if per-class-\nper-arch\
                  \ autoscaling targets diverge."
                items:
                  description: "One fetcher size class. Mirrors `SizeClassSpec` minus\n\
                    `cutoff_secs` \u2014 fetchers route by reactive floor only, not\n\
                    duration estimate. The scheduler's `[[fetcher_size_classes]]`\n\
                    config carries just the names (for ordering); per-class\n`resources`\
                    \ live here on the controller side."
                  properties:
                    maxConcurrent:
                      description: 'Concurrent-Job ceiling for this class. `None`
                        = inherit

                        `spec.max_concurrent`.'
                      format: uint32
                      minimum: 0.0
                      nullable: true
                      type: integer
                    name:
                      description: 'Class name. Becomes the child pool / Job name
                        suffix AND the

                        `RIO_SIZE_CLASS` env the executor reports in its heartbeat.'
                      type: string
                    resources:
                      description: "K8s resource requests/limits for this class's\
                        \ pods.\nNON-Option: distinct resource profiles are the entire\
                        \ point\nof size classes. `any_object` passthrough \u2014\
                        \ see\n`crate::any_object` for why."
                      nullable: true
                      type: object
                      x-kubernetes-preserve-unknown-fields: true
                  required:
                  - name
                  - resources
                  type: object
                type: array
              deadlineSeconds:
                description: 'Backstop `activeDeadlineSeconds` on Jobs. `None` = per-role

                  default (3600 for builders, 300 for fetchers).'
                format: uint32
                minimum: 0.0
                nullable: true
                type: integer
              hostUsers:
                description: "Explicit `hostUsers` override. `None` defaults to `hostUsers:\n\
                  false` (userns isolation per ADR-012). Set `true` for k3s/\ncontainerd\
                  \ deployments that don't chown the pod cgroup to the\nuserns-mapped\
                  \ root UID \u2014 see `BuilderPoolSpec.host_users` doc\nfor the\
                  \ full diagnostic."
                nullable: true
                type: boolean
              image:
                description: "Container image ref. Required \u2014 there's no sensible\
                  \ default\n(depends on how operators build/tag)."
                type: string
              maxConcurrent:
                description: 'Concurrent-Job ceiling. The reconciler spawns one Job
                  per

                  dispatch-need up to this many active at once. Both CRDs add

                  a struct-level CEL `self.maxConcurrent > 0`.'
                format: uint32
                minimum: 0.0
                type: integer
              nodeSelector:
                additionalProperties:
                  type: string
                description: Node selector for the Job pod spec.
                nullable: true
                type: object
              systems:
                description: 'Target systems (e.g., `["x86_64-linux"]`). Builders
                  AND

                  fetchers execute derivation `builder` scripts, so the host

                  system must match.'
                items:
                  type: string
                type: array
              tlsSecretName:
                description: "mTLS client cert Secret name (`tls.crt`/`tls.key`/`ca.crt`).\n\
                  Same cert across builders and fetchers \u2014 same binary, same\n\
                  scheduler/store endpoints. Unset = plaintext gRPC (dev mode)."
                nullable: true
                type: string
              tolerations:
                description: 'Tolerations for the Job pod spec. Typed `Toleration`
                  (not

                  `serde_json::Value`); `any_object_array` passthrough because

                  k8s-openapi types don''t impl JsonSchema.'
                items:
                  type: object
                  x-kubernetes-preserve-unknown-fields: true
                nullable: true
                type: array
            required:
            - image
            - maxConcurrent
            - systems
            type: object
            x-kubernetes-validations:
            - message: "maxConcurrent must be > 0 \u2014 it is the concurrent-Job\
                \ ceiling"
              rule: self.maxConcurrent > 0
            - message: "classes must be non-empty \u2014 fetcher pools are size-classed\
                \ (I-170/I-208); the legacy single-size spec.resources path has been\
                \ removed"
              rule: size(self.classes) > 0
          status:
            description: FetcherPool status. Reconciler writes; `kubectl get fp` reads.
            nullable: true
            properties:
              conditions:
                default: []
                description: "Standard K8s Conditions. Both pools currently expose\
                  \ one type:\n`SchedulerUnreachable` (status=True when the reconciler's\n\
                  `ClusterStatus` RPC fails \u2014 disambiguates \"scheduler idle,\n\
                  queued=0\" from \"scheduler down, queued unknown\")."
                items:
                  type: object
                  x-kubernetes-preserve-unknown-fields: true
                nullable: true
                type: array
              desiredReplicas:
                default: 0
                description: Concurrent-Job target the reconciler is converging on.
                format: int32
                type: integer
              readyReplicas:
                default: 0
                description: 'Jobs whose pod has passed readinessProbe (heartbeating
                  to

                  scheduler).'
                format: int32
                type: integer
            type: object
        required:
        - spec
        title: FetcherPool
        type: object
    served: true
    storage: true
    subresources:
      status: {}
