apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: builderpoolsets.rio.build
spec:
  group: rio.build
  names:
    categories: []
    kind: BuilderPoolSet
    plural: builderpoolsets
    shortNames:
    - bps
    singular: builderpoolset
  scope: Namespaced
  versions:
  - additionalPrinterColumns:
    - jsonPath: .spec.classes[*].name
      name: Classes
      type: string
    - jsonPath: .metadata.creationTimestamp
      name: Age
      type: date
    name: v1alpha1
    schema:
      openAPIV3Schema:
        description: Auto-generated derived type for BuilderPoolSetSpec via `CustomResource`
        properties:
          spec:
            description: "BuilderPoolSet spec. Each `classes[]` entry becomes a child\n\
              BuilderPool owned by this CR (ownerReference \u2192 cascade delete).\n\
              \n`KubeSchema` alongside `CustomResource`: same pattern as\nBuilderPoolSpec.\
              \ No CEL on this struct today, but KubeSchema\nkeeps the door open without\
              \ a re-derive (CustomResource +\nJsonSchema conflict if you later add\
              \ `#[x_kube(validation)]`)."
            properties:
              classes:
                description: "Size classes. Each becomes a child BuilderPool named\n\
                  `{bps-name}-{class.name}`. Order doesn't matter \u2014 the\nreconciler\
                  \ keys by `.name`, not position (spec-order\nchurn shouldn't trigger\
                  \ reconciles)."
                items:
                  description: 'One size class. The scheduler''s classify() maps a
                    derivation''s

                    predicted build time to the class whose cutoff is closest-above.'
                  properties:
                    cutoffSecs:
                      description: 'Upper bound (seconds) for builds this class handles.
                        A

                        build with predicted duration < cutoff_secs routes here.

                        f64 because build-time predictions are fractional (EMA

                        output). The LAST class''s cutoff is effectively infinity

                        (it catches everything above the previous cutoff).'
                      format: double
                      type: number
                    maxConcurrent:
                      description: "Concurrent-Job ceiling for this class. `None`\
                        \ = inherit.\nPer-class because \"large\" workers have big\
                        \ resource requests\n\u2014 capping them prevents one class\
                        \ from starving the cluster."
                      format: uint32
                      minimum: 0.0
                      nullable: true
                      type: integer
                    name:
                      description: 'Class name. Becomes the child BuilderPool''s name
                        suffix

                        (`{bps}-{name}`) AND the `BuilderPoolSpec.size_class` value

                        the scheduler matches against. Convention: "small" / "medium"

                        / "large"; nothing enforces that.'
                      type: string
                    resources:
                      description: "K8s resource requests/limits for this class's\
                        \ builder\npods. NON-Option: the entire POINT of size classes\
                        \ is\ndistinct resource profiles (\"small\" = 1cpu/2Gi; \"\
                        large\"\n= 16cpu/64Gi). An inherited default defeats the purpose.\n\
                        P0233's child-builder does `Some(class.resources.clone())`\n\
                        straight into `Option<ResourceRequirements>`.\n\n`any_object`\
                        \ passthrough \u2014 see builderpool.rs for why.\nThe helper\
                        \ emits `nullable: true` (it was written for\nOption fields);\
                        \ here the field is non-Option so serde\nrejects `null` at\
                        \ deserialize regardless. Apiserver\naccepts `null` \u2192\
                        \ controller fails deserialize with a\nclear error \u2014\
                        \ acceptable (operators see it)."
                      nullable: true
                      type: object
                      x-kubernetes-preserve-unknown-fields: true
                  required:
                  - cutoffSecs
                  - name
                  - resources
                  type: object
                type: array
              poolTemplate:
                description: 'Template merged into each child BuilderPool''s spec.
                  Per-

                  class fields (resources, cutoff) override; template fields

                  (image, node_selector, seccomp) apply uniformly.'
                properties:
                  features:
                    default: []
                    description: 'requiredSystemFeatures this pool advertises. Shared

                      across classes for the same reason as `systems`.'
                    items:
                      type: string
                    type: array
                  hostNetwork:
                    description: "Host network. Shared \u2014 if one class needs hostNetwork\n\
                      (e.g., bare-metal with NAR-heavy store traffic), all do."
                    nullable: true
                    type: boolean
                  hostUsers:
                    description: "Explicit hostUsers override. Shared \u2014 cluster\
                      \ runtime cgroup\ndelegation behavior (containerd OwnerUID under\
                      \ userns) is\nthe same for all class pods. See `BuilderPoolSpec.host_users`."
                    nullable: true
                    type: boolean
                  image:
                    description: "Container image. Shared across classes \u2014 same\
                      \ builder\nbinary, different resource allocations. REQUIRED\
                      \ \u2014\n`BuilderPoolSpec.image` has no default. The reconciler's\n\
                      child builder errors with `InvalidSpec` if this is empty."
                    type: string
                  nodeSelector:
                    additionalProperties:
                      type: string
                    description: 'Node selector. Shared because builder nodes are
                      usually

                      tainted/labeled uniformly (`rio.build/builder: "true"`),

                      not per-class.'
                    nullable: true
                    type: object
                  privileged:
                    description: "Privileged escape hatch. Shared \u2014 cluster runtime\n\
                      constraints (containerd seccomp blocking mount(2)) are\nthe\
                      \ same for all class pods on a given node pool."
                    nullable: true
                    type: boolean
                  seccompProfile:
                    description: "Seccomp profile (P0223). Applied uniformly \u2014\
                      \ the syscall\nfilter doesn't vary by builder size. The Localhost\
                      \ profile\n(`infra/helm/rio-build/files/seccomp-rio-builder.json`)\n\
                      denies ptrace/bpf/setns/process_vm_* regardless of how\nbig\
                      \ the builder is."
                    nullable: true
                    properties:
                      localhostProfile:
                        description: 'Path relative to `/var/lib/kubelet/seccomp/`.
                          REQUIRED when

                          `type: Localhost`, FORBIDDEN otherwise (CEL enforces both).

                          rio''s profiles are written by systemd-tmpfiles on every
                          node

                          before kubelet starts (`nix/nixos-node/hardening.nix`) and
                          land

                          at `operator/{name}.json`; the chart''s default builderPool

                          value is `operator/rio-builder.json`.'
                        nullable: true
                        type: string
                      type:
                        description: "`RuntimeDefault` \u2014 the runtime's default\
                          \ filter (~40 syscalls\nblocked). `Localhost` \u2014 a profile\
                          \ JSON at `/var/lib/kubelet/\nseccomp/<localhostProfile>`\
                          \ on the node; rio ships one at\n`infra/helm/rio-build/files/seccomp-rio-builder.json`\
                          \ that\nadditionally denies ptrace/bpf/setns/process_vm_*.\n\
                          `Unconfined` \u2014 no filter (debugging ONLY; never production).\n\
                          \n`type_` with serde rename: `type` is a Rust keyword. K8s\n\
                          convention is the field is literally `type` in YAML."
                        type: string
                    required:
                    - type
                    type: object
                    x-kubernetes-validations:
                    - rule: self.type in ['RuntimeDefault', 'Localhost', 'Unconfined']
                    - rule: 'self.type == ''Localhost'' ? has(self.localhostProfile)
                        : !has(self.localhostProfile)'
                  systems:
                    description: "Target systems (e.g., `[\"x86_64-linux\"]`). Shared\
                      \ across\nclasses \u2014 all size classes in one BPS run the\
                      \ same binary\non the same arch; separate arches warrant separate\
                      \ BPSes.\nREQUIRED \u2014 child BuilderPool CEL rejects empty\
                      \ `systems[]`."
                    items:
                      type: string
                    type: array
                  tlsSecretName:
                    description: "mTLS client cert Secret name. Shared \u2014 same\
                      \ cert-manager\nCertificate across all builder pods regardless\
                      \ of size."
                    nullable: true
                    type: string
                  tolerations:
                    description: "Tolerations. Shared \u2014 pairs with node_selector.\n\
                      Typed `Toleration` (not serde_json::Value) to match\nbuilderpool.rs;\
                      \ `any_object_array` passthrough because\nk8s-openapi types\
                      \ don't impl JsonSchema."
                    items:
                      type: object
                      x-kubernetes-preserve-unknown-fields: true
                    nullable: true
                    type: array
                required:
                - image
                - systems
                type: object
            required:
            - classes
            - poolTemplate
            type: object
          status:
            description: 'BuilderPoolSet status. Reconciler writes; `kubectl get bps`

              reads.'
            nullable: true
            properties:
              classes:
                default: []
                description: "Per-class observed state. One entry per `spec.classes[]`,\n\
                  matched by `.name`. A missing entry = reconciler hasn't\nprocessed\
                  \ that class yet (transient) or the child\nBuilderPool create failed\
                  \ (check .conditions on the BPS\n\u2014 P0233 adds those)."
                items:
                  description: 'One class''s observed state. Mirrors the child BuilderPool''s

                    status plus BPS-level derived fields (effective cutoff).'
                  properties:
                    childPool:
                      description: 'Name of the owned child BuilderPool (`{bps}-{name}`).

                        Stored explicitly (not just derivable) so `kubectl get

                        bps -o yaml` shows the link without operators having to

                        know the naming convention.'
                      type: string
                    effectiveCutoffSecs:
                      description: 'The cutoff the scheduler ACTUALLY uses right now.
                        Equals

                        `spec.classes[].cutoff_secs` when learning is off; drifts

                        toward observed build-time percentiles when on. This (not

                        the spec value) is what the scheduler''s classify() reads.'
                      format: double
                      type: number
                    name:
                      description: Matches `spec.classes[].name`.
                      type: string
                    queued:
                      description: "Builds currently queued for this class. From scheduler\n\
                        `ClusterStatus.queued_derivations` filtered by size_class.\n\
                        The autoscaler input \u2014 `queued / target_queue_per_replica`\n\
                        is the desired-replica formula."
                      format: uint64
                      minimum: 0.0
                      type: integer
                    readyReplicas:
                      description: "Child BuilderPool's `.status.readyReplicas`. Passed\n\
                        readinessProbe = heartbeating to scheduler. THIS is\nthe operator\
                        \ signal \u2014 Ready/Desired gap diagnoses\nstuck rollouts\
                        \ (matches builderpool.rs printcolumns)."
                      format: int32
                      type: integer
                    replicas:
                      description: 'Child BuilderPool''s `.status.replicas` (observed).
                        May

                        lag `ready_replicas` during rollout.'
                      format: int32
                      type: integer
                  required:
                  - childPool
                  - effectiveCutoffSecs
                  - name
                  - queued
                  - readyReplicas
                  - replicas
                  type: object
                type: array
            type: object
        required:
        - spec
        title: BuilderPoolSet
        type: object
    served: true
    storage: true
    subresources:
      status: {}
