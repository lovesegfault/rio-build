[package]
name = "rio-scheduler"
version.workspace = true
edition.workspace = true
authors.workspace = true
license.workspace = true
repository.workspace = true
publish = false
description = "DAG-aware build scheduler for rio-build"

[[bin]]
name = "rio-scheduler"
path = "src/main.rs"

[dependencies]
rio-common = { workspace = true }
rio-proto = { workspace = true }

tokio = { workspace = true }
tokio-stream = { workspace = true }
tonic = { workspace = true }
# grpc.health.v1.Health for K8s readiness probes. C3 gates SERVING on
# is_leader so the K8s Service routes only to the leader replica.
tonic-health = { workspace = true }
# Lease-based leader election. Thin wrapper over coordination.k8s.io/v1
# Lease. Gated on RIO_LEASE_NAME env — unset means non-K8s mode
# (generation stays at 1, VM tests unaffected). No fencing: brief
# dual-leader possible on network partition. Acceptable — dispatch
# is idempotent (DAG merge dedups by drv_hash; workers reject
# stale-generation assignments via heartbeat compare).
kube = { workspace = true }
kube-leader-election = { workspace = true }
rustls = { workspace = true }
k8s-openapi = { workspace = true }
sqlx = { workspace = true }
uuid = { workspace = true }
clap = { workspace = true }
tracing = { workspace = true }
metrics = { workspace = true }
anyhow = { workspace = true }
thiserror = { workspace = true }
rand = { workspace = true }
prost = { workspace = true }
prost-types = { workspace = true }
rio-nix = { workspace = true }

# phase2c D5: priority queue. f64 doesn't impl Ord (NaN);
# OrderedFloat wraps it with a total ordering.
ordered-float = { workspace = true }

# phase2b: build-log S3 flush (gzip + PUT logs/{build_id}/{drv_hash}.log.gz)
aws-sdk-s3 = { workspace = true }
aws-config = { workspace = true }
flate2 = { workspace = true }
# phase2b: log ring buffer written from BuildExecution recv tasks
dashmap = { workspace = true }
serde = { workspace = true }

[dev-dependencies]
tokio = { workspace = true, features = ["test-util"] }
rio-store = { workspace = true }
rio-test-support = { workspace = true }
sha2 = { workspace = true }
tracing-test = "0.2"
aws-smithy-mocks = "0.2"
aws-sdk-s3 = { workspace = true, features = ["test-util"] }
# figment::Jail for env-var isolation in lease.rs tests (env is
# process-global; parallel tests would race without isolation).
figment = { workspace = true, features = ["test"] }
