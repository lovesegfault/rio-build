# This file contains settings for `cargo hakari`.
# See https://docs.rs/cargo-hakari/latest/cargo_hakari/config for a full list of options.

hakari-package = "workspace-hack"

# Format version for hakari's output. Version 4 requires cargo-hakari 0.9.22 or above.
dep-format-version = "4"

# Setting workspace.resolver = "2" or higher in the root Cargo.toml is HIGHLY recommended.
# Hakari works much better with the v2 resolver. (The v2 and v3 resolvers are identical from
# hakari's perspective, so you're welcome to set either.)
#
# For more about the new feature resolver, see:
# https://blog.rust-lang.org/2021/03/25/Rust-1.51.0.html#cargos-new-feature-resolver
resolver = "2"

# Add triples corresponding to platforms commonly used by developers here.
# https://doc.rust-lang.org/rustc/platform-support.html
platforms = ["x86_64-unknown-linux-gnu", "aarch64-unknown-linux-gnu"]

# xtask is deploy tooling (aws-sdk-{ec2,ecr,elbv2,sts}, gix). Excluding it
# from final unification stops ~600K LoC of generated AWS API bindings
# from leaking into rio-auth/rio-nix/rio-crds via workspace-hack. The nix
# build path already stubs workspace-hack (nix/crate2nix.nix), so this
# only affects local cargo + the importCargoLock-based checks (mutants/
# fuzz/deny).
[final-excludes]
workspace-members = ["xtask"]

# aws-smithy-runtime[test-util] → legacy-test-util → connector-hyper-0-14-x
# pulls hyper 0.14 / h2 0.3 / http 0.2 into [dependencies] — exactly the
# heavyweight-transitive case the previous comment said to revisit. Excluding
# the smithy crates from feature traversal means test-util features don't
# unify into the prod feature set; aws-smithy-mocks (dev-dep) still gets what
# it needs at test time.
[traversal-excludes]
third-party = [
  { name = "aws-smithy-runtime" },
  { name = "aws-smithy-http-client" },
  { name = "aws-sdk-s3" },
  { name = "aws-sdk-ec2" },
  { name = "aws-sdk-sts" },
]

# Write out exact versions rather than a semver range. (Defaults to false.)
# exact-versions = true
